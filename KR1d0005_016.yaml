body:
  text: 周禮詳解卷十六宋王昭禹撰土均掌平土地之政政音征均人掌均土政而土均掌平土地之政者以土為質而能包之者地也本於地而有所􅋄生者土也言地則土在焉言土則不能兼地故十二土則本於地五物之中則莫不具十有二土均人無所不均故曰均地政土均則雖有及乎地政然以土為主而不及乎均人也故言平土地之政言土地則指其土之所在而已故平土地之政其官謂之土均掌均地政其官謂之均人蓋言均人則土不得而均之矣地守地事地貢莫不皆有政所謂政則正此者也土均先言平土地之政蓋以此也以均地守以均地事以均地貢生財之道有地則有物有物則有政其政有事則謂之地事其事有職則謂之地職其物有守則謂之地守有職而財生有守而財足斯有地征焉或征其財謂之財征或征其力謂之力征上征財於下下共財於上斯有地貢焉澤虞使其地之人守其財物迹人掌邦田之地政為之厲禁而守之草人掌金玉錫石之地為之厲禁而守之山虞物為之厲為之守禁皆地守也任農以耕事任圃以樹事任牧以畜事任虞衡以山澤之事皆地事也農貢五穀圃貢草木虞衡貢其物皆地貢也均人均地職而不均地事土均均地事而不均地職均人均地政而不均地貢土均均地貢而不均力政者大司徒分地職以為地守而待政令則力征出於地職也小司徒井牧其田野以任地事而令貢賦則地貢出於地事也然有職必有事有事必有職亦互見也土均之均地守則序於地事之上均人之均地政則序於地職之上何也蓋有地則有物有物則有政其政有事謂之地事其事有職謂之地職其物有守謂之地守然則地守不均則物烏能無害物有害何待於職事此所以序於其上與以和邦國都鄙之政令刑禁與其施舍禮俗喪紀祭祀皆以地􅍇惡為輕重之法而行之掌其禁令孔子曰均無貧和無寡知和而和不以禮節之亦不可行也則均之而和和之而節事之序也以均地守地事地貢所謂均也以和邦國之政令刑禁與其施舍禮俗喪紀祭祀所謂和也皆以地􅍇惡為輕重之法而行之掌其禁令所謂節也蓋政令刑禁施舍禮俗喪紀祭祀皆順民之欲而不乖其所宜不咈其所習夫是之謂和也政令之緩急刑禁之寬猛施舍之可否禮俗之因革喪紀之豐約祭祀之備殺視地之􅍇而重行之視地之惡而輕行之宜行者令之不宜行者禁之無過無不及使之一趣於中而已夫是之謂有節也和而節之然後均之事成矣草人掌土化之法以物地相其宜而為之種以物化土以土飬物使九榖草木皆得其宜故名官謂之草人草於榖木為微物也微物尚然况其大者乎與洪範言庶草蕃廡同意夫天時有生地理有宜人官有能物曲有利草人掌土化之法以物地相其宜而為之種人官有能而致物曲之利者也六府之政水火金木土榖惟修五行天以生物者也不能自致其生九榖天以飬人者也不能自致其飬惟人修之而已以其宜各以土為之種焉所以修榖以其宜土之物為之糞焉所以修土移壯而老移少而壯夫是之謂物化移瘠而肥移惡而美是之謂土化化者因刑以易之者也物之有化天之理也而使九榖草木實函斯活苗而至於秀秀而至於實則后固有輔相裁成之道草人豈可闕哉十有二土之中皆有五地五地之中皆有九土五物之民五地之物待此九土以飬生者也不知異壤則地失其利不知異宜則物失其性故物地相其宜而為之種也凡糞種騂剛用牛赤緹用羊墳壤用麋渴澤用鹿鹹潟用貆勃壤用狐埴壚用豕彊㯺用蕡輕爂用犬緹他奚反墳符粉反渴其列反潟音昔貆呼丸反埴音職彊其兩反㯺呼覽反蕡扶云反爂孚照反大司徒别十有二土則有冀之白壤兖之黑墳青之白墳徐之赤埴揚荆之塗泥豫之墳壚梁之青黎雍之黃壤然冀之土不能盡為白壤徐之土不能盡為赤埴草人又統十有二土而物色之則有騂剛赤緹墳壤渴澤鹹潟勃壤埴壚彊㯺輕爂之類焉牛宜稌羊宜黍之類禽獸以九榖為宜其利在飬人騂剛用牛赤緹用羊之類九土以禽獸為宜其利在飬穀禽獸土穀有相為用之理自非窮理盡性未有能及之者矣有土㑹之法以辨物之多寡然後土均之政行焉有土宜之法以知地之利害然後土化之法行焉土均之法行而天下無不平之政土化之法行而天下無不實之物糞種以糞糞之性用蕡非以糞而謂之糞者為其用之也亦如糞糞之也稻人掌稼下地以瀦畜水以防止水以溝蕩水以遂均水以列舍水以澮寫水草人以物化土稻人以榖擇地此其職所以相次與地有異宜榖有異性利髙燥者黍地不宜下濕利下濕者稻地不宜髙燥稻人以榖之性擇地以稻宜下濕也故掌下地夫山澤平地為之三農以處九榖之性而稼之稻人掌稼下地故榖不失其生地不失其利素問曰西方共榖稻稻雖金榖而金生水稻宜水以母從子也水性趣下故下地乃水之種最易為生此掌稼下地所以専設稻人之職也然旱乾水溢天變之無常也先王不能使天時無旱乾水溢之變能使之不為害者預為之備而已以瀦畜水所以待旱乾也以防止水所以待水溢也能止水而不能蕩也水猶無所行焉以溝蕩水則蕩而行之使有所歸也以遂均水則均瀦之所畜以列舍水則舍遂之所均遂者傳受諸瀦而置之列則所舍非一也以澮㵼水則澮溝之所蕩言澮則所受非一也澮者通諸溝而置之川者也以涉揚其芟作田凡稼澤夏以水殄草而芟夷之澤草所生種之芒種旱暵共其雩斂喪紀共其葦事毁草為芟涉水而揚去其所芟毁之草萊然後田可作也故曰以涉揚其芟作田月令季夏燒剃行水利以殺草如以熱湯夏以水殄草則以夏水如湯利以殺草故也夫稂莠荼蓼之害稼也無地無之而稼澤者其患尤甚然夏以水殺草則井其根本而絶之則草不復生矣故曰殄殄者絶其根本之謂也芟以毁草夷以平草必先毁之然後平之周任曰見惡如農夫之務去草芟夷蕰崇之故曰凡稼澤夏以水殄草而芟夷之芒種者澤所宜稻之類也澤草所宜其地必宜芒種故種之芒種夫利下濕而暑者稻之類也故種之芒種序於夏以水殄草之後則夏殄草而芒種種矣旱暵共其雩斂者旱陽干時也暵則旱甚而乾焉蓋陰中之陽上達陽中之隂下同而固之然後為雨雩者旱暵求雨之祭也故其字從雨從于以陽干時旱祭求于而雨也使稻人共其雩斂則稻尤急雨故也夫以瀦畜水其以責諸人事者所以立本其求諸天時者所以為之輔二者不可偏廢也荀卿乃以雲而雨為天而已又烏知天人之際哉喪紀共其葦事則葦生下地故也稻可以為生葦可以為死財力之所在蓋雖下地飬生喪死之物具焉土訓掌道地圖以詔地事稻人掌擇地利土訓掌去地害此土訓所以次於稻人之後與謂之土訓以其能訓說土地善惡之𫝑故也土地之圖大司徒建之職方氏掌之土訓則掌以其圗道王而已地事則若職方氏所職邦國都鄙夷蠻閩貉戎狄之利害也蓋內之邦國都鄙逺之夷蠻閩貉戎狄王皆制其畿封近者為之扞蔽逺者為之奮衛其地異制其利異宜其民異數其榖異種其畜異類王將制其職貢巡其封域而或物之有無事之利害莫之知焉其欲安擾邦國不亦難乎土訓掌道地圖以詔地事則王不下堂而知天下矣大司徒佐王安擾邦國土訓與有力焉道地慝以辨地物而原其生以詔地求王巡守則夾王車慝他得反物受地氣而生土性而化也慝地氣之惡而匿者發或為瘴生或為蠱散於草木禽獸之類皆能害人王將發政施仁安飬人物為務則地慝可不知哉此土訓所以道之也辨地物則求知其善惡之類原其生則求知其善惡之性以詔地求則詔王以可求之物如此則地慝之物不能行其毒矣害人之蠱先王為設庶氏以攻說禬而去之蓋有土訓為之辨焉王巡守則夾王車者必夾王車則便於詔王故也土訓以其道地圖以詔地事故使之夾王車職方氏以其掌天下之地則使之先道皆其職之所宜也誦訓掌道方志以詔觀事處堂上而知天下則土訓掌地圖以詔地事處方今而知久逺則誦訓掌道方志以詔觀事此其職所以相次也前往之事出於四方各志以為書焉誦訓誦此志以訓耳土訓則以土訓惟其志以為書故可以言誦訓道方志以詔觀事則於王所觀以所志之事詔焉聖人之學溫故而知新道中庸則當溫故極髙明則當知新然則四方之志誦訓詔王以觀斯亦不可廢土訓之詔所以助王之為政也誦訓之詔所以廣王之為德也掌道方慝以詔辟忌以知地俗王巡守則夾王車辟音避地慝五土之氣能致毒以害人者方慝五方之氣能致邪以病人者若中央地平以濕其病多痿寒熱之類是詔辟則在其居處詔忌則在其飲食謂之中央當辟濕忌食雜而不勞之類是也以知地俗者寒暖燥濕異氣廣谷大川異制民生其間異俗剛柔輕重異齊衣服異宜飲食異和然則地俗之異蓋自五方之氣各有感致之者若中央以道引按蹻為俗也知俗之善者則禮之所因知俗之惡者則禮之所制則地俗不可不知也王巡守則夾王車者土訓所道地圗誦訓所道方志王嘗聞之矣巡守夾王車者備王或質所聞焉王且見而知之矣山虞掌山林之政令物為之厲而為之守禁山林方地之所有此職其事者所以次於誦訓之後其害不除不能致其利其政不平不能取其物是故山澤之官以虞名之者有防患之意也山林之官以衡名之者有平政之意也方堯之時禽獸逼人獸蹄鳥跡之道交於中國烈山澤而焚之禽獸逃匿益任其事周雖無是患矣其患豈可忘哉此山澤之官所以有虞焉然除禽獸之患然後立山林之政山林之政立矣然而除患之慮卒不可忘是故以虞名官為之先後二衡在其中焉林木金玉錫石禽獸之類山之所有非一物也為之厲則各有地為之守則各有物為之禁則妄入竊取之民莫敢犯焉仲冬斬陽木仲夏斬隂木凡服耜斬季材以時入之斬陽木必以仲冬以水之盛氣飬其堅以濟諸其隂也斬隂木必以仲夏以火之盛氣飬其柔以濟諸其陽也如此而後用之則隂陽之氣相濟而堅者不失於倔强柔者不失於軟弱矣餘見新經斬以為服耜服謂牝服則車之平較也耜謂耒耜即耕耨之器也二者皆因其材而揉焉故取季枝季枝摽枝也夫材美工巧然而不良則不得地氣也是故以仲冬斬陽木以仲夏斬隂木凡服耜斬季材因天時以飬材因天材以制器然後工之巧行焉令萬民時斬材有期日凡邦工入山林而掄材不禁春秋之斬木不入禁掄魯門反草木零落然後入山林斬木之時也使終是時而斬之則將苟取以盡物矣故令之以時又期之以日有期日則節其時焉時斬材有期日慮民以過取盡我材耳邦工掄材為邦用也焉用禁哉邦工掄材不必以時然而春秋斬木非其時也斬於禁外可也不入禁中凡竊木者有刑罰若祭山林則為主而修除且蹕若大田獵則萊山田之野及弊田植虞旗于中致禽而珥焉竊木者有刑罰然後厲守禁令莫敢犯焉祭山林則為主者山虞以其虞物之害神之所依故其祭也為主餘並見傳林衡掌巡林麓之禁令而平其守山林之禁令山虞掌之林衡掌其巡之禁令而已地有廣狹物有多寡事有難易職有勞逸巡其禁令要知其所守而平之名官以衡者有平政之意故林川之官皆以平其守為任山澤之官一以平政一以防患不可廢也故山林之官以山名虞以林名衡川澤之官以川名衡以澤名虞必以澤名虞禽獸之患比於山林尤多此虞所以名澤與然而平其政山澤皆不可廢也此閭師所以任衡以山事與以時計林麓而賞罰之平其守然後可以計林麓而賞罰之禁有嚴易林有盛衰民有畏慢令有可否然後賞罰可行焉令萬民時斬材然而不以時計林麓則不見其用捨也若斬木材則受法于山虞而掌其政令山林之政令林衡不得而掌之掌其斬木材之政令而已仲冬斬陽木仲夏斬隂木春秋之斬木不入禁斬木之法也凡服耜斬季材令萬民時斬材斬材之法也反此則有刑罰天生蒸民即為庶物以飬之物之所在髙在乎山林卑在乎藪澤財物之入其盛足以充邦賦實王府其餘足以及萬民裕貧乏雖然山林藪澤天有飬人之意先王不能物為之厲為之守禁則利亦幾乎熄矣何以聚民而致其義哉故任衡以山事任虞以澤事澤虞之藪在焉以富得民獨言藪者言藪之小如此則大乎藪者豈有不得民哉先王之時有地則有物有物則有政有政則有厲守禁令妄取者以禁防之妄入者以厲限之守有民主有官故山林川澤之物以時而取以禮而費有材者不可勝用也有味者不可勝食故雖小藪之徒凡二十人大藪四之充邦賦實王府頒其餘於萬民飬生有備喪死有具此其所以能得民與不然或弛山澤之租使同其利不知其實害之或禁其利悉歸於公上而民不與焉或棄山林藪澤而弗治以至於無物野荒民散可勝惜哉為之厲禁則不弛山澤之租頒其餘於萬民則不禁其利以時計林麓而賞罰之則不至於無物夫榖不可勝食則飬生有備焉材不可勝用則送死有具焉孟子曰飬生喪死無憾王道之始也然山林藪澤之利蓋與井田相為用者豈可偏廢哉後世有若榷山之利類為百姓所擅而有豪强小民交易而去羣行山林出入萬死一生之地其直與公上爭低昻其勇與公上爭勝負冒法抵禁小者以徒大者以殺然而山林之功不施於百姓徒禁其交易而去者故其法愈嚴犯者愈衆與其取於百姓而禁其私販孰若物為之厲為之守禁頒其餘於萬民之為愈哉故嘗謂後世山林藪澤之政廢而不行未知為政之務者也川衡掌巡川澤之禁令而平其守以時舍其守犯禁者執而誅罰之祭祀賔客共川奠山虞兼林之政令川衡兼澤之禁令林衡兼麓澤虞兼藪林之政山虞掌之林衡掌其巡之禁令而已澤之政澤虞掌之川衡掌其巡之禁令而已然則林衡者正於山虞者也川衡正於澤虞者也澤虞之政令而不及川則川之政令掌於川衡不言政令者略之也百川生出無常汗漫而難制不言物為之厲不可厲也澤虞曰使其地之人守其財物則平其守者亦各使人守其地之財物而平其所守之多寡矣不言者以澤虞見之也以時舍其守則守者嗣守於其所守澤之人亦必如此而不言則互見也共川奠共川物之奠也則籩豆之實魚鱐蜃蛤之類也不言物則以澤虞見之矣澤虞掌國澤之政令為之厲禁使其地之人守其財物以時入之于玉府頒其餘于萬民澤虞掌國澤之政令則禁令掌於川衡矣厲以限其妄入禁以止其非法有厲而無禁則侵踰之心生焉烏能使之不入者哉使其地之人守其財物則地與人人與物不患其相失地之所出物之所宜人習而守焉然文王之治岐澤梁無禁何也蓋商之末世猶凶年也以荒政拯之而已成王周公之時苟不禁之則謂之無政矣餘見傳凡祭祀賔客共澤物之奠喪紀共其葦蒲之事若大田獵則萊澤野及弊田植虞旌以屬禽澤物則芹茒菱芡之屬也川衡言共川奠而不言物則以此見之也喪紀共其葦蒲之事則葦以闉壙蒲以為席二者皆生於下地故使澤虞共之也稻人共葦事而不共蒲則各以其所有共之也若大田獵則萊澤野所謂藪也及弊田植虞旌以屬禽者山虞以旗致禽則熊虎山物也致之亦宜有威而使之服故也澤虞以旌屬禽則鳥羽澤物也屬之亦宜有析而使之别故也旌屬禽之物也其用之在於得利而已齊景公之招虞人以旌用屬禽之物是待虞以利而已古者虞人有防患之智有除害之義豈志於得利者之所能為哉惟非其招不往故能有是智有是義此其所以不負於先王名官之意孔子所以取之也或言致禽或言屬禽皆致而屬之者也不言則亦以山虞見之迹人掌邦田之地政為之厲禁而守之凡田獵者受令焉禁麛卵者與其毒矢射者麛音迷卵力管反詩以庶類蕃殖搜田以時為王道之成故其見於政事者邦田之地皆有官以掌焉其官謂之迹人則以獸可從迹而後可得田而取之也其地謂之邦田則以飬蕃鳥獸而田之與種藝百穀而田之其利同故也有邦田之地然後鳥獸有所生有地而無政則其生不能蕃息雖有政不為厲禁以守之則侵地盜物以干有司者衆矣雖為厲禁以守之然雉兔者往焉亦弗禁也令之以其所當為禁之以其所不當為而已凡田者受令以其所當為也禁麛卵者與其毒矢射者禁之以其所不當為也蓋萬物之生惟人為最靈故能圈豹檻虎獵取禽獸以自飬雖以自飬然先王之交物未嘗無愛心焉故生之則以其時殺之則以其禮禁麛卵者則生之以其時也禁毒矢射者殺之以其禮也生之以時故於物無所殄殺之以其禮故於物無所暴暴殄天物蓋無時焉可也而記月令者乃以孟春之月則母麛母卵季春之月則餧獸之藥母出九門豈其然乎草人掌金玉錫石之地而為之厲禁以守之若以時取之則物其地圗而授之巡其禁令草革猛反天財之所出地利之所在先王不盡以遺民非私之也要使民之棄末厚本而兼人之强不能擅取豫之權故金玉錫石之地皆有掌焉其官謂之草人與詩所謂總角丱兮之丱同矣蓋丱雖總髮然别而為二不如冠者之一金玉錫石之地立官以掌以非權之也特取其有公私之别焉耳若以時取之則物其地者因其見禁而物之也圖而授之則使之按圗而取之也蓋天之財地之利盛衰消息不能常齊凡以天所化地所育化育之事不能常均故也然則以時取之者以適其盛衰消息之時而已故使之日出而不窮所謂六府孔修節用水火金木土槩見於此矣後世上失其政山海之藏乃盡棄而與民草人之厲禁既委而不修則其取無時其用無節雖天所化地所育有時而屈於求取之無已生民之用其能日出而不窮乎角人掌以時徴齒角凡骨物于山澤之農以當邦賦之政令以度量受之以共財用萬物盈於天地之間而人並用之故一草木一蟲魚齒革羽毛根實色味一材茍中於用亦有所不遺此角人羽人掌葛掌荼掌炭掌蜃之屬所以列於地官與然其取之也取地之所宜而不責其所無也因其職之所共而不强其所不足也故以當邦賦之政令權然後知輕重度然後知長短量然後知多寡角人所受則以度量掌葛則以權度掌染草則以權量凡以其所掌之物有輊重長短多寡為不同故也羽人掌以時徴羽翮之政于山澤之農以當邦賦之政令凡受羽十羽為審百羽為摶十摶為縳政音征縳除轉反一翕張者羽之所恃以立相隔而必相用者翮也謂之羽翮之政者有物斯有政有政斯有官故羽人之官以時徴羽翮之政也凡受羽十羽為審以羽至十可審而知也百羽為摶以羽至百可束而執也十摶為縳以羽至千可繫而制也審摶縳皆束羽之名數如此則物數雖多而易辨也於羽如此則凡物之在官者可知矣掌葛掌以時徴絺綌之材于山農凡葛征徴草貢之材于澤農以當邦賦之政令以權度受之詩言葛之覃兮繼之以是刈是濩為絺為綌則絺綌皆葛也言其物則曰葛言其服治之功則曰絺綌其精者則為絺其粗者則為綌必徴於山農則葛出於山故也徴草貢之材則檾紵之屬必徴於澤農則檾紵之屬出於澤故也凡此亦相地之宜而不責其所無也掌葛言絺綌之材草貢之材而掌染草言染草之物掌炭言灰物者所以色此謂之物所以為用謂之材以權度受之而不以量蓋葛覃之材以輕重長短為非用量也掌染草掌以春秋斂染草之物以權量受之以待時而頒之染草則茹藘紫茢藍皂之屬以春秋斂之則其斂有時也詩曰物其多矣惟其時矣蓋物之不時則不中於用則絺綌不可登於服皮革齒牙骨角羽毛不可登於器雖多日用非所貴矣故角人羽人掌葛之所徵皆以時以時則非時在所不斂矣掌斂染草以春秋則惟春秋之時而已非特斂之以春秋之時而用亦有時故又繼之以待時而頒之蓋染人春暴練夏纁𤣥秋染夏則纁𤣥之物頒以夏染夏之物頒以秋也掌炭掌灰物炭物之徴令以時入之以權量受之以共邦之用凡炭灰之事炭灰之物為至微而用不可廢先王設官以掌之則物曲之利無所遺也角人羽人掌葛掌染草莫不有徴斂之時而掌炭灰物之徴令但曰以時入之何也蓋角羽天産也草葛地産也天地之産其生成有時非時則其物未成而不中用故徴斂皆有時若夫炭灰則人力之所成也人力之所成則無時而不有故上之人亦無時而不徴特以時入之而已掌染草掌炭皆以權量受之則染草與灰炭惟權其輕重量其多寡故也無俟於長短之度矣掌荼掌以時聚荼以共喪事徴野疏材之物以待邦事凡畜聚之物共喪事者以荼著物儀禮曰茵著用荼然則聚荼以共喪事所以為茵以藉柩著以禦濕不以時聚之則倉卒無以用故掌荼以時聚焉蓋吉凶迭事先王於吉未嘗忘凶故雖茵著之微物亦預為之備矣凡植物而非所美者謂之疏材雖疏材而凡邦事有須之者則掌荼徴之以待焉自無以致有之謂徴凡物聚之而後斂斂之而後徴以九職言之聚斂疏材蓋臣妾之事掌荼則因臣妾之所聚斂者徴之而已鄭氏謂徴于山澤入于委人是也掌蜃掌斂互物蜃物以共闉壙之蜃祭祀共蜃器之蜃共白盛之蜃互戶故反蜃子忍反夫宋文公卒厚葬用蜃炭春秋譏之以僣禮也蜃器之盛以盛胙肉用之以歸也春秋天王使石尚來歸脤脤蓋胙肉以蜃器盛之乃可以饋逺也白盛之蜃以飾屋用之以居止也墻壁得蜃灰以飾因以成其盛焉故守祧曰其祧則有司黝堊之堊之謂以蜃飾之故爾雅亦曰墻謂之堊囿人掌囿游之獸禁牧百獸祭祀喪紀賔客共其生獸死獸之物夫棄田以為園囿沛澤多而禽獸至古人之所誅而此有囿人掌囿游之獸禁何也蓋一張一弛人情之所不免先王襲諸人間亦與之同則人之所樂者亦與之偕樂焉此所以有囿游也然一游之頃亦非無事也故囿游之獸禁掌以牧百獸而牧百獸以共生獸死獸之物為祭祀喪紀賔客之饔飱膳羞焉夫豈盤于游哉後世暴君竊先王之迹窮一已之私欲故囿人獸禁之意一切忘矣齊宣王之囿乃為之大禁而殺其麋鹿者如殺人之罪故孟子謂為阱於國中也餘載傳場人掌國之場圃而樹之果蓏珍異之物以時斂而藏之凡祭祀賔客共其果蓏享亦如之載師以場圃任園地所謂國之場圃則屬於公者場人之所掌也所謂民之場圃則屬於私者閭師之所掌也此言場人則以掌築場圃故耳蓋先王之時徑行必有桑疆埸必有瓜所以力地而無遺利焉故萬物之生則闢場以為圃所以種植及物之成則築圃以為場所以收穫凡祭祀賔客共其果蓏享亦如之言祭祀而又言享則享為宗廟之祭也廪人掌九榖之數以待國之匪頒賙賜稍食食音嗣天道之運散於春藏於冬故春之色蒼而冬之氣則凛凛與廪同義所以藏也倉與蒼同義所以散也名官以廪人而首言掌九榖之數以待國之匪頒賙賜稍食者卒乎散之意也名官以倉人而首言掌粟入之藏則倉雖所以散然始乎斂故掌粟入之藏始乎斂之意也以嵗之上下數邦用以知足否以詔榖用以治年之凶豐凡萬民之食食者人四釜上也人三釜中也人二釜下也若食不能人二釜則令邦移民就榖詔王殺邦用凡邦有㑹同師役之事則治其糧與其食大祭祀則共其接盛數色主反接注作扱周四時為嵗禾一熟為年嵗之字從戍從步則嵗以戍為節天時也數戍必期焉年之字從禾從人從一則年以禾為節人事也凡禾年一稔焉禾稔不齊不可以期數也廩人數邦用以嵗上下蓋數邦用者量入以為出非周四時不知其足否也司稼出斂法以年之上下則以出斂法者巡野觀稼惟禾之熟已見其豐凶故也然則制邦用大宰事也廩人何與焉蓋制之者大宰而詔之者廪人廪人之所詔亦榖用而已邦用非特榖也數邦用以知足否以詔穀用則年適豐雖粒米狼戾不侈於有餘年適凶雖饑饉薦臻不苦於不足以吾有以治之也晏嬰謂六斗四升為釜管仲謂百升而成釡即釜也當從管子為正四釜三釜二釜者月計之也月計人食四釜為年之上三釜為年之中二釜為年之下然則何以量其數而計之也蓋先王之民生齒以上有食之端矣已書于版挍登邦比之法又詳則凡民之幼壯孤寡登耗無不知也以口授田以田制食觀稼省斂又以時出焉則凡其食之有餘不足無不知也若食不能人二釜則令邦移民就榖者榖少則姑自足而已多則可移以就民或移民以就焉大司徒于大凶大札亦令邦移民通財夫不擅其民而移之不擅其財而通之所以使天下為一家中國為一人後世此法亡矣邦國之君専財以自封艱厄急難莫相救恤乃有請糴之禮或與或閉以為私恩故晋糴於秦則與之秦糴於晋則閉之豈先王荒政之意乎詔王殺邦用非特以為不足故殺之備禮於盛多省禮於凶札損益與時偕行凡邦有㑹同師役之事則治其糧與其食者所以量逺近為之節焉莊子曰適百里者宿春糧適千里者三月聚糧亦計日而為之糧食也大祭祀共其接盛者以王籍之所藏亦廩人之所掌也謂之接盛則其所以接盛者在是與舍人掌平宫中之政分其財守以法掌其出入舍人掌宫中之政以贊宫正內宰之事者也故宫正掌王宫之政令紏禁內宰掌治王內之政令而舍人則掌平宫中之政則王宫后宫之政皆掌平之也分其財守者凡宫中之財守皆掌分之以法掌其出入者非特分之又以法掌其出入也與宫正幾其出入均其稍食內宰均其稍食分其人民以居之同意凡祭祀共簠簋實之陳之賔客亦如之共其禮車米筥米芻禾喪紀共飯米熬榖內方曰簋內圓曰簠簠以實稻粱簋以實稷黍稷食之常也故用簠則簋從之簋之字從艮從艮則簋常以日共焉內方有常故也稻粱其加榖也故用簋則簠不從之簠之字從甫甫言有父之用又內圓則非常以食也凡祭祀共簠簋實之陳之實之以言其物陳之以言其數賔客共車米筥米芻禾則掌客所謂侯伯米百筥米三十車禾四十車芻薪倍禾之數是也喪紀共飯米熬穀者飯米所以含不忍死者之口也熬榖以置宫旁使異物不得親其膚而已以嵗時縣穜稑之種以共王后之春獻種掌米粟之出入辨其物嵗終則㑹計其政縣音懸稑音六內宰上春詔王后帥六宫之人生穜稑之種而獻之于王故舍人則縣穜稑之種以共王后之春獻種所以成內宰之事也先種後熟謂之穜後種先熟謂之稑嵗時縣穜稑之種則將以備後之先種也王耕而后獻種后蠶而王獻繭夫婦相成之義也宫正月終掌㑹稍食嵗終㑹行事內宰嵗終㑹內人之稍食舍人米粟之出入而辨其物嵗終則㑹計其政亦所以通職聨事也倉人掌粟入之藏辨九榖之物以待邦用若榖不足則止餘法用有餘則藏之以待凶而頒之凡國之大事共道路之榖積食飲之具廪所以藏倉所以散故倉之字從人從口從彐從丿蓋倉雖集之圍之掌之然卒乎散者必始乎斂故倉人掌粟入之藏則始乎斂之意也辨九榖之物以待邦國則九穀之物以待邦用者物辨之待邦用而共之也有言五榖有言九榖有言百榖以五行所屬而言則有五榖以三農所生而言則有九榖號其多而言之則曰百榖廪人掌九榖之數倉人辨九榖之物皆以三農所生而言也數之掌之而已物則有辨焉若榖不足則止餘法用者法式所用有雖不足不可以已者有待有餘然後用者所謂餘法用則待有餘而後用者也有餘則藏之以待凶而頒之者榖雖有餘不可以妄費則藏之以備不足故待凶而頒之然則先王之世雖凶荒而國無廢禮用無乏財者以有此具故也國之大事共道路之榖積食飲之具者大事則戎祀之類也蓋戎以出征而祀亦有出郊者故倉人共道路穀積食飲之具若戎祀之外則非所共也司祿闕司稼掌巡邦野之稼而辨穜稑之種周知其名與其所宜地以為法而縣於邑閭巡野觀稼以年之上下出斂法掌均萬民之食而賙其急而平其興稼曰稼穫曰穡稼以往穡以來生民之本在是焉先王既有以教之又有以觀之巡之則有時治之則有法而又有司稼之官者蓋稼事而滅裂之則穡事將以滅裂而不登矣故致詳於稼事以作其始則穡事之所以成其終可知矣此司稼所以掌巡邦野之稼也夫先王之民可謂務農矣然辨穜稑之種周知其名與其所宜地非人之所能也故司稼以為法縣於邑閭使稼者取法焉由是觀之農豈可以無師帥之官哉巡野觀稼以年之上下知年上下則知民有餘不足然後出斂法焉則有餘知斂不足知舍矣夫公田之稅助也觀稼而出斂法貢也夏貢商助則兼修而並用之其實皆什一以變而通之有此道也孟子曰治地莫不善於貢然周雖兼用貢法而有司稼以三年上下出斂法則有貢之名而無害矣掌均萬民之食則以司稼知年之上下故使均民食若年之上則人食四釜年之下則人食二釜也既均其食若食不足則必知之矣故急者從而賙之既有賙民之急則或興粟以就民之所居斯賦役矣故平其興平其興者平其興粟之役也使逺近勞役各適於均而已舂人掌共米物祭祀共其齍盛之米賔客共其牢禮之米凡饗食共其食米掌凡米事齍音咨春之字從廾從三從臼杵臼上春榖以為米也榖之所以毁米之所以成故㫪人掌共米物則非一未也祭祀賔客饗食凡用米之事皆掌焉其職則以奄二人女㫪抌二人奚五人為之亦稱其事而已稷謂之粢實於簠簋謂之盛祭用衆榖而總曰粢者舉粢以該衆也賔客共其牢禮之米則以共􅐪人簠簋之實者蓋以賔客車米筥米自舍人所共故也饗食共其食米言饗與食則兼燕矣􅐪人掌凡祭祀共盛共王及后之六食凡賔客共其簠簋之實饗食亦如之􅐪昌志反㫪人㫪榖以為米􅐪人炊米以為食􅐪之字從食從熙或又從喜則陰以陽熙而為喜也春與􅐪其事相成餘見新傳槀人掌共外內朝冗食者之食若饗耆老孤子士庶子共其食掌豢祭祀之犬槀苦報反朝直遙反冗如勇反豢音患木髙而水氣不足以滋之則槀槀則在所槀焉猶勞之為勞罷之為罷也掌共內外朝冗食者之食則凡以槀其槀而已故名官謂之槀人冗食謂無職事而食者或待事故也外朝則司冦斷獄訟之朝內朝則路門外王日治事之朝外內朝皆有無職事而待事槀人共其食故曰冗食者之食人也有所屈焉而為人所知乃其所以為冗也饗耆老孤子士庶子以槀人共其食者死政之孤老則以其父子致義於國士庶子則以其效能致勞於國皆宜有以槀之也故使槀人共其食焉先耆老孤子而後士庶子則食以飬之為主而耆老孤子宜在所先也與外饔言饗耆老孤子而以士庶子如之同意掌豢祭祀之犬者飬犬豕曰豢飬犬不於􅐪人蓋􅐪人為食以共至尊雖潘瀾餕餘不可䙝也故掌於槀人周禮詳解卷十六
