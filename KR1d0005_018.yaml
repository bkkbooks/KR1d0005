body:
  text: 周禮詳解卷十八宋王昭禹撰小宗伯之職掌建國之神位右社稷左宗廟兆五帝於四郊四望四類亦如之兆山川丘陵墳衍各因其方王之所體者道也大宗伯所以佐王特道之物而已大宗伯之所建者禮也小宗伯所以佐大宗伯者特禮之物而已道不渾於度數故求之度數而不得也降而生物則度數存焉大宗伯之所建凢明於本數小宗伯之所佐凢係於末度本精而末粗數畧而度詳聖人南面而治與萬物相見必以祀致餙焉則精粗詳畧不可以不備也記曰知禮樂之情者能作識禮樂之文者能述然則大宗伯盖與於知禮之情而作之也小宗伯盖與於識禮之文而述之也别而言之天曰神地曰示人曰鬼合而言之皆可謂之神葢神無方無乎不在然古人所以求諸神者未嘗不在焉有在故有方有方故有位右社稷左宗廟國中之神位也兆五帝於四郊與夫四望山川丘陵墳衍國外之神位也尊五帝而逺之則以宗廟為親賔山陵墳衍而外之則以社稷為主右隂也而地道尊右社稷地類也故右社稷左陽也人道所向君子於其親事死如生故左宗廟左右各因其所尚而非相為尊卑故此言右社稷而左宗廟而匠人營國亦曰左祖右社言社則見稷言祖則見宗東西隂陽之中南北陰陽之正昊天其君五帝其佐也君王其中而五帝之運與五行同其休王焉故為之兆五帝於四郊五帝也而兆止於四郊則土與火相生以相繼者也豈同兆於南郊乎非特五帝之兆如此四類四望亦如之五嶽四瀆在地而成形故祭謂之望日月風雨司中司命在天而成象故祭謂之類所以聚之非一神也故經於上帝每言類而小宗伯天地之大災亦類社稷宗廟之位夫國之神位衆矣言兆五帝而不言地上之圓丘言山川丘陵墳衍各於其方而不言澤中之方丘言宗廟而不言祧廟則皆舉卑以見尊也掌五禮之禁令與其用等辨廟祧之昭穆辨吉凶之五服車旗宫室之禁掌三族之别以辨親疎其正室皆謂之門子掌其政令吉凶軍賔嘉之五禮大宗伯既掌其本數矣小宗伯又掌其末度焉禁謂禁其所不得用令謂令其所當用又有等焉葢道通為一則無等矣禮别於五故象天地之大而有髙卑象四時之行而有先後卑髙之陳先後之序而自然之等存乎其間禮之為禮特輔其自然者以等之而已用等之不同有尊卑焉於是有廟祧之昭穆所以辨尊卑有貴賤焉於是有衣服車旗宫室之禁所以辨貴賤有親踈焉於是有三族之别所以辨親疎辨廟祧之昭穆合為三昭三穆與大祖之廟而七焉昭穆之序尊卑之殺不可以不辨也小宗伯辨廟祧之昭穆而小史又辨昭穆何也小宗伯所辨其序也小史所辨其書也自昔禹不先鯀湯不先契文武不先不窋葢子雖賢聖不得先其父新鬼雖大不得先其故凢以昭穆所辨其序固如此也而魯之文公乃至於躋僖公夏父弗忌不能有以辨之而已故君子以為逆祀辨吉凶之五服車旗宫室之禁者吉之五服或以九或以七或以五降殺以兩凢以象其徳凶之五服近止於三月逺止於三年凢以稱其情車旗宫室必有禁焉則奢不僣儉不偪矣掌三族之别以辨親踈者人之主也上親父下親子而已與之為三以父而親祖以子而親孫是之謂以三為五以祖親髙祖以孫親𤣥孫是之謂以五為九夫親親之序自三以至於九而此特言三族之别則由隆以為殺篤近以舉逺正所以辨親踈故也三族之已立則本末斯從焉其正室皆謂之門子掌其政令者尊祖故敬宗敬宗故明嫡正室其嫡矣以其當室故謂之正室以其當門故謂之門子曲禮曰孤子當室文王世子曰正室守大廟皆指嫡而言毛六牲辨其名物而頒之於五官使共奉之辨六齍之名物與其用使六宫之人共奉之牲齍尊彛之名物易知也而以小宗伯辨焉則名之所命物之所色有義存焉為難知也夫祭祀之事王后親之而五官所以續王之事而終之以成外治六宫之人所以續后之事而終之以成内治者牲天産也其類屬乎陽而動然皆生之而後可殺焉是故謂之牲而辨六牲之名物則使續王之事而終之以成外治者共奉之齍地産也其類屬乎陰而植然其在器也各有多少之齊焉是故謂之盛而辨六齍之名物則使續后之事而終之以成内治者共奉之内外隂陽各從其類也非特是也頒六牲於五官亦從其類而分之也司徒主牛宗伯主雞司馬主馬及羊司冦主犬司空主豕此以其類而分之也至於六齍使六宫之人共奉之而不言頒則無所分矣共言共其物奉言奉其事詩以大夫妻能循法度為可以共祭祀則共之言其物也以夫人可以奉祭祀為不失職則奉之言其事也酒正共后之致飲於賔客之禮使其士奉之酒人為五齊三酒祭祀則共奉之凢此皆其别也辨六彝之名物以待果將辨六尊之名物以待祭祀賔客掌衣服車旗宫室之賞賜掌四時祭祀之序事與其禮若國大貞則奉玉帛以詔號彛酌以祼求諸隂而已隂有常而無變故為之彛尊酌以獻居其所而爵者從之故謂之尊於彛言祼將則尊酌以獻可知也於尊言祭祀賔客則彛亦可知也祼將謂祼之時則将瓉以祼也司尊彛掌六尊六彛之位詔其爵辨其用與其實則尊彜之名物既不同故其所用亦異此小宗伯所以辨其名物以待其用也幂人先尊後彛彜卑而尊尊故也今此先彛而後尊者以言其用用則先彛矣掌衣服車旗宫室之賞賜者衣服車旗或以有功而賞或以私恩而賜其賞賜亦有等差此小宗伯所以掌之也掌四時祭祀之序事與其禮者謂天神人鬼地示之祭祀四時有之其祭祀之事則各有先後之常序若卜日省鑊示滌濯之類也禮則四時祭祀所當用之常禮若隆殺厚薄之類有度數存焉耳若國大貞則奉玉帛以詔號者大貞謂以事之大者而卜以貞之貞以問問以吉知吉凶吉凶生乎動者也惟静而正足以勝故易曰凶者貞勝者也卜以知吉凶惟静而正為可問焉故洛誥亦曰我二人共貞大卜曰凢國大貞天府曰季冬陳玉以貞來嵗之􅍇惡若國大貞則若卜立君卜大封皆大貞也奉玉帛則以卜而禮神詔號則詔大祝之六號玉帛以二精致其物詔號以六號辨其名皆禮之重者故小宗伯奉而詔之大祭祀省牲眡滌濯祭之日逆齍省鑊告時於王告備於王凡祭祀賔客以時將瓚果詔相祭祀之小禮凡大禮佐大宗伯賜卿大夫士爵則儐祭之物牲重而齍輕故此先省牲而後逆齍祭之序先腥而後熟故此先省牲而後省鑊省牲以省充人之所係逆齍以逆􅐪人之所共省鑊以省烹人之所具至於滌濯則無所不用以致其清而已詩云泂酌彼行潦可以濯溉葢言所貴在此而不在彼滌濯以致其清宜在所畧也此於牲鑊則言省於滌濯則言眡而眡又詳於省者葢詩所美者道也而此所記者禮也告時於王者時至矣而後告之也告備於王者禮備矣而後告之也凢祭祀賔客以時将瓉祼者以時将之以授於王與后也故欝人凢祭祀賔客之祼事和欝鬯以實彛而陳之此祭祀賔客之禮所以同用祼也典瑞祼圭有瓉以肆先王以祼賔客此祭祀賔客之祼所以同用瓉也王之祼也大宰賛之故大宰祀之日賛玉幣爵之事大朝覲㑹同賛玉帛玉獻玉几玉爵后之祼也内宰賛之故内宰大祭祀后祼獻則賛瑶爵亦如之凢賔客之祼獻瑶爵皆賛小宗伯所謂以時瓉祼所以授王與后也鄭氏乃謂祭祀則奉而授王賔客則奉而授宗伯殊不知大宗伯王后不與而後攝載祼也詔相祭祀之小禮者以大禮大宗伯詔相之也故大禮則佐大宗伯而已夫盛徳之至其於禮也動容周旋莫不中焉果何待於詔相乎此則大宗伯詔相祭祀之大禮小宗伯詔相祭祀之小禮者葢以言禮之意則動容周旋莫不中焉以言禮之事則有而為之不敢以易此詔相所以不可已也子入太廟每事問夫豈不知而問哉亦以有而為之不敢以易是所以為知禮也賜卿大夫士爵則儐者王命諸侯則大宗伯儐之也故諸侯雖卑如子男尤以大宗伯以子男雖卑亦君道也故隆之以致其伸諸臣之尊雖如孤卿尤以小宗伯儐以孤卿雖尊亦臣道也故殺之以致其屈小祭祀掌事如大宗伯之禮大賔客受其將幣之齎大宗伯凢祀大神享大鬼祭大示帥執事而卜日宿眡滌濯涖玉鬯省牲鑊奉玉齍詔大號小祭祀則小宗伯之所掌也故其事如大宗伯之禮小宗伯既待賔客以六彜以時将賛祼則王於賔客之禮施之盡矣禮之道施報而已受其將幣之齎則邦國享王而報之禮盡矣夫報之盡在於將幣之齎則不㡬於貨取者也葢君子雖不可以貨取而亦不可以虚拘故成王之識百辟享與不享特於儀物多寡之間此所謂將幣之齎則亦以其儀先焉而幣之所齎將之而已謂之齎則所享之物莫不有多寡之齊焉若大師則帥有司而立軍社奉主車若軍將有事則與祭有司將事於四望大師之禮用衆也故大師則帥有司而立軍社奉主車言軍社則主軍其祖也言奉主車則社亦載於車也古者出師其始必宜乎社造乎祖其必載於車示有所受命也以此用衆其有不受命者乎社本義義為隂祖本仁仁為陽先社後祖先義後仁則隂陽事故也然則書用命賞於祖不用命戮於社先祖而後社何也葢書方其誓而撫衆則宜先祖以誘之也有司大祝之屬也大祝之職亦曰大師設軍社祭有司亦大祝之屬也軍将有事則與戰合敵也雖以至仁伐不仁然君子臨事而懼故有事於祭焉必祭四望則五岳四瀆山川之大者也山川為國阻固四望光絶其類則阻固之大者大兵之象故将戰則祭焉若大甸則帥有司而饁獸於郊遂頒禽大烖及執事禱祠於上下神示甸音田大甸則四時之田也帥有司則帥大司馬之屬也夫大田之禮簡衆也故大甸則帥有司而饁獸於郊遂頒禽獸可狩而獲者於禽為大故饁之禽可擒而制者於獸為小故頒之葢盍而餉焉謂之饁頒則分之而已且田以簡衆則衆所不欲也田以獲取禽獸為得焉則衆所同欲也先王以所不欲者寓之於其所欲故其於田也大獸公之小禽私之上殺者以為乾豆次殺者以為賔客下殺者以充君庖而面傷剪羽毛不成其為禽者不以獻還舍於郊饁獸出而頒禽其獸與禽皆不以獻者也以此簡衆則得其所同欲而輕其所不欲矣大烖及執事禱祠於上下神示猶大宗伯大故則旅上帝及四望也故者人所為烖者天所為故禱祠於上下神示則靡神不舉求祭曰禱報祭曰祠雖然古之體道者將超於吉凶得失之表人所不能害天所不能烖而於此大故旅上帝及四望大烖禱祠於上下神示者特與民同患而已王崩大肆以秬鬯渳及執事涖大斂小斂帥異族而佐縣衰冠之式於路門之外及執事眂葬獻器遂哭之卜葬兆甫竁亦如之旣葬詔相喪祭之禮成葬而祭墓為位渳亡婢反竁充内反陳尸謂之肆大肆以順魂氣之變也以秬鬯渳則死者人之所惡貴於潔馨故也及執事涖大歛小歛以順其體魄之蔵也縣衰冠之式於路門之外則制色宜同故也及執事眡葬獻器遂哭之執事梓匠之屬獻器明器也獻明器則將以𦵏之反而亡焉始於此小宗伯於其生也以禮詔相之故於其將𦵏也則感而哭焉非特是也至於卜𦵏兆甫竁亦然也故亦如之䘮祭之禮虞祔也既𦵏而祭謂之虞虞死者精神無所歸而祭之也檀弓曰𦵏者虞弗忍一日離也虞祭既畢明日祔於祖父故有祔祭者以附祖屬於廟也成𦵏而祭墓為位者丘已封則謂之成𦵏成𦵏而祭則祭后土也小宗伯則為壇位凡王之會同軍旅甸役之禱祠肄儀為位國有禍烖則亦如之凡天地之大烖類社稷宗廟則為位凡國之大禮佐大宗伯凡小禮掌事如大宗伯之儀甸音田王之㑹同軍旅田役皆有禱祠者以吉凶生乎動欲吉而避凶者人情所不免也禱以求祠以賽禱祠皆有儀不可以不預習小宗伯於習儀則為位焉國有禍烖於禱祠亦肆儀為位故亦如之天地之大灾若日月食山冡崩皆非常之變也則合聚社稷宗廟之神而禱祠焉故曰類社稷宗廟則為位凢國之大禮佐大宗伯凢小禮掌事如大宗伯之儀者一隂一陽體此以示焉謂之禮儀者著乎末節以列數度宜之謂儀簡子之問禮及於揖遜周旋故太叔以謂儀也非禮也肆師之職掌立國祀之禮以佐大宗伯禮之義㣲而難知禮之數粗而可陳大宗伯掌建天神人鬼地示之禮則得於微而難知之義肆師掌立國祀之禮以佐大宗伯則明於粗而可陳之數故肆師之職以展器陳告備為事肆之為言陳也明於可陳之數焉人之所依附此其名官所以謂之肆師神位既定然後國祀之禮可立大宗伯建天神人鬼地示之禮建其意義而已必有玉帛牲牷之物籩豆簠簋之器然後其禮立焉故掌立國祀之禮以佐大宗伯立大祀用玉帛牲牷立次祀用牲幣立小祀用牲大祀謂天地宗廟之祀也次祀謂日月星辰社稷五祀五岳之祀也小祀謂司中司命風師雨師山川百物之祀也别而言之則天曰祀地曰祭鬼曰享合而言之均謂之祀也玉帛牲牷以禮神禮之隆也有牲幣而無玉帛者禮之殺也獨牲而已又其殺也牲之純者謂之牷上言牲牷下言牲而不言牷則知所謂牲者其牲不必純也幣帛一也自其質而言之則謂之帛制而用之則謂之幣夫牲以天産致味玉以地産致徳幣帛以人力致禮次祀則去玉小祀則去幣而牲以致味禮之近人情者也下至于小祀焉葢行我爱敬而親鬼神者牲也行我清明而尊鬼神者玉也行我和荘而交鬼神者幣也尊而交之患在其情不通則鬼神不可得而祀矣此三祀所以通用牲以歳時序其祭祀及其祈珥嵗時之祭祀有先後之别則有序矣序其祭祀則先後必以時也嵗時之祭祀者祀之常也至于祈珥則非若常祀也祈所以求福若大祝之六祈是也珥所以禦妖釁若小子珥于社稷是也以祈福祥為先以禦妖釁為後故先祈而後珥大祭祀展犧牲繫於牢頒於職人牲之純者謂之牷牲之完者謂之犧春秋所謂魯郊牛口傷周景王時雄雞自斷其尾則不可謂之犧矣大祭祀肆師展犧牲者視其完也繫於牢頒於職人者牛人牧人共牲者也充人飬牲者也牛人牧人共牲然後肆師從而展則職人非牛人牧人矣凢㪚祭祀繫於國門則職人非門人矣充人之職曰掌繫祭祀之牲牷祀五帝則繫於牢芻之三月享先王亦如之則所謂職人者其充人之謂乎充人而曰職人則以充人職其事故也故牛人凢祭祀共其求牛享牛以授職人而芻之亦謂充人也凡祭祀之卜日宿為期詔相其禮眡滌濯亦如之祭之日表齍盛告潔展器陳告備及果築䰞相治小禮誅其慢怠者掌兆中廟中之禁令凢祭祀禮成則告事畢大賓客涖筵几築䰞賛果將果古亂反䰞音煑宿為期卜前之夕也眡滌濯祭前之夕也祭祀必卜日者擇日之吉也祭祀必眡滌濯者致其潔也詩所謂吉蠲者於此見矣執事之人與日不能齊則其卜也其眡滌濯也不能以敬與恭交神明矣故皆宿為期焉祭之日表粢盛者簠以盛稲粱簋以盛黍稷簠簋旣陳也則以徽幟而表之盖粢盛王之所自致者也表而出之所以明其自致之尊也告潔則以鬼神所歆者在潔也詩曰吉蠲為饎以黍稷稲梁皆人所舂治而成食者易失於不潔故使肆師告潔馬展器陳則器及陳皆展之也告備則禮之備也小宗伯告備於王則肆師告備於小宗伯矣禮有告具有告備具則有所不備焉備則非特具而已及果築䰞者則築香草煑以和秬鬯以泲之而祼也相治小禮則禮之小者在所相而治之也誅其慢怠者慢則不敬怠則不勤祭祀之禮以敬勤為尚慢怠則非特欺於神也又欺人焉故誅之掌兆中廟中之禁令者宗伯兆五帝於四郊四望四類亦如之兆則四帝之兆也廟則七廟及遷廟禁令禁使不得犯者令則令其所當為者也事畢於禮成故禮成則告事畢大賔客涖筵几者筵几所以禮賔客司几筵設之肆師則臨而觀之也築䰞賛果将者見大賔承大祭皆主於敬故其祼賔也猶待其神焉大朝覲佐儐共設匪罋之禮饗食授祭與祝侯禳於畺及郊儐所以接賔客之人也有上儐有中儐有末儐佐儐者上儐之佐則中儐是也所以佐宗伯焉大宗伯㑹同朝覲為上相則肆師為佐儐乃佐小宗伯也小行人将幣為承而儐則末儐其小行人與共設匪罋之禮者匪以實幣也罋以實醯醢也其物其事掌客籩人等共之也其所設之禮則肆師共之也饗謂以酒飲賔食謂以食食賔也授祭授賔以祭也記曰祭食祭所先進又曰殽之序徧祭之謂此祭也夫王祭則膳夫授之故賔祭則肆師授之與祝侯禳者侯者候之祭也禳者郤灾之祭也國事之有侯有禳逺或至於五百里之畺近或止於百里之郊小祝之官實主其事而肆師與之偕行也則以掌國祀之官而侯禳又其事之小者故也大䘮大渳以鬯則築䰞令外内命婦序哭禁外内命男女之衰不中灋者且授之杖衰七雷反中丁仲反小宗伯王崩大肆以秬鬯渳故肆師築香草煑以為鬯也序哭則以服之輕重為先後小宗伯縣衰冠之式於路門之外則衰法既已示之若不中法者肆師又從而禁之則男女之衰無異制矣授杖則王䘮杖竹后䘮杖木也凡師甸用牲於社宗則為位類造上帝封於大神祭兵於山川亦如之凡師不功則助牽主車凡四時之大甸獵祭表貉則為位甸音田師甸用命則賞於祖不用命則戮於社故必載社之石主祖之木主以行焉示民以用命也遷主亦謂之宗者則以其繼太祖故也用牲以祭則肆師為所祭之位以位者神所立有位然後可祭也故小宗伯掌建國之神位於軍旅甸役之禱祠則為肄儀之位肆師於用牲於社則為位矣類造皆祭名聚其神而祭則謂之類至其所而祭則謂之造記曰類乎上帝宜乎社造乎禰小宗伯類社稷宗廟則為位大祝之六祈一曰類二曰造葢非特禰上帝亦謂之造類非特上帝宗廟社稷亦謂之類也書之舜典曰至于岱宗柴詩之時邁曰巡狩告祭柴望也言封土而告柴則燔燎以逹氣焉記曰因天事天因名山升中于天謂此也祭兵於山川則謂兵之所過名山大川則從而祭之也以山川為國阻故有兵之象故因以祭焉類造在行始封及祭兵在行後故其言之序如此然則類造上帝封于大神祭兵於山川方其牲以祭也肆師則為之位而如師甸之事焉故曰亦如之凢師以民用命有功以神依之為助不功則以民不用命神不依助之故掌邦國與立國祀者任其事此大司馬所以厭而奉主車肆師則助牽祭貉師祭也表而祭之故謂之祭表貉詩曰是類是也禡貉音通于禡則貉禡同也天子出征則貉祭所征之地而大甸獵以教戰也祭表貉肆師則為之位也嘗之日涖卜來嵗之芟獮之日涖卜來嵗之戒社之日涖卜來嵗之稼芟色御反獮思淺反嘗嘗穀之祭也芟以作田故於嘗而卜之欲知來嵗之芟有利否也獮教治兵戒兵之事故於獮而卜之欲知來嵗之戒有備否也社祭土示稼土之事故於社而卜之欲知來嵗之稼有宜否也夫于得也而不忘失于安也而不忘危先王與民同吉凶之患而使掌卜之官掌其卜欲預知其吉凶而為之防也如此則於卜也使肆師涖之不亦宜乎然芟主于除害也戒主于防患也稼主于興利也能防患害然後利可興也故其言之序如此若國有大故則令國人祭嵗時之祭祀亦如之凡卿大夫之喪相其禮凡國之大事治其禮儀以佐宗伯凡國之小事治其禮儀而掌其事如宗伯之禮令之祭故畧於神者不得不祭令然後祭故蔽神者不得數祭嵗時之祭祀乃其常禮也國有大故而祭則非常禮也禮之常者與其非常者皆待上令則祀事有節而無廢禮矣記曰祭有其舉之莫敢廢也有其廢之莫敢舉也謂是矣凢卿大夫之䘮相其禮者相其家人也大事則從其長故以佐宗伯小事則専達故如宗伯之禮鬱人掌祼器凡祭祀賔客之祼事和鬱鬯以實彛而陳之凡祼玉濯之陳之以贊祼事詔祼將之儀與其節凡祼事沃盥大䘮之渳共其肆器及葬共其祼器遂貍之大祭祀與量人受舉斝之卒爵而飲之鬱人掌以鬱金香草以和鬯酒者也葢凢祼事則用鬱鬯築而煑之者肆師也掌共秬鬯者鬯人也鬱人則和鬱鬯用之以祼也掌祼器者以和鬱鬯因使之掌彜舟與瓉以祼焉祼之字從示從果者味也能下入地而復生出以致飬馬祼者以味灌地求神而出之以致飬馬故其字所從如此凢自下以交乎上者以陰中之陽蕭隂也臭則為陽自上而交乎下者以陽中之隂鬯陽也味則為隂司尊彛於四時之常祭春夏之祼則用雞彛鳥彛秋冬之祼則用斝彛黄彛四時之間祀則用虎彛蜼彜所謂祼器者此也鬱人掌之而司尊彜則詔其酌辨其用與其實也天地之神不祼凢用祼者惟宗廟而已葢人之死也魂氣升於天故􅌊蕭以求諸陽體魄降於地故祼鬯以求諸隂賔客亦用祼則先王之承賔猶承神也所以致其敬鬱人則以所煑之鬱金草以和鬯人之秬鬯以實六彜而陳之於祭前故曰凢祭祀賔客之祼事和鬱鬯以實彛而陳之凢祼玉則圭璋王用圭璋后用璋瓚故郊特牲曰灌以圭璋用玉器也灌之所以致潔陳之所以備用於用祼則又因以賛其事焉詔祼将之儀與其節者儀謂奉玉送祼之儀節謂時之早晚也凢祼事則王及后與宗伯之行祼事也沃盥者沃水以盥手及洗瓉也沃盥所以致潔敬其事也大䘮之渳共肆器則小宗伯所謂王崩大肆以秬鬯渳鬱人共其陳尸之器也䘮大記曰君設大槃造氷焉所謂器則大槃是也及𦵏共其祼器遂貍之鄭氏謂進奠之彜與瓉貍於祖廟之堦間明奠終於此也大祭祀與量人受舉斝之卒爵而飲之者舉斝禮記所謂舉斝角詔妥尸是也卒爵若儀禮所謂皇尸卒爵是也明堂位曰爵夏后氏以琖商以斝周以爵斝先王之爵惟王禮用焉于舉斝也量人與鬱人受其卒爵而飲之以明祭祀之禮鬱人掌賛祼量人制從獻之脯燔與之同其事必與同其福也賛祼者主以物之氣氣陽也制從獻之脯燔主以物之形形陰也陽始而隂終陽先而隂後相成之義則鬱人與量人受舉斝之卒爵而飲之以其相成於祭祀然後能受福也鬯人掌共秬鬯而飾之凡祭祀社壝用大罍禜門用瓢齎廟用修凢山川四方用蜃凡祼事用概凡疈事用散大喪之大渳設斗共其釁鬯凡王之齊事共其秬鬯凡王弔臨共介鬯禜音詠修音卣秬鬯以一稃二米者為之一稃二米天地至和之氣所生名之曰鬯則以言和氣之條鬯也鬯人共秬鬯而又飾之以巾故曰共秬鬯而飾之幂人以畫布巾幂六彛則鬯人設巾以為飾可知矣然則祼之事必以欝和鬯者葢欝香草也以明其徳之馨香也其色則黄以明徳之中而著乎外也鬯取天地至和之氣所生以名徳之和而達乎外也先王所以承祀而交神明者其徳如此則其祼用欝鬯者因以致其義故也夫内有以致其徳外又以設飾而致其美神其有不享乎社壝則封人所設王之社壝是也王社之示比於天地之神為近人情則宜交之以人道故有秬鬯言于人道則非鬼故不加欝而不祼大罍瓦罍也社土神用瓦罍則以土氣故也故祭祀社壝用大罍禜則黨正春秋祭禜是也禜門謂禜於門也莊二十五年秋大水用牲於門是也易以艮為門而八音以艮為匏用瓢齎者此其義也夫雩榮祭水旱也則禜所以除害門者利用出入之所在且以禦暴焉此禜所以必即門也夫除害禦暴皆所以養人用匏則有飬人之美道以為匏又中虚而善容亦有門之象也則用瓢齎而下修蜃概㪚皆罍名可知矣廟用修則増飾之以彩色山川四望用蜃則飾之以蜃凢祼事葢用概謂以朱帶為飾而横概以落腹也疈事用散者自概以上皆有飾惟疈事之罍則無飾故謂之散焉廟以享人鬼人道尚文故用修山川四方為國阻固扞蔽且以時通氣乎天地之間蜃外堅有阻固扞蔽之義且能一闔一闢其通亦有時焉故山川四方罍則飾以蜃凢祼必和欝鬯而多少之齊宜適平焉故其罍以朱帶為飾而横概落腹以概落腹能平物也疈事則蜡而疈辜以祭四方百物言疈則辜可知蜡以息老物物終則無飾矣故罍曰散與樂之散者謂之散樂車之散者謂之散車同意然則欝人所和者乃用以祼鬯人所共秬鬯則不和欝者用之以陳而已欝鬯之有秬鬯亦猶三酒五齊之有𤣥酒也此亦反本復古不忘其初之意歟凢王之齊事共其秬鬯者葢齊所以致潔以交神明故鬯以浴所以致其香潔也夫王内有潔浄馨香之徳固足以感通於神明而外又資於物之潔浄馨香以助其象體之養此内外所以兩偹焉凢王弔臨共介鬯曲禮曰天子用鬯葢天子至尊凢有弔臨以鬯為摯非以自致使介執之以禮鬼神鬯人則共之而已雞人掌共雞牲辨其物大祭祀夜嘑旦以嘂百官凡國之大賔客㑹同軍旅喪紀亦如之凡國事為期則告之時凡祭祀面禳釁共其雞牲嘑火吳反嘂古弔反雞於十二辰則屬酉於二十八宿則屬昴而反列於春官者葢雞之為物向隂而伏向陽而噍主於司農日之晨猶嵗之春則雞正東方之畜也此所以列於春官故庖人用禽獻秋行犢麛膳膏腥腥雞膏也以秋金旺而木衰故膳以雞膏所以助飬肝也則雞為木畜可知矣五官各有所共而雞人共雞謂之雞牲則以生之而後殺也物以色之雞之色既不同則所用亦異故不可以不辨若牧人所謂陽祀用騂牲隂祀用黝牲是也大祭祀夜嘑旦以嘂百官以雞之為物能知時而其鳴也則知将旦所以儆使夙興也然於旦言嘑者氣分而不背戾隂而有虞其事焉於百官言嘂者則以雞鳴致警其聲四達而非一也其嘑旦嘂百官以祭祀尤當致嚴而不可緩故於大賔客會同軍旅䘮紀亦如之而已凢國事為期則告之時者所作謂之事言凢國事則其事非一也亦以雞能知時故使雞人告之時焉若庭燎宣王曰夜如何其夜未央東方未明刺朝廷興居無節皆失是矣凢祭祀靣禳釁共其雞牲者禳以却災禍釁以厭妖怪靣禳則以所禳非一方也葢古者侯禳于畺郊于四方皆有禳焉故曰面禳與釁用雞牲則雞人共之也司尊彛掌六尊六彛之位詔其酌辨其用與其實尊酌以獻居其所而爵者從之故曰尊彜酌以祼求諸隂而有常無辨故曰彜尊彜禮之器而義所寓焉其器雖粗而可陳其義則微而難知義蔵於不變之大法而器則各有司存此司尊彝之官所由設也六尊則自獻尊至於山尊之屬是也六彜則自雞彛至於蜼彜之屬是也名物既異則所陳之位不同禮運言𤣥酒在室醴醆在戸粢醍在堂澄酒在下若此者所陳之位也司尊彜非特掌其器而又掌其位尊酌以獻彛酌以祼司尊彜非特掌其位而又詔其酌辨其用則四時祭祀所用不同也辨其實則欝鬯以實彛齊酒以實尊也先言掌六尊而後言掌六彛則尊所卑之序也至於祠禴烝嘗追享朝享皆先彜後尊則用之序春祠夏禴祼用雞彛鳥彛皆有舟其朝踐用兩獻尊其再獻用兩象尊皆有罍諸臣之所昨也秋嘗冬烝祼用斝彛黄彛皆有舟其朝獻用兩著尊其饋獻用兩壺尊皆有罍諸臣之所昨也凡四時之間祀追享朝享祼用虎彛蜼彛皆有舟其朝踐用兩大尊其再獻用兩山尊皆有罍諸臣之所昨也斝音嫁蜼音誄著直畧反宗廟之祭其分於四時者春祠夏禴秋嘗冬烝是也其在於四時之間者五年之夏有禘三年之冬有祫是也禘以其追及於祖之所自出故謂之追享祫以自三年之䘮畢而朝於廟為始故謂之朝享此六祭之名也至於致祭之節則宗廟之禮以獻為備始於二祼合王與后為二也次於朝踐為二也又次於饋食為二也至於饋食之後又有酳尸之三禮凢九獻焉葢人之魂氣於其體魄相附則為生相離則為死故人之終也魂氣則散而歸於天乃有􅌊蕭以求諸陽體魄則降而歸於地乃有祼鬯以求諸隂求諸陽也故用天産而加之以膋求諸隂也故用地産而以臭鬰合鬯而已禮曰臭陽達於墻屋臭隂達於淵泉者此之謂也仁者之求其親以求諸近為未足復求諸逺以求於下為未盡於是復求乎上故祭祀以祼為始而􅌊蕭乃在於朝踐之後是以禮曰既奠然後􅌊蕭又曰建設朝事燔燎羶香也祼然後朝踐以薦腥禮所謂腥其爼者是已朝踐而後饋食以薦熟禮所謂熟其殽者是也且祼者求諸隂也故坐室中而書所謂王入太室祼是也朝踐者陽也饋食者隂也饋食雖為隂乃所以致食味之道而已故其莭同在於堂而禮所謂坐尸於堂又曰設祭於堂是也且人之生雜乎芒芴之間變而有氣氣變而有形形變而有生故禮以朝踐主於報氣則明饋食之報其形饋食主於報魄則明朝踐之報其魂氣與魄者神之道天之合也所以教之反始魄與形者鬼之道地之合也所以教之要終反始所以尊而敬之要終所以愛而親之故禮朝踐言教衆反始於饋食言教民相愛也然則朝踐者用氣報氣而事之以天道者也饋食者用味報魄而事之以人道者也不能示之以天道則不智不能示之以人道則不仁故命特牲少牢之禮自饋食後而尸有飲食之禮此先王之事其親制之以死生之間者也然則祭祀之禮終於酳尸之三禮王與后獻尸尸獻王與后既又諸臣為一獻是之謂卒食之三獻而諸臣之獻乃所以酢尸也故曰諸臣之所昨也葢酢所以報其昨之獻故通於昨如司几筵言祀先王昨席與諸侯昨席皆同用昨也酳尸必終於諸臣之所昨則造始者君成終者臣也夫尊彛之所用既不同則其名亦異葢因時與事以致其義焉故雞彛獻尊主於春而夏兼之烏彞象尊主於夏而春兼之夫春者時之始而雞以其司晨而木之屬故用雞彛獻尊犧尊也春耕之時而耕以牛為主故用獻尊夏以五行為火而烏火屬也故用烏彛夏於時為火象以其火而南方之獸也故用象尊斝彛著尊主於秋而冬兼之黄彛壺尊主於冬而秋兼之斝彛水為禾稼之象秋者稼成而收歛之時故用斝彛著以無足止而著地葢萬物於春為出出為行於秋為入入為止而著著有止之象也故用著尊冬於方為辨所謂復小而辨於物也黄彛飾之以目記曰黄者中也目者氣之清明者也言酌於中而清明於外則以其小而辨於物也故用黄彛萬物𤼵㪚於春而處蔵於冬壺以收蔵為事者也故用壺尊至於四時之間祀則以禘及其祖之所自出故謂之追享追享以尊尊則有義之徳焉故彛以虎虎者義也祫自䘮除朝廟始而合食於羣廟之主故謂之朝享朝享以親親則有智之德焉故彛以蜼蜼者智也太尊太古之瓦尊則有反本復始之意禘以義追及其祖之所自出亦以仁而反本復始也故用太尊山尊畵為山形明堂位曰山罍夏后氏之尊是也山則以仁而興利致養之意祫則以窮死者之所歸而合食於祖廟亦以仁而興利致養也故用山尊然春夏者用動之時也故皆象以動物秋冬者用静之時也故皆象以静物祫禘則有合四時之義故一以静物也彛皆有舟尊皆有罍為酒戒也葢舟能載物所受過量則有沉溺之禍罍為雲之象以雷能作陽氣以澤物作而不節則有浸滛之害則先王之寓意㣲矣非特是也至於醆以言其戔散以言其散觚言交物無節其窮為孤觶言用禮無度其窮為單先王以為以禮飲酒者始乎治常卒乎亂故於用禮每每戒焉後世猶至於飲酒無度沉湎滛佚用亂䘮徳用燕䘮威儀亦罔非酒為辜者其不知禮意之甚也可勝痛哉凡六彛六尊之酌鬱齊獻酌醴齊縮酌盎齊涗酌凡酒修酌大喪存奠彛大旅亦如之涗舒銳反修直歴反宗廟之祭尊彛所酌其節有四祼用鬱齊鬱齊不縮也酌以獻之而已然九獻之禮賔始於鬱齊故曰鬱齊獻酌朝踐用醴齊則以茅縮之而後酌也故曰醴齊縮酌記曰縮酌用茅明酌也以醴齊尤濁茅之以茅縮去滓也饋食用盎齊盎以酒涗之而後酌也故曰盎齊涗酌記曰凡涗新之也又曰醆酒涗於清以盎其色葱白而尤清故涗以酒也凡酒三酒也三酒人所飲故曰凢酒酒用以酳尸尸飲焉則尤宜修治之以致其味故曰凡酒修酌獻用以齊而此言醴盎二齊者葢泛齊從醴齊用於朝踐緹齊沈齊從盎齊用於饋食也祭用五齊三酒者五齊最薄所以致其義三酒致味所以致其實以神事焉故用五齊以人養焉故用三祭大䘮存奠彛者謂大遣時奠者朝奠夕徹不即去焉故謂之存大旅有大故而祭亦以䘮禮悲哀以祈於神故亦存之而不即徹故曰亦如之周禮詳解卷十八
