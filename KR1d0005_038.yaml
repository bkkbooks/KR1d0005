body:
  text: 周禮詳解卷三十八宋王昭禹撰玉人之事鎮圭尺有二寸天子守之命圭九寸謂之桓圭公守之命圭七寸謂之信圭侯守之命圭七寸謂之躬圭伯守之信音身玉所以比德仁者德之愛君子所以守位者在是也故自天子至於諸侯伯所執之圭皆以仁為體以利為用仁之體用莫大於天子故以四鎮之山制其象於地為最高者山於山為最大者鎮其仁之静足以安四方其仁之利足以養萬物仁莫大乎此則天子執鎮圭於是為稱公次王則公之德疑於王矣其制象以雙柤則以仁之體用不及王之大也强直以有立則仁之體也上承而不下庇則仁之用也上承則尊王也不下庇則避王也侯執信圭伯執躬圭皆為人形亦致人之體用也侯之德能蔽人伯之德能長人皆仁之事其為仁則又不及公之强直而能承王止於致人之道而已或為人形而伸或為人形而屈是又侯伯尊卑之辨也德莫備於天子故鎮圭其長尺有二寸以備天數也九者陽數之極七者陽數之盛上公九命侯伯七命其禮儀各視其命之數故其圭有九寸七寸之差也然春官大宗伯於圭皆言執秋官小行人於圭皆言用而玉人於圭則言守者蓋大宗伯作六瑞則制其度數也度數有制而不可易執之以行禮而已故自王以下皆言執小行人成六瑞則奉其成事也成事有常而不可廢用之以合符而已故自王以下皆言用若玉人則斵玉以為器也器以藏禮而皆有分守之以保其國而已故自天子以下皆言守公侯伯皆曰命圭者以其出於天子之所命故也天子執冒四寸以朝諸侯聖人中天下而立定四海之民其迹之大無所不覆東漸西被蠻之南狄之北莫不一視而同仁包容而無外利其仁者莫知其仁之所自樂其樂者莫知其義之所將是猶天之冒萬物也日月之冒下土也執冒以朝諸侯凡以明此也冒圭其形方正其制邪刻不方正則不足以立天下之義不邪刻則不足以合天下之瑞以方正之義而合天下之瑞則天下之信於是乎成矣葢天子之冒圭則邪刻其下諸侯之瑞圭則邪鋭其首以邪鋭之圭首而合天子邪刻之冒圭凡以為之驗也四方諸侯各以其時來朝其所執之圭皆有以合於天子之冒豈徒為之驗哉以天子之道無不徧覆故也傳曰珽玉六寸明自炤葢天子朝諸侯執冒圭搢珽圭其猶天子之事神執鎮圭則搢大圭也冒圭四寸所以冒四方珽圭六寸所以臨六服則玉器之用皆義之所寓矣天子用全上公用龍侯用瓉伯用將繼子男執皮帛天子圭中必龍莫江反必註讀縪德不美不足以為人君而物之美者莫如玉故君子用之以比德焉然自天子下達于上公侯伯其德既有純雜之不同所用之玉亦宜有以稱其德而已故或執或佩或用之以為器或用之以為飾皆不能無隆殺之辨也夫貫三以為一謂之全天子通三才之道則其德純而無雜故王則用全上公爵位盛大以背公自營為戒則其德疑于王矣然未免事人而事事則德不若王之純也故用龍龍以其不能無雜故也侯雖有蔽人之德而其德也已下于公矣故用瓉瓉祼器所謂圭瓉是也觀王祼用玉爵后用瑶爵而后之王已降于王則王所賜諸侯之圭瓉又居其次也然則諸侯所用之玉視其所賜圭瓉而為之差等故曰圭用瓉伯用躬圭已不若侯之信雖同于七命所用之玉又當有降于諸侯故用將將謂玉石相將則為愈雜矣先儒謂公侯四玉一石伯子男三玉二石理或然也繼子男執皮帛則書所謂三帛是也大宗伯以禽作六摯言孤執皮帛而司服言孤之服自希冕而下如子男之服此王之孤也典命言公之孤四命以皮帛眂小國之君此公之孤也典命言諸侯之適子未誓以皮帛繼子男則王之孤公之孤與諸侯之適子未誓者皆執皮帛矣子男雖執璧而其摯不同然其禮則眂之而已故繼子男天子圭中必先儒以必為縪謂以組約其中央以備失隊然圭所以象德而德者得也寧有失乎亦所以象其執德而防失也夫天子平旦而櫛冠日出而視朝一物不應亂之端也宜兢兢業業以致其慎焉故執此以為之戒也四圭尺有二寸以祀天大圭長三尺杼上終葵首天子服之土圭尺有五寸以致日以土地祼圭尺有二寸有瓉以祀廟四圭則典瑞所謂四圭有邸以祀天旅上帝是也尺有二寸所以備天數也于典瑞言邸于此言尺有二寸言相備也大圭則典瑞所謂王晉大圭以朝日是也圭之所象道之用也大圭杼上終葵首則其用也即其體而已離體以為用則小攝用以歸體則大此其所以謂之大圭也故其形則質而無追琢之文其用則圜而無利用之象五服之所以備内心之誠也有内心以致其誠無外心以備其禮則又非道之全也故執鎮圭以為之用焉其長三尺則備三才之義所以合三而為一也土圭尺有五寸以致日以土地則典瑞所謂土圭以致四時日月封國則以土地是也祼圭尺有二寸有瓉以祀廟則典瑞所謂祼圭有瓉以肆先王以祼賔客是也玉人不言祼賔客則以典瑞見之典瑞不言尺有二寸則以玉人見之典瑞言肆先王玉人言祼廟皆即廟而祼之以肆先王也琬圭九寸而繅以象德琰圭九寸判規以除慝以易行琬于阮反繅音早琰餘冉反慝土得反易以豉反琬圭圜其鋭以順為義故宛而不剡所以示愛也治德則順人性之所固有而治之結好則順人情之所常然者而結之上所以示愛也典瑞言以治德以結好而此言以象德者惟象德焉然後可以治德結好也象德言圭之制治德結好言圭之用玉人斵玉而制之以為器故言其制典瑞辨其名物而用之以為禮故言其用琰圭剡其末而為戈象剡而不死上所以示惡也易行則誥責之使改過除慝則誅伐之以治其罪治德結好文事也故言繅除慝易行則義事也故判規凡規剡上寸半琰圭剡半以上又半為瑑飾是半其圜而剡之故謂之判規其長皆九寸則以九者陽數之極而能變者也以象德則欲其變而日新以除慝易行則欲其變而後新璧羨度尺好三寸以為度圭璧五寸以祀日月星辰羨以善反肉倍好謂之璧肉六寸好三寸則璧之員凡九寸也今虧其旁一寸而延之以盈尺則上廣八寸其長十寸矣璧圜所以象天之體廣其羨所以象禮之用自其圜而視之雖禮之本具在而人莫之識自其羨而視之然後禮之用有數而人得循其制自此積之則為仞為尋為丈為常其餘長短皆自是生焉其數可至于無窮矣夫度在禮則起于璧羨在樂則起于黄鐘之長先王以為度之不存則禮樂之文熄故此使天下後世有攷焉圭璧則以璧為邸也圭鋭以象天之用璧圜以象天之體圭以璧為邸以鋭為用託于體若邸之託宿焉葢日月星辰之神非止于昭然垂象著明而已其所以運化不息者其用妙矣其好以示人而人得而見之者其迹粗矣其即體以致用攝用以歸體固甚密而不滯于迹圭邸于璧所以象其神也其長五寸則致天數也典瑞不言其數以辨其用致祀禮而已若玉人則制之以為器故也璧琮九寸諸侯以享天子榖圭七寸天子以聘女琮才宗反小行人合六幣璧以帛琮以錦葢侯伯之享禮也葢璧有辟之道禮天之玉也故以享天子琮有宗之道禮地之玉也故以享后于此言享天子而不言后者以諸侯來享以天子為主故也由此推之則二王後之享用圭璋子男之享用琥璜玉人不言以小行人見之也必九寸以九為陽數之極也榖圭為粟文以榖不失性生生而不窮有信善之義故用之以聘女典瑞言以和難以聘女此不言和難亦以典瑞見之也葢玉人為穀圭以用于天子聘女為主故不言和難也大璋中璋九寸邊璋七寸射四寸厚寸黄金勺青金外朱中鼻寸衡四寸有繅天子以巡守宗祝以前馬大璋亦如之諸侯以聘女射食亦反勺上灼反衡音横守與狩同大璋中璋邊璋三者皆天子巡守有事於山川則用灌者也於大山川則用大璋於中山川則用中璋於小山川則用邊璋半圭曰璋以象隂之成事而終天之功者也山川以成地之功為事以終天之功為事故祀山川以璋邸射而巡守用事于山川亦以璋凡以象其隂之成事故也先儒謂三璋之勺形如圭瓉葢以璋為柄以勺承流勺以黄金為之而其外以青金為飾葢金為義而山川為國阻固義之象也黄者隂盛美之色青者陽發生之色以黄金為勺則取其以義為質而其美之發見也以青金飾外則取其佐陽而成其發生之功也以朱飾中者朱者含陽之色隂雖以成陽功為事而實以陽為主也故朱中大璋中璋九寸邊璋七寸以九為陽功之極七為陽數之盛勺以璋為柄雖致隂之成事而操執之用一本于陽而已或九或七則以山川有大小之差也射四寸則射以貫勺如射之貫以象山川通氣也鼻寸者鼻謂勺龍頭鼻也衡四寸者衡謂勺徑也鼻長寸則十分為寸隂之成數也徑四寸以山川為阻固于四方也于大山川則用大璋則加文飾也于中山川用中璋則殺文飾也于小山川用邊璋則半文飾也言大璋中璋則知邊璋之為小不言小而言邊以邊璋特飾其邊如邊之有邊縢焉故也天子巡守之時于所過山川用事而宗祝則以此前馬而致禮故曰宗祝以前馬大璋亦如之諸侯以聘女者葢諸侯聘女之大璋亦如山川之邊璋長七寸射四寸焉故曰亦如之諸侯聘女以大璋則取其隂之成事也天子以榖圭諸侯以大璋則尊卑之辨也瑑圭璋八寸璧琮八寸以頫聘牙璋中璋七寸射二寸厚寸以起軍旅以治兵守瑑圭璋八寸璧琮八寸以頫聘者典瑞所謂瑑圭璋璧琮繅皆二采一就以頫聘是也于君禮用圭享用璧于夫人禮用璋享用琮則圭璋以致命擘琮以致享也皆八寸則取隂數之盛以諸侯于人臣以位為最上故也典瑞不言其長之數玉人不言其采就之數亦以互見也雖互見而必于玉人言其長之數以其斵玉而為器其制存于玉人也必于典瑞言采就之數以其器成然後設飾以為用其禮成于典瑞也牙璋中璋七寸射二寸厚寸以起軍旅以治兵守則典瑞所謂牙璋以起軍旅以治兵守固其宜也然典瑞未嘗言中璋則中璋特牙璋之次者也以軍旅兵守其事有大小故有牙璋中璋之異典瑞合而用之故但言牙璋而已其長七寸則火之成數也其射二寸則火之生數也其厚寸則土之成數也火為禮土為信軍旅兵守皆軍禮之事也其起之治之則有信存焉不然則勇而無禮與夫失信者詩人何以刺之駔琮五寸宗后以為權大琮十有二寸射四寸厚寸是謂内鎮宗后守之駔琮七寸鼻寸有半寸天子以為權駔音祖以琮為權以組係之則謂之駔琮權以等輕重先王懼其制之不存則天下後世無所考焉故天子與宗后皆有駔琮以為權然度則起于璧羨權則起于駔琮者葢璧之體圜以象天琮之體方以象地莫髙於天而髙者長短之所形莫厚于地而厚者輕重之所積然璧有辟之道能行辟以治人者然後能出法以制度琮有宗之道能為人所宗者然後能出法以為權故璧羨以起度則為王之事駔琮以為權則為后之事為后之事而天子亦以駔琮為權者美王者繼天而為之子后則繼地以賛内治而已天道圜則無所不達故能天而已能地焉此宗后與天子所以皆以駔琮為權也駔琮后則五寸天子則七寸隆殺之辨也且五者陽數之中七者陽數之盛夫謹權量四方之政行則天子以駔琮為權治之成也故有取于七寸后以出法賛天子則期于不失中而已故有取于五寸于天子之權言鼻寸有半寸則知后之制亦如此寸則十分半寸則五分十取數之成五取數之中也内鎮猶王之有鎮圭也琮方以象地故大琮后以為所守之玉焉謂之大琮則以守内治者玉莫大於此也十有二寸則與鎮圭其數同之王繼天而為之子故備天數后繼王而致内治故同于王其射四寸象其利用達四方其厚寸則取地數成也兩圭五寸有邸以祀地以旅四望瑑琮八寸諸侯以享夫人萬物祖天而地為之宗萬物親地而天為之辟故乾之為元則大而坤之為元則至乾之資始以氣而坤則資生以形乾于物則成象而坤則效法而已乾以元氣統天而坤則承天而已乾能變化以正性命而坤則含萬物化光而已乾以美利利天下不言所利而坤則利牝馬之貞而已由此觀之則天之道能天而能地其利用無所不達故四圭以祀天旅上帝地之道則能地而已不能如天之無不周故兩圭以祀地旅四望四圭尺有二寸以象天數之全也兩圭五寸則以象土數之生也琮祀地之玉故諸侯享天子用璧享后用琮瑑琮八寸則諸侯享于所聘君之夫人故亦用之必瑑之則以别于禮神之王八寸則取其隂數之盛也案十有二寸棗㮚十有二列諸侯純九大夫純五夫人以勞諸侯璋邸射素功以祀山川以致稍餼勞力報反案謂玉飾案人所按而安者也以玉飾案則取其以德而安之意夫人佐后以致内治王於賔客致酒后致飲而夫人亦致飲王于賔客有膳與饗食之禮而夫人亦致饗食與膳故玉勞賔客而夫人亦勞諸侯隂陽相成之義也案之所陳則有棗與桌日人人棗有早意所以取其敬栗有堅實之義所以取其信夫侮慢諸侯而無信義詩人以為刺則諸侯之來不能接以敬信之誠雖備物以致其勞豈能安之哉則夫人之勞諸侯以玉案棗㮚凡以寓其意而已諸侯純九大夫純五則十有二列者用以勞二王之後也璋邸射則典瑞所謂以祀山川以造贈賔客也國主山川賔客與山川同德故所用同物也素功言無瑑飾也以致稍餼則典瑞所謂以造贈賔客也造贈言造館以贈稍餼則指其物言之以山川通氣而致稍餼亦所以通好于賔客也楖人闕雕人闕磬氏為磬倨句一矩有半其博為一股為二鼓為三參分其股博去一以為鼓博參分其鼓博以其一為之厚已上則摩其旁已下則摩其耑倨音據句音鉤去起吕反上時掌反耑音端又音穿詩曰依我磬聲葢樂器之中磬聲為最清衆樂依之以為凖也樂記曰石聲磬磬以立辨惟其聲之清故動出而能辨也磬者樂之細也細則大聲為貴故欲其將將焉夫樂大者從細細者從大故石尚用角焉鋭喙而决吻數目而顅脰小體而鶱腹無力而輕其聲清揚而逺聞以之為虡則擊之而由其虡鳴矣先王用磬其詳如此以其音於樂聲中最為難諧故夔稱舜功德之效其言擊石拊石則有至于再也然則為磬者其可苟乎此磬氏之職所以立也先王之為磬其制取象乎天其形曲折則以象天體之下覆其聲清揚則以象天氣之上騰聲出乎形者也故凡為磬必先度一矩為句一矩為股而求其弦而以一矩有半觸其弦則磬之倨句也磬之制有大小亦假矩以定其倨句非用其度爾其博為一博謂股廣也股為二鼔為三者股謂磬之上大而接乎上者也鼔謂磬之下小而所當擊者也且以其博為一而廣四寸半言之股為二則其長九寸矣鼔為三則又加三分之一則其長一尺三寸半矣三分其股博去一以為鼓博則鼔廣三寸矣三分其鼓博以其一為之厚則廣其厚一寸矣已上謂其聲太清也則摩其旁使簿而則其聲濁也已下謂其聲太濁也則摩其耑使矩而厚則其聲凊也先王之制磬有股有鼓有博有厚或摩其旁而使其聲濁或摩其耑而使其聲清用之以作樂衆聲孰不依之以為和乎然則八音克諧無相奪倫其來固有自矣矢人為矢鍭矢參分茀矢參分一在前二在後兵矢田矢五分二在前三在後殺矢七分三在前四在後參分其長而閷其一五分其長而羽其一以其笴厚為之羽深水之以辨其隂陽夾其隂陽以設其比夾其比以設其羽參分其羽以設其刃則雖有疾風亦弗之能憚矣刃長寸圍寸鋌十之重三垸茀註作殺殺註作茀閷色界反笴註讀為稾夾古洽反比毗志反夏官有槀人司弓矢而冬官又有矢人者葢槀人則掌受財齎弓矢之幹所以給矢人之用者也司弓矢則掌弓矢之法所以藏矢人之成者也鍭矢殺矢司弓矢所謂用諸近射田獵者是也兵矢田矢謂枉矢絜矢也司弓矢所謂利大射用諸守城車戰是也茀前矢司弓矢所謂用諸弋射是也鍭矢殺矢三分一在二在後者箭槀中鐵莖也矢長三尺而鐵莖長一尺三分其鐵而以一分居前則一尺之鋌槀前得三寸三分寸之一槀後得六寸三分之二則前鐵為重也此所以中之則死而謂之殺矢鍭矢也兵矢田矢五分二在前三在後則其鐵差小也茀矢七分三在前四在後則鐵又差小也三分其長而殺其一矢槀長三尺殺其前一尺令趣鏃也五分其長而羽其一則羽居六寸也以其笴厚為之羽深則量其力之所受也水之以辨其隂陽者隂重濁陽輕清浮之于水以别其輕重也夾其隂陽以設其比者比謂箭括抵弦處是也夾之使輕重均也夾其比以設其羽者謂夾其括使輕重均然後可設羽也三分其羽以設其刃居羽三分之一其長二寸矣矢之制如此則可謂盡善而用之以射則其行也疾而風不能驚矣故曰雖有疾風亦弗之能憚矣刃長寸圍寸鋌十之重三垸其文已見于冶氏此葢殺矢之刃鋌如此宜從冶氏三垸為正前弱則俛後弱則翔中弱則紆中强則揚羽豐則遲羽殺則趮是故夾而摇之以眂其豐殺之節也橈之以眂其鴻殺之稱也凡相笴欲生而摶同摶欲重同重節欲疏同疏欲㮚趮音躁橈乃孝反稱尺證反相息亮反摶徒丸反矢之幹其强弱欲適中矢之羽其豐殺欲適節前弱則矢行而低後弱則矢行而旋中弱則矢行而曲中强則矢行而起此强弱之失中者也羽豐則太多太多則矢重而其行失于後羽殺則太少太少則矢輕而其行過于急此豐殺之失節者也欲眂其豐殺之節宜以指夾矢而摇之以酌其輕重則豐殺之節可知矣欲眂其鴻殺之稱宜以指橈其幹而曲之以審其强弱則鴻殺之稱可知矣凡相笴者葢為矢者雖出于工之巧而材苟不美雖工亦不能易其質而為良所謂妢胡之笴者亦以其材美故也然則欲其笴之良者孰若眂而審其材之美者乎彼為鐻者必觀其天性形軀之至而後施工則為矢者胡獨不然哉欲生而摶者視其材之圜也同摶欲重者視其材之實也同重節欲疏者以節密則其輕重不等也同疏欲㮚者以㮚則縝栗而堅故也陶人為甗實二鬴厚半寸脣寸盆實二鬴厚半寸脣寸甑實二鬴厚半寸脣寸七穿鬲實五觳厚半寸脣寸庾實二觳厚半寸脣寸甗魚輦反鬲音歴觳音斛夫泥之在鈞惟甄者之所為陶人甄土以為器依阜為之包缶焉故其字從阜從包從缶上古之時世質民淳所用者瓦器而已後世雖易之以金木而其文大備于周聖人不忘其本而瓦器之用未嘗廢焉此陶人所以為甗為盆為甑為鬲為庾皆燒土為之也甗甑用之以蒸者也盆用之以盛者也庾用之以量者也鬲用之以烹者也甗先儒謂無底甑鬲獻其氣甗能受焉甑有底而為七穿所以達氣也百升而為鬴十六升曰庾盆二鬴則分物而盛之者也庾實十六斗則少數也須臾而廩之矣鬲用以烹煮所以通水火之氣也甑則加于上焉甑以通火氣而熟物故其底為七穿七者火之成數也旊人為簋實一觳崇尺厚半寸脣寸豆實三而成觳崇尺凡陶旊之事髺墾薜暴不入市器中膊豆中縣膊崇四尺方四寸髺音刮墾苦狠反薜卜革反暴音剥中丁仲反膊市專反縣音懸旊人為瓦瓦成有方者也故其字從方從瓦簋以盛黍稷簠以盛稻粱嘉膳也故用簠則簋從之用簋則簠不從也掌客諸侯之禮用簠有差唯簋皆十有二則簋之為器固可以通上下用之旊人言為簋而不為簠以簋為常用之器故也豆實一斗豆實三而成觳則觳實三斗矣詩曰于豆于豋葢有木豆有瓦豆瓦豆謂之豋者木有升性土所執下陶以為豆乃有登理人執之而登故也凡陶旊之事謂陶人旊人所作之器也夫陶旊之事柔則坯剛則劓貴于和而已髺墾薜暴皆剛柔失節而不和者也髺謂器之縮墾謂器之傷薛言其破裂暴言其墳起王制曰用器不中度不粥于市髺墾薜暴所謂不中度者也故不入市器中膊謂為之度以擬度端其器也豆中縣謂為之繩以正豆柄也膊崇四尺則以正其髙使不過此也方四寸則以正其厚使不過此也梓人為筍虡天下之大獸五脂者膏者臝者羽者鱗者宗廟之事脂者膏者以為牲臝者羽者鱗者以為筍虡外骨内骨郤行仄行連行紆行以脰鳴者以注鳴者以旁鳴者以翼鳴者以股鳴者以胷鳴者謂之小蟲之屬以為雕琢厚脣弇口出目短耳大胷燿後大體短脰若是者謂之臝屬恒有力而不能走其聲大而宏有力而不能走則於任重宜大聲而宏則於鍾宜若是者以為鍾虡是故擊其所縣而由其虡鳴鋭喙决吻數目顅脰小體騫腹若是者謂之羽屬恒無力而輕其聲清陽而逺聞無力而輕則於任輕宜其聲清陽而逺聞於磬宜若是者以為磬虡故擊其所縣而由其虡鳴小首而長摶身而鴻若是者謂之鱗屬以為筍筍息允反臝力果反郤羌畧反仄音側紆乙俱反脰音豆注音呪燿註讀為哨縣懸同由猶同數音促顅音慳聞去聲梓材之美可以為禮樂之器故工能治材以為器者謂之梓人筍虡所以縣樂器横曰筍植曰虡包之日為筍出之日為竹筍如竹筍之形言樂出于是而有節也樂之本常一而其器異以器異故虡異其本在心可以常樂其末在器則合止有時而不可過過實生患也先王以筍虡其寓意可謂微矣詩曰虡業惟樅葢虡植而筍横其中其上設焉則謂之業以象業成于上而樂作于下也天下之大獸五脂膏鱗羽毛是也雜肉而生謂之脂生于肉中謂之膏二者其味美而可以致其實而用之宗廟以為牲也臝先儒謂虎豹之屬虎豹淺毛謂之臝物誤矣羽鳥屬鱗龍屬二者或取其形聲或取其勇力而可以致其文故用之宗廟以為筍虡也外骨謂龜屬内骨謂鼈屬郤行謂蚓屬仄行謂蟹屬連行謂魚屬紆行謂虵屬脰鳴謂鼃黽屬注鳴謂蜻􅖹屬旁鳴謂蜩蜺屬翼鳴謂發皇屬股鳴謂斯螽屬胷鳴謂榮原屬先王之德足以作動物雖庶物之微皆取之以為雕琢之文則樂之所作非特有以感格其大者而已雖其微者樂和無不均被之矣雕琢刻制之以為文工之至細者也故小蟲之屬以為雕琢鍾樂器之重者而其聲大臝物其聲大而宏有力而宜任重故以為鍾虡磬樂器之輕者而其聲清揚而逺聞無力而宜任輕故以為磬虡筍之形欲圜故鱗屬小首而長摶身而鴻乃以為筍自古之為樂器者笙管之屬其音象馬鼓鏞之屬其聲象獸非特其聲也其形制亦然又况筍虡所以縣鐘磬者哉既象其聲又象其形則擊其鐘磬而顧其形焉孰不謂由其虡之鳴乎昔夔之言樂始曰鳥獸蹌蹌以言萬物之治也終曰鳯皇來儀以言治之大成也雖曰和樂之所感如此豈非樂器之所象者然哉凡攫閷援簭之類必深其爪出其目作其鱗之而深其爪出其目作其鱗之而則於眂必撥爾而怒苟撥爾而怒則於任重宜且其匪色必似鳴矣爪不深目不出鱗之而不作則必穨爾如委矣苟穨爾如委則加任焉則必如將廢措其匪色必似不鳴矣攫俱博反簭音筮撥必末反穨徒回反措七故反凡攫閷援簭之類謂筍虡所象之獸也攫言其體之動觸閷言其爪之纖利援言有所攀取簭言有所齧食必深其爪則其爪長而曲必出其目則其目露而瞪必作其鱗之而其勢起而直如此則其于視也若撥動其體而怒焉雖任大鐘其力之勇致足以勝之而不為重且其匪然之文著干采色之間擊其鐘而似由其獸之鳴矣苟其爪不深目不出鱗之而不作則其體穨下而如委伏于地加之以任則若柔弱而不勝其重雖有匪然之采色又豈能似由其虡之鳴哉然則為筍虡者有賴乎工之巧矣先王所以立梓人之職者殆謂是歟梓人為飲器勺一升爵一升觚三升獻以爵而酬以觚一獻而三酬則一豆矣食一豆肉飲一豆酒中人之食也凡試梓飲器鄉衡而實不盡梓師罪之勺上約反觚註作觶之豉反豆註作斗鄉許亮反梓人為筍虡為樂器也為飲器為禮器也禮器在飲者所容有多寡其制名亦異勺言度其所受而取之者小也爵言資于尊而所入者小矣觚言交物無節而其窮為孤也飲酒之禮主有獻賔有酢而主又酬之酬所以致主人之厚意也獻以爵則一升矣酬以觚則三升矣一獻而三酬則凡十升矣故為一豆為禮而至于酬禮極而不可以有加則不可以無節故用觚焉亦所以為酒戒也肉隂也以養精酒陽也以養氣精所以保神氣所以充體精氣之養不可失則酒肉其可廢乎然先王亦欲其飲食有節而不可過故以中人為則而已故曰食一豆肉飲一豆酒中人之食也凡試梓者試以為器之效也飲器鄉衡而實不盡者謂衡平以平爵鄉口而酒或不盡則梓人為器之不善也故其長得以罪之梓師梓人之長也梓人為侯廣與崇方參分其廣而鵠居一焉上兩个與其身三下兩个半之上綱與下綱出舌尋縜寸焉个註讀為幹縜於貧反射侯内受矢外仄人諸侯矢人為王受難如此故與射侯同字梓人為禮樂之器而為侯者以射則藩飾之禮樂故也廣與崇方謂侯中也且天子射禮以九為節侯道九十弓弓取三寸以為侯中則侯中凡丈八尺髙廣等矣自諸侯而下名以爵命為之等數焉三分其廣而鵠居一者鵠棲侯中以為的者也鵠之為物逺舉而難中射以及逺中難為善中則告勝焉故的謂之鵠也鵠以皮為之各如其侯之廣狹故居侯中三分之一天子之侯中廣丈八尺則鵠凡六尺矣上兩个與其身三下兩个半之者个先儒讀為幹鄉射禮曰倍中以為躬倍躬以為左右舌下舌半上舌所謂舌則兩个是也侯身居中兩个在左右以兩个合身故為三夫侯中丈八尺身倍之則凡三丈六尺左右舌倍身則上兩个凡七丈二尺侯之制上廣而下狹身居一分上兩个倍之下兩个半之則凡五丈四尺矣其制則身夾中个夾身在上下各一幅則此侯用布凡三十六丈也上綱與下綱出舌尋縜寸焉者綱所以繫侯于植縜又為紐以持綱以繫侯則綱舉而紀隨故謂之綱以持綱則為縜而員之故謂之縜上綱與下綱皆出舌八尺象人張手之義縜寸則象人伸指之義葢人張臂則知尋伸指則知寸是皆近取諸身故也非特是也至于侯之制上廣而下狹則亦取象于手足焉以張臂則八尺張足則六尺故也張皮侯而棲鵠則春以功張五采之侯則逺國屬張獸侯則王以息燕棲音西射之制有三有大射有賔射有燕射皮侯則飾以皮而用之以大射即司裘所謂王大射則共虎侯熊侯豹侯諸侯則共熊侯豹侯卿大夫則共麋侯皆設其鵠是也五采侯則繪以采而用之以賔射即射人所謂王以六耦射三侯三獲三容樂以騶虞九節五正五正則以五采飾正是也獸侯則象以獸而用之以燕射即鄉射禮謂天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕是也方其大射張皮侯而擇士助祭取其有中的之功然後得與祭諸侯以春入貢秋獻功其貢士必居萬物之前則貢士正以春之時射中多者得與祭則其君為有慶而益以地射中寡者則不得與于祭則其君為有罰而削其地此大射之侯因諸侯春至射夫既同獻爾發功亦謂此也五采之侯則以賔射之禮待諸侯之朝覲五采則所以象文德也葢逺人不服則修文德以來之故五采之侯張于賔侯則言以逺國屬也獸侯張于燕射故畫為熊麋虎豹鹿豕之象以言能為民除害既去然後可以休息而安燕故張獸侯則王以息燕也于皮侯稱鵠則五采之侯中采而已五采之侯中采則獸侯之中畫熊麋虎豹鹿豕而已然皮者被文以相質其質以義為主士之事如此故大射用之以擇士五采以文飾而其文以禮為主故設采侯則用之以懐逺獸侯以除害而安人而其安人以恩為主故設獸侯則用之于無事而息燕三侯之制既異則其名不得同凡以稱之其實而已春以功者大射之侯因諸侯春貢士擇士之有功者而用之所以謂之春以功也詩曰大侯既抗弓矢斯張云云祭侯之禮以酒脯醢其辭曰惟若寜侯毋或若女不寧侯不屬于王所故抗而射女强飲强食詒女曽孫諸侯百福女音汝射音石强上聲侯而祭之者神無乎不在而君子無往不用其至也然祭用其至則以誠為主以少為貴而不貴多品故以酒脯醢而已夫侯受内扞外有諸侯之象故天子之大射張虎熊豹之三侯則象其威德之足以服諸侯也賔射張五采侯則象其文德之足以懐諸侯也燕射張獸侯則象其無事而其恩足以安諸侯也故祭侯之辭曰惟若寜侯而已使之為諸侯者也乃若不安其為諸侯不屬于王所則必抗而射女司馬以九伐之法正邦國馮弱犯寡則𤯝之賊賢害民則伐之暴内陵外則壇之負固不服則侵之所謂不寜侯不屬于王所故抗而射女也夫外諸侯嗣則繼世以象賢若安其為諸侯則與國咸休永世無窮其福之詒子孫者可勝計哉故曰詒女曾孫諸侯百福周禮詳解卷三十八
