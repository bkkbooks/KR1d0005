body:
  text: 周禮詳解卷三十宋王昭禹撰秋官司㓂惟王建國辨方正位體國經野設官分職以為民極乃立秋官司㓂使帥其屬而掌邦禁以佐王刑邦國孔子曰道之以徳齊之以禮有恥且格道之以政齊之以刑民免而無恥蓋徳禮者治之本刑政者治之末末所以輔本也惟其任末而不知本此民所以至於免而無恥先王之治先之以徳禮而輔之以政刑德所不能化然後禮禮所不能服然後政政所不能正然後刑刑豈先王所欲用哉不得已而用之也故司㓂掌刑而屬於秋官以秋者天所以肅殺之時於方則為西之酉於行則為金之剛而刑以義為主也舜命臯陶為士而先戒之曰蠻夷猾夏㓂賊姦宄則刑以懲㓂為急也然立官而司至於㓂則刑官之事無不舉矣謂之司㓂其義如此大司㓂之職掌建邦之三典以佐王刑邦國詰四方一曰刑新國用輕典二曰刑平國用中典三曰刑亂國用重典詰起吉反掌建邦之三典三典即太宰所謂刑典也合而言之故曰刑典别而言之則刑有三等之不同故曰三典以佐王刑邦國詰四方者邦國謂中國也四方謂四夷邦國政之所加故曰刑邦國詳於近故也四方則有威讓之令有文誥之辭布令陳辭而又不至則或增修於德而已故曰詰四方畧於逺故也太宰刑典言以詰邦國以刑百官而大司㓂言刑邦國詰四方者太宰之於刑建其書以道佐王故詳於内而畧於逺也司㓂任其事以法佐王故詳於外而略於近也此所以不同刑新國用輕典者舊染汙俗不可疾正姑徐教之則以其教化未明習俗未成宜以柔道乂之也刑平國用中典者已安已治既富既庶陶冶被服莫不辨治則以其教化巳明習俗已成宜以平直乂之也刑亂國用重典者殱厥渠魁㓕其强梗以威克愛以義勝仁則以其頌昏暴悖不可教化宜以剛乂之也書曰惟敬五刑以成三德盖謂此也然則治時不同而有三國之異以俗異之也刑書不同而有三典之異者以德異之也有乆近之教斯有缺成之俗有缺成之俗斯有平亂之國先王於是以德制刑以待三國之不同也三德所以趨時三典所以立德先王何甞容心於其間哉猶之權衡應物而已然則先王之制刑罰一輕一重非特此也有權一世而為輕重者書所謂刑罰世輕世重之謂也有權一人而為輕重者書所謂上刑適輕下服是也有權一國而為輕重者司㓂所謂刑新國用輕典之類是也吕刑之言惟齊非齊有倫有要其言有倫正謂此也以五刑糾萬民一曰野刑上功糾力二曰軍刑上命糾守三曰鄉刑上德糾孝四曰官刑上能糾職五曰國刑上愿糾暴守劉音狩愿音願野刑施於六遂者也軍刑施於軍旅者也鄉刑施於六鄉者也官刑施於官府者也國刑施於王國者也野刑所以弼事也民知即功則事官之事成矣力所以致功也故所尚者功而所紏者在力軍刑所以弼政也而下知用命則政官之政成矣守所以致命也故所上者命而所紏者在守鄉刑所以弼教也民知務德則教官之教成矣孝所以致德也故所上者德而所紏者在孝官刑所以弼治也官惟其能則治官之治成矣職所以致能故所上者能而所紏者在職國刑則正以刑為主也以教祗德而使之不虣而已豈徒以鞭扑殺戮為事哉故所上者愿而所紏者在暴盖失愿而暴刑所取也凡此五刑以六官攷之而不及於禮者盖禮之施於萬民者在教而已謂之紏萬民則刑之所施以賤者為主故也先野刑而後至於國刑者刑之所施先逺而後近先外而後内與書序蠻夷猾夏㓂賊姦宄同以圜土聚教罷民凡害人者寘之圜土而施職事焉以明刑恥之其能改者反於中國不齒三年其不能改而出圜土者殺罷音皮注下皆同寘之豉反又音示以兩儀言之則乾為圜以五則言之則規為圜獄而謂之圜土有生養而主乎仁之意非茍寘之也罷民不能自强以禮者也故有至於罪以至於罪而害人唯其過矣故寘之圜土凡以聚而教之也施職事焉謂以其所能役使之也所以勞苦之使知自强以明刑耻之謂書其罪惡以著之於背也所以汚辱之使知自好彼知自强則厭勞苦而思就顯榮矣則向之失者今也皆洗滌自新遷善徙義斯釋之可也故其能改者反於中國方其寘之圜土猶外之中國也其能改者出之而無復圜土之拘制所謂反之於中國也且其収之也三讓而罰而歸之於圜土及與其能改亦不可以一日而足故不齒於倫類者三年三年無違亦已乆矣則歸之倫類以序之而復於平民也先王於罷民宥而教之可謂至矣然有不能改而又造焉者殺之可謂義也故其不能改而出圜土者殺聚而教之者仁出而殺之者義也圜土之法一設而先王之仁義兩存則孰不欲逺罪遷善哉其不能改而出焉者固無有矣特其立法也詳而曲為之防及此書曰五流有宅五宅三居則方舜之時以流宥五刑輕者外之中國也囚之圜土其意亦猶是與然時異則法異此其所以不同與以兩造禁民訟入束矢於朝然後聽之造七報反兩造謂彼巳有辨而皆至於公也訟者言於公也訟以兩造聽之而無所偏受則不直者自反而民訟自禁矣入束矢以自眀其直而矢之為利直行者也不直則入其矢亦所以懲不直知所懲則訟何患於滋而不禁乎古之於訟謂之聽者以聽其聲為主也其来自外受之自内我無加損焉因彼而巳書曰兩造具備師聽五辭此之謂也以兩劑禁民獄入鈞金三日乃致於朝然後聽之劑子隨反方言於公者訟也因而守之者獄也盖争而不已必事於訟訟而不已者必至於獄以其至於獄也必有簡然後聽之故書曰無簡不聽兩劑書也兩劑彼巳各具其獄辭之書也以兩劑聽之而無所偏信則不直者自反而民獄自禁矣入鈞金則以自明其不可變然後聽之而金之為物則堅剛而不變故也必三日而後辨者重致民於獄也書曰聽獄之兩辭記曰有旨無簡不聽所謂簡者非特劑也舉劑以見類焉以嘉石平罷民凡萬民之有罪過而未麗於灋而害於州里者桎梏而坐諸嘉石役諸司空重罪旬有三日坐朞役其次九日坐九月役其次七日坐七月役其次五日坐五月役其下罪三日坐三月役使州里任之則宥而舍之桎音質梏古毒反易曰嘉會足以合禮則嘉者合禮之善也罷民不能自强以禮坐諸嘉石以辨治之則使之自省而克已復禮也圜土之聚民謂之害人則以其己麗於法也嘉石之平罷民謂其有罪過而未麗於法則其得罪差輕於圜土也餘見雜傳以肺石達窮民凡遠近􅑏獨老㓜之欲有復於上而其長弗達者立於肺石三日士聽其辭以告於上而罪其長􅑏其營反長丁丈反肺之在五臟其情為憂肺之在五官其竅為鼻􅑏獨老㓜所謂窮民也以其憂在乎内而不能自達則立於肺石而達之則窮民有所信矣夫􅑏獨無助而可誣老者無力而可侮幼者無知而可罔為之長者至不敢廢也其事葢有助焉堯之不虐無告文玉之發政施仁必先斯四者其意葢亦如此也正月之吉始和布刑於邦國都鄙乃縣刑象之灋於象魏使萬民觀刑象挾日而歛之夫刑者侀也侀者成也宜無所加損焉於嵗終亦有所改易正月之吉始調和而布行之者盖先王雖原情以定罪據事以制刑亦當因時而為之變通矣噬嗑之明罰勑法賁之無敢折獄豐之折獄致刑中孚之議獄緩死大司徒以荒政而緩刑穆王度作刑以詰四方則刑雖有常刑亦量時而有輕重正月之吉始和布刑於邦國都鄙為事故也其布刑也亦與太宰之布治司徒之布教司馬之布政同意且民不可使覿刑先王必縣刑象使民觀之者盖先王之法若江河貴乎易避而難犯茍匿為物而愚不識及陷於罪又從而刑之不幾於罔民乎其使民觀象者凡使民知所避而已豈覿刑之意哉凡邦之大盟約涖其盟書而登之於天府太史内史司㑹及六官皆受其貳而藏之約於妙反㑹古外反司民之職曰凡邦國有疑㑹同則掌其盟約之載所謂邦國之大盟約者此也刑者侀也一成而不可變盟約以質信則亦一成而不可變也故大司冦涖其盟書違盟約則刑所取亦刑官之事也登於天府保藏之與寶鎮寶器民數榖數同也古之盟也必質明與神晏子仰天而嘆曰嬰所不唯忠於君利社稷者是有如上帝乃㰱則盟約之所主天寔司之也太史内史司㑹皆受其貳而藏之各以攷事焉非特備失亡而已司約之言六官辟藏亦謂此也凡諸侯之獄訟以邦典定之凡卿大夫之獄訟以邦灋斷之凡庶民之獄訟以邦成弊之斷丁亂反弊必世反凡有情者不能無争凡有争心者不能無獄訟雖貴賤之異𫝑尊卑之殊分是非之相攻利害之相仍争而不已或至於訟訟而不已或至於獄先王為之剖决不啻若辨白黑若數一二者盖各以其事類定而已六典所以待邦國之治諸侯强大其獄訟難定故以邦典定之八法所以待官府之治云云見新經一之使不亂者定也辨之使有分者斷也因而治之者弊也弊詳於㫁㫁詳於定諸侯尊於卿大夫故言定卿大夫貴於庶民故言㫁萬民則卑賤其治之為愈詳故言弊大祭祀奉犬牲若禋祀五帝則戒之日涖誓百官戒於百族及納享前王祭之日亦如之奉其明水火凡朝覲會同前王大䘮亦如之大軍旅涖戮於社凡邦之大事使其屬蹕享普庚反又普孟反蹕本亦作䟆音畢奉犬牲各從其類新經云云若禋祀五帝則戒之日涖誓百官戒於百族者精意以享謂之禋戒之日謂散齋也百官則凡官府之執事者皆是也百族則凡百官之族姓與祭者皆是也太宰之祀五帝則戒百官大司㓂涖之而已至於百族則大司㓂又戒之也吾王方致其精意以交乎神則百官之執事百族之於祭可不致其嚴乎記曰獻命庫門之内戒百官官也太廟之命戒百姓也所謂百姓則百族也於百言誓於百族言戒亦互見也夫精禋之所盡主之心進於道矣誓戒之所嚴臣之心進於禮矣誓之至矣有不用誓者則司㓂之刑從而加其慢誓者焉戒之至矣有不用戒者則司㓂之刑從而加其弛戒焉必使司㓂涖誓而㫁焉則致百官百族於刑之中義也且夫莫親於王猶親立於澤中以聽誓戒況夫卑之為臣屬者乎莫卑於遂師於祭祀且猶審其誓戒況夫貴之為官族者乎惟其如是然後可以佐王之禋祀也於天地二官未甞言禋則所以佐王事上帝者有在於此盖治教之官佐王以道於所事意不期精粗焉刑官以革汚濊而除之則致意之精正在是也及納享前王祭之日亦如之者納亨則受牲於鑊以亨也太宰及納亨賛王牲事方是時也治官以宰制斟酌賛王而刑官先焉俾王從欲以治則刑先之而四方莫不順從無敢慢故也太宰稱祀而司㓂稱祭之日者宰天官以道佐王事神故稱祀刑制人之形焉故稱祭奉其明水火者明水謂以鑒取水於月也明火謂以燧取火於日也新經云云書曰明清於單辭此以刑官明清之事也凡朝覲㑹同前王大喪亦如之與大祭祀前王同義亦期於無刑之意也大軍旅涖戮於社者弗用命戮於社涖戮刑官之事也凡邦之大事使其屬蹕者止使人毋敢干焉刑官之事也盖先王之用刑亦使人易避而難犯刑官之佐王亦以是也小司㓂國之大事使其屬蹕事在國中而已大司㓂言邦則非特國中也事之所在通國野焉小司㓂之職掌外朝之政以致萬民而詢焉一曰詢國危二曰詢國遷三曰詢立君其位王南鄉三公及州長百姓北面羣臣西面羣吏東面小司㓂擯以叙進而問焉以衆輔志而弊謀王朝有三有内朝有治朝有外朝外朝在庫門之外而致萬民以詢事之朝也詢者徧咨之謂也洪範曰汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮汝則從龜從筮從卿士從庶人從是之謂大同則所謂致萬民而詢者卿士庶人無不在也詢民則其謀也徧矣故以致萬民為主也國危及於庶安則謀矣若周公之討亂是也國遷則謀居矣若盤庚之遷都是也立君則謀嗣矣若文王舍伯邑考立武王是也新經云云小司㓂擯以叙進而問焉則先貴後賤先上後下謀在衆也志在王也以衆輔志則以衆謀而輔王之志也弊謀則以衆謀為稽而弊之於王也書曰朕志先定詢謀僉同亦若此而已矣以五刑聽萬民之獄訟附於刑用情訊之至於旬乃弊之讀書則用灋凡命夫命婦不躬坐獄訟凡王之同族有罪不即市訊音信五刑則司刑所謂墨也劓也宫也剕也殺也聼訟則其是非曲直能審能克也能聽獄訟然後於有罪者而麗之於法以附於刑也既得其罪附於刑矣又從而用情以訊之恐其非心服而從也新經云云以五聲聽獄訟求民情一曰辭聽二曰色聽三曰氣聽四曰耳聽五曰目聽蚩蚩之民汨於利害之塗域於是非之境争心不已至於獄訟先王於訟則聽之以兩造於獄則聽之以兩劑善良於此欲以正勝姦僞於此欲以幸免彼其正勝幸免之心藏於深情厚貌之際必也以言訊之以情求之其聼有五而大概以辭為主盖心者形之君辭者心之聲心聲發於中而不能掩之於外其情安能廋哉此所以合氣色耳目之聽而同謂之五聲矣其辭信矣則色定氣舒耳目之視聽不亂其辭僞矣則色變氣短耳目之視聽皆失以此聽訟則民之情僞尚安所逃哉惟皆以辭為主故一曰辭聽聽其辭而因察其色以色著乎顔而為心之表故也彼脅肩諂笑者有愧於心則其色赩然則察其色固足以得其心矣故二曰色聽以色為未足又察其氣以氣充於體而為心之運故也狓行有不慊於心則氣為之餒則察其氣亦足以得其心矣故三曰氣聽耳目者心之樞機則心之情僞亦寓於耳目視聽之際察其視聽亦足以得其心矣探其夲而言之則惟耳夲於立始而先五官而生即其用而言之惟耳為能無待而先五官而聞故天一生水而耳屬之地二生火而目屬之此所以四曰耳聽五曰目聽也以八辟麗邦灋附刑罰一曰議親之辟二曰議故之辟三曰議賢之辟四曰議能之辟五曰議功之辟六曰議貴之辟七曰議勤之辟八曰議賔之辟新經云云親謂王之親族也故謂王之故舊也賢謂有德行者也能謂有道藝者也功謂臣之有大功者也貴謂臣之有爵位也勤謂羣吏之勤於事者也賔謂四方之賔客者也以王之親故則不可以衆人同例以國之賢能則不可以與庸常同科有功則或可以掩過在貴則不可以遽凌辱吏之勤勞則不可以沮抑吏之尊貴則宜有以優異此所以用八辟以議之也然以臯陶為士而瞽瞍殺人舜不敢赦必至遵海而逃然後可其議之大概可知矣以三刺斷庶民獄訟之中一曰訊羣臣二曰訊羣吏三曰訊萬民聽民之所刺宥以施上服下服之刑刺七賜反㫁丁亂反先王以好生之德洽於民心與其有不辜之殺寧有不經之失故民之麗於刑而在所棄者猶不忍置之死地尚冀有以生之焉此所以用三刺以㫁庶民獄訟之中也刺殺也訊之於臣吏萬民衆人皆曰可殺然後殺之則殺者非我因彼而已如刺之於物物觸之而後刺其刺無不當矣故不曰殺而曰刺必曰三刺而後㫁則凡以求其事實而已中者事實之書也與天府謂之治中告天謂之升中同意以宰夫攷之羣吏非大夫以上則所謂羣臣者大夫以上也羣吏者士以下也訊羣臣羣吏然後訊萬民者則臣吏能循民志而達之故也聽民之所刺宥司刺所謂三刺三宥之法是也聽民之所刺則衆人皆曰可殺然後殺之也聽民之所宥則衆人皆曰可宥然後宥之也刑者上之所制以服於下而下有罪附於刑者宜無不服也上服則服刑之重者也下服則服刑之輕者也謂之上服下服則猶舜典之言五刑有服呂刑之言上刑適輕下服下刑適重上服者同也記曰刑人於市與衆棄之此刺宥所以必聽於民凡與衆共之而已及大比登民數自生齒已上登於天府内史司㑹冡宰貳之以制國用比毗志反上時掌反及大比謂三年大比也以三年之乆而民之生死登下亦已多矣故及大比登民數焉生齒則有食之端有食之端則將任之以職故自生齒以上登其數登於天府則寶而藏之也民數有多寡則利之繁省亦可知矣盖民之犯刑以其貧民之貧則以上賦歛之多不知事為之制也此内史司㑹冡宰所以貳之以制國用盖國用以賦歛制之賦歛之多寡以民数制之故也記曰冡宰制國用於嵗之杪制國用者冡宰之事而兼内史司㑹言之者盖内史執國法及國令之貳以攷政事以逆㑹計司㑹以法均節其財用故也小祭祀奉犬牲凡禋祀五帝實鑊水納亨亦如之大賔客前王而辟后世子之喪亦如之小師涖戮凡國之大事使其屬蹕鑊户郭反辟皮亦反大司㓂大祭祀奉犬牲故小司㓂小祭祀奉犬牲新經云云盖木仁也火禮也以木㸑火則以仁出禮也鑊義也水知也實鑊水則以知充義也舜戒臯陶曰惟明克允穆王之吕刑曰哲人惟刑則用刑者尤賴於智此刑官所以貴乎以智充仁而成乎以仁出禮之事也盖禮與刑相為表裏失禮則刑之所恥也以義用刑者茍無智以充其義則輕重失其序淺深失其量智之於刑其可少乎大司㓂凡朝覲㑹同前王小司㓂大賔客前王而辟則小司㓂非特前王又為王闢道也亦刑先之意大司㓂大軍旅涖戮於社故小司㓂小師涖戮大司㓂凡邦之大事使其屬蹕故小司㓂凡國之大事使其屬蹕言邦則通邑都焉言國則主於國中而巳孟冬祀司民獻民數於王王拜受之以圖國用而進退之民生自天天實有司之者先王必有以報其生養之功冬物成之時故孟冬祀司民焉方祀司民則司㓂獻民數於王者以民之多寡實天降也刑之繁省致天討也人之所為凡以奉成天之所為而已未甞私焉有以照之於天也王拜而受則重數也司會冡宰以制國用而王則圖國用而進退之者盖圖者圖其大計也制則事為之備也圖其大計者君之事也事為之制者臣之事也人君不圖而退之人臣不敢擅殺物而損禮此無他上之所主者要下之所治者詳故也如此則内史司㑹冡宰雖事為之制而盈虚緩急之度開闔歛散之權一皆㫁於王焉然以圖國用必言於司㓂者以民之輕生而觸法冐死而犯刑者以其貧而已民之貧以上用度之侈賦歛之多而已用度侈而賦歛多以不知圖國用而制之故也嵗終則令羣士計獄弊訟登中於天府曰羣士刑官也刑官謂之士士事也察也治至於用刑非道也事而已直欲致其察故也自士師鄉士而下皆刑官故謂之羣士計獄者計其多寡之數也弊訟者察其情而斷之為不疑要其歸則計非不弊弊非不計各有攸當而已然於嵗終令計獄弊訟則計獄者所以要其用而攷之也弊訟者所以革其弊而㫁之也中獄訟之中言事實之書也登中於天府刑所以致天討故登於天府而藏之且示重其書而有慎用之意正嵗帥其屬而觀刑象令以木鐸曰不用法者國有常刑令羣士乃宣布於四方憲刑禁乃命其屬入㑹乃致事鐸侍洛反正嵗帥其屬而觀刑象與小宰帥其屬觀治象同意令觀刑象則慮其或不見也令以木鐸則慮其或不聞也刑官聞見之既審而猶有不用法則刑所取也故戒以不用法者國有常刑令羣士則令於士師鄉士以下使之稟法故也宣布於四方及邦國矣所宣布非一國也故言四方與行人言時㑹以發四方之禁同意憲刑禁則掲而示之使知所避也有刑必有禁所以左右刑罰而使不犯也命其屬則命刑宫之屬也入㑹則㑹計其刑之多少而入其書於司㓂也於秋官言入則秋以入為事也嵗㑹餘官皆以歳終入其書獨司㓂以正嵗入之者所以謹其始也且春主仁而先王於刑亦以仁為主故也士師之職掌國之五禁之灋以左右刑罰一曰宮禁二曰官禁三曰國禁四曰野禁五曰軍禁皆以木鐸狥之於朝書而縣於門閭左右並去聲先王之用刑罰常出於不得已故刑期於無刑罰期於無罰必輔之以禁使民不犯而後已也禁施於未然之前刑罰施於已然之後禁之所以為仁刑罰之所以為義禁之不止而猶有犯焉然後加之以刑罰以義斷仁也然則以刑罰為正而以五禁左右之來而翼之使無敢犯也宮禁施於宮中者也官禁施於官府者也國禁施於王國者也野禁施於郊野者也軍禁施於軍旅者也自宮禁以至於軍禁由内以及外之序也五刑自野以及國其序與此不同者盖禁欲其無犯此其所以異於刑也以木鐸狥之於朝使之内有所聞也書而縣於門閭使之外有所見也皆狥而縣之互相備也以五戒先後刑罰毋使罪麗於民一曰誓用之於軍旅二曰誥用之於㑹同三曰禁用諸田役四曰糾用諸國中五曰憲用諸都鄙誥古報反禁止使勿為施於未然之前戒敕其怠忽施於事為之際故以五戒先後刑罰盖以刑罰為中以五戒引而導之故謂之先後也先之則若盤庚上篇以戒羣臣是以誥先之也後之則若盤庚下篇以戒百官族姓是以誥後之也若中篇誥民我乃劓殄滅之無遺育則刑罰將致矣以五戒先之則引而導之使民無退而麗乎刑罰也以五戒後之則引而導之使民無進而麗乎刑罰也如此則固無麗罪之民矣誓若湯誓泰誓之類誥若康誥洛誥之類禁若遂人之田役掌其禁令紏若刑典之紏萬民也憲若布憲掌邦之刑禁是也新經云云軍旅㑹同田役則戒之於有事之時國中都鄙則戒之於無事之日毋使罪麗於民則軍旅為大㑹同次之田役次之先事而戒宜緩於有事而戒故國中都鄙又次之先國中後都鄙則自近以及逺與五禁同意此其序也然則誓之所用非特軍旅也而軍旅為主祭祀田役之類皆有誓也禁之所用非特田役也而以田役為主宫中官府皆有禁也以此推之則誥也紏也憲也亦若是而已矣掌鄉合州黨族閭比之聯與其民人之什伍使之相安相受以比追胥之事以施刑罰慶賞比毗志反追如字又張類反胥如字又思叙反六卿之内其居則有州黨族閭比其民則有什伍合州黨族閭比者以比合比以閭合閭所以聯其居也合其人民之什伍者以伍合伍以什合什所以聯其人也聯比其居什伍其人鄉宦之事也而士師又掌之使之相安相受故也去其害人者則使之相安使州里任焉而舍之則使之相受以居處則相安而不相疾以往來相受而不相拒則可以無事矣無事而相安相受然後有事而可以同其憂患焉比追胥同盗賊之事於是乎作矣以施刑罰慶賞則廢事者施刑罰有功者施慶賞也士師掌刑故使之相安而已若夫相保則教官之事也非士師所及掌官中之政令察獄訟之辭以詔司㓂斷獄弊訟致邦令宫中之政令謂政令之旋於官府之中者也士師則掌之邦令施於邦國都鄙也士師則從而致之矣盖政令也邦令也欲其行而不敢違必使士師掌而致之者以違令則刑之所取也掌士之八成一曰邦汋二曰邦賊三曰邦諜四曰犯邦令五曰撟邦令六曰為邦盜七曰為邦朋八曰為邦誣汋上灼反諜音牒撟音矯終始無虧之謂成八成者以我之成法成物之虧而已官府之八成則其經治之成法也士師之八成則其正亂之成法也經治之成法在德故德成於此而衆治之虧者理焉正亂之成法在刑故刑成於此而衆亂之虧者懲焉邦汋謂汋邦事之輕重緩急所在為鄉背出入者也邦賊謂小人作於内而為邦賊者也邦諜謂姦人來於外而為諜也賊則逆亂也諜則反間也犯邦令則犯而違之也撟邦令則撟而造之也為邦盗則竊取國之寶藏者也為邦朋則為私黨以亂民也為邦誣則造訛言以惑衆也先王之時齊八政以防淫一道德以同風俗患夫姦人所以為禍本者如此立八成之法以使士師掌之俟其類至則從而治之則制治於未亂保邦於未危所以防其芽蘖者豈不至哉若邦凶荒則以荒辯之灋治之令移民通財糾守緩刑榖不熟為凶凶甚則為荒若邦凶而至荒則移民通財糾守緩刑之事因而有辨矣故以荒辯之法治焉夫移民則若梁惠王移其民於河東也通財則若晉饑秦輸之粟也糾守則糾四封之守以防㓂警也緩刑則以刑雖不可去亦緩之而不急也小行人言若國凶荒令賙委之則概指諸侯之國也故言國以别邦焉今此言邦凶荒以荒辨之法治之則凶荒徧邦然後以荒辨之法治之故言邦以别邑都焉荒政無紏守而有去幾今此無去幾而有紏守王責諸侯以守故可以去幾邦國為王守則有紏守而已凡以財獄訟者正之以傅别約劑若祭勝國之社稷則為之尸王燕出入則前驅而辟祀五帝則沃尸及王盥洎鑊水凡刉珥則奉犬牲諸侯為賔則帥其屬而蹕於王宫大䘮亦如之大師帥其屬而禁逆軍旅者與犯師禁者而戮之嵗終則令正要會正嵗帥其屬而憲禁令於國及郊野傅音附約於妙反盥音貫洎其器反又音冀刉音機又音竒珥而志反要平聲㑹古外反傅謂地傅别謂判書約謂書其期約也劑謂為之要書也以財獄訟者必有傅别約劑然後其實僞可正也民知此則無敢苟簡於其始而獄訟由之以省也易之訟言君子以作事謀始殆謂是也勝國之社亡殷之社是也故祭則以士師為之尸小司㓂大賔客前王而辟故士師王燕出入則前驅而辟以燕出入非大事故也祀五帝則沃尸及王盥者沃盥所以致潔而除汚穢尸神像也王事神者也沃尸及王盥以潔除汚穢相天及王事者也刑官之事如此故使士師沃尸及王盥也不言禋祀則精意以享非士師所及也洎鑊水者小司㓂實鑊水士師續司㓂之事而終也洎從水從自以物為自而加以水也刉珥釁禮之事也用牲毛者曰刉羽者曰珥比大祭此又為小也故士師刉珥則奉犬牲諸侯為賔則帥其屬而蹕於王宮者大司㓂小司㓂言使帥其屬非必親帥之也士師言帥其屬則親蹕矣尊卑之序也大司㓂蹕邦事則通國邑小司㓂蹕國事止於國中故士師蹕王宮而已所蹕者彌狹矣禁逆軍旅則使之無犯也犯師禁戮之則治軍旅以嚴為主也然亦非軍之大事嵗終則令正要㑹謂小司㓂正嵗乃命其屬入㑹故也正嵗帥其屬而憲禁令於國及郊野者國謂王國郊野則鄉遂也内而王國外而郊野士師於正嵗則帥其屬而憲禁令亦使之無犯故也周禮詳解卷三十
