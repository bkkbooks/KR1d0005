body:
  text: 周禮詳解卷三十九宋王昭禹撰廬人為廬器戈柲六尺有六寸殳長尋有四尺車㦸常酋矛常有四尺夷矛三尋凡兵無過三其身過三其身弗能用也而無已又以害人故攻國之兵欲短守國之兵欲長攻國之人衆行地逺食飲飢且涉山林之阻是故兵欲短守國之人寡食飲飽行地不逺且不涉山林之阻是故兵欲長廬力呉反下同柲兵媚反殳慵朱切酋在由反廬者總合之辭也水始一勺總合而為川土始一塊總合而為田虛總合衆實而受之也皿總合衆有而盛之者也若虚之無窮若皿之有量若田之止若川之逝其為總合一也故從虚從川從皿從土工為兵器之柄而曰廬人者以兵器必有柄然後可以總合而為用故也凡伍用兵逺則弓矢者射之近則矛者句之然後令殳者擊之戈㦸者刺之其總合而用之可見矣戈矛㦸之柄謂之柲者葢操執之以為用則謂之柄左右戾而為取小則謂之柲柲言其事而且有慎意故音毖八尺曰尋倍尋曰常利兵莫短於戈莫長于車㦸故戈柲六尺有六寸車㦸常常則丈有六尺矣矛所以句則宜長于㦸然後有及故酋矛常有四尺則其長二丈矣夷矛三尋則其長二丈四尺酋矣殳持以擊者也則長短宜適中焉故長尋有四尺言就也以夷矛三尋于長為極酋矛之長則近而就之矣故曰酋矛夷言傷也以夷矛極長句則有及而傷物為易故曰夷矛凡兵無過三其身過三其身弗能用也而無已又以害人者葢人長八尺故夷矛三其身以傷人此矛之極長者所以其制止于三尋而已凡兵有用之以攻者有用之以守者攻國之人涉山林之阻行地逺而食飲飢則長兵為不便故兵欲短守國之人不涉山林之阻行地近而食飲飽則短兵為不利故兵欲長由此觀之制兵用兵亦不必拘于定制宜稱事而已凡兵句兵欲無彈刺兵欲無蜎是故句兵椑刺兵摶􅌛兵同强舉圍欲細細則校刺兵同强舉圍欲重重欲傅人傅人則密是故侵之句音鈎彈徒旦反蜎于全反椑音鼙刺七賜反摶音團校音絞句兵矛屬刺兵戈㦸屬矛以句則引之而使來故其柲欲無彈彈謂如發丸失于太圜也戈㦸以刺則中之而使深故其柲欲無蜎蜎謂如蜎虫體弱而撓也惟欲無彈故句兵椑椑謂隋圜也惟欲無蜎故刺兵摶摶謂圜也􅌛兵謂殳與矛殳以撃矛亦撃而句之故同謂之􅌛兵同强謂上下等也舉謂手所操其柲圜細則有力而其用疾故曰舉圍欲細細則校刺兵同强謂戈㦸之柲亦上下等也于手所操之處則欲重重則増之使豐以之刺人則傅著而易入故曰舉圍欲重重欲傅人傅人則密是故侵之凡為殳五分其長以其一為之被而圍之參分其圍去一以為晉圍五分其晉圍去一以為首圍凡為酋矛參分其長二在前一在後而圍之五分其圍去一以為晉圍參分其晉圍去一以為刺圍凡試廬事置而摇之以眡其蜎也灸諸牆以眡其橈之均也横而摇之以眂其勁也六建既備車不反覆謂之國工灸音救覆芳服反被謂殳把中也殳長尋有四尺五分其長以其一為之被而圍之則其圍二尺四寸矣晉謂殳下插車處也三分其被圍去一以為晉圍則晉圍凡一尺六寸矣首謂殳上也五分其晉圍去一以為首圍則首圍凡一尺二寸五分寸之二也酋矛長有四尺三分其長二在前一在後而圍之則手所操執其圍欲細也晉圍亦矛㦸下鐏也刺圍謂矛刃首也凡試廬事置而摇之以眂其蜎謂植之地而摇以手以審其體弱而橈也灸諸牆以眂其橈之均謂挂兩牆之間以審其本末之匀也横而摇之以眂其勁謂横執而摇之以審其村之堅强也六建所謂車有六等之數是也五兵與人既備建而車不反覆則五兵輕重趣于匀故也非國工之巧何以及此匠人建國水地以縣置𣙗以縣眂以景為規識日出之景與日入之景晝參諸日中之景夜考之極星以正朝夕已斤為匠以工欲善其事必先利其器也先王建國必辨方正位然後可以體國經野以為民極匠人置槷眂景以正地中必天地之所合四時之所交風雨之所㑹隂陽之所和于是乎建王國也然其置臬必光水地以縣使所植之臬必平而直然後可以正日景也水莫動則平可用之而望髙下之勢繩垂之而墜可用之而正曲直之形葢于四角立植縣以繩而取其直又以水而取其平然後于所平之地置臬爾雅曰在牆者謂之杙在地者謂之臬所謂槷則臬也于所平地之中央立八尺之表以縣正之以眂日景將以正四方也方旦而日出夕而日入之時則又為規以刻識其景葢以規識其出入之景則東西可正東西既正則南北亦從而正矣夫兩相差為互三相參為參為規以識其出入之景所謂兩也于晝又從而正之以日中之景是以三相參焉故曰晝參諸日中之景以參諸日中之景為未足夜乂考之極星以北辰所居者天之中故也晝參日景所以正其朝也夜考極星所以正其夕也以日景正其朝則地之中得矣以極星正其夕則天之中得矣書曰自服于土中又曰其自時配皇天則洛邑非特地之中亦天之中矣唯其宅天地之中以中上以中道配皇天以中德紹上帝民於君取中于是乎在矣五官之首皆先之以唯王建國而終之以為民極者殆謂是也匠人營國方九里旁三門國中九經九緯經涂九軌左祖右社面朝後市市朝一夫涂音塗匠人言建國又言營國者詩序言衞文公始建城市而營宫室葢作而立之謂之建言其始也方九里言城中之制以典命考之上公其國家宫室皆以九為節上公百里之地其地方九里以王畿千里之廣百官之所止舍四方之所湊㑹而城中之制乃反下同于公殆不然也葢天子備天數則城中之制宜以十有二里然後其廟足以有容焉謂方九里葢作記者之誤矣旁三門則四方凡十有二門十有二門所以備天數也門既十有二門則國中之涂安得獨九而經緯之制止于九軌哉涂所以通四方之往來既曰十二門則其涂之數十有二亦可知矣縱為經横為緯九經九緯言道路縱横之皆九也軌轍廣也乗車六尺六寸旁加七寸凡八尺言九軌則積七十二尺矣左人道之所向右地道之所尊言祖則宗可知言社則稷可知朝者義之所在市者利之所在于朝言面則知市在所背于市言後則知朝在所先朝者官吏之所㑹市者商旅之所聚必一夫百畝之地然後足以容之故市朝一夫不言地數而言夫者葢夫以智帥人者也義利之所在皆宜有以帥之義而無以帥之則君子有犯義者矣利而無以帥之則小人有犯刑者矣謂之一夫義在是已夏后氏世室堂脩二七廣四脩一五室三四步四三尺九階四旁兩夾窻白盛門堂三之二室三之一夾古洽反窻初江反盛音成明堂之中有世室有重屋夏曰世室商曰重屋周曰明堂各舉其一而言之也以月令考之天子春居青陽夏居明堂秋居總章冬居𤣥堂至中央則居大廟大室然則世室則大廟大室也記曰魯公之廟文世室也武公之廟武世室也則世室為宗廟可知矣以夏后氏承堯舜之後始繼世而有天下此宗廟所以謂之世室也君子將營宫室宗廟為先故夏后氏以世室為始以事神為尚也孔子言禹菲飲食而致孝乎鬼神惡衣服而致美乎黻冕則夏后氏以事神尚可知矣堂脩二七廣四脩一者脩言南北之深也夏后氏度以步令堂脩十四步其廣益以四分脩之一五則堂廣十七步半矣五室三四步四三尺者堂上為室所以象五行也三四步以言室之深也四三尺以言室之廣也葢木室于東北火室于東南金室于西南水室于西北其深皆二步其廣益之以三尺土室于中央深四步其廣益之以四尺也九階者世室以南面為正南面三階而餘三各二階也四旁兩夾窓者助戸以為明者窓也每室四戸毎戸夾以兩窓則凡八窓也白盛者以蜃灰堊其牆壁所以致飾而成堂之也門堂門側之堂爾雅門側之堂謂之塾是也門之制居正堂三分之二室則居正堂三分之一皆小也夫其居有堂其處有室升降有階出入有門慮其不徹也夾窓以為明慮其不潔也白盛以為飾夏后氏如此則商周之制亦然矣殷人重屋堂脩七尋堂崇三尺四阿重屋重直龍反重屋謂王居正堂之路寢所以自居以安身也王之制始于夏而為未備故以事神者為尚而于自居以安身者為畧焉故言世室而已至商則其制為稍備非特見于神也所以自居以安身亦備其制焉故于商人言重屋葢夏后氏始以人道而王商人又以人道繼而重之此路寢所以謂之重屋也經言商人尚梓梓人為禮樂之器惟以重屋為尚則藩飾于禮樂之器不可廢也昔衛文公之營宫室尚植梓漆以為用則商人尚重屋其尚梓固其宜矣堂上度以尋以八尺為度也堂脩七尋則言其深也堂崇三尺則言其髙也四阿即四霤重屋複笮也商人之制如此則夏周亦然周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵明堂者王者明政教以接人之堂也故月令于夏則言天子居明堂以夏萬物相見之時而王者嚮明而治俯已接人者于是乎在王之制始于夏備于商而大備于周孔子曰周監於二代郁郁乎文哉則法度之文至周為大備而其盛不可復加焉故其布政教之堂謂之明堂然則世室以事神為尚則不若重屋以安身而其制為備重屋以安身為尚則不若明堂以接人而其文為盛經言周人尚輿亦以法度之文大備于此故也記曰虞夏之文不勝其質商周之質不勝其文夏后氏世室商人曰重屋周人曰明堂其文質之辨歟周度以筵而筵長九尺東西九筵則明堂其廣凡八丈一尺矣南北七筵則其深凡六丈三尺矣堂崇一筵則其髙凡九尺矣夏商周或舉世室或舉重屋或舉明堂葢其所尚不同故也然其堂之制雖或脩廣髙下之異數而其大槩則未始有殊故夏言世室非無重屋明堂也商言重屋非無世室明堂也舉其一互相明而已矣室中度以几堂上度以筵宫中度以尋野度以步涂度以軌廟門容大扃七个闈門容小扃參个路門不容乗車之五个應門二徹參个扃古熒反个古賀反闈音韋徹轍通度所以度長短者也有物斯有數有數斯有度几筵尋步軌五者其數雖殊而用之以度長短其度則一而已然度之所用亦各因物之所宜而非苟為異也隠几而坐者宜于室故室中度以几肆筵為禮者宜于堂故堂上度以筵所圍不一而伸屈于此者宫也伸臂而度之為宜故宫中度以尋在郊坰外而起畝于步者野也以步而度之為宜故野度以步涂有左有右而車從中央以行故涂度以軌尋也步也取諸身而度之者也几也筵也軌也取諸物而度之者也夫大扃牛鼎之扃其長三尺廟門容大扃七个則其廣凡二丈一尺小扃膷鼎之扃則長二尺闈者廟中皆旁出之門其廣六尺故闈門容小扃三个大扃小扃廟中所用故用之以為廟門闈門廣狹之數也道之大謂之路路門大寢之門也天子入而安身之地靜而復於道也故謂之路門乗車廣六尺六寸五个則凡三丈三尺矣言不容五个則是兩門乃容之也此門之制其廣一丈六尺五寸也出而接物謂之應應門朝門也朝者接人之地天子出而應天下之務也故朝門謂之應門一徹之内其廣八尺二徹三个是則應門其廣凡二丈四尺也夫長短之度廣狹之量各因物宜而為之數凡以便人而已故引而伸之雖十百千萬可以其數推而知之矣又奚至若膠柱鼓瑟之不能變哉先王之法神而化之使民宜之于是乎在内有九室九嬪居之外有九室九卿朝焉九分其國以為九分九卿治之内有九室謂路門之内也外有九室謂路門之外也后理隂教而聽内政于宫故有三夫人九嬪二十七世婦八十一女御所以佐内治者也天子理陽教而聽外治于朝故有三公九卿二十七大夫八十一元士所以佐外治者也九嬪上賛夫人以佐后而下則帥世婦以及女御故曰内有九室九嬪居之九卿上賛三公以佐天子而下則帥大夫以及元士故曰外有九室九卿朝焉九分其國以為九分九卿治之者三孤佐王公坐而論道六卿士大夫作而行之三孤六卿合而為九卿六卿之治合而為一成周所以致太平者職此之由乎書曰三孤貳公𢎞化寅亮天地又曰六卿分職以倡九牧阜成兆民葢分而言之則曰三孤六卿合而言之則同謂之九卿而已孤而謂之卿者以典命放之王之三公八命其卿六命而未嘗言孤則孤葢與卿同于六命矣夫由天道而大同于物者公也孤之德特立而無朋則未能大同于物有向於公而已卿之德羣而不黨則有類於孤而已孤卿之德其相去既不逺則孤之列職其序雖處于卿之上其同于六命宜矣故外朝之法則孤卿之位同于九棘司士辨等則孤卿之儀同于時揖孤與卿其名雖異而其實則類合而同謂之卿奚不可哉王宫門阿之制五雉宫隅之制七雉城隅之制九雉經涂九軌環涂七軌野涂五軌門阿之制以為都城之制宫隅之制以為諸侯之城制環涂以為諸侯經涂野涂以為都經涂五堵為雉其長三丈髙一丈雉之為物其飛若矢一往而墮有分守而不相犯者也雉有分域故取名焉使之各有分而不相犯故也阿棟也隅角也門阿之制五雉則三丈之長者五城隅髙于宫隅宫隅髙於門阿則外内髙下之制異也轍廣曰軌其廣八尺國中曰經涂遶城曰環涂郊外曰野涂經涂所由者衆故九軌環涂所由者少故七軌野涂所由者又少故五軌此内外廣狹之制異也都城王子弟公卿所封其城如門阿之制則無過五雉比諸侯之禮為殺也宫隅之制以為諸侯之城制則無過于七雉比天子之禮為殺也環涂以為諸侯經涂則邦國之經涂以七軌為度野涂以為都經涂則王子弟公卿之經涂以五軌為度凡以使天下共由之而無異道故謂之軌以天下有道則書同文而車同軌也夫降殺以兩禮之節也故諸侯之制下於天子都城之制下於諸侯然諸侯之有功德者乃所以入為卿士而其禮反下於諸侯何也葢君譬則日也臣譬則月也月近日則明闕逺日則光盈臣近君則威殺逺君則勢伸都于王宫為邇安得不屈禮以下於諸侯乎觀其采地下謂之國而謂之都其君不謂之監而謂之長其命也以耦不可以竒其治也以則不以典其傳也以禄不以嗣則其城涂之制亦可知矣匠人為溝洫耜廣五寸二耜為耦一耦之伐廣尺深尺謂之􅍒田首倍之廣二尺深二尺謂之遂九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮專達於川各載其名􅍒古犬反天地之氣不能常和隂陽之運不能無舛則水旱之變不能保其不至也所可保者人事之素備有以勝之而已先王以是闢田畝治溝洫也耜耕器也其首有金其甬有耒以木㠯金而耒為之用故其字從耒從㠯其廣五寸以二耜耦而耕則共一尺矣故耜廣五寸二耜為耦一耦之伐廣尺深尺謂之􅍒􅍒壟中也伐則所發􅍒上之髙土也田則一夫之所佃百畝方百步也田首倍之廣深皆二尺而謂之遂遂夫間小溝也九夫為井井間廣四尺深四尺謂之溝者先儒謂此為畿内采地之制與夫遂人治野之法不同葢惑于遂人十夫有溝之説也不知周雖通用貢賦之法而井田之制實公行天下鄉遂與都鄙其溝洫又安得異制哉葢遂人言十夫有溝以横度之也此言九夫為井井間有澮以方度之也以横度之則十夫之地相連屬而同以一溝以方度之則一里之地所容者九夫故九夫為井井間廣四尺深四尺謂之溝則方里之内凡二溝矣百夫有洫則百夫之地相連屬而同以一洫方十里則百夫也百夫之地為成成間廣八尺深八尺謂之洫則十里之地為洫者有九矣千夫有澮則千夫之地其旁同以一澮方百里則千夫也千夫之地為同其間廣二尋深二仞謂之澮則百里之地為澮者有九矣萬夫有川則方千里矣澮則專達于川而各載其名又以别其水之所從出也以此觀之則遂人與匠人溝洫之制其實則一而已凡天下之地埶兩山之間必有川焉大川之上必有涂焉凡溝逆地防謂之不行水屬不理孫謂之不行梢溝三十里而廣倍凡行奠水磬折以參伍欲為淵則句於矩屬讀為注孫音遜梢音蕭奠音亭又音定句音鈎上文言專達干川各載其名即遂人所謂萬夫有川葢治野之法也此言兩山之間必有川則因天下之地勢自然而非人為之川也葢有山斯有川有川斯有涂川積兩山之水而為之故曰兩山之間必有川焉涂通往來而依川為之故曰大川之上必有涂焉然此所謂川涂雖非遂人治野之法彼有出于地勢者固非人力所得而易世先王亦因之而已凡溝逆地阞謂不依脉也水屬不理孫謂地理之不順也不依地脉不順地理非因水性導而下之也此水所以皆不行然謂之凡溝則非必廣深四尺在田間者葢人所造以引水皆是故言凡以該之梢溝謂不墾地之溝也水所漱齧而成溝亦出于地勢之自然而已故積三十里而其廣倍之然後水勢流行而無所壅焉以其上而寖小下而寖大如木梢肖其身而小故謂之梢溝也奠水謂水有所蓄而停于此也將欲行之不磬折以三五則水無所蓄而其流或壅矣葢水湍激則疾磬折則徐其為磬折或三或五直行曲行則水勢湍激其流疾而不壅也欲為淵則句于矩者水之性流之斯為川止之斯為淵欲其積而為淵則必句曲其矩方之勢則水流迴緩斯積為淵矣凡溝必因水埶防必因地埶善溝者水漱之善防者水淫之凡為防廣與崇方其閷參分去一大防外閷凡溝防必一日先深之以為式里為式然後可以傅衆力凡任索約大汲其版謂之無任葺屋參分瓦屋四分囷窌倉城逆牆六分堂涂十有二分竇其崇三尺牆厚三尺崇三之漱色救反里註讀為已囷邱貧反窌古孝反溝所以導水不因水埶則其流易壅防所以止水不因地埶則其土易壊故為溝者必因水埶之曲直則其流斯無壅矣為防者必因地埶之髙下則其土斯無壊矣葢因其埶而順之則易為力違其埶而逆之則難為功其理固然也善為溝者水必漱齧之而無所壅以其因水埶故也善為防者水必淫液之而無所壊以其因地勢故也凡為防廣與崇方者言其徑與髙等也其閷三分去一者謂簿其上以三分減其一也大防外閷者于三分去一之外又薄其上而厚其下也大抵防之基貴乎厚基厚則其埶固水雖溼之而不壊矣凡溝防必一日先之以為式者溝也防也必先以人數程一日所作之功以為一定之式也里為式然後可以傅衆力者但從一里以為式則衆力可以傳著而用之也葢以寡可以加多以小可以交大故也凡任索約大汲其版謂之無任者索約謂築防與牆以繩約其板也縮以繩而大引之則其板必橈故謂之無任也詩曰其繩則直縮板以載葢以繩縮板載土以築其繩則直而能審曲面埶又豈至於大級其板哉葺屋三分瓦屋四分用茅草以覆屋謂之葺用陶器以覆屋謂之瓦葺屋宜峻于瓦屋以防雨雪則葺屋不及瓦屋之堅密故也三分者謂三分之中取其一分之峻若丈有二尺而三分之則取四尺以為峻也四分者謂于四分之中取其一分之峻若丈有二尺而四分之則取三尺以為峻也囷窌倉城逆牆六分者囷窌倉皆所以積榖圜者曰囷方者曰倉穿地曰窌城則在郭内以為扞蔽者也鄭氏謂逆猶卻也築此四者六分其髙卻一分以為閷也堂涂十有二分者爾雅曰堂涂謂之陳謂階前也于十有二分之中取一分以為峻也竇其崇三尺者宫中水道謂之竇必崇三尺所以防壅也牆厚三尺崇三之者謂牆基廣三尺則髙九尺葢不髙九尺則不足以為防蔽不厚三尺則不足以為完久其他皆以是為率也車人之事半矩謂之宣一宣有半謂之欘一欘有半謂之柯一柯有半謂之磬折欘張玉反柯古阿反凡物有形斯有名有度斯有數車人之為器豈離乎名與數哉以名命其形以數定其度而制作之法立矣宣也欘也柯也磬折也此其所命之名也半矩也一宣有半也一欘有半也一柯有半也此其所定之數也半矩謂之宣一柯有半謂之磬折此取諸身以為法者也一宣有半謂之欘一欘有半謂之柯此取諸物以為法者也近取諸身逺取諸物長短之制一皆有法以是而度物用之為器又安有不中矩者哉半矩謂之宣者先儒謂頭髪皓落曰宣以人長八尺而大節三頭也腹也脛也以三通率之則矩長二尺六寸三分寸之二半矩尺三寸三分寸之一人首之長也一宣有半謂之欘者欘謂斵木柄其長二尺爾雅曰句欘謂之定是也一欘有半謂之柯者柯謂斧柯其長三尺詩曰伐柯伐柯其則不逺是也一柯有半謂之磬折者磬折謂人所立之儀葢人帶已下四尺五寸磬折之則上俛玉藻曰三分帶下紳居二焉紳長三尺也車人為耒庛長尺有一寸中直者三尺有三寸上句者二尺有二寸自其庛緣其外以至於首以弦其内六尺有六寸與步相中也堅地欲直庛柔地欲句庛直庛則利推句庛則利發倨句磬折謂之中地耒力對反疵七賜反縁悦戰反推湯雷反車人為車而亦為耒者易曰揉木為耒葢耒之為物其體曲其用利而車之為物或揉曲木以為體或資利轉以為用器殊而事類此車人所以為耒也庛謂耒下前曲接耜而施耜于其上也中直者謂庛之上句之下也上句者謂人手所執之處也庛長尺有一寸中直者三尺有三寸上句者二尺有二寸則耒之長凡六尺有六寸也自其庛縁其外謂由尺有一寸之庛循縁之至于外之中直者三尺有三寸又至于首之上句者二尺有二寸則表之長其數具是矣以弦其内則耒上下雖曲而内直者如弦有三尺三寸則耒之制其曲直具是矣其長短之數曲直之制不過乎六尺有六寸之外凡以與步相中也葢人之步以六尺為準而田器大率取法乎此也堅地其土剛故推欲直庛柔地其土耎故欲句庛直庛所入者深故利句庛所起者順故利發然此特堅柔之地所用之庛如此耳若夫中地之耒則合于磬折而句直欲得其中故曰倨句磬折謂之中地然則車人之為耒或曲或直之中各因地之宜以致用之利此耕者所以易為力車人為車柯長三尺博三寸厚一寸有半五分其長以其一為之首轂長半柯其圍一柯有半輻長一柯有半其博三寸厚三之一渠三柯者三車人為車其所斵削雖非一器而其運用大率以斧為主故斧于斤有父之道因用之以量物而先論斧柄之長短與其刃之大小也柯長三尺博三寸厚一寸有半者以斧柄言之也三分其長以其一為之首者以斧刃言之也凡察車以輪為始凡為輪以輻轂牙為備轂長半柯其圍一柯有半輻長一柯有半其博三寸厚三之一言轂輻之制也渠三柯者三言牙之制也牙而謂之渠者葢渠一曲一直受衆小水而牙揉木之直以為曲其埶圜而包轂輻之衆材有類乎渠故謂之渠也柯長三尺渠三柯者三則三柯九尺又從而三之則渠之周圍其長凡二丈有七尺矣行澤者欲短轂行山者欲長轂短轂則利長轂則安行澤者反輮行山者仄輮反輮則易仄輮則完輮人九反仄音側易以豉反輪人言轂小而長則柞大而短則摯則轂長三尺有二寸而不可以過不及也然此中地之轂而已若夫行山澤則必有以適其地之宜又安可拘執而不知變哉葢行澤則多泥泥多則其行必鈍故欲短轂轂短則雖有深泥亦莫之粘故利行山則多險險多則其行必危故欲長轂轂長則輻長而無摇動之患故安長轂短轂以轂言之也反輮仄輮又以牙言之也葢牙所以包轂輻而為固抱輪所賴以行地平實自乎此其輮之也亦不可不視其地之所宜矣澤地為其泥之粘其心在外而滑故反輮則其行斯為易矣山地為其沙石之磨甐欲其表裏相依而堅忍故仄輮則其行斯為完矣六分其輪崇以其一為之牙圍柏車轂長一柯其圍二柯其輻一柯其渠二柯者三五分其輪崇以其一為之牙圍大車崇三柯綆寸牝服二柯有參分柯之二羊車二柯有參分柯之一柏車二柯凡為轅三其輪崇參分其長二在前一在後以鑿其鉤徹廣六尺鬲長六尺綆方穎反牝步忍反六分其輪崇以其一為之牙圍則乘車兵車六尺有六寸而牙圍尺有一寸矣鄭氏以柏車為山車以大車為平地載任之車以羊車為善車雖無所據理亦宜矣然柏車記轂輪牙之長短徑圍言輪之制也大車記綆牝服之分寸言輪箄較之制也羊車二柯有三分柯之一則繼大車之較言之也柏車二柯則繼羊車之較言之也柏車較雖短轂輻牙則長羊車較雖長轂輻牙則小比其異也凡為轅三其輪崇者車轅雖不同宜各三其輪之崇也若乗車兵車其輪崇六尺有六寸三之則其長凡一丈九尺八寸矣三分其長二在前一在後以鑿其鉤者謂鉤心之制也徹廣六尺鬲長六尺者謂牛車之制也徹謂車廣鬲謂轅端厭牛領者各六尺焉則異於四馬車者矣周禮詳解卷三十九
