body:
  text: 周禮詳解卷八宋王昭禹撰司裘掌為大裘以共王祀天之服裘者可以衣被人而人之所裘也古之制裘者必以獸皮而差為之等皆有法象存焉非明其義者不足以制之非知其數者不足以為之得其義而制之者聖人之事也因其數而為之者工之事也以此為大裘所以掌於司裘也大裘者以簡大為名與記所謂大禋必簡同意語曰緇衣憲裘大裘則黑羔裘也黑者天道在北方之色也大裘無經緯之文無繪繡之功其色復乎至幽道之象也羔之為物能羣而不黨可以為公致恭以有禮可以為敬德之象也道德相渾淪而未嘗相離聖人不知其名而字之曰道強名之大茲其所以為大裘也祀昊天上帝則服大裘而冕祀五帝亦如之故曰掌為大裘以共王祀天之服有言祀昊天上帝有言祀五帝有言祀天者蓋天以道言帝以德言祀天則合衆神而言祀吳天上帝五帝則别衆神而言合衆神則言其道之全别衆神則言其德之尊於司服别而言之故稱昊天上帝五帝於司裘則合而言之故曰祀天而已蓋裘之所制以象道之全服之所用以明禮之法此所以異中秋獻良裘王乃行羽物季秋獻功裘以待頒賜中音仲因其質之甚善而成之者謂之良裘致人功制治而成之則謂之功裘良裘非不致人功也其質又良焉功裘則致人功而已不必其質之良也然則良以其質之自然者言之功以其成於人為者言之因其質之良而成之則其為裘也易以速故仲秋則獻之致人功而制治之則其為裘也成必緩故季秋始獻之非特是也良裘以共王衣服之用功裘以為羣臣頒賜之用其先後之序固當然矣仲秋者隂於是乎中是月也寒氣將至王既迎寒則禦寒之具不可以不備則中秋獻良裘於王乃其時也季秋者隂於是乎盛是月也霜始降而寒氣總至方命民入室之始則以裘而頒賜乃其時也王乃行羽物順隂氣之始殺行羽物以頒賜也先王消息盈虛與時偕行故仲春行羽物則以隂氣衰於此罻羅為將禁之矣中秋行羽物則以隂氣盛於此罻羅為既設之矣王大射則共虎侯熊侯豹侯設其鵠諸侯則共熊侯豹侯卿大夫則共麋侯皆設其鵠射食亦反鵠古毒反射有三有賓射有燕射有大射大射者將有祭祀而以射擇與祭者以祭祀為國之大事故謂之大射記曰天子將祭必先習射於澤澤者所以擇士也已射於澤而後射於射宫射中者得與於祭不中者不得與於祭此言王大射之事也至於諸侯卿大夫將祭其祖先亦有大射擇士之禮故司裘言王大射而并諸侯卿大夫言之也且擇士助祭而必先射於澤宫者蓋射之為德內志正外體直其容比於禮其節比於樂古人於是而觀德澤之言擇也射之言繹也繹於中而錯於外則射之而無不中擇於此而用於彼則祭之而無不享享者嚮也惟中心嚮也而後能享之是無異乎君子之射也先王所以觀德於射而後與之祭也大射將以與之祭故天子之侯三諸侯之侯二卿大夫之侯一皆所以象德而已記曰虎豹之皮示服猛也則虎豹猛獸也書曰如熊如羆則熊􅐧獸也馭民之道以正物為事正物以服猛毅為先能致猛毅者莫大於虎而豹與熊次之能服猛毅者莫大於王而諸侯次之由是以得萬國之歡心以事其先王者天子之德也故共虎侯熊侯豹侯由是以得百姓之歡心以事其先君者諸侯之德也故共熊侯豹侯至於卿大夫之德則以能養人而已不能除害則不足以養人麋能害稼而為人之患射而去之所以除患害而養人由是然後能得臣妾之歡心以事其先祖者卿大夫之德故大射則共糜侯侯之為言捍外受內以為蔽障諸侯之象也故記曰射中則得為諸侯祭侯之禮曰毋或若女不寧侯不屬於王所以抗而射女意亦謂此矣必設其鵠則鵠棲侯中以為的也鵠之為物逺舉而難中射以及逺中難者為善故的謂之鵠也是故為人父者以為父鵠為人子者以為子鵠為人君者以為君鵠為人臣者以為臣鵠故射者各射已之鵠君子修身以為弓矯思以為矢立義以為的亦若是而已矣射人王以六耦射三侯則此所謂虎熊豹侯也諸侯以四耦射二侯則此所謂熊侯豹侯也孤卿大夫以三耦射一侯則此所謂麋侯也司裘言其物射人言其數互相備也然射人言士以三耦射豹侯而此不言者蓋士事人者也事人者擇於人事於人者擇人士之祭祀盡已之歡心而已尚何擇士之有哉以事於天子之擇則所射堪質而已其見利思義見危致命聽從而不違守死而不犯則有犴侯以明之犴侯用之於燕射而非所以大射侯之用犴贄之用雉其義一也共侯必於司裘者凡射以服禽獸然後得其皮以為裘則共侯以佐射者正司裘之事矣大喪廞裘飾皮車凡邦之皮事掌之歲終則會唯王之裘與其皮事不會廞許金反廞裘與廞樂同意蓋陳儀物於庭序以興觀者之欽故謂之廞大儀物皆德之所寓死者形漸盡而盛德之在人固有不忘者存觀者之欽亦欽其德而已且廞者陳之而無實用陳之非所以致死不惡於不仁無實用非所以致生不惡於不智凡廞儀物者亦仁智之盡也飾皮車亦明器之車以皮飾之事死如事生之意也嵗終刖會者會其一歲用皮之數也唯王之裘與皮事不會所以優至尊也不言后者后之服無以皮之者也掌皮掌秋斂皮冬斂革春獻之遂以式法頒皮革于百工司裘謂之司掌皮謂之掌者蓋反后為司司有察意掌則尚其手以掌之而已裘者法象之所存為之者宜致察焉故以司名官皮則尚其守以掌其物而已故謂之掌皮未練治謂之皮已練治謂之革秋則物成之時物成則堅實故秋斂皮革則人功練治之其成差久故冬斂革春則用皮之事於是乎始故春獻之夫一人之身百工之所為備則皮革之事百工之與有事焉故掌皮於春獻之後所以頒皮革于百工也以式頒之則使不失其所用以法頒之則使不失其治與大府凡頒財以式法授同意共其毳毛為氊以待邦事歲終則會其財齎毳尺鋭反毛之細縟者謂之毳毛禮有用氈者若大旅上帝氈案之屬也夫毳毛取之獸皮不預備之則或困于倉卒之求故共于掌皮以待邦事也泉布謂之財行費謂之齎欽之則弔則斂而取之則有行費矣故用齎故嵗終則會其財齎掌皮斂皮而司裘則用皮故司裘會其皮而掌皮則會其財齎也先王設官以司裘則屬之治官以司服則屬之禮官者蓋制皮以為衣則謂之裘服裘以為禮則謂之服裘與服其實則一特以先後為之此所屬之官所以異也內宰掌書版圖之法以治王內之政令均其稍食分其人民以居之任道者無為而用天下任事者有為而為天下用無為而用天下故王則長而不宰有為而為天下用此宰制調和所以為諸臣之事也然有王之宰有后之宰王之宰則合內外之事以治之故不謂之外宰后之宰則所治者王內之政令而巳故謂之內宰書則所掌治教之書也版則人民之版也圖則官府次舍之圖也王內后宫也后宫謂之王內則后宫之政令皆自王出故也王內之衆有人有民其貴者民其賤者人民以上皆有稍給之食均其稍食則裒多益寡平其餼廩也分其人民而居之使衆就寡均宿衛也內宰掌治教之書故使之治王內之政令掌版圖故使之均稍食分人民以居之言稍食則先人民者誘之以祿利使就功故也以隂禮教六宫以隂禮教九嬪以婦職之法教九御使各有屬以作二事正其服禁其竒邪展其功緒易曰男正位乎外女正位乎內王立六官以待天下之外治所以正男位也后立六宫以待天下之內治所以正女位也男女正天地之大義也是以本乎天者親德于陽本乎地者效德于隂故后及九嬪皆以隂禮教之也蓋凡內事皆陰后祭市謂之隂禮司徒教親謂之隂禮與此同意不曰教后而曰教六宫者后尊不敢斥猶言天子則稱乘輿也至于九御則猶天子之有元士也女御八十一人每九人則屬一嬪故謂之九御使各有屬則使屬于九嬪也婦職之法則所以事王及后共祭祀賓客之職法也禮所以成德職所以從事位之尊則宜以德率人故九嬪而上則教以婦禮所以成其德也位之卑則宜以事事人故九御之屬則教以婦職所以致其事也言九嬪則包夫人言九御則包世婦矣以作二事則絲枲之事也大宰以絲枲之職任嬪婦內宰以絲枲之事任嬪御九嬪勤于絲之事則天下無不蠶者矣九御勤于枲之事則天下無不績者矣治自內而外化自近而逺之意也正其服者使非法不服也禁其竒邪者禁其竒所以一之禁其邪所以正之展其功緒展其絲枲之功緒也絲枲者女功之本必勤于化治然後可以成布帛固不可斯須廢也于是乎展之展者所以省之也夫論隂禮之教以率六宫之人于和順中正者夫人之事也掌婦職之法以教九御之人于勤勞恭儉者九嬪之事也其德之尊卑雖不同而皆得以必事于王者世婦之事也其命之貴賤雖不同而皆得以進御于王者九御之事也自夫人而下皆不必備而惟后率之有關睢之德則窈窕之教興有卷耳之志則險陂之行息其福履之綏無異于樛木之所逮其子孫之衆多無異于螽斯之所化然則王之所以風天下而正夫婦者其用此道歟大祭祀后祼獻則贊瑶爵亦如之祼古亂反大祭祀指宗廟之禮也祼者用鬱鬯灌地求神出而致養也王入室祼既祼出迎牲后于是亞祼而內宰則贊祼也獻謂薦腥薦熟后從王亞獻而內宰則贊獻也石次玉為瑶用之以飾爵則謂之瑶爵詩木瓜先言瑶後言玖玖美玉也報之以瓊玖則厚于瓊瑶則瑶不如美玉后之飾爵當降于主故以瑶飾爵尸卒食王酳尸后亞獻用瑶爵內宰亦從而贊之也正后之服位而詔其禮樂之儀贊九嬪之禮事服所以象德后之所服則固有法也位所以承神后之所位則固有所矣正其服則使以法而服也正其位則使即所而立也又詔其禮樂之儀告以出入進止之節使與禮樂相應也記曰禮交動乎上樂交動乎下詔其儀則使其容比于禮其節比于樂而已贊九嬪之禮事則贊其薦徹之禮與所執之事也詔則告之以言贊則道之以力言詔則尊其事言贊則卑其禮祼獻言贊禮樂之儀言詔而九嬪禮事亦言贊各有所主也內小臣之言正內人之禮則以尊正卑也此言正后之服位則所正者在于位而不在后也凡賓客之祼獻瑶爵皆贊致后之賓客之禮先王之承賓猶承神故大享之禮惟不入性而其他則皆如祭祀是以祭祀后有亞祼亞獻與瑶爵酳尸之禮而賓客亦如之祼獻刖王禮賓而后亞獻也瑶爵則王酬賓客而后亞酬賓客也不言后以上文祼獻瑶爵言后從可知也致后之賓客之禮者若后致飲于賓客之禮則酒人共之而內宰致之也凡喪事佐后使治外內命婦正其服位內命婦則三夫人九嬪世婦女御之屬是也外命婦則公卿大夫之妻是也凡喪事則外內命婦皆有衰麻之服哭泣之位而其事則有治之者后之所使而內宰所佐也正其服則正其正服之等正其位則正親疏貴賤之居使各當其禮也凡建國佐后立市設其次置其敘正其肆陳其貨賄出其度量淳制祭之以隂禮夫道在天則有隂陽在人則有義利利之所以輔義猶隂之所以佐陽不可相無也故凡建國王立朝后立市朝者義之所自出市者利之所中聚利可以和義不可以先于義故面朝而後市所以先義而后利也朝為王事故立朝主于王市為隂事故立市主于后方后之主市則內宰助而成之故曰佐后立市次其官之次則司市所謂思次介次是也敘其地之敘則司市所謂各于其地之敘是也肆謂陳物之肆肆長所謂各掌其肆之政令是也植之植謂立殺則陳而飾之無所立也置則但錯諸地而無所設也正其各止于一而已陳則置使成列而已度所以度長短量所以量多寡淳則布帛之幅廣制則布帛之匹長度量淳制皆法之所寓所以經市之貨賄而致其公焉出其度量淳制則所以一而同之也祭之以隂禮者市隂事也故祭以隂禮與教六宫九嬪謂之隂禮同意隂以作成效法之為事祭之則宜象其事焉故設其次置其敘正其肆陳其貨賄出其度量淳制然後祭之以隂禮中春詔后帥外內命婦始蠶于北郊以為祭服中音仲王親耕以供粢盛后親蠶以為祭服孝子孝婦所以自致也中春始蠶之時故內宰詔后帥外內命婦始蠶于北郊北郊正隂之地帥外內命婦而蠶則后之正事也然則王與后所以父母天地而享天下之所尊親享天下之所尊而不知稼穡之艱難則不足以治外享天下之所親而不知絲枲之勤則不足以治內故天子親耕所以帥天下之農王后親蠶所以帥天下之婦有以帥天下之農則天下無不足之食有以帥天下之婦則天下無不足之衣因以供栥盛為祭服則天下莫不勸于孝矣嵗終則會內人之稍食稽其功事所謂內人則王內之人謂之王內則以內屬于王也謂之內人則以人屬于內也內宰既均其稍食故嵗終又會之均則使之平會則計其數既展其功緒又稽其功事展則視之非一時稽則考其成而已展言緒則所展者功之綸緒也稽言事則所稽者功之成事也展其功緒則省其勤怠稽其功事則考其多少展詳而稽略故宫正于功緒但稽之而已內宰既展而又稽則所以治后宫詳于治王宫故也佐后而受獻功者比其小大與其粗良而賞罰之會內宫之財用佐后而受獻功者典婦功曰凡受嬪婦功及秋獻功則典婦功以功獻于后內宰則佐后而受之也小大比其制粗良比其功制中度功中程而又善則在所賞矣制不中度功不中程則在所罰矣會內宫之財用為大宰嵗終受其會故也正歲均其稍食施其功事憲禁令于王之北宫而糾其守稍食嵗終既會之矣正嵗又均焉功事嵗終既稽之矣正歲又施焉夫終則有始天行也先王平在朔易以待來歲之宜亦安得不然哉憲禁令者禁將使有所避令將使有所行將使避行之不表而示之是匿為物而愚不識故必憲之使皆明知其害利焉謂之王之北宫則所憲者王之禁令也有謂之內宫有謂之北宫言內宫則知王宫之為外言北宫則知王宫之在內所憲禁令唯后宫而已故曰于王之北宫糾其守者宿衛者各有所守有守不可以緩散故內宰糾焉上春詔王后帥六宫之人而生穜稑之種而獻之于王穜直龍反稑音六親耕籍田以共粢盛者雖王之職然王所以能竭力耕田共為子職生則親安之死則鬼享之者亦必有內助之力焉蓋夙夜警戒相資以相成者夫婦之道又况親耕者王政之所重后宜有以相之也後種後熟謂之穜先種先熟謂之稑生是二種而獻之于王非獨王后一人之力也凡六宫之人自三夫人而下莫不皆預焉故后則帥之而內宰則先詔之上春者建寅之月也必于上春則方是時也陽氣始達土膏脈發三農于耒而于耜矣遂大夫于是而修稼政矣所以相王而道之者宜以是焉內小臣掌王后之命正其服位后出入則前驅若有祭祀賓客喪紀則擯詔后之禮事相九嬪之禮事正內人之禮事徹后之俎相息亮反引君以大道謂之大臣詔相王之法儀謂之小臣王有大宰而后有內宰王有小臣而后有內小臣亦其理也于后之小臣言內則以别王之小臣為外矣內小臣以禮從后而掌王后之命謂之命而不謂之令則其所掌王后之言而已正其服則王后之六服所用不同也正其位則祭祀賓客喪紀所以為禮者其位不同也內小臣正后之服位而小宰亦正之者蓋內宰所正特因乎大祭祀詔禮樂之儀而已非徒正之也言王以后屬于王故也言后而不言王以對王而言故也前驅則導之以禮使無非僻之敢犯也擯則以賓禮助之詔則以禮事之義告之相則助其事正則使之止于一正正卑于相相卑于擯詔故后則擯詔之九嬪則相之內人則正之膳夫徹王之胙俎所以尊王內小臣徹后之胙俎所以尊后也命所以正人也服位所以正身也王之命大僕出入后之命內小臣掌王服位大僕正之后之服位內小臣正之內外之辨也后有好事于四方則使往有好令于卿大夫則亦如之掌王之隂事隂令好呼報反上作而下行之為事上言而下守之為令于四方言好事則非特有言而已又有所作也于卿大夫言好令則有言而已不必有所作也好事好令則后之所以睦外親也隂事隂令則王之所以睦內親也隂事則進御之事隂令則王有所求為于北宫之令睦外親而不失其所謂女正位乎內睦內親而不失其所謂男正位乎外男女正而天下定則內小臣之所掌非特有助于后而已王之所治已有助焉此王之隂事隂令所以終于內小臣之所守也閽人掌守王宫之中門之禁閽人司昏晨之啓閉不以晨門名官而謂之閽者蓋守王宫中謂之禁尤宜謹于昏閉之事此所以獨謂之閽人也王有五門一曰臯門二曰庫門三曰雉門四曰應門五曰路門中門即雉門也以其畫雉以為飾示人以文明焉故謂之雉門以其于五門為中故謂之中門則雉者以門之飾言之也中者以門之序言之也凡王門皆有禁以謹出入者獨守中門之禁者以治朝在路門之外中門于治朝為己近守禁之嚴于是而始喪服凶器不入宫潛服賊器不入宫竒服怪民不入宫喪服衰麻之屬凶器明器之屬孔子見齊衰者雖少必作過之必趨蓋內有感惻則外為之變動喪服凶器不入宫恐變動至尊故也潛服則衷甲之類賊器則器之可以賊人者潛服賊器不入宫則嚴禁衛故也竒服則非法服也怪民則行怪民也非法則違禮行怪則違義竒服怪民不入宫則王宜非禮弗視非禮不聽故也凡內人公器賓客無帥則幾其出入以時啓閉凡外內命夫命婦出入則為之闢掌掃門庭大祭祀喪紀之事設門燎蹕宫門廟門凡賓客亦如之帥色類反為于偽反內人則王內之人公器則公家之器賓客則諸侯諸臣之為賓客者內人公器賓客皆有帥以導其出入若無其帥以導之閽人則微察其出入也以時啓閉則晨昏為啓閉之節也凡外內命夫命婦出入則為之闢闢者闢行人使之無敢犯也門外之地謂之庭以其掌禁宜潔其所守故掌掃門庭然閽人掌中門之禁則所掃者中門之庭而已設門燎則設燎于門以為明蹕宫門廟門者蹕以止行者于宫門廟門也宫正几邦之事蹕明所禁止者廣閽人蹕宫門廟門明所禁止者門而已官正宫中廟中則執燭明所照察者內閽人設門燎明所照察者門而已宫正先蹕而後執燭閽人先設門燎而後蹕者宫正宫官之長閽人宫官之屬以禁止為尚而致明于內則尊者之道故宫正先蹕而後執燭以禁止為下而致明于外則卑者之道故閽人先設門燎而後蹕宫正所蹕則廣閽人則狹官正所照察則內而閽人則外亦尊卑之辨也寺人掌王之內人及女宫之戒令相道其出入之事而糾之相息亮反度數所自出而求度數者之處謂之寺故詩曰未見君子寺人之令王之正內有寺人凡以相道內人出入佐治禮事掌其禁令度數自是出矣謂之寺人其義如此王之內人則王內之人自女御而下皆是也女宫則刑女有職事于宫者若女奚之數是也戒以敕其怠忽令以使之有為自女御而下至于刑女之屬寺人皆掌其戒令故曰掌王之內人及女宫之戒令相為之右道為之先糾則約其緩散焉內人女宫皆寺人之所帥故相道其出入之事而糾之若有喪紀賓客祭祀之事則帥女宫而致于有司有司謂宫卿世婦之官也蓋世婦掌女宫宿戒及祭祀比其具喪紀賓客祭祀女宫與有事焉故寺人則帥而致于世婦也佐世婦治禮事掌內人之禁令凡內人弔臨于外則帥而往立于其前而詔相之九嬪以上內宰內小臣贊相之則世婦之治禮事宜寺人佐之以力也禁則禁其不當為令則令其所當為必先之以戒令而後掌內人之禁令不欲罔人之意也弔謂以凶禮拜有喪之人臨謂以凶禮臨有喪之家內人有弔臨于外則施之于有服之親也詔則詔其人相則相其事立于其前而詔相之則以內人為卑異于內小臣之詔相矣內豎掌內外之通令凡小事若有祭祀賓客喪紀之事則為內人蹕王后之喪遷于宫中則前蹕及葬執褻器以從遣車為于偽反童而有立謂之豎亦內宰之屬也寺人王之正內五人而內豎之數倍之以其所掌之事為繁于寺人其數不得不倍也寺人不謂之內則以其所事主于王故也內豎獨謂之內則以其所掌主于內也男正位乎外女正位乎內則令之通乎內外者必有人以逹之故內豎掌內外之通令大事則成人掌之小事則內豎掌之固其所也凡言內外則先外而後內此則先內而後外者外屬王為尊內屬后為卑內豎所掌以后為主故也為內人蹕則其所禁止者王內之人也王后之喪遷于宫中則將葬朝于廟也朝廟前蹕則所以善行也執褻器所以送終也先王之禮事死如事生故內豎之于后事死之禮未始異于生也九嬪掌婦學之法以教九御婦德婦言婦容婦功各帥其屬而以時御敘于王所女之賓從于主謂之嬪書于二女言嬪于虞以其順從于舜猶之賓之于主也九嬪以賓從于主故亦謂之嬪婦學之法則婦人所學之法也所謂婦德婦言婦容婦功是也德得于已者也婦德以正順為尚言心聲也婦言則以婉娩為尚容容貌也婦容則以柔靜為尚功見于事業者也婦功則以絲枲為尚有德者必有言故德先而言次之言發乎心而容見乎貌故言先而容次之容見乎身而功見于事故容先而功次之功者婦學之所成終始也各帥其屬者女御也以時御敘于王所者以當進御之時九九而御于王以次序而進于燕寢之所也內宰以隂禮教九嬪以婦職之法教九御而九嬪掌婦學之法以教九御者隂禮所以成婦學之法者也婦學所以行婦職之法者也蓋禮為事之節文學則童蒙固執而求有所覺者也此婦學之法所以待隂禮之教而後成者也學所以致其道職所以致其事此婦職之法所以待婦學而後行者也內宰掌隂禮而不掌婦學則婦學隂禮之所成也九嬪掌婦學而不掌婦職則九嬪所教內而已內宰所教及于外而以婦功為主故也凡祭祀贊王齍贊后薦徹籩豆若有賓客則從后大喪帥敘哭者亦如之齍音咨王齍故書為玉齍當從故書為正下言贊后薦徹豆籩則上言贊玉齍言之序也小宗伯辨六齍之名物使六宫之人共奉之則六齍共奉于六宫而九嬪統其事此所以贊玉齍也王致孝于鬼神而后為之助此所以后有薦徹豆籩之禮而九嬪贊之也若有賓客則從后則將有所贊也大喪謂外宗敘內外朝暮哭者而九嬪亦從后帥之世婦掌祭祀賓客喪紀之事帥女官而濯溉為齍盛及祭之日涖陳女宫之具凡內羞之物掌弔臨于卿大夫之喪溉古愛反執箕帚以事人者謂之婦記曰納女于天子備灑掃言納女者以卑自稱猶婦人之于姑也婦之以事人有廟嗣之義故謂之世婦世婦之數二十七所以視大夫今此不言者蓋有婦德則充無婦德則闕不苟于充也世婦之德可以事人不可以教人故掌祭祀賓客喪紀之事而已九嬪帥女御御敘于王所世婦帥女官濯溉為齍盛女官卑于女御故也水翟為濯濯進于滌也手既為溉溉終于拭也或言粢或言齍盛粢則辨其始而已言齍盛則終始其事濯溉齍盛則皆女宫之具內羞則籩人醢人為王及后世子共之及祭之日世婦涖陳之故曰及祭之日涖女宫之具凡內羞之物掌弔臨于卿大夫之喪者九嬪視卿世婦視大夫故使弔臨于卿大夫之喪也女御掌敘御于王之燕寢以歲時獻功事凡祭祀贊世婦大喪掌沐浴后之喪持翣從世婦而弔于卿大夫之喪內宫之屬自后而降有三夫人九嬪二十七世婦八十一女御三夫人視三公九嬪視九卿二十七世婦視大夫女御視元士然則女御內宫之屬之至卑者也其進退遲速唯御者之聽如馬之在御故謂之女御御敘則九九而以敘進于王之燕寢也世婦女御皆事人者也世婦則以事事人女御則預燕寢之事而已以事事人猶有敵夫之義故名世婦婦承夫夫敵敵之者也預于燕寢之事則事之至賤者非若婦有夫之意故但曰女御而已謂之女者非名其為婦也考小星之詩言夙夜在公實命不同抱衾與稠實命不猶而序詩者亦以賤妾名之女御之事正謂是也故曰掌御敘于王之燕寢王有六寢一為路寢五為燕寢燕寢女御御敘之所也九嬪言王所此言燕寢其實也以歲時獻功事者嵗時者嵗終之時典婦所謂秋獻功是也功事絲枲成功之事秋蓋功成之時故以歲時獻之祭祀之事則世婦所掌女御預贊之事故曰凡祭祀掌世婦沐浴所以致潔女御御敘于王所于宫中宜以致潔為事故大喪掌沐浴翣為方扇之狀所以為棺飾也女御備內宫之數凡以為后蔽飾故后喪則持翣以從柩也世婦視大夫女御視元士故從世婦而弔于卿大夫之喪女祝掌王后之內祭祀凡內禱祠之事掌以時招􅠹禬禳之事以除疾殃禱丁老反􅠹古孟反人尚其口以事神謂之祝蓋祈禳者人情所不能無先王與民同吉凶之患故有祝以陳信于神王有大祝小祝之屬故后亦有女祝之官掌王后之內祭祀則祭祀之在內者若王祀之數是也祈福曰禱賽夢曰祠禱求有所延仁之事也祠如春祠之祠品物少而文辭多也召之使至謂之招礙使不至謂之􅠹禬以會之禳以攘之招以召祥􅠹以礙災禬以會福禳以禳禍禬于其既散而會之禳于其方至而禳之招􅠹者施于未然之前禬禳者施于已然之際施于未然之前者先天之事也若非大人與天地合其德與鬼神合其吉凶者不足以及此而后亦預焉者蓋王繼天而理陽道后繼王而治隂德王為天子后視天之妹則先天而天弗違後天而奉天時者固其所也招􅠹禬禳顧何施而不可然女祝掌其事亦固有時矣以男巫考之春招弭以除疾病冬堂贈無方無算則招􅠹者必于春之時禬禳者必于冬之時以春為一嵗之始招祥􅠹災宜于時之始矣冬為一歲之終禬福禳禍宜于時之終矣且禬以會福而以神仕者曰以禬國之凶荒民之札喪則弭凶災札喪乃所以會禍矣然福莫長于無禍則招􅠹禬禳亦以除疾殃為先矣氣不行而為疾禍適當而為殃疾雖作于人之身而四時皆有癔疾則疾有得于外者固可除之矣作不善降之百殃則致內治者宜若無殃然事或出于不幸宜思患而預防之則殃亦不可以不除矣女史掌王后之禮職掌內治之二以詔后治內政逆內宫書內令凡后之事以禮從史掌宫書以助上之為中者也王有大史小史之屬此后所以有女史也王后之禮各有所職若祭祀則有薦徹賓客則有獻酬女史掌之則王后以禮動而當以其職告上也故曰掌王后之禮職內宰掌治王內之政令則內治之政內宰掌之女史則二內宰之所掌也所以正內宫者謂之內政內政則內治之别也內治所以治內政女史又掌其二以詔后治內政有所治正則逆之逆內宫者所以正后宫也出于上而下稟行之者令也書內令則書后之所令也凡后之事以禮從者后舉而以禮籍從焉詔后故也猶大夫以書協禮事執書以詔王同意典婦功掌婦式之法以授嬪婦及內人女功之事齎婦功則婦人絲枲之事絲以為帛枲以為布其粗良皆有常法其多寡皆有常數先王以中士二人主其事故曰典婦功掌婦式之法者式言所用之式也法言所治之法也所用之式則多寡之數存焉所治之法則精粗之度存焉知其所為之法然後可授其所為女功之事資嬪有夫者也婦有姑者也有夫有姑則不可以無職故授資以嬪婦為主齎當從故書為資授事者授其所為女功之事授資者授其所為女功之資無資則無以致功故也言內人則以别嬪婦之在外者也嬪婦非內人而必授以女功事資者蓋先王以九職任萬民而嬪婦固有職矣此所以授之事資也凡授嬪婦功及秋獻功辨其苦良比其小大而賈之物書而楬之以共王及后之用頒之于內府授音受苦音古楬其列反授鄭氏謂當為受理宜然也凡受嬪婦所為之功及秋獻功則秋者物成之時獻功于后也方是之時典婦功則辨其苦良比其小大而賈之物書而楬之賈計其所值楬素而示之賈以當物楬以當名則良者貴之苦者賤之貴賤之用各得其所宜然後可共王及后之用內宰先言比其小大然後言粗良此先言辨其苦良然後比其小大典婦功以功為主故先言苦良然或言粗良或言苦良或言辨者苦良則因于功粗良則因于物功則必辨物則比之而已頒之于內府者所以待邦之大用共四方使者及好賜之所用也典絲掌絲入而辨其物以其賈楬之掌其藏與其出以待興功之時頒絲于外內工皆以物授之凡上之賜豫亦如之賈音嫁一蠶所吐為忽五忽為系二系為絲為帛者必資于絲有粗細不同不可以不辨也故典絲掌絲入則辨其物絲入者九職嬪婦所貢者是也既辨其物而又以所直之賈而楬示之者防其以賤貿貴也藏以待用出以給用亦必有時焉故曰掌其藏與其出以待興功之時若溫暖宜縑帛清涼宜丈綃凡此乃興功之時也頒絲于外內工者外工謂外嬪婦也內工謂內人之屬也皆以物授之則亦防其以賤貿貴也凡上之賜豫亦如之者蓋賜豫所用有貴賤不同亦各以其物授之也及獻功則受良功而藏之辨其物而書其數以待有司之政令上之賜豫典絲受良功而不受苦功則絲功之苦典婦功受之矣蓋典絲所掌以待有司之政令與祭祀黼畫組就喪紀組文之物是乃王所以致美于黻冕致孝于鬼神者也故受絲功之良典婦功所掌以共王及后之用則其所給特燕私所用非禮服法物之正也禮服法物之正則其于有司之政令典絲之所藏而待者也故典婦功但受絲功之苦者而已有司之政令則若司服辨師所司之政令也王府言王之好腸內府言王及冡宰之好賜豫此言上之賜豫則又非特王及冡宰而已蓋王后夫人所用有在是矣凡祭祀共黼畫組就之物喪紀共其絲纊組文之物凡飾邦器者受文織絲組焉歲終則各以其物會之織音至纊音曠言凡祭祀則祭天地宗廟社稷山川之類其禮非一故言凡以該之白與黑謂之黼青與赤謂之文分布衆色謂之畫采色一成謂之就組而織之以為綬以黼為畫則謂之黼畫以組為就則謂之組就故曰凡祭祀共黼畫組就之物喪紀有用絲以為線縷有用纊以充衣褥或用組用文以為物之飾故曰共其絲纊組文之物文織以文為織絲組以絲為組邦器則若茵席屏風之屬是也文織絲組所以為飾邦器之用故曰凡飾邦器者受文織絲組焉嵗終各以其物會之則非特計其多寡之數又隨其物色而計之亦以防其偽故也典枲掌布緦縷紵之麻草之物以待時頒功而受齎麻之未緝者謂之枲典枲所掌其物非一而獨以枲名官蓋麻為女功之正而葛覃言后妃志在女功之事而其詩獨言葛者以葛為女功之餘事于餘事且志焉則于麻可知矣掌布緦縷紵之麻草之物者以飭物而有父道者布也布有縷數哀不足而致其思者緦也縷則紵之屬紵則苧草之為布者其草不一卒于披而别之者麻也草則葛之屬凡可以為布者皆是也麻亦草也必言麻草以麻為男服所尚女功之正本乎此故言麻而繼之以草麻草之物指其自然之質而言之也布緦縷紵指其人為之功而言之也布緦縷紵皆出于麻草之物故曰掌布緦縷紵麻草之物以待時頒功而受資者亦以待興功之時頒之于功也授資則授其所以為功之資與典婦功授資同意也及獻功受苦功以其賈楬而藏之以待時頒頒衣服授之賜豫亦如之歲終則各以其物會之苦音古典枲受苦功而不受良功者麻功之良典婦功受之矣麻之苦功共喪服而已典絲受麻功之苦掌共喪服故也典婦功所掌以共王及后之用故受麻功之良以其賈楬而藏之與典絲辨其物以其賈楬之同意典絲辨其物而典枲不言者皆辨而楬之也以待頒者以待因時而頒之也頒衣服授之賜豫亦如之者頒衣服賜豫皆以其物授之矣言賜豫而不言上者典絲見之也典絲典枲歲終各以其物會之蓋先王不維其物之輕重皆防其以賤貿貴也夫先王之于婦職王后帥之以蠶內宰教之以二事九嬪又從而教之至于婦功與絲枲二物亦皆有官以典之及其獻功則后受之而內宰佐之典婦功則又辨其苦良比其大小典絲之屬皆辨其物卑而內人尊而王后皆相率以絲枲之事而其詳至于如此之嚴者豈非天下之務惟本之為貴耶男子之務本于農耕女子之務本于絲枲苟不忘其本而先之于上則男有餘粟女有餘布而邦之財用所為足也孟子曰無政事則財用不足然則財用足者實本乎政事先王于政事可忽乎內司服掌王后之六服褘衣褕狄闕狄鞠衣展衣緣衣素沙褘音暉褕音遙春官司服掌王之吉凶衣服故掌后之六服者謂之內司服言內以别外也褘衣繪翬狄于衣爾雅所謂伊洛而南素質五彩皆備成章曰翬是也褕狄繢褕狄于衣爾雅所謂江淮而南素質五彩皆備成章曰鷂是也翬與褕皆雉也雉之為物交有時别有倫其性耿介則正直見乎內身備五色則文明見乎外后之所以祭祀之服取之以正直見乎內故謂之雉也以文明見乎外故謂之翟也雉從矢則有正直之意翟從羽則有文明之意后之德為皆備正直文明此所以字或用翟又用狄也古之制字者于文從大從火從大則大能守禦有正直之意也從火則火能照燎有文明之意也翬狄素質西方之色義也褕狄青質東方之色仁也五色皆備成章禮也于褘言衣于褕言狄互相備也君子之為禮必有仁義以為質禮凡以節文仁義而已以禮節文仁義則后之德備矣然則王體天道則尚仁而合之以義后體地道則尚義而合之以仁故后服以褘衣為尚褕狄次之闕狄或謂之屈狄喪大記復者夫人以屈狄是也其名物不可知既謂之屈則知其有屈于褘褕而已猶侯執信圭伯執躬圭謂之躬則知其有屈于信也此三者皆王后之祭服鄭氏謂王祭先王則后服褘衣祭先公則服褕狄祭羣小祀則服闕狄以序推之理宜然也鞠衣則其色象鞠鞠之華以隂中其色黃則隂之盛色也后蠶服鞠衣則帥外內命婦而蠶使天下嬪婦于是而取中焉后之盛服也展衣之色則純白王后服之則以禮見王以享賓客而有誠信之道焉故謂之展也緣衣之色黑而緣以纁士昏禮所謂純衣纁袖是也純即緣也謂之緣則有取于循緣之義謂之纁則有上逹之意緣衣后服之以處燕居以從進御蓋婦人以至正為體其上逹則循緣而已故衣用緣也鞠衣黃陰之盛色也展衣白陰之純色也緣衣黑陰之正色也惟盛為能帥人而人斯從惟純為能擇人而無所雜惟正為能格人而無所二則衣服之制豈苟然哉寓大法于不説之間施之動容周旋之際其德斯足以稱之矣易曰夫子制義婦人從一而終故王后之六服皆以素沙為裏以示其德之一也素則取其內之純白也沙則取其內之疏通也麻陰也陽尚之故六冤之飾皆用麻絲陽也隂尚之故后六服之裏皆用沙辨外內命婦之服鞠衣展衣緣衣素沙外命婦則卿大夫士之妻也內命婦則九嬪世婦女御也記曰夫人屈狄世婦袒衣士妻稅衣內子鞠衣下大夫妻袒衣然則卿之妻服鞠衣大夫之妻服展衣士之妻服緣衣此外命婦之服也記以夫人展狄并世婦言之則夫人者后宫三夫人也三夫人闕狄則九嬪鞠衣世婦展衣女御緣衣此內命婦之服也然此所言以鞠衣為首而三夫人與公之妻所服固不同矣記曰夫人副褘此言上公之夫人也蓋上公與王同服衮衣則上公之夫人宜與后同服褘衣矣伯降上公一等則侯伯夫人宜服褕狄子男又降一等則子男夫人宜服闕狄矣三夫人視三公服同闕狄則三公之夫人亦宜服闕狄矣其服皆以素沙為裏亦與后同則婦人之德皆以専一為主欲其內之純白有以通逹乎外也凡祭祀賓客共后之衣服及九嬪世婦凡命婦共其衣服共喪衰亦如之后之喪共其衣服凡內具之物于奉祭祀接賓客共后與九嬪世婦之衣服則凡喪衰及九嬪世婦所服亦內司服共之也故曰亦如之內司服所掌主以共后故其生也共其所服而及其死也亦無以異于生焉凡內具之物則后生時所用帉帨線纊鞶帙之屬亦無不共之此事死如事生之意也縫人掌王宫之縫線之事以役女御以縫王及后之衣服喪縫棺飾焉衣翣栁之材掌凡內之縫事衣于記反翣所甲反逢之而屬者縫之事也縫則必資于線先王設縫人之職掌王宫之縫線之事則非特掌縫衣服而已凡縫衣服所用之線亦使縫人為之也故言縫線之事謂有事于縫有事于線也且其宫之屬有奄二人女御八人女工八十人奚三十人凡百有二十人之衆蓋以王宫中縫線之事其事既多非多其員則不足以給之也女御則掌製造王及后之衣服故縫人掌縫線之事以為女御所役故曰以役女御以縫王及后之衣服棺必有飾則雖死而不致死之意也王及后之喪則縫人縫棺飾不言王及后之喪則蒙上文可知也翣如方扇持之所以蔽棺栁隂木為之故喪車謂之栁車翣以木為體用采繒衣纒之以為飾故曰衣翣栁之材前言掌王宫縫線之事則主王與后而言之今此言凡內之縫事非止王及后而已凡宫中之縫事皆縫人為之則縫人之屬皆所謂女御八人則非王宫八十一女御之數矣染人掌染絲帛凡染春暴練夏纁玄秋染夏冬獻功掌凡染事暴步卜反染如啖反夏户雅反染之字右從水水始事水無當于五色而五色弗得弗章是也下從木木東方其于藏也主色染成而色見故也從九在木上每入必變變至于九丸已無變故也掌染絲帛者絲帛之質待染而後成文則絲帛者染之質染者絲帛之文也春暴綀者綀其素而暴之㡆氏練絲帛皆畫暴諸日是也夫天道致剛于西北而其事質致柔于東南而其事文至西南而成章聖人因物之質而成文章雖一染之微豈能違乎天道之運哉以春為文之始故春暴練暴練則文始乎此矣夏為文之著而與物交故夏纁玄纁者黃而兼赤色玄者赤而兼黑色以其陰陽雜而成文故也秋則文成而為章故染夏夏則五色備矣四時之夏以其文明與中國同謂之夏則五色謂之夏亦以是故也七月之詩言八月載績載玄載黃我朱孔陽為公子裳蓋于是時五色皆可以染故也然染人于夏言纁玄與此不同者蓋染纁玄者始于夏秋則文雜而成章之時故染五色者備于是時矣至于冬則復乎至幽而與物辨非有事之時也故因其成功而獻之則事功為已就而止乎無所事也然則先王之染亦豈苟然哉凡以順乎天道之自然而已掌凡染事則非特掌染絲帛也几物之染者無不掌之矣追師掌王后之首服為副編次追衡笄為九嬪及外內命婦之首服以待祭祀賓客喪紀共笄絰亦如之追丁回反編步典反詩曰追琢其章追者治玉之名也其字與追琢之義同故同字蓋所追者止能追者止而從之故也掌王后之首服而謂之追者以其有追衡笄之事而副編次亦有玉以為飾故也為副編次者詩曰副笄六珈蓋髮為正副者所以飾首而二之又其音覆則所以覆首故也編則編列髮而為之次則次第髮而為之記曰夫人副褘則副配禕衣首飾之上也昏禮女衆純衣則次配緣衣首飾之下也副編之所配如此則編之所配在中也故首服之飾一曰副編繼之次為後乃其序也后之服有六其首服有三以序推之蓋以一當二由是言之則副配褘褕編配闕鞠次配展緣矣追衡筓者衡則維持冠而平之也筓則卷髮而節之使適平也衡也筓也皆以三為之故曰追衡筓九嬪外內命婦之首服則所以配鞠展緣之衣也凡此所以待祭祀賓客之所用故曰以待祭祀賓客至于喪紀則笄而又加之以絰其共九嬪外內命婦所用亦如祭祀賓客之禮故曰亦如之屨人掌王及后之服屨為赤舄黑舄赤繶黃繶青絇素屨葛屨辨外內命夫命婦之命屨功屨散屨凡四時之祭祀以宜服之屨在服下所以飾足也人所常用而履之屨矣舄亦飾足而名官獨曰屨人者以舄用為禮而非常屨故以所常屨者名官凡首服衣裳之類王與后皆異官以掌之而屨則同于一官者首服衣裳之類在上而為尊故異官以掌之所以貴之也屨在下而為卑故同一官以掌之所以賤之也然先王于此亦寓之以微意矣蓋首服衣裳之所象者德也屨之所象者行也德則有聖賢而行則同歸于中庸而已掌王及后之服屨者服名有屨也司服言辨則曰辨服辨在上故也屨人言屨則曰服屨屨在下故也舄者所以隱足而為禮也赤陽之正色故王服赤舄里陰之正色故后服黑舄必以隂陽之正色則以人所履者皆隂陽之正故也陽則純故赤舄之繶亦赤陰則雜故黑舄之繶黃黑陰之正色黃隂之盛色以隂之正色為體以隂之盛色為飾也繶所以飾舄謂之繶亦猶衣純謂之緣也屨所以檢行赤舄黑舄同于青屨也青東方之陽色而有動意屨所以檢行而有止意舄用青絇則欲其動而能正也復下曰舄以隱足而别貴賤也單下曰屨以人所常用而履之屨矣素屨則屨之無舄者也葛屨則以葛為之者也命屨則以王命錫之者也功屨則致人功焉與功裘同意散屨則喪屨無絇故也外內命夫命婦服各有筓則屨亦各以其服所謂命屨者亦如所命之服也凡四時之祭祀以宜服之者各隨其時與事之宜而服之也若夏則葛屨冬則皮屨此隨時之所宜也若言祭則用赤舄黑舄功屨喪祭則有素屨散屨此隨事之所宜也夏采掌大喪以冕服復于大祖以乘車建綏復于四郊掌復之官而謂之夏采者以冕服備采色焉采色所以事生之道故也喪則哀素哀素則所以事死之道也復者所以幸其生故以采色夫人之死也魂氣歸于天體魄降于地先王䔬其魂氣反歸于形體故始死則有復禮焉復者反之已至者也死者人之窮也窮則宜反本大祖則子孫之本也故復之于大祖反本則無不之也故復之于四郊復于大祖必以冕服者王生時所服以祭祖廟故也復于四郊必以乘車建綏者王生時所乘建以適四郊故也亦各以其所宜而用之記曰復盡愛之道也望反諸幽而求諸鬼神之道也先王所以愛其親其至誠忠厚以至于此以此而率天下則民德其有不歸于厚者乎曾子曰慎終追逺民德歸厚矣為治而至于民德歸厚其治之大成與此夏采之職所以序于天官之終也夏采掌大喪之服而特置一官則其兼掌明矣兼掌則不為冗特置則専其事則所使復宜致一故也且司服掌王衣服之官序于春官而內司服掌后衣服之官乃序于治官辨師掌王冕辨之官序于夏官而追師掌后首服之官乃序于治官者蓋王之道忽然如神其施于四體形于動靜者猶為禮而已故司服序于春官其飾于首者所以降而與物接也故辨師序于已夏官若夫后則王所帥而成者也其見于首服形容為盛德之至則惟道是從此內司服追師所以序于天官之意歟周禮詳解卷八
