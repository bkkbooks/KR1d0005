body:
  text: 周禮詳解卷十五宋王昭禹撰遂集掌邦之野以土地之圖經田野造縣鄙形體之法鄉遂列於千里之畿而名不同以逺近內外所主不同也鄉近而內所王者教故自五家之比積為二千五百家之州非特鄉遂其别然也鄉謂之民遂謂之氓鄉謂之田遂謂之野鄉官所掌者教遂官所掌則言政令而不及教鄉官所指者德遂官所稽則為功事而不及德合而言之鄉豈不耕遂豈不教鄉官豈無政令遂官豈無賢良哉特各言其所掌要使鄉遂之官各言以見其分守之意云爾土地之圗大司徒所建之國也以土地之圗經田野則以所建之國為井牧溝塗田萊之類而經之物生而後有象象生而後有形形具而後有體體者形所待而立者也故有縣鄙之形斯為井邑溝塗之類以體之有王國之形斯為門闈宫室之類以體之其所以造之者豈漫然乎莫不有度數存焉夫是之謂形體之法也五家為鄰五鄰為里四里為酇五酇為鄙五鄙為縣五縣為遂酇作管反兩家相比謂之鄰五家為鄰猶五家為比也出同耕入同居謂之里五鄰為里猶五比為閭也四里為酇則其人衆矣有相贊助之意猶四閭之為族也五酇為鄙則如邉鄙之鄙害則同禦之意猶五族之為黨也若五鄙為縣則縣而首下所以首於遂猶五黨為州聚而內比於鄉也五縣為遂則其地逺於王朝而有遂於外之意猶五州為鄉則向于內也鄉遂之制其立名不同如此乃所以為內外逺近之别矣然大司徒於比閭族黨州鄉言相保相受相葬相救相賙相賔而遂人不言以鄉主教遂主耕遂人所主不在是也雖然由鄉之所言則遂之不言亦可知皆有地域溝樹之使各掌其政令刑禁以嵗時稽其人民而授之田野簡其兵器教之稼穡皆有地域者域字從土或為其或之也故為其封疆以辨之溝所以為之限樹所以為之阻各掌其政令刑禁則使六遂之官共掌其所治之政令刑禁也以嵗時稽其人民而授之田野則必先稽其人民多寡之數然後田野可得而授也蓋人民則有家七人六人五人之異數田野則有上地中地下地之異等不先考其數而計之如之何其能均其地域哉簡其兵器教之稼穡者兵革器利然後可以禦患則兵器不可以不簡土壤異宜而播種收成有不同則稼穡不可以不教然兵器之不簡則稼穡不能得教故先簡其兵器而後教其稼穡蓋王畿以鄉為近以遂為逺以鄉為內以遂為外逺而外則以外禦為事必先守其地域而有之然後能致力於稼穡焉不然則謂之棄民雖有粟不可得而食也况可得而稼穡乎若夫以古人足食然後足兵洪範八政以始於食而終於師此乃治之常序非六遂之政凡治野以下劑致氓以田里安氓以樂昏擾氓以土宜教氓稼穡以興鋤利氓以時器勸氓以強豫任氓以土均平政氓亡耕反鋤音助強其良反以下劑致氓者劑約劑所謂要書也蓋征役之制上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人今與氓約以征役用下地為率焉則授地多而征役少孰不願為之氓乎此以致之而使至也以田里安氓者出則輩作於田入則族息於里不授之以田使其作無以耕不授之以里使其息無所居非所以安之也授以田則彼得以安其耕授以里則彼得以安其居及其西成則百室盈而婦子寧及其改嵗則嗟婦子而入室處又安有不安之氓乎以樂昏擾氓者男子生而願為之有室女子生而願為之有家人之大情在是適其情則樂非其情則擾先王立之室家因其情之所樂而無所逆焉凡以治其擾而已故曰以樂昏擾氓以土宜教氓稼穡者夫十有二土之名物不同則稼穡之所宜亦異氓或不能與知故以土宜教之大司徒所謂辨十有二壤之物而知其種以教稼穡樹藝與此同也以興鋤利氓者孟子曰唯助為有公田許慎釋鋤以商人七十而助則鋤一也興之以助公田也公田所以飬君子君子所以治野人公事畢然後敢治私事則民各得其私以自利焉各得其私以自利則以私為主而於公為助矣故以興鋤利氓以時器勸氓者夫耕穫之類其為時不同其所用之器亦各有時若耕以耜穫以銍所謂時也有其具者易其事然則器得其時者農之所以易田畝也蓋人之情勤則怠易則勤使之善其器而又以時焉孰不勸而趨其事哉此時器所以勸氓也以強豫任氓者因其力之有餘而後豫之以田則謂之強豫夫力有餘矣豫之以其寡則力遺於民力不足矣豫之以其多則利遺於地力不遺於民利不遺於地亦要其力之所任而豫之斯可也以土均平政者夫自下劑致氓以至於強豫任氓則遂人之治野者悉矣職貢賦財之政於是乎施焉職貢賦財之政不可以不平所以平之者以土均而已則逺近多寡各適於勻而無偏重不齊之患矣此平政所以在乎土均而已然則治野之政必始乎以下劑致氓所以強本而實遂地也有以致之而至則必有以安之故以田里安氓安之矣必有以治其擾故以樂昏擾氓民擾矣然後可教之稼穡故以土宜教氓稼穡既教矣然後興之以助公田故以興鋤利氓利其土矣然後為之善其器以勸之故以時器勸氓勸其事矣然後可強豫以任之故以強豫任氓可任矣然後以土均之法平其職貢財賦之政故終之以土均平政辨其野之土上地中地下地以頒田里上地夫一㕓田百畝萊五十畝餘夫亦如之中地夫一㕓田百畝萊百畝餘夫亦如之下地夫一㕓田百畝萊二百畝餘夫亦如之畝音畝萊音來里以㕓計田以畝計上地田百畝萊五十畝猶都鄙不易之地家百畝也中地田百畝萊百畝猶都鄙一易之地家二百畝也下地田百畝萊二百畝猶都鄙再易之地家三百畝也然都鄙不言夫一㕓及餘夫者則以遂人見之也遂之上地萊五十畝特異於都鄙則以利上農實遂地亦所以致之也且頒田里有餘夫者頒田里所以分民父祖子孫不可公也故以為餘夫雖然田里之所頒言餘夫大故之所致言餘子何也蓋頒田里則以其力強而可任者則訃其夫故以受田之正者言之為餘夫几起徒役無過家一人則大故之所致者計其家故以合族之長者言之為餘子凡治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有塗千夫有澮澮上有道萬夫有川川上有路以達於畿畛之忍反洫况域反澮古外反先王不能使天下無水旱能使水旱不為之災以有溝塗之法焉溝所以導水因水之勢而導之也故自夫間之遂達於萬夫之川為五溝也塗所以防水則因地𫝑而防之也故自遂上之徑達於川上之路為五塗五溝始於遂以水自是而之他所以遂於外也故夫間有遂自是之他則直逹矣至於十夫相積然後為溝故十夫有溝積溝而百夫則其流衆矣猶人之血脈然消息盈虛自適於一體之中故百夫有洫積千夫而為澮則遂溝洫水并而會焉故千夫有澮而逹於外則集衆流而為川其水大矣而周於外焉故萬夫有川此五溝所以導水也考工記曰廣二尺深二尺謂之遂廣四尺深四尺謂之溝廣八尺深八尺謂之洫廣二尋深二仞謂之澮專逹於川則川之制又倍於洫矣故書亦曰濬畎澮距川然則遂從而溝橫洫從而澮橫川則集衆水而同於外矣五塗始於徑以水行而順水之徑也故遂上謂之徑有左有右而致飾者畛也故溝上謂之畛畛而十之則行者衆故洫上謂之塗塗而千之則行者衆而有首焉故澮上謂之道路大道也有足者得以各行而不相踵故川上謂之路此五塗所以防水也其廣狹之制則先儒謂徑容牛馬畛容大車塗容乘車一軌道容二軌路容三軌是矣以嵗時登其夫家之衆寡及其六畜車輦辨其老幼廢疾與其施舍者以頒職作事以令貢賦以令師田以起政役施式氏反舍音捨登者上其籍也遂人既登其夫家衆寡六畜車輦而遂師又以時登則遂師登之於遂人遂人登之於小司徒也辨其老幼廢疾與其施舍者而不言貴賤則遂以治野為主故也不言辨可任則頒職作事辨可任可知也小司徒先言軍旅田役而後以令貢賦此則先言令貢賦者蓋遂人以治野為主野者貢賦之所出故以貢賦為先小司徒主教教以率民為事貢賦乃其本也故以貢賦為後若起野役則令各帥其所治之民而至以遂之大旗致之其不用命者誅之鄉師致民以司徒之大旗遂人所謂遂之大旗亦司徒之大旗也熊虎為旗烏隼為旟鄉建旗遂建旟今此致民必以旗則致民者宜以威猛致其義故下文繼之以其不用命者誅之則致其義可知矣於遂建焉故曰遂之大旗於遂言大旗則鄉可知於鄉言司徒之大旗則遂亦可知凡國祭祀共野牲令野職凡賔客令修野道而委積大喪帥六遂之役而致之掌其政令及葬帥而屬六綍及窆陳役凡事致野役而師田作野民帥而至掌其政治禁令屬音燭綍音弗共野牲則牲之未入牧人者也共之使入於牧人以待事焉令野職則職之不任於民者也若薪炭之屬雖微而用不可廢焉凡賔客令修野道而委積則異乎司徒所謂令野修道委積也蓋令修野道則止於遂之地而已令野修道則非止於遂地自郊以外凡野道皆是也及葬帥而屬六綍則帥而屬大司徒也引在前屬之於車以道匶綍在旁屬之於棺以弼匶六鄉主以道德成之故使屬引而道之於前六遂主以功事成之故使屬綍而弼之於旁道德始終從焉功事則以自弼焉故也及窆陳役則所預者窆事而已殯事則非所預凡事致野役而師田致野民言事而又言師田則事者乃立政之事而已政治禁令則所以治野役野民者也遂師各掌其遂之政令戒禁遂人之主六遂猶司徒之主六鄉然遂官降鄉官一等故其爵與小司徒等均於中大夫也遂師猶鄉之有鄉師下大夫四人則二人同掌三遂故言各掌其遂之政令戒禁司徒以教民為主故鄉師鄉大夫州長多言教事所治則以民言之遂人以治野為主故遂師遂大夫縣正之屬多言耕事所治則以氓言之以時登其夫家之衆寡六畜車輦辨其施舍與其可任者經牧其田野辨其可食者周知其數而任之以徴財征作役事則聽其治訟登其夫家衆寡六畜車輦登其籍於遂人也鄉師以時稽其夫家衆寡而遂師登而不稽者以有遂大夫稽之也在所舍者而不之舍焉則厲民在所任者而不之任焉則害事故辨其施舍者又辨其可任者使兩得其所也經牧其田野猶小司徒所謂經土地而井牧其田野不言井則以下文辨其可食者周知其數而任之故也地有可食有不可食必辨之然後其數可以周知既知其數然後可以頒地以任民征其財謂之財征征其力謂之力征征者以正行也周知其數故其征不失民財其役不失民力令之而不從則有治治之而不服則有訟遂師聼而已巡其稼穡而移用其民以救其時事稼穡之時不可緩而民之札喪為無常茍困其札喪而力有不逮則稼時不作穡時不收時事於是乎廢先王乃移用其民以救之則民以不急致困者寡矣職內及會以逆職嵗與官府財用之出而敘其財以待邦之移用此移用其財者也財無力不生力無財不養民無力不行事非民不立財力常相為用而不可偏廢也此所以皆有移用之法先王之世所賴以相濟而無敗事者以此道也後世不知出此不幸而有天變患難民日因之而流離區區之移民移粟之小惠又何補哉凡國祭祀審其誓戒共其野牲大宰祀五帝掌百官之誓戒則凡國祭祀皆有誓以喻衆戒以敕衆遂師于國祭祀審其誓戒而已審者聼而辨之當以其事喻於預祭祀之人故也蓋遂師各掌其遂之戒禁故祭祀則在審其誓戒遂人凡國祭祀共野牲遂師又共野牲則贊遂人共牲入於牧人也以遂師登六畜牧其田野故也入野職野賦于王府無君子莫治野人無野人莫飬君子君子有以治野人之悉然後可以責野人飬君子之備夫囏厄可施賢能可舍強壯可任非登其生者下其死者弗能辨也地有上下種有利害食有可否非經其土地牧其田野弗能知也天有變動民有囏厄事有緩急非移民之強者以就急難移民之弱者以即緩易弗能救也君子之任野人可任者無怨可食者無害其悉如此野人亦何以為報哉野職野賦入於玉府以共王之玩好是所以為報也則野人之飬君子可謂備矣野職九職也野賦九賦也角人羽人掌葛皆徴財物於山澤之農以當邦賦之政令則九賦九職皆各聼民以其物當職賦而其物有中玉府之用則入於玉府矣賔客則巡其道修庀其委積大喪使帥其屬以幄帟先道野役及窆抱磨共丘籠及蜃車之役軍旅田獵平野民掌其禁令比敘其事而賞罰道者賔客往來之衝則不可以不修而治之委積者給賔客之食用則不可以不庀而備之道修以致其恭委積以致其愛修而庀之則恭愛之情著乎外矣故遂師於道修則巡而視之於委積則庀而具之以幄帟先道野役所以帥之也使而不帥則野役豈能自致哉及窆抱執綍者之名籍行而挍數之也共丘籠者共其為丘之籠器以成土也及蜃車之役者蜃車載闉壙之蜃遂師則共蜃車之役人也平野民謂軍旅田役則平其行列部伍也比敘其事而賞罰者比謂校比其事之得失事謂次敘其事之前後遂大夫各掌其遂之政令以嵗時稽其夫家之衆寡六畜田野辨其可任者與其可施舍者以教稼穡以稽功事掌其政令戒禁聽其治訟一鄉一遂人衆所聚必有以帥之者故鄉遂皆有大則夫師師所以教養之則仁之任也大夫以政帥導之智之任也鄉師之職各掌其所治鄉之教而聼其治鄉大夫曰鄉大夫之職各掌其鄉之政教禁令此不言者聖人之制詳於鄉師鄉大夫其職之所掌則盡其事耳遂師遂大夫其事略而或比於鄉師鄉大夫而舉之此所以不言與鄉師以時稽其夫家衆寡而遂師不稽者以有遂大夫稽之也鄉大夫以嵗時登其夫家衆寡而遂大夫不登以有遂人登之也蓋鄉之官莫尊於鄉大夫遂之官莫尊於遂人也遂師以辨其施舍為先遂大夫以辨其可任者為先辨其施舍者仁之先務也辨其可任者智之先務也可任與施舍雖本無先後而亦有仁智之别矣遂師既辨之遂大夫又從而辨焉亦所以相成也稽則得其數辨則得其力以教稼穡則各稱其任以稽功事則各服其責數力不得其詳政教失其所施則安得功事而稽哉此稽其功事所以次於教稼穡之後矣令為邑者嵗終則會政致事正嵗簡稼器修稼政量地以致之周營以聚民者邑也王畿千里其中正之所邑外百里謂之四郊六鄉在焉外二百里謂之邦甸六遂在焉六遂之地蓋自逺郊以逹於畿其間公邑及鄉大夫王子弟之采邑在焉然則凡民之所聚或廣或狹或多或寡皆可以謂之邑矣故雖五家十家所聚亦得謂之邑鄰長凡邑中之政相贊此五家而謂之邑矣孔子曰十室之邑必有忠信此十家而謂之邑矣令為邑者則令六遂之吏而已善惡在政利害在事嵗終令會政則政之善惡皆有所録者令致事則事之利害皆以告於上矣稼器則耒耜鎡䥓之屬工欲善其事必先利其器故稼器不可以不阪簡也稼政若月令孟春修封疆審端經術善相丘陵險原隰土地所宜五榖所植以教道民者是也夫三之日于耜四之日舉趾則正嵗為耕事之始則簡稼器正其時也簡稼器則頒用於民修稼政則頒行於吏矣三嵗大比則帥其吏而興氓明其有功者屬其地治者鄉遂雖異地而耕教無異事然鄉以其近而在內故以教為主遂以逺而在外故以耕為主帥其吏而興氓亦猶鄉大夫賔興賢能但鄉以教為主故其事詳遂以耕為主故其事略其實則一而已大司徒以鄉三物教萬民而賔興之在施教法於邦國都鄙之後則其教及於邦國都鄙矣其施於遂亦可知也然謂之鄉三物則教以鄉為主故也故遂地謂之野其民謂之氓言其官所掌則政令而已不及教也言其政所稽則功事而已不及德也明其有功者則察舉其屬人之有功者也屬其地治者則聨比其地治之職者也察舉其屬人之有功者得以見知聨比其地治之職事者則地治者得以相贊如是則妨功害能者無以逞其私而瘝官曠職者亦無所容於時矣凡為邑者以四逹戒其功事而誅賞廢興之先王之世教法同乎天下而無異德政令同乎天下而無異事惟教法同而無異德故鄉吏受之於鄉大夫鄉大夫受之於大司徒大司徒受之於天子惟政令同而無異事故自王逹之於大司徒大司徒逹之於遂人自遂人逹之於遂大夫遂大夫逹之於為邑者此之謂四逹政以德為主則謂之德政事以功為效則謂之功事六遂之官所掌者政令而不及教六遂之政所稽者功事而不及德怠而有過者在所廢廢之不已則有至於誅勤而有功者在所興興而不已則有至於賞先言誅賞而後言廢興者大小之序也縣正各掌其縣之政令徴比吏民之衆先王不能人人而治之或為之大夫以帥其不智者或為之師以教其不賢者或為之正以董其不率者或為之長以倡其不順者正之名上至六卿下至於黨縣長之名上至州鄼下至於鄰比師之名上至三公下至於族鄙大夫之名以為爵也則臨三等之士以為職則正一鄉之衆鄉大夫卿也弗以卿名官者以居之愚正在帥之以智而已遂縣皆大夫也以智帥之則謂之大夫以正帥之則謂之正長也或於鄉州或於遂鄼名之正也或於鄉黨或於遂縣名之師也或於鄉旅或於遂鄙名之莫非師正也其才德有多寡其職事有大小民吏事物之所在必有正長焉蓋雖少頃不可廢也然而司徒以教民為主遂人以治野為主師正大夫取名鄉遂官未嘗異者何也遂言師則未嘗不用教鄉言正則未嘗不用政學者不可廢耕耕者不可廢學則其臨涖之者豈可異哉然而閭里之官特異其名者何也同閭門而居則同其情可也患其乖暌必有胥相之者故其官謂之胥同田里而作則同其事也患其失誤必有以宰制之者故其官謂之宰一遂而有五縣正故曰各掌其縣之政令徴比則或徴財征或徴賦事則為飬君子之計也比則或比其夫家衆寡或比其六畜車輦則為野人之計也以頒田里以分職事掌其治訟趨其稼事而賞罰之若將用野民師田行役移執事則帥而至治其政令既役則稽功會事而誅賞趨音促民數之多寡比而知之以頒田里人材之能否比而知之以分職事分職事則民於是有事矣理其事者有治爭其事者則有訟故掌其治訟頒田里則民於是有業矣東作西成不可以無所督勤怠功過不可以無勸沮故趍其稼事而賞罰之師也田也行役也移執事也將用野民則縣正帥而至治其政令移執事則若遂師所謂巡其稼穡而移用其民以救其時事也既役則稽功會事而誅賞者功有多寡事有難易會事則功定矣其用命者在所賞不用命者在所誅如此則勤者勸而怠者懲矣鄙師各掌其鄙之政令祭祀正者人之所表帥故也利則同營無所表帥則亂故其長之者謂之黨正害則同禦無所附依則散故其長謂之鄙師師者人之所附依故也黨正言各掌其黨之政令教治此則及政令而已蓋以耕為主然言師則亦不嫌於無教焉黨正凡其黨之祭祀喪紀昏冠飲酒教其禮事掌其戒禁然則鄙師所掌之祭祀豈特祭禜而已亦必教其禮事矣凡作民則掌其戒令凡作民而師田行役則以法治其政事掌正之任也此掌其戒令者蓋治其政令則有縣正焉正之所治下同於黨正矣州長凡作民掌其戒令則鄙師之所掌上同於州長矣以其民力之不可易也掌其戒令治其政事雖小大之事不可廢耳以時數其衆庶而察其􅍇惡而誅賞嵗終則會其鄙之政而致事數色主反􅍇音美衆寡之民上有遂大夫遂師稽登而比之下有鄼長里宰校登而比之鄙師無事於斯焉數其衆庶而已故不言衆寡衆庶之中美惡不辨則恐有亂民者故致察焉􅍇者美之微惡者美之反必詳視而後見故言察黨正書其德行道藝紏戒之則教也鄙師察其􅍇惡而誅賞則政也其在鄉也雖謂之正教之如彼其在遂也雖謂之師正之如此此治野之法也遂大夫令為邑者會政致事所會者及於六遂之吏則其會廣矣鄙師所會則止於五百家之政而已則其所會者寡矣故言會其鄙之政而致事鄼長各掌其鄼之政令以時挍登其夫家比其衆寡以治其喪紀祭祀之事治直吏反相保聚仁也故主五族之衆謂之族師相贊助義也故主一鄼之衆謂之鄼長一夫之家或能而興之或死而下之或老疾而廢之或壯長而任之昔時受上地者或降之於下籍昔時受中地者或置之於上等未始有常也故曰以時校登其夫家比其衆寡校而登之則其衆寡定矣然後以比焉族師以時校登其夫家則鄉師統其事鄼長以時校登其夫家則遂師統其事遂師言登鄉師言稽皆互見耳校而登之慮其不實而偽不公而私不詳而略此所以有稽焉必以校而登之責百家之長者何也所蒞者衆所教者悉也三師則任稽登而已校之責弗與焉大夫又各稽其嵗時考其詳也然後入而數焉其施政教也使民無戾其行徴令也使民無怨蓋自大夫決矣共喪器於公相葬之於下此喪紀之事也春秋祭酺為其害物之成此祭祀之事也若作其民而用之則以旗鼓兵革帥而至若嵗時簡器與有司數之凡嵗時之戒令皆聽之趨其耕耨稽其女功作民而用之或用之於師田或用之於行役旗所以屬民鼓所以作衆兵革則示其有事於武也帥而至然後各致於其長族師言以鼓鐸旗物帥而至大司馬言羣吏以旗物鼓鐸鐲鐃各帥其民而致詳略皆相備耳司常言縣鄙建旐則卑者所建兵事兆於此然則族師鄼長帥民而至其用旐與耕則有祭器作則有兵器共則有喪器器之所用有此三者則此所言簡器者非特簡稼器而已與有司數之若簡稼器則與遂大夫數之若簡兵器則與里宰數之也以其涖民也簡授民也詳故凡嵗時之戒令皆聼之蓋自鄙師以上至於遂人凡有戒令皆聼而行之也趍其耕耨則食足而民不飢稽其女工則衣具而民不寒然後百家之衆相保聚有仁相贊助有義也里宰掌比其邑之衆寡與其六畜兵器治其政令政音征先王之名鄉遂以名寓其意或以治其所居之里或以治其所耕之地互見其名焉二十五家聚而居則同閭故於鄉名謂之閭出而耕則同其里故於遂名謂之里閭師則各數其閭之衆寡辨其施舍此治其入而同者也里宰則比其邑之衆寡與其六畜兵器治其政令此治其出而同者也以嵗時合耦于鋤以治稼穡趨其耕耨行其秩敘以待有司之政令而徴斂其財賦鋤公田也合耦於鋤則即公田而合其民之耦一邑四井一耦二耜合耦於鋤則八夫四耦同治百𤱔之公田公田謂之鋤猶親耕之田謂之藉也欲其協意同力有事於公與春以治稼秋以治穡未有二三而不齊者雖則齊矣其出為或緩其耕也不深其耨也不易欲其實函斯活其鎛斯趙豈可得哉此里宰所以趍其耕耨使無敢緩之意也雖則勵其耕耨然而使民徒用力致我公家之利無恩以慰其勞無義以治其事欲其農夫克敏田畯至喜豈可得哉此里宰所以行其秩敘秩常賜也所以慰其勞敘其事治之先後也所以治其事趍其耕耨然後行其秩敘則與夫日有秩者異矣徴謂有所求斂則取其常共而已財賦或斂而必待有司之政令者以見用財有禮取財有義不為橫賦暴斂矣鄰長掌相糾相受凡邑中之政相贊徙於他邑則從而授之五家之衆至寡而其親近猶易致察故使之相紏有罪竒邪無所容於其間有善而已故使之相授一遂之中鄰長衆矣其比失信其鄰失德一長之察有所不及則竒邪或乘其間矣故邑中之政使相贊比長言有罪竒邪相及而此言相糾者蓋相糾則為其有罪竒邪相及故也比長言相及則鄰亦相及矣鄰長言相紏則比亦相紏矣比長言相和親而此言相贊者相贊則欲其相和親也鄰相贊則比亦相贊矣比相和親則鄰亦相和親矣徙於他邑則從而授之不言於他而言他邑則其徙未離於遂也比長言若徙於他則為之旌節而行之無授無節則惟圜土內之而此不言則亦以比長見之也鄉遂之官其所掌或言或不言則其同可知蓋皆互見也旅師掌聚野之鋤粟屋粟間粟而用之間音間聚而不能散斂而不能施猶盜其民焉旅師聚粟而頒之或施之以惠艱厄或散之以利缺乏能以聚斂為仁者也有衆人依附之道焉而又聼新氓之治此其所以名旅師與掌聚野之鋤粟屋粟間粟而用之者聚此三粟而用之以頒以施以散也鋤粟則公田所入粟也屋粟則田不耕者所罰粟也間粟則間民以當貢上所入粟也閭師曰凡無職者出夫布載師曰凡無職事者出夫家之征蓋凡無職之民未必無事也但使出夫布而已及夫無九職又無三事則使之出夫家之征故有間粟焉田不耕惰民也無職事間民也惰民雖不能耕猶不失職焉此所以罰以屋粟而間粟則施於無職事者以當邦賦所入也載師以時徴其賦則鋤粟屋粟間粟皆在焉閭師以時徴其野之賦貢及鋤粟之類旅師則無事於徴焉聚而用之而已然有米粟之征有粟米之征閭師任農以耕事貢九榖是為鋤粟鋤粟十一而已所謂米粟之征是也若任地而非公田若載師或無過十二或無過二十而三則宜有粟米之征矣然則屋粟間粟皆粟米之征也以質劑致民平頒其興積施其惠散其利而均其政令平頒其興積有不欲而強豫之者致民而受之當防其或偽冒而取或抵負而去故其致之也有質以立見有劑以立約如此則姦者無所肆其欺矣平頒其興積者不如賒貸待民欲取而後豫也興謂興粟以就民之所聚積謂致民以就粟之所積夫興粟非民之所欲而必平頒之者蓋樂嵗民有餘則或利食新而不欲取粟於旅師為是而不頒則邦物因或腐耗而貴者反食陳賤者反食新邦物因或腐耗則非所以愛物貴者食陳賤者食新則非所以制節且方粟貴之時而強豫之及其賤時然後斂之亦何傷於民哉無傷於民而可愛物制節此其所以平頒也或頒其興或頒其積則趍便利故也施其惠者民有艱厄則施其惠以賙之也散其利者既平頒矣有資之以利本業者又散以與之也施惠不責其償矣散利則責其償但不使之出息也蓋有不欲而強之者則因民之所利而與之尚安用息乎然則散其利不如泉府出貸息矣夫欲而與之其利在民不欲而與之其利在公專與其所不欲者則不便於民専與其所欲者則不便於公平頒其興積非民所欲也施惠散利則民之所欲也先王之法民與公其利兩得焉均其政令者均旅師賦役之政令也旅師或興粟則有賦役矣其頒之平則其政令宜均矣凡用粟春頒而秋斂之方春興作則粟宜貴之時因其不足而出粟以資之方秋收成則粟宜賤之時因其有餘而斂之如此則為農者不為兼并者之所奪其生計可積而厚矣先王之民所以無貧困之患者亦以有此術故也凡新氓之治皆聽之使無征役以地之􅍇惡為之等新氓下劑所致者也旅師有頒散之任新氓之治皆聼之則應其所求與使無征役者且飬其財力不以事撓之與記曰自諸侯來徙於家期不從政則徙於遂者亦然矣以地之􅍇惡為之等者􅍇謂上地惡謂下地蓋家有七人者以􅍇地授之為上等家有五人者以惡地授之為下等然則征役於是乎出矣稍人掌令丘乘之政令乘繩證反肖所當行而與焉謂之稍故稍食謂之稍然則稍者非并與之也稍稍與之而已稍人凡用役不必一時皆遍以人數調之使勞逸遞焉亦稍稍以給役事而已故以稍人名官非特是也稍人掌令丘乘之政令則一丘之中有同葬之義則其恩足以相給矣一乘之中有同戰之勇則其義足以相給矣然而丘之相葬之恩乘之同戰之義未為至也稍足而已蓋自家之相保閭之相受以至於相救相賙然後足以為恩之至也自五人之伍五伍為兩以至於五師之軍勝能相先敗能相救然後足以為義之至也丘乘之恩義稍足以相給而已先王猶要其至焉上而在公征役取其稍給不欲勞民之意也下而在民恩義明其稍足必欲使充而盡其至之意也名官之義豈苟然哉意之所寓抑亦深矣丘之政令司徒之所掌也乘之政令司馬之所掌也稍人掌令丘乘之政令矣丘言其地乘言其賦下文所謂同則丘地也所謂徒役輦輦乘車則乘賦也其作而帥以至而掌其政令以聼於司馬司徒則所謂令丘乘之政令也夫一百四十四夫田野之間同為一丘葬則之焉夫同井而飲同邑而居使民相與為生同丘而葬使民相與為死生則相聚死則分背人之情也夫惟死而相棄則民可以死致之矣未之厚也仁政之術必使民老其老以及人之老者故其死也相葬於一丘其未死也相衛以一乘則一丘之政令其可易乎孟子曰民為貴社稷次之君為輕是故得乎丘民而為天子得乎天子為諸侯天子至尊而貴者也得之則為諸侯而已丘民至卑而賤者也得之則為天子焉此民所以為重士卒七十五人同寓於一乘行則為庇倚止則為營衛死傷疾病皆載於其中相衛以生相率以死者也孔子曰道千乘之國敬事而信節用而愛人使民以時夫能敬事而信則民不愛其情節用而愛人則民不愛其命使民以時則民不愛其力然則有車千乘以守則固以戰則克丘乘之政其可易乎故丘乘之政令又别為一官以掌之非敢易故耳仁政至丘而成甸與縣鄙則聨屬其夫而已此所以特言丘六鄉之兵以車為主人之卒伍則取於險而已此所以特言乘矣若有會同師田行役之事則以縣師之法作其同徒輂輦帥而以至治其政令以聼於司馬大喪帥蜃車與其役以至掌其政令以聽於司徒縣師之法則縣師所謂若將有軍旅會同田役之事則受法於司馬以作其衆庶及牛馬車輦是也司馬之法稍人不得受焉以縣師之法而已事有小大法有簡易物有多寡同徒輂輦司馬知其所用縣師知其數以聼於司馬則惟其所用者也大喪帥蜃車與其役以至者則衆庶之受役者也葬則同丘丘之政令司徒之所掌其蜃車與役皆取足於丘民欲以示相葬之義非待十二井之田能以蜃車與役自致於上焉委人掌斂野之賦斂薪芻凡疏材木材凡畜聚之物有所畜聚之謂委小曰委大曰積則此所聚者非其大者也故曰委人郊曰野掌斂野之賦則凡郊外園圃山澤所出之物皆委人所斂也薪以給內外饔㸑烹之用芻以給牛馬之用委人掌斂之也甸師帥其徒以薪蒸役外內饔之事則委人斂之而甸師之徒疏役其事也疏材臣妾之所聚木材虞衡之所作凡言材木材則其材非一色也言凡畜聚之物則其物非一色也此皆野之賦委人掌斂之耳閭師言民職之貢不言臣妾蓋有所𨽻焉則不使之貢委人特斂之而已以稍聚待賔客以甸聚待羇旅凡其余聚以待頒賜稍聚者所聚稍給之物甸聚者所聚甸賦之物餘聚者所聚縣都之餘物遺人以郊里之委積待賔客野鄙之委積待羇旅然則稍聚亦郊里之類也甸聚者亦野鄙之類也稍聚近故以待賔客甸聚逺故以待羇旅頒則用財之餘事故以餘聚待之然遺人之待賔客羇旅以其委積委積大用也可以言惠焉故名官曰遺人委人之待賔客羇旅以其所聚所聚微用也非若遺人之施惠故名其官曰委人以式法共祭祀之薪蒸木材賔客共其芻薪喪紀共其薪蒸木材軍旅共其委積薪芻凡疏材共野委兵器與其野囿財用凡軍旅之賔客館焉先王用財有理至於薪蒸木材未嘗輒廢式法則其祭祀賔客豈能廢禮哉喪紀共薪蒸而又共木材蓋大喪則有廬舍而凡喪則有張事皆須木材以用也軍行有常其用不可以頃失故軍旅共其委積薪芻凡疏材共野委兵器者野委則三十里有宿宿有路室路室有委也兵器則軍旅守衛陳兵之器也與其野囿財用者野囿財用以備資給兵器以備守衛也凡軍旅之賔客館焉者國野之道三十里有宿宿有路室則軍旅之賔客館焉蓋師行三十里車徙則止故也周禮詳解卷十五
