body:
  text: 周禮詳解卷二十宋王昭禹撰世婦掌女宫之宿戒及祭祀比其具詔王后之禮事帥六宫之人共齍盛相外內宗之禮事大賔客之饗食亦如之大喪比外內命婦之朝莫哭不敬者而苛罰之凡王后有􅉔事於婦人則詔相凡內事有達於外官者世婦掌之比本又作庇匹氏反莫音暮相息亮反世婦每宫卿二人其職以掌世婦之事為主故名官曰世婦然則自后而下有三夫人九嬪之屬而名獨以掌世婦之事為主者以三夫人無職而九嬪其職亦己尊故也女宫鄭氏謂刑女給宫中事者宿戒於祭前豫告使齊戒也比其具則次序所祭祀當具之於物若濯溉齍盛之類是也內宰詔后禮樂之儀則見周旋動容者也世婦詔王后之禮事以祼獻薦徹之節也非特儀而已內小臣擯詔后之禮事則以詔而擯之其詔蓋始於世婦內小臣又從而擯詔焉帥六宫之人共齍盛者帥世婦女御也蓋世婦率女御濯溉為齍盛女御凡祭祀贊世婦故也夫辨六齍之名物與其用使六宫之人共奉之者小宗伯也世婦之則帥之而已外宗凡外女之有爵內宗凡內女之有爵者其職主於佐后世婦又從而相其禮事大賔客之享祀后亦有亞祼亞獻之禮外內宗佐之而世婦亦相之也故曰亦如之以先王之承賔猶承神故也故於王后之禮事則以言詔之於外內宗之禮事則以事相之尊卑之序也肆師大喪令外內命婦序哭世婦則比其已哭者而己夫哭者所以致其哀思之情內必有敬心焉不敬則有慢心故苛責而罰之王后所以母天下其體至尊其形至佚於婦人無所事拜焉有拜事於婦人惟大喪而已喪大記曰夫人亦拜寄公夫人於堂上由此推之則后亦拜夫人於堂上可知矣世婦於后拜則以言詔之以事相之而已內事有達於外官者則亦六宫有徴求於外也世婦則主通之使相共授焉夫內外之通令有內豎掌之內事有達於外官者世婦又掌之如此則其出入也有節而內外辨矣夫世婦每宫卿二人六宫則凡十二人矣蓋祭祀賔客之禮事其薦獻之節交接之儀其其禮縟而其事繁則命宫卿之數如此之多凡以明禮事不可簡而忽也如此是乃所以稱其事也內宗掌宗廟之祭祀薦加豆籩及以樂徹則佐傳豆籩賔客之饗食亦如之王后有事則從大喪序哭者哭諸侯亦如之凡卿大夫之喪掌其弔臨傳直專反從才用反內宗王同姓之女有爵者婦人無外事故使之掌宗廟薦加豆籩加豆加籩以象饋之有加則醢人籩人所謂加豆加籩之實者是也必使內宗薦之則以其同族故也卒食之禮以樂徹於造所以助氣體之飬先王以生事死以存事亡故祭祀徹豆籩亦以樂焉方其以樂徹豆籩內宗則佐后外宗佐后而內宗亦佐者則后徹傳之內宗內宗傳之外宗外宗傳之有司迭相佐也先王承賔如承神故饗食賔客惟不入牲其他皆如祭祀則徹豆籩亦如祭祀也王后有事則從者則吉凶之事皆在焉大喪序哭者則與宫中之哭者序焉哭諸侯亦如之則諸侯來朝而卒於王國者諸侯以王為天而服斬衰則王視諸侯如子而亦哭之也哭之之禮則司服所謂王為諸侯緦衰者是也內宗亦為之序哭者故亦如之凡卿大夫之喪掌其弔臨亦以同族故也世婦言掌弔臨於卿大夫之喪而內宗凡卿大夫之喪掌其弔臨則凡喪皆往矣則亦以其同族故也外宗掌宗廟之祭祀佐王后薦玉豆視豆籩及以樂徹亦如之王后以樂羞齍則贊凡王后之獻亦如之王后不與則贊宗伯小祭祀掌事賓客之事亦如之大喪則敘外內朝莫哭者哭諸侯亦如之外宗王異姓之女有爵者內宗以其同族故薦加豆籩外宗異族故佐贊后及宗伯而已視豆籩者非特佐后而又視其實羞齍則薦其簠簋之實方其作樂而羞齍亦外宗贊之也王后之獻則亞王獻禮亦外宗贊之也王后不與則有故而宗伯攝其禮故贊宗伯大宗伯之職曰凡大祭祀王后不與則攝而薦豆籩徹謂此也小祭祀掌事則宫中之祀五祀之類是也內宗賓客之享食佐后傳豆籩外宗賓客掌事如小祭祀之事則非特傳豆籩之事而已凡賓客之事皆贊后也內宗大喪序哭者則與宫中之哭者序焉外宗序內外朝暮哭者則大喪序內女外婦之序哭者也冡人掌公墓之地辨其兆域而為之圖先王之葬居中以昭穆為左右凡諸侯居左右以前卿大夫士居後各以其族出於一則守以家反於一則包以冡有形而纍者皆然故冡之字從豕從勺則封土為壠山頂之髙亦若冡然故爾雅曰冡凡地類之髙者皆謂之冡所謂冡君冡宰冡婦者以其髙故也禮大夫家有家乃有冡凡掌公墓之地者所以謂之冡人必命之以人者蓋由人之道有形而纍者乃有是事而過是則非冡之所能包矣謂之公墓之地則其屬於公而非私有之也自天子至於大夫士皆葬於此地冡人則掌其墓地焉貴賤尊卑左右前後各有兆域而不可相侵入考辨其地圖為地形及丘壠所處皆有圖葬者則依圖而授之地也昭穆之序非特施諸宗廟而已葬亦有焉此上下尊卑之分所以嚴而不可亂也且人之生則聚而相親死則辨而相逺茍不以族而相葬是何異豚子之食於死母乎少焉眴若皆棄之而走矣先王制為合族之禮非特施於生者至於死者皆使之以類相從此仁厚之情篤於親親而民德由之歸於厚矣諸侯縣內之諸侯也諸侯有君道尊於卿大夫士故居左右以前卿大夫士卑於諸侯故居後各以其族則亦以昭穆焉凡死於兵者不入兆域凡有功者居前以爵等為丘封之度與其樹數事親孝然後忠可移於君孝者仁之本忠者義之實也死於兵者雖得於義之實而於仁之本有虧焉以其不能自全其德所以絀之使葬不得入兆域馬夫死政者既養其老孤而又享之所以勸之也凡死於兵者不入兆域所以絀之也勸之以明其有義絀之以明其非孝欲人兩得之而已必於葬絀之則父母全而生之子全而歸之然後為孝故也以昭穆為左右各以其族尚親也凡死於兵者不入兆域尚德也凡有功者居前尚功也以爵等為丘封之度與其樹數尚貴也蓋先王之所以治死者如此大喪既有日請度甫竁遂為之尸及竁以度為丘隧共喪之窆器及葬言鸞車象人及窆執斧以涖遂入藏凶器正墓位蹕墓域守墓禁凡祭墓為尸凡諸侯及諸臣葬於墓者授之兆為之蹕均其禁請度之度待洛反天子七月而葬大喪既有日於七月而定喪之日也冡人於是請量度所竁之地始竁之則祭以告后土冡人為之尸也凡祭為尸皆取所祭之類故宗廟之尸則以其昭穆之間山林之尸則以山虞竁墓之尸則以冡人以度為丘隧者隧墓道也負土曰隧無負土曰羡天子有隧諸侯以下有羡道故僖十五年晉侯請隧不許故封土為丘負土為隧其廣袤所至皆有度焉喪之窆器者窆下棺也窆器則下棺豐碑之屬也冡人則共之鸞車遣車也巾車所飾亦設以鸞旗故曰鸞象人結芻人孔子所謂為芻靈者是也言鸞車象人言之於匶而治役冡人於下棺執斧涖焉所以威衆也凶器明器也既窆冡人遂入而藏之正墓位則正其所居左右前後也蹕墓域則若墓大夫之巡墓厲也守墓禁則若墓大夫居其中之室以守之凡祭墓為尸則非特甫竁為之尸也凡諸侯及諸臣葬於墓者授之兆則授之兆域所至之地使之自竁窆均其禁則均其地守之禁也墓大夫掌凡邦墓之地域為之圖令國民族葬而掌其禁令正其位掌其度數使皆有私地域凡爭墓地者聽其獄訟帥其屬而巡墓厲居其中之室以守之冡人墓大夫皆以下大夫為之掌公墓之地者則名官謂之冡人掌凡邦墓之地者則謂之墓大夫焉蓋冡以丘壠之度言之自天子以下其墓皆有封土之度此掌公墓之地者所以名官以冡人也凡邦墓之地域則萬民所葬之地欲其致孝以思慕其親焉故名官以墓大夫也必以大夫名宫則萬民之墓皆有私地或欲其無相侵爭必其智足以帥人之大者然後可以為之故爵以下大夫而名官亦以大夫也公墓之地其徒百有二十人而墓大夫其徒則二百人者以民之類衆非多其徒不足以給其事也然邦墓地域禁令度數皆掌於墓大夫又帥屬巡墓厲居其中之室以守之與後人自求地家自置守者異矣職喪不解大司樂掌成均之法以治建國之學政而合國之子弟焉凡有道者有德者使教焉死則以為樂祖祭於瞽宗孟子曰仁之實事親是也義之實從兄是也禮之實節文斯二者是也樂之實樂斯二者是也孔子亦曰興於詩立於禮成於樂蓋君子之所性由中出以言之則未至於樂不可以言學之成也掌成均之法以合國之子弟而教必職之大司樂者其以此與昔舜命夔興樂以教胄子亦此意也記曰於成均以及取爵於上尊成均蓋五帝學名也教學之道成其虧均其過不及而已故其命名如此夫自天之莫為言之則性之在人無成與虧也自人之或使而言之則有成與虧也自合而渾以言其同則道之在人無過與不及也自離而散以言其異則道之在人有過與不及也莊子曰是非之彰道之所以虧也果且有成與虧乎哉果且無成與虧乎哉由此觀之則人之性雖有無待於外德不殊天降之才一誘於物則孰能全之而使不虧哉則成者所以成其虧而使之全也中庸曰道之不明也我知之矣知者過之愚者不及也道之不行也我知之矣賢者過之不肖者不及也由此觀之則人之生雖受中於天地降衷於上帝一流於偽則孰能折其過而使之就乎中勉其不及而使之企而及於中哉則均者均其過與不及而使之中矣成均之學所以教人者如此則性命之理實寓於度數之間矣大司樂之所掌所以又有法焉以治建國之學政則學者道之所自出道不可以須臾離則學不可以一日廢於天下故建國則有學焉夫有教則有學有學則有政政所以正之而凡治教勸阻而施之學者皆政之事夫古之仕者世祿而國之子弟者先王將與共天位治天職則不可以不教大司樂掌成均之法以治建國之學政而合國之子弟固其理也然教者人之模範模不模範不範則器亦隨窳而不良則教國子者非有道有德者又烏可哉道者人之所同由而由之者或不能以自知德者人之所同得而得之者或不能以自明惟和於道者然後能教人而使之由於道順於德者然後能教人而使之迪于德然則保氏飬國子以道所謂有道者教之也師氏以三德教國子所謂有德者教之也死則以為樂祖祭於瞽宗者禮明堂位曰瞽宗殷學也言主於樂教瞽所宗焉古之人於田則祭田祖於馬則祭先牧於飲食則祭先食於飬老則祭先老皆所以示其不忘本也又况以道德而教者其不然乎死則以為樂祖祭於瞽宗所以示其不忘於所教與然必祭於瞽宗則主以樂教故也夫國子之合無政則亂無教則怠其正之也移屏而已無成均之法則人性失中其教之也記誦而已無道德之師則人心失正有教焉以使之學有政焉以使之稟其治之以中法迪之以中德又皆本於道德之師而且成之以樂則先王之教國子不其至乎以樂德教國子中和祗庸孝友以樂語教國子興道諷誦言語以樂舞教國子舞雲門大卷大咸大㲈大夏大濩大武國子賢者之類功臣之世也謂其賢也則將進之以位謂其貴也則將授之以職德不足則不可與有為言不足則不可與有應容不足則不可與有接則大司樂之教樂德樂語樂舞者其可緩乎以樂成其德則謂之樂德以樂達其語則謂之樂語以樂節其舞則謂之樂舞樂德有六中以本道之體由是而達其義以為和逹其敬以為祗庸以本道之用由是而充其愛以為孝充其敬以為友此樂德之序也樂語有六興道諷者樂語之用也誦言語者樂語之體也以用言之興者感物而興也諷者風被而使動也非興非諷直道其事則謂之道而已以體言之彼有言而吾誦之則謂之誦彼有問而吾答之則謂之語非誦非語自形諸言則謂之言也此樂語之序也樂舞有六雲門大卷者黃帝之樂也雲者天之施門言其所出卷言其所聚蓋言其德如雲之出則曰雲門能聚物類則曰大卷又謂之大章者章之也大咸者堯之樂也亦或謂之咸池咸言其以虛感物也池者治之澤也大咸言其感物無不周焉大㲈舜之樂也舜之德莫大於紹堯故曰大㲈又謂之九㲈則言其九成也皇以道而作樂也升之以法象乎天故以雲門言之帝以德而作樂也降之以效法乎地故以咸池言之大夏者禹之樂也功業莫大於禹故曰大夏夏以言其文明也與書號禹曰文明同意大濩者成湯之樂也言其以寬代虐而有所獲也大武者武王之樂也言其誅暴伐亂而有所制也湯武一道也而武王之樂名以武者以我武惟揚於湯有光故也夫時異則異德世異則異功發於聲音形于動靜凡以稱此此樂舞之序也然則德主於中者也有德必有言有言必有容言與容正於外者也入道之序中有主而後中正外有正而後行而樂自內循而逹之也此大司樂之教所以先之以樂德而以樂語樂舞次之與古之制舞者有大舞小舞大司樂教國子以雲門韶濩之屬所謂大舞也樂師教國子有帗舞羽舞皇旄干人之屬所謂小舞也然則制舞必有大小者蓋古之教國子十三學樂誦詩舞勺成童舞象則樂師所教者十三舞勺之小子也二十而冠始學禮可以衣裘帛舞大夏則大司樂之所教二十之成人故教之以大舞一以順其時一以稱其德也以六律六同五聲八音六舞大合樂以致鬼神示以和邦國以諧萬民以安賓客以説逺人以作動物説音悅陽聲之所合者其管有六謂之六律黃鍾太簇姑洗蕤賔夷則無射是也隂聲之所合者有六謂之六同大吕應鍾南吕函鍾小吕夾鍾是也名之曰律以其述天地自然之氣而宣之也名之曰同以其為律之偶而同于陽也宫商角徴羽所謂五聲也金石絲竹匏土革木所謂八音也雲門至大武所謂六舞也樂之作也六律六同所以考五聲五聲所以成八音八音所以節六舞六舞所以大合樂蓋作樂也至於興舞則所謂六律六同五聲八音無不備也此其所以大合樂歟先王作樂所以道和其和至矣則大同于物故奏之郊廟而天神地示人鬼可得而禮則幽而鬼神由此致也賜之諸侯或將以柷或將以鼗則明而邦國由此和也或奏之鄉射或奏之鄉飲則內客焉萬民由此諧也或奏之燕或奏之饗則外焉賔由此安也九夷八蠻七閩九貉五戎六翟其國之君爵不過子其來朝也與之燕焉樂以此作而逺足以悅逺人也歲十二月合聚萬物而索享之羽裸之族鱗毛介之類所謂動物其祭之也樂由此作則微足以動物也然則先王作樂其和之至無所不通也如此豈偽為哉彼墨子非之奈何致鬼神示作樂所先故易之豫言先王作樂殷薦之上帝以配祖考作動物者樂之餘事故其序如此乃分樂而序之以祭以享以祀乃奏黃鍾歌大吕舞雲門以祀天神乃奏大蔟歌應鍾舞咸池以祭地示乃奏姑洗歌南吕舞大㲈以祀四望乃奏㽔賓歌函鍾舞大夏以祭山川乃奏夷則歌小吕舞大濩以享先妣乃奏無射歌夾鍾舞大武以享先祖凡六樂者文之以五聲播之以八音大音泰蔟七豆反蕤人誰反函胡南反射音亦夾古洽反天道出而有數其始終有彞而不亂其先後冇倫而不可逆三才之所共由三極之所共立莫不冇序先王之作樂也以事乎鬼神亦謂其異位也謂其異德也則其作其歌其舞亦豈能違其序乎分樂而序之故分律而序之則自黃鍾以至于無射也分同而序之則自大吕以至于夾鍾也分舞而序之則自雲門至于大武也其序如此則象其類稱其德考其數著其義莫不具焉天者氣之始而萬物之所本也其用則神而不可測於是乎奏黃鍾而歌大吕所以尚始而貴幽而子亦丑之合也天道逺人而尊其動出與萬物相見其澤則萬物之所同望者也此舞所以用雲門與地者形之始萬物所聚而出焉其體則順而不可易也于是乎奏大蔟而歌應鍾所以尚形而貴順而寅亦亥之合也地近人而親其用也與萬物相接焉其澤則萬物之所同利者此舞所以用咸池與四望者繼地以生成萬物者也物之始乎生則潔齊其成則隂之中而已非潔齊之時不足以格其神非隂中之位不足以稱其德則奏姑洗而歌南吕以祀四望者所以尚明而貴中而辰亦酉之合也其舞以大㲈則象其能繼地也山者以聚飬為功川者以含受為事兆于國外則賓之也故非有賓之之意則不足以致其神非有含聚衆多為實則不足以稱其德則奏蕤賓而歌函鍾以祭山川者所以尚逺而貴實而午亦未之合也其舞以大夏則亦以其文明也先妣者其德能飬物而夷之皆有則也然以從陽為正順祖為義故非取其夷物有則不足以明均飬之德非用正陽之吕不足以明其順從之序于是乎奏夷則歌小吕以享先妣者所以尚親而貴柔而申亦己之合也其舞以大濩則象其能有養也先祖者有自強之德而創業垂統為可繼也故非取帝出之方則不足以明其始事之功非用六律之終則不足以明其可繼之業于是乎奏無射歌夾鍾以享先祖所以尚尊而貴勤而戍亦卯之合也其舞以大武則象其能有功也然則先王之於祭享祀分樂而序之象其類稱其德考其數著其義者蓋如此也所謂奏者播之于器也歌者詠之于聲也舞者動之于容也奏以播其器歌以詠其聲舞以動其容則其樂備矣文之以五聲播之以八音則樂之作也以五聲八音為之故也五聲必相雜然後成文故言文之以五聲八音必宣奏然後有音故言播之以八音然五聲所以成八音故先五聲而後八音文之以五聲而不言商詩之時邁曰懷柔百神商以剛為主非所以懷柔之也故不用焉凡六樂者一變而致羽物及川澤之示再變而致裸物及山林之示三變而致鱗物及丘陵之示四變而致毛物及墳衍之示五變而致介物及土示六變而致象物及天神郊特牲曰蠟者索也歲十二月合聚萬物而索享之也凡此六樂所致蓋皆合萬物而索享之之時也天曰神地曰示物曰物天神地示與夫萬物一歲之間有功于人亦厚矣先王以蠟祭索享而報之必有以致其神使至焉吾將致之以外心之禮則禮者所以事神也而未必能致之將欲致之以內心之誠則誠者所以感神也而未必能致之將欲致之莫若乎樂樂者為同同則與物為一而莫之異樂者敦和和則與物為順而莫之乖浮以祭乎上凡髙逺者無不率沉以窮乎下凡深厚者無不究以之而致天神則天神降以之而致地示則地示出以之而致萬物則萬物格此六樂所以一變始而六變終所致者所以為偹矣然其所致之序則以難易為先後也羽物輕疾而川澤則虛此致之易也故一變而致羽物及川澤之示裸物蛙蚓之屬比羽物為重遲山林草木所集比川澤為實致之則稍難故俟乎再變鱗物水族也又重遲于裸物丘陵積土之敦實髙大又實于山陵故俟乎三變毛物虎豹之屬其體又重遲于鱗物水涯之墳下平之衍水土交而其體卑又實于丘林故俟乎四變介物龜鱉之屬尤為重遲土示則所執在下而尤為實故俟五變致之象物恍惚無形天神則逺人而尊其致之尤難于介物與土示矣故六變而後致之此其序也凡樂圜鍾為宫黃鍾為角大蔟為徵姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣凡樂函鍾為宫大蔟為角姑洗為徴南吕為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至於澤中之方丘奏之若樂八變則地示皆出可得而禮矣凡樂黃鍾為宫大吕為角大蔟為徴應鍾為羽路鼓路鼗隂竹之管龍門之琴瑟九德之歌九㲈之舞於宗廟之中奏之若樂九變則人鬼可得而禮矣記曰十二律旋相為宫蓋十二律皆具五聲先王于祭祀其用樂也各以其義類取聲而用之此天神人鬼地示之樂宫商角徴羽所用之律吕所以不同也圜鍾正東方之律致天神以之為宫則以天無乎不覆求而禮之宜于帝所出之方也函鍾西南方之律也致地示以之為宫則以地無乎不載求而禮之宜以助致養之方也黃鍾正北方之律也致人鬼以之為宫則以死者北首求而禮之宜以其所首之方也園鍾為宫而以黃鍾為角大蔟為徴姑洗為羽者是三者律吕之相繼也相繼者道之序也天任道故也函鍾為宫而以大蔟為角姑洗為徴南吕為羽者是三者律吕之相生也相生者功之自地終功故也黃鍾為宫而以大吕為角大蔟為徵應鍾為羽者是三者律吕之相合也相合者情之交人尚情故也靁鼓靁鼗以雷為天聲孤竹之管則以陽為竒雲和之琴瑟雲門之舞則以雲為天之施圜丘天之象也其日用冬至亦以陽生于此故也靈鼓靈鼗則以靈為地德孫竹之管則以隂為衆為小空桑之琴瑟則以隂道為常乏咸池之舞則以池為地之澤方澤地之象也而其日用夏至亦以隂生于此故也路鼓路鼗則以路為人道之大也隂竹之管則以人道左宗廟而又致以冬之日至又用陽竹之管則純于陽矣非所以致鬼以隂竹則以隂而和陽也龍門之琴瑟則以龍能仁而人道主于仁故也又龍能變化人道之極也九德之歌九㲈之舞則以人之所致飬乎內外而盡善盡美者無以加此也然致天神以六變致地示以八變致人鬼以九變者蓋道之在天為隂陽隂陽之數至於十有二而後周焉故時運而為十有二月支别而為十有二辰先王之制律也通乎月之氣本于辰之位即律以知月即月以知辰即辰以起數自子至已六數皆陽也凡陽數之所起至少隂之申而已盡自午至亥六者皆隂也凡隂數之所起至少陽之寅而必止圜鍾在卯太玄以為卯數六是由卯至申其辰數六而止焉者也若樂六變得非圜鍾之數于此而盡與數盡矣則所以禮天者不可有加矣天神皆降不亦宜乎函鍾在未太玄以為未數八是由未至寅其辰八而止焉者也若樂八變得非函鍾之數于此而盡與數既盡則其所以禮地者不可有加矣地示皆出不亦宜乎黃鍾在子太玄以為子數九是由子至申其辰數九而止焉者也若樂九變得非黃鍾之數于此而盡與數既盡則所以禮人鬼者不可有加矣人鬼之享不亦宜乎然則欲極之數而必本于三宫者衆樂以是為主故也蓋宫於五行為土土則無不包于五音為君君則無乎不制為宫之樂其數既盡則衆樂之所止理則然也書曰簫韶九成樂師曰樂成則告偹而此則謂之變者何也蓋節奏俱備謂之成備而更新謂之變或曰成或曰變亦互相備而已然言天神皆降則凡在天者若昊天上帝日月星辰風師雨師之屬莫不以類而畢降矣言地示皆出則凡在地者若大示社稷五祀五嶽四瀆山林川澤四方百物之屬莫不以類而畢出矣于人鬼則曰可得而禮而不曰皆至者蓋天陽也位乎上而有定氣地隂也位乎下而有定形惟求之盡其道則上者降下者出至于先王先公后夫人之屬方其死也魂氣歸于天體魄降于地無不之無不為求之尤難孝子之心拳拳然惟患其不至故特曰可得而禮則其禮之也若可得焉耳以此見先王致孝于親而常有不足之意矣不然則祀人鬼之禮何為獨致其詳哉或以鬯求諸隂或以􅌊蕭求諸陽以今日之祭為未盡而明日又求諸祊焉以此推之惟盡禮以求之而不敢必其皆至也固其宜矣函鍾應鍾未之氣處于坤萬物皆致養函受而聚矣故謂之函鍾亥之氣則午美極矣純用事而不逆乎陽故謂之應鍾凡樂事大祭祀宿縣遂以聲展之王出入則令奏王夏尸出入則令奏肆夏牲出入則令奏昭夏縣音懸宿縣者祭前之夕列于筍簴也以聲展之者五聲十二聲皆展之以調其器也夫祭祀所以致和以格神者存乎聲聲之所以和者存乎器聲之出乎器者茍或不和則有乖而已則天之大神地之大示人之大鬼其可得而格之乎然則大祭祀者尤致敬之至故宿縣遂以聲展之而異于他祭也王夏肆夏昭夏三者皆詩篇之名古者以詩為樂章各依其人而奏焉九夏之文雖不見于後王以理推之所謂王夏者言王之德而已宜用于王故王出入則奏王夏所謂王出入者謂王于祭祀之時出入乎廟門也直而自遂之謂肆尸以象乎神則有直而自遂之意故尸出入門則奏肆夏所謂尸出入者謂祭祀之時尸出入乎廟也神散而為明明散而為昭牲以致味行乎愛敬而親鬼神者在此宜致其精明以歆鬼神焉故牲出入則奏昭夏所謂牲出入謂王祭祀之時迎牲以出入乎廟門也尸出入奏肆夏而古者享元侯亦奏肆夏以承賔之禮猶承神故同用肆夏也謂之肆夏則夏大也文明也以樂歌之文明莫大乎此故也帥國子而舞大饗不入牲其他皆如祭祀大射王出入令奏王夏及射令奏騶虞詔諸侯以弓矢舞騶側留反大司樂以樂舞教國子舞故凡樂事用舞則帥國子而舞也大饗之禮殺牲于廟門之外故不入牲然承賔事之大猶承神也故筵國賔于廟不見凶服刑人祼獻之禮皆如祭祀焉用其主故也射禮有三有大射有賔射有燕射所謂大射將祭而擇于士之射于禮大故謂之大射其射在于西郊之虞庠王之出入令奏王夏以王德為主也及射令奏騶虞則以樂仁而殺以時為義也鐘師掌九夏凡樂以鐘鼓奏九夏則大司樂所令者令鐘鼓奏之也詔諸侯以弓矢舞者則諸侯之來助祭而預王之射也王以六耦射三侯其耦王射者必詔以弓矢舞則以天子之射其節比于樂而諸侯之舞亦所以應王政也大司樂則詔其升降揖遜之儀焉儀禮大射命三耦取弓矢有升降之儀者亦以此也王大食三宥皆令奏鐘鼓王師大獻則令奏愷樂凡日月食四鎮五嶽崩大傀異災諸侯薨令去樂大札大凶大災大臣死凡國之大憂令弛縣凡建國禁其淫聲過聲凶聲慢聲大喪涖廞樂器及葬藏樂器亦如之宥音又傀音詭去上聲王日一舉所食者少牢乃常食也大食者大牢非常食也玉藻曰天子日食少牢而朔食大牢所謂大食者其朔日之食乎夫人之養也心志和而後氣體從之食飲膳羞所以飬氣體也侑之以樂所以和其心志而致氣體之飬焉又况王者憂樂以天下為事無大荒無大札無天地之災無邦之大故而主可以樂之時此所以大食之三宥大司樂皆令奏鐘鼓也鐘鼓者樂器之大所以節樂豈非稱其禮之大與詩或言鐘鼓既設或言於論鼓鐘者亦舉其大者而已膳夫言王日一舉鼎十有二物皆有俎以樂侑食此謂常食之禮也至于王齊日三舉亦大食之禮與王師大獻令奏愷樂者夫心之為物在志為喜愷者喜之屬也失志而懼則腎或使之也失志而憂則肺或使之也失志而怒則肝或使之也無懼然後有喜無憂然後有樂無怒然後有愷南風謂之凱風者天地之怒氣散焉故也王師大獻奏愷樂者人之怒氣釋焉故也樂師軍大獻教愷歌遂倡之鎛師軍大獻則鼓其愷樂然則大司樂所令者令其屬而已所謂王師者王親征伐之師也蓋非王親征伐而奏愷則非大司樂之所令也王親征伐不言軍而言師者不嫌其不成軍而軍亦不足稱也故稱師而已王者憂樂以天下凡日月食至於凡國之大憂令弛縣此所謂憂以天下也憂之日短則令去樂而已憂之日長則令弛縣焉或曰異災或曰大災者異災則非常矣然不必大大災則非小矣然而不必異傀之字從人在左從鬼在右鬼勝人也鬼勝人則鬼有靈饗而傀異所以出也大傀又傀異之大者也或去樂或弛縣亦稱其事變而已夫樂者聖人之所樂也可以善民心其感人也深其移風易俗故先王著其教焉中正則雅淫哇則鄭凡建國禁其淫過凶慢之聲者所以尚中正也淫聲則不正過聲則不中凶聲則不善慢聲則不肅凡此皆大司樂之所禁也顔淵問為邦孔子告以放鄭聲者亦以此也廞樂器者若笙師廞笙典庸器廞筍虡籥師廞樂器而大司樂皆涖之也樂師掌國學之政以教國子小舞凡舞有帗舞有羽舞有皇舞有旄舞有干舞有人舞帗音拂一音弗大司樂中大夫二人樂師以下大夫四人為之則所以佐大司樂教其屬者也故以樂師名官大司樂以樂舞教國子自雲門至于大武六者舞之小者也于樂師言小舞則知大司樂所教者其舞之大者與析衆繒以成體其用也有衣被之象有帗除之名者帗舞也析衆羽以成體其用也有分辨之形有翼蔽之義者羽舞也皇則隂類而為其類之長者也隂中之陽也取其羽以致飾焉者皇舞也氂牛之為物土獸也強而順者也取其旄以致飾焉者旄舞也干舞則兵舞人舞則手舞而已凡此皆樂師之所教而國子之所學者與樂師有六舞而舞師之所教止于四舞而無旄舞與人舞者蓋樂師教國子小舞故凡舞之小者皆教之舞師教其所用者故止於四舞而已舞師先教兵舞而樂師則先教帗舞者舞師以所用祭祀大小為先後樂師以所教之序為先後教則以用之所能任者先之若所謂十三舞勺成童舞象二十舞大夏同意人舞則非舞之正故列于數者之末教樂儀行以肆夏趨以采齊車亦如之環拜以鐘鼓為節盛德之至非特動容周旋中于禮而其節又比于樂焉所謂禮樂不可斯須去身也則王之進退一成規一成矩有可觀之容可象之則矣然則樂師之所教者教作樂者而已鐘師曰凡樂事以鐘鼓奏九夏謂此也爾雅曰堂上謂之行門外謂之趨堂上之行而肆夏作門外之趨而采齊作一行一趨皆有儀其儀則與樂節相應不可以不豫教焉行則奏肆夏者行則緩緩則有直而自遂之意故奏肆夏趨則采齊者趨則疾疾則欲齊而整肅焉故奏采齊蓋肆夏則取其直而自遂采齊則取其齊而整肅也王之行趨既然而車之疾徐如此故曰車亦如之且王于賔客饗食則在廟其燕則在寢或步或乘其出入皆有儀則王之進退豈茍乎哉玉藻曰趨以采齊行以肆夏先趨而後行者以外而入內也此先行而後趨者從內而出外也行趨以肆夏采齊此王接賔之儀環拜以鐘鼓為節又是賔拜之儀也環拜謂列而拜以拜者非一也必以鐘鼓為節以環拜者禮之大也有大禮必有大樂以和之則鐘鼓者樂之大故也鼓陽聲以作之鐘金聲以止之作止應鐘鼓則其儀不忒矣凡射王以騶虞為節諸侯以貍首為節大夫以采蘋為節士以采蘩為節夫射者所以觀德也禮樂皆得謂之有德其容體必貴夫比于禮其節必貴乎比于樂此王與諸侯卿大夫之體所以有樂章以為之節也騶虞之詩言搜田以時仁如騶虞則王道成則王以騶虞為節者樂仁而殺以時也射儀載貍首之詩曰曾孫侯氏四正具舉小大莫處御于君所則諸侯以貍首為節者樂御而射以禮也采蘋之詩言能循法度則大夫以采蘋為節者樂循法也采蘩之詩言不失職則士以采蘩為節者以樂不失職也記曰君使士射不能則辭以疾則射者士之職也此所以有取于不失職之義與凡樂掌其序事治其樂政凡國之小事用樂者令奏鐘鼓凡樂成則告備詔來瞽臯舞及徹帥學士而歌徹令相饗食諸侯序其樂事令奏鐘鼓令相如祭之儀燕射帥射夫以弓矢舞樂出入令奏鐘鼓凡軍大獻教愷歌遂倡之凡喪陳樂器則帥樂官及序哭亦如之凡樂官掌其政令聽其治訟序事謂陳樂器及作樂先後之序也凡有所正者皆政也樂政則正其器與其聲之類也凡國之小事用樂者令奏鐘鼓謂小祭祀之事令奏鐘鼓則令其屬也小事樂師令之則大事大司樂所令也禮以陳為備樂以奏為備故禮則告備而後行禮樂則樂成而後告備凡樂一變謂之一成如天神之樂成于六變地示之樂成于八變人鬼之樂成于九變也必告備焉使知其成之數也禮有體故以陳為備樂出虛故以奏為備此禮樂告備之别也詔來瞽臯舞者臯緩也詔瞽使來而詔舞使緩也蓋瞽無目非可以觀視舞有節非可以過于速也徹祭必歌雍者其詩曰有來雍雍至止肅肅相維辟公天子穆穆取其和而敬故也人之情樂于始者或倦于終篤于暫者或怠于久于祭之終猶不失其敬以和此誠之至也歌雍學士也樂師則帥之而已令相則令相瞽者也饗食諸侯序其樂事者饗以飲為主食以食為主序其樂則其作樂亦有先後之序也令奏鐘鼓令相如祭之儀則承賔猶承神也燕射謂王與羣臣燕而行射禮也射夫衆耦之人也王以六耦諸侯以四耦大夫士以三耦帥其耦而治之者射人也帥之使舞者樂師也大司樂詔諸侯以弓矢舞諸侯尊故也樂師帥射夫射夫卑故也飲燕之間必用射豈特為以禮觀德而已抑又為有事之備焉夫武不可忘又不可黷先王寓于為禮之際則人習之而不知其為武偹矣樂出入鄭氏謂笙歌舞者及其器是也必奏鐘鼓所以為之節也大司樂王師大獻令奏愷樂故樂師則教愷歌記曰比音而飾之及干戚羽毛謂之樂言令愷樂則歌在焉樂師教愷歌而已歌出于人聲有倡則有和故樂師倡之使所教之瞽矇和焉然言凡軍大獻則非必王親伐之師也言歌不言樂則以其事小于王師之大獻故也其言軍也亦以明非成軍無大獻之禮也凡喪陳樂器則明器也陳而不作猶大喪之廞也之死而致生之不知而不可為所以陳之而已序哭亦如之亦樂師帥樂官也小宗伯及執事視葬獻器遂哭之樂師又帥樂官而哭樂器以明先王之盛德感人之深其生也榮其死也哀故睹器而思其人則哭其哭也必使樂師帥而哭亦以明哀樂之相仍舞用翣亦此意也凡樂官掌其政令聽其治訟樂師總焉故也周禮詳解卷二十
