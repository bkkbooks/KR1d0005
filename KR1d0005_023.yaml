body:
  text: 周禮詳觧卷二十三宋王昭禹撰小祝掌小祭祀將事侯禳禱祠之祝號以祈福祥順豐年逆時雨寜風旱彌烖兵逺辠疾大祝掌六祝之詞以事鬼神示則祭祀之大者也非祀大神享大鬼祭大示皆祭祀之小者也大祝祝官之長以下大夫為之故所掌者大小祝祝官之貳以中士為之故所掌者小侯以候福之將至者也禳以却禍之方来者也禱先事而求之也祠以後事而報之也言小祭祀將事而繼之以侯禳禱祠之祝號則小祭祀所奉祀者亦祝號而已故并侯禳禱祠言之也祈福祥則大祝所謂吉祝也神之所為謂之禍福天之所降謂之烖祥耗則為禍衍則為福逆則為灾美則為祥祈福祥則欲有福而無禍有祥而無灾也順豐年則大祝所謂順祝也豐年出于天先天而致之者王也後天而順之者祝也逆時雨寜風旱則大祝所謂年祝也時雨以候而知之也故逆之風旱陽亢之過也故寜之彌烖兵逺辠疾則大祝所謂祀祝也灾天患也兵人難也故彌以止之辠自貽之毒也疾癘氣之作也故逺以避之凡此莫非神之所使也小祝掌侯禳禱祠之祝號則為之候福而却灾先事而求後事而報固其宜也然則祝者陳信于鬼神而無媿詞者也于是六者豈徒尚其虚拘之文哉盖人事盡矣則所以相之者小祝之官與有力也不偹其本而從事其末則祝之者豈有補哉𫝊曰有徳之君内外不廢上下無怨動無逆事其祝史薦信無愧心矣是以鬼神用享國受其福祝史與焉大祭祀逆齍盛送逆尸沃尸盥贊隋贊徹贊奠凡事佐大祝大喪贊渳設熬置銘及𦵏設道齍之奠分禱五祀大師掌釁祈號祝有冦戎之事則保郊祀於社凡外内小祭祀小喪紀小㑹同小軍旅掌事焉齍音咨盥音管齍盛王所以親耕而自致者在是考大祭祀小祝則逆之所以尊之也五官奉牲而六宮之人奉齍則牲事尊于齍矣故大祝逆牲而小祝逆齍盛大者其事畧小者其事詳故大祝逆尸而小祝送逆尸送徃而迎來也不曰迎而曰逆者猶逆暑謂之逆所以尊之也盥所以致潔沃尸盥則尸盥而為之沃也贊隋則大祝所謂隋釁而小祝則贊之也贊徹則大祝既祭令徹而小祝于徹又贊之也贊奠司尊彝奠爵而小祝贊之也凡事佐大祝以其職主于貳大祝故凡事皆佐之也大喪贊渳則王始崩大祝以肆鬯渳而小祝贊之也熬熬榖也喪大記所謂熬君四種八筐是也設熬則設于棺旁所以惑蚍蜉也銘銘旌也銘旌者識之使不忘焉檀弓曰銘明旌也盖以死者為不可别故以其旗識之愛之斯録之矣及𦵏設道齍之奠分禱五祀者道齍之奠謂行奠也既夕禮所謂設大遣奠是也分禱五祀則分遣奠之牲體以禱五祀者也盖王生在宫出必告五祀故將𦵏而行以禱之也王有七祀而此止言五祀則司命大厲王平日出入未嘗告焉故也大師掌釁祈號祝則左傳所謂軍行祓社釁鼓祝奉以從之也盖軍行殺牲以血釁鼓以禦妖釁而求其所㫁焉故謂之釁祈小祝則號啟焉而後祝也有冦戎之事則保郊保神壝之在郊者祀於社不在郊無所事故祀之而已保郊所以防患祀社所以弭兵大祝以大名官故所掌皆事之大者小祝以小名官故祭祀喪紀㑹同軍旅皆掌其事之小者焉尊卑之辨也喪祝不解甸祝掌四時之田表貉之祝號舍奠於祖廟禰亦如之師甸致禽於虞中乃屬禽及郊饁獸舍奠於祖禰乃歛禽禂牲禂馬皆掌其祝號甸音田貉莫駕反舎音釋屬音燭禂音誅又音禱甸與田同以包地而田則謂之甸甸祝掌田之祝號而已故甸祝名官貉師祭也設表以祭故謂之表貉甸所以教戰春蒐夏苖秋獮冬狩表貉以祭甸祝則掌其祝號也師甸皆以遷祖行視民以用命也見新傳師甸用師以田也師甸致禽於虞中乃属禽山澤之虞也及郊饁獸者司馬也舍奠於祖禰則由田而祭也歛禽歛而入于公也禂牲則欲牲之衆大也禂馬則欲馬之强壮也禂牲馬之祝號皆甸祝掌之故曰皆掌其祝號餘見傳詛祝掌盟詛類造攻說禬禜之祝號作盟詛之載辭以叙國之信用以質邦國之劑信歃血自明以詔明神者盟也以言相與要之鬼神者詛也類造攻說禬禜則大祝之六祈也夫先王之于民涖之以信則上不敢為欺道之以正則下不敢為偽不正者莫從也不信者莫與也于其所不能免者然後因其情而為之節文焉可使由而不可使知也詛祝之于祝號如此非矯正也不然則君子屢盟亂是用長侯詛侯咒靡届靡究與列國之盟詩人所刺而春秋所以譏也盟詛之詞載之于策則謂之盟詛之載詞國之信用謂王國為載詞以使人信而用之而有先後之叙故曰以叙國之信用邦國之用此也則有劑焉以信其約故謂邦國之劑信既約之于神而又有劑焉以信其約如此則民之欺偽無敢施矣謂之信用謂之劑信則以信之由中出者盟詛亦以輔其自然而已茍自信不足而盟詛之詞亦安用哉是豈先王之意乎彼荀况不明乎此乃曰盟詛不及先王之人也又安足與言周官之政事司巫掌羣巫之政令若國大旱則帥巫而舞雩國有大烖則帥巫而造巫恒祭祀則共匰主及道布及蒩館凡祭事守瘞凡喪事掌巫降之禮匰音丹蒩子都反瘞於例反國語曰古者民神不雜民之精爽不携貳者而又能齊肅衷正其智能上下比義其聖能光逺宣朗其明能光照之其聰能聴徹之如是則明神降之在男曰覡在女曰巫以字法考之巫之字從工從二人從工者通上下也從二人者人為人交神也覡之字從巫從見女為人交神盖以弗覿其見也巫而已盖神降之在男曰巫在女曰覡通而言之皆巫矣楚語之言則是而其謂在男曰覡在女曰巫則誤矣神降之然後在男曰巫在女曰覡故男巫女巫皆不豫為員數司巫則為羣巫之長故掌羣巫之政令雩旱祭也陽亢在上阻隂而旱帥巫而舞雩所以動達隂中之陽也帥巫女巫也不言女則以女巫見之造舞恒造其祈禳之恒事也恒久也其所造事灾弭而後止焉非頃而已故謂之恒也主者神所依匰承主之器也道布則所設之布属于几也故中霤禮曰以布為道布属于几蒩者以茅為蒩而藉也館茅之器也凡祭事守瘞謂祭地示埋牲玉也方祭則守之祭已則去之已上皆神所依而待用者也故使司巫掌其事男巫掌望祀望衍授號旁招以茅冬堂贈無方無算春招弭以除疾病王弔則與祝前衍音延弭與彌同祝與巫皆事神者也祝則以詞而通神也巫則神所降而依之也故巫所以佐祝凡祝所掌之祀禮而巫則掌降其神也此所以掌巫望祀望衍也望祀謂凡祝所祀之神男巫則望而降之也望衍衍謂尸祭之餘尊而祭之也九祭之衍祭是已男巫于衍祭亦望而降其神也授號謂授祭者以祭號大祝所辨六號是也旁招以茅謂以茅旁招四方所祀之神也必有茅者謂其體順理直柔而潔白所以通神明之徳者當如此也冬堂贈謂嵗終設祭于堂以贈送鬼神之為不祥者與贈惡夢之贈同也無方則惟巫之所之無算則惟巫之所用以巫能制神處位而神所降焉故也春招弭以除疾病者招謂招福祥弭謂止禍祟夫福莫長于無禍故招福祥必有以弭禍祟而招弭之道莫先于一身之安强故又繼以除疾病也王弔則與祝前者與喪祝前也盖于喪祝言王弔則與巫前後知其為喪祝也于男巫言王弔則與祝前後知其為男巫也必與祝前則祝與巫聮事故也女巫掌嵗時祓除釁浴旱暵則舞雩若王后弔則與祝前凡邦之大烖歌哭而請暵呼旱反求神以去凶禍謂之烖祓除之類也除舊以致新謂之除若以除疾病之類是也釁則以血塗器厭其妖釁浴則以香草薰浴去其汙穢若此者嵗時有之而女巫則掌之也陽干時為旱旱甚為暵旱暵以隂中之陽不上達陽中之隂不下垂而固隂故不雨而旱暵雩以祈雨也女隂物舞陽事舞女以助達隂中之陽也用物則以接神焉國大旱則舞雩矣又徧焉故司巫帥舞旱暵則不至是也故女巫舞之而已凡邦之大烖歌哭而請者易曰知鬼神之情状盖鬼神之情與人同非歌以樂其神則不足以致神非哭以感其情則不足祈哀有歌有哭然後可以請福而除烖也必以女巫所以懐柔之而已大史掌建邦之六典以逆邦國之治掌灋以逆官府之治掌則以逆都鄙之治治直吏反六典八法八則之書大宰既建之矣而大史又建之以逆邦國官府都鄙之治者盖建者作而立之也大宰以道揆者也大史以法守者也以道揆則所建者法之所自出也以法守則所謂建者書之所自成也史以掌官書為事大史所謂建則特作而立其書焉以道製法有不與焉邦國官府都鄙之治其所逆者非一也所治在大史則大史之所逆也所治在司㑹則司㑹之所逆也所治在小宰則小宰之所逆也非大史司㑹小宰所逆然後大宰以典法則待之凡辨法者考焉不信者刑之凡邦國都鄙及萬民之有約劑者藏焉以貳六官六官之所登若約劑亂則辟灋不信者刑之上之制下以有法也其書皆藏于大史有疑者則使之辨于大史而考之不信者是謂非法其刑之宜矣夫天子制法其下守法是宜承式而行謹度而循茍辨而不信是奮其私智將至于亂法矣然則考其辨法所以伸其在下之情刑其不信所以杜其好辨之源矣司約掌邦國及萬民之約劑若大亂則六官辟藏其不信者殺盖六官所藏約劑有登于司約而藏焉者大史藏焉則以貳六官所藏及其所登者而參考之故也約劑所以輔信今又從而亂之則倍信而奸偽滋啟其書而正之不信則奸偽可知刑之所取也司約不信者服墨刑大亂則殺亦以約其罪之重輕也正嵗年以序事頒之於官府及都鄙易之革曰君子以治厯明時盖時以作事始乎治厯時以厚生始乎明時生民之本於是乎在先王由是以人占天因時以授事以天占人序事以及時以數作厯知辰以辰知星以星知日以日知月以月知嵗年由是而正矣以事係日以日係月以月係時以時係年則事由此而序矣頒之于官府都鄙及是時也凡嵗者自成然後數偹則數以期言也凡言年禾成熟可以數計則年之不足于期也嵗則若馮相氏所謂十有二月廪人以嵗之上下數邦用是也年若春秋書年司稼以年之上下出歛法是也周官之事有畢嵗而序者故必正嵗有不必一嵗而序者故必正年若嵗終則廢置則周嵗而可知矣嵗其可以不正乎若三年大比則不必三期矣年其可以不正乎正嵗年則王以因乎天以序事則下以成乎人上以因乎天之時下以成乎人之事或頒于官府或順于都鄙國之事時定矣然後可以及邦國故繼之以頒告朔于邦國也頒告朔於邦國先王之興人事未嘗不因于天時則授民事時寔王政之所急正嵗年以序事頌之于官府都鄙授事時于王國也頒告朔于邦國授事時于侯國也道之在天日月之運星辰以紀之先王為之厯以推其數為之象以占其運積日以為月積月以為時積時以為嵗凡四時之運以朔月為之始而政事之行以朔月為之首故頒之于邦國而諸侯則以所頒藏于祖廟朔則告廟而受行之如此則邦國之諸侯莫不以偹待時以時興事而無先時不及之患玉藻曰諸侯皮弁聴朔于大廟吉月必朝服而朝則古人重朔如此而文公始不視朔此子貢所以欲去告朔之餼羊然使子貢之說遂行則當時之人有不知告朔之禮者也此孔子所以譏之曰爾愛其羊我愛其禮也閏月詔王居門終月道之在天運而有日月以之而有星辰日月星辰其行也有常度其動也有常數變象見于上則人事興于下先王由是厯象日月星辰以授人時朞三百有閏六旬有六日以閏月定四時成嵗其餘則歸之閏是者所以定四時而成嵗也夫閏非四時之正而四時不得不正然嵗月日時盖有常矣而置閏則無常無常者變也有常者待是而後成王于是乎居門以門者一闔一闢之無常而利用出入有常者待是焉故也盖有常以為利無常以為用者天道之自然王之所為盖以體天而立道也王于四時春則居青陽夏則居總章秋則居明堂冬則居𤣥堂其居固有常矣至閏而居門凡以明此而已玉藻曰閏月闔門左扉立於其中然則王之居門也豈一朝一夕而已哉凡以應天而已則不可以不終月終月者以成其事也大史則詔王而已國語曰吾非瞽史焉知天道大史為能知天道故使之詔王焉揚䧺曰十九年而七閏天之常也盖周天三百六十五度四分度之一而一嵗凡十二月除月之小者而計其餘積三十二月而適得一月之數故三年而一閏五年而再閏八年而三閏十年而四閏十三年而五閏十六年而六閏十九年而七閏自此推之則有徃來不窮之運則王之居門非特取其有一闔一闢之變而又以其有徃來不窮之運焉則大史詔王居門大法固已存于不說之間矣惟王消息盈虚與時偕行而已大祭祀與執事卜日戒及宿之日與羣執事讀禮書而協事祭之日執書以次位常辨事者攷焉不信者誅之大㑹同朝覲以書協禮事及将幣之日執書以詔王大師抱天時與大師同車大遷國抱灋以前大喪執灋以涖勸防遣之日讀誄凡喪事攷焉小喪賜諡凡射事飾中舍算執其禮事與大師之大音泰舎音釋大祭祀與執事卜日者執事大卜之属也祀大神享大鬼祭大示前期十日而太史與大卜之属卜日者以史主占墨故也戒及宿之日與羣執事讀禮書而協事者羣執事則凡有事于祭者皆是也祭之事則繁矣具載于禮書之文故讀禮書則按其文之所載而協其事之所當共者也以史主書故也位常者貴賤之位有常處也執書以次位常亦以史主書以書叙其所當居之處也法者上之所以制下也辨而不信則其罪宜重故刑之事者下之所以事上也辨而不信則其罪宜輕故誅之誅之者以言責之而已夫法者道之顯于可陳之間事者道之㪚于有為之際聖人以道制法史能属法之詞以為書而已聖人以道御事史特能属事之詞于其書而已然此以是考之而彼不疑其所行後以是應之而此不疑其所立則其于辨法辨事也又孰禦之哉如其不然辨法而不信則是謂亂法亂法者無善政辨事而不信則是謂敗事敗事者無成功欲求免先王之刑誅盖不可得矣夫辨法辨事者先王設官置吏考之如是之詳且審故其盛時無一法之不行無一事之不舉若挈裘振領之順若運臂使指之易則其故不為小補矣大㑹同朝覲以書協禮事則其書掌于大史故也餘見傳及將幣之日執書以詔王則行人所謂廟中將幣三享是也盖諸侯將幣有三享之禮而王于受授之際其儀亦多矣故大史執以詔王亦所以協其禮是也大師抱天時與太師同車者太師掌以聲而知天道者也太史掌以書而知天道者也抱天時謂抱以知天時之器也太師于大師則執同律以聴軍聲故太史與太師同車以知天道者同也大遷若盤庚之遷都是也法謂司空營國之法大史抱之先至其所也大喪執法以涖勸防者勸防謂行匶也勸勸力勤防防傾覆喪祝志大喪勸防之事大史執法以涖之而已遣之日讀誄者遣謂柩將行祖廟之庭大奠也誄所以潔其行而人之道成于此大史故于遣之日讀之曾子問曰王誄稱天以誄之然則大史讀誄大師帥瞽作諡王之誄諡成于天道故也郷射禮曰君於郊射則閭中于竟則虎中大夫兕中士鹿中然則中形為兕虎閭鹿之属而鑿中以盛算明善射多算則能勝物而制之以為用也凡射事使大史飾中則以史掌官書而佐中也舍算則以主計書為職也各以其類而已執其禮事則以禮書皆掌于大史故也小史掌邦國之志奠繋世辨昭穆若有事則詔王之忌諱大祭祀讀禮灋史以書序昭穆之俎簋大喪大賓客大㑹同大軍旅佐大史凡國事之用禮灋者掌其小事卿大夫之喪賜諡讀誄奠音定邦國之志謂志其土地風俗之書掌之以備王之觀覽也誦訓掌道方志則非徒掌之又道之于王也小史于邦國之志則掌之而已父謂之昭子謂之穆父子相代謂之世世之所出謂之係奠係世以知其本所出辨昭穆以知其世序凡此皆有其書小史則奠而辨之也忌謂先王之終日諱謂先王之名忌則其所不為諱則在所當辟故有事皆詔王也然則出行則詔所忌祭祀則詔所諱矣大祭祀讀禮法則大史戒及宿之日與羣執事讀禮書而恊事是也俎以盛牲簋以盛粢其先後有序多寡有數小史掌叙之而其序俎簋則以大史與羣執事讀禮法為節故也小史所以佐大史而掌小事也故言佐大史掌其小事也馮相氏掌十有二嵗十有二月十有二辰十日二十有八星之位辨其叙事以㑹天位馮音憑相息亮反掌嵗月辰日星之位而名官曰馮相氏者盖無體無色則不可相凡有體有色者皆可得而相焉嵗月辰日星既有位矣其氣之升降其物之隐顯莫不有可見之相焉其相為可馮而先王立官因得以辨叙事焉此所以謂之馮相氏掌十有二嵗者謂太嵗左行於地行十有二辰嵗移一辰是也十有二月謂斗柄所指之月建十二月而一周也十有二辰謂自子至亥是也十日謂自甲至癸是也二十有八星謂自角至軫是也叙事謂春作夏訛秋成冬易厥民析因夷隩之属其在事各有先後之序也天位謂星鳥以正仲春星火以正仲夏星昴以正仲秋星虚以正仲冬之属其在天各有所居之位也夫馮相氏之辨叙事所以授人時也非㑹天位則不知四時之正故言辨其叙事則曰以㑹天位言授人時必取正于天故也叙事異宜故言辨天位總衆星之所聚非特合之而已故言㑹夫天有自然之位順之則成逆之則敗順之則為福逆之則為禍盖隂陽之運造化之機有數存焉于其間安可不務哉此馮相氏所以辨其叙事以㑹之也然馮相氏辨而㑹之羲和之事也而以中士為之列于春官之属也者盖帝者天道也行天道以治人故天道致其詳王者人道也行人道以奉天故人道致其異時異二事故也冬夏致日春秋致月以辨四時之叙辨皮勉反日月之運乎天也相推而為晦明相繼而成晝夜一徃一來一升一降其照臨有象其躔有數其象為可占其數為可歩雖周天遲速之不同先王因推其象數而得以土圭度其景之至否而辨四時之叙矣且冬至日在牽牛景丈有三尺夏至日在東井尺有五寸此長短之極也故冬夏則致日春分日在婁而月上弦于東井下弦于牽牛秋分日在角而月上弦于牽牛下弦于東井亦以其景知氣至否也故春秋則致月春秋冬夏氣皆至焉則是四時之叙正矣典瑞所謂土圭以致四時日月者謂此也然日為陽而實故致於長短極之時月為隂而闕故致於長短不極之時各有所主也保章氏掌天星以志星辰日月之變動以觀天下之遷辨其吉凶物相雜曰文文之成為章日星之變動昭回於天其垂象有見乎章而章之所示有吉凶妖祥之不同人則因而保之此掌天星之官所以謂之保章氏盖吉與祥固在所保而妖凶則亦有以保之使不為灾禍焉然則章之見于自然者天也保之成于使然者人也先王設官亦以和同天人之際而使之無間矣掌天星者掌天與星也所謂日月之變動五雲之物十有二風皆天也所謂星辰分星者皆星也星有贏縮日有明晦月有盈虚其變動無常也而天下之妖祥禍福遷運于下者寔隨之矣則保章氏掌天星以志日月星辰之變動以觀天下之遷辨其吉凶者則王政得失可由此而知之也于日月星辰言變動則知所謂遷者亦變動也盖變動以象言也遷者以推移而言之也夫天不人不因人不天不成仰志日月星辰之變動則考之天也俯以觀天下之遷辨其吉凶以騐之于人也天人之相與間不容髮天人之相感至不旋踵象見于天則在人之事以形于下事修于人則在天之象以應于彼官謂之保章豈茍然哉以星土辨九州之地所封封域皆有分星以觀妖祥以十有二嵗之相觀天下之妖祥分扶問反星土則分星之十二次分属九州也十二次雖分十二土然合而言則為九州而已九州之分域不同而皆有所主之分星星紀吳越也𤣥枵齊也娵訾衞也降婁魯也大梁趙也寔沉晋也鶉首秦也鶉火周也鶉尾楚也夀星鄭也大火宋也析木燕也以觀妖祥則分星所主在其地者妖祥兆于天故也以所主之分星而觀之則九州之妖祥灼然可見矣十有二嵗星也太嵗為隂左行于地嵗星為陽右行于天十二嵗而一小周焉以十有二嵗之相觀天下之妖祥占其見之相有逆順盈虚伏見進退之不同而妖祥著于天下矣分星經星也故有所主之封域嵗星緯星也異于分星則無常主矣故以其相觀天下之妖祥左傳曰越得嵗而吳伐之必受其凶此蓋以其嵗之相觀妖祥之效也以五雲之物辨吉凶水旱降豐荒之祲象隂陽分而為五行章而為五色五雲之物則雲之有五色也數有吉凶時有水旱則降豐荒之祲象所由著也于數有吉凶于時有水旱則降豐荒之祲象使人預知而為備氣象謂之祲形本謂之象則保章之所占或以其氣或以其象故也傳言分至啟閉必書雲物為偹者凡以此歟言降豐荒之祲象則與眡祲所謂叙降同矣盖下其說于國使民知之故謂之降事未至而使之偹患未生而使之防先王所以仁民可謂厚矣以十有二風察天地之和命乖别之妖祥十有二風風之生于十二辰之位者也盖天地六氣合以生風艮為條風震為明庶風巽為清明風離為景風坤為凉風兊為閶闔風乾為不周風坎為廣莫風八風本乎八卦傳曰舞以行八風謂此也四維之風兼于其月故艮為條風而立春亦曰條風巽為清明風而立夏亦曰清明風坤為凉風而立秋亦曰凉風乾為不周風而立冬亦曰不周風故風八變而言之又謂十二風也風生於天地之和氣以風察天地之和和則無事矣不和則命乖别之妖祥以告人而使之知所偹焉乖則異而不同别則離而不通萬物之氣故也盖以陽召陽以隂召隂凡氣之同者無不地應鼓宫宫動鼔角角動凡聲之同者無不應至于天何獨不然哉于豐荒之祲象言降于乖别之妖祥言命者皆命降之也命謂書而告之降謂下而示之先王所以戒諭于民者如此其至又孰不知先事而偹哉凡此五物者以詔救政訪序事志日月星辰之變動而吉凶可辨也辨分星之地域而九州之妖祥可觀也占十有二嵗之相而天下之妖祥可觀也騐五雲之物而豐荒之祲象可降也察十二風之和而乖别之妖祥可辨也此之謂五物于凶荒乖别之政所以當救者則以詔于上于救政之事所當先後緩急者則以訪于下政不失所救事不失其叙則可以轉凶而為吉矣又况其無凶者乎可以止妖而致祥矣又况其無妖者乎吉凶妖祥雖不同而先王所以有救政叙事者未嘗廢故曰知天之所為知人之所為者至矣惟天有以示人惟人有以奉天修其誠足以應其情正厥事足以格其變此所以能成天下之大順致天下之大利和同天人之際而使之無間也周禮詳解卷二十三
