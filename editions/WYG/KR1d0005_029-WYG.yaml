body:
  text: 周禮詳解卷二十九宋王昭禹撰趣馬掌賛正良馬而齊其飲食簡其六節掌駕説之頒辨四時之居治以聽馭夫説始銳反治直吏反掌賛正良馬者贊校人校人掌王馬之政頒良馬而養乘之則有所正矣趣馬則贊之而已齊其飲食所以養之使無饑渴害之也簡其六節所以閑之分二十六種之等也詩曰比物四驪閑之維則四牡脩廣其大有顒以其養而閑之如此掌駕說之頒者駕以行説以止有勞使之節故以叙而頒之也辨四時之居治者居謂牧庌所處之宜也治謂執駒攻特之屬也以聽馭夫維馭夫之所役也巫馬掌養疾馬而乘治之相醫而藥攻馬疾受財於校人馬死則使其賈粥之入其布於校人相息諒反注同賈音嫁粥音育巫通上下為人交神者也巫馬以下士二人為之蓋以知馬之祟故以巫馬名官掌養疾馬而乘治之者馬疾則不可以乘用故養之然其疾之所在為難知必驅歩之以發其疾而後可騐而療故乘治之乘謂騐步以知其疾而治之也若獸醫觀其所發而養之是已相醫而藥者蓋其屬有醫四人其治疾則亦以藥攻焉然醫馬疾大抵以獸醫為主巫馬之用藥亦以相醫而已攻馬疾者攻謂繫而治之也盖其疾有藥不足以療之者乃用攻焉猶􅅑醫所謂以五毒攻之也受財於校人以資醫馬之費也馬死則以其賈粥之以其屬有賈一人以知其直也入其布於校人則以備馬費也牧師掌牧地皆有厲禁而頒之孟春焚牧中春通淫掌其政令凡田事贊焚菜中音仲牧人牧六牲而阜蕃其物牧師掌牧地則牧人掌其物而牧師掌其地也皆有厲禁而頒之者有厲以防其妄入有禁以止其非法則頒其地於牧人也中春則陰陽交萬物發生之時故通淫以合馬之牝牡月令所謂乃合累牛騰馬遊牝於牧是也孟春焚牧則以除陳草而生新所以備馬食也凡田事贊焚菜則贊山澤之虞也廋人掌十有二閑之政教以阜馬佚特教駣攻駒及祭馬祖祭閑之先牧及執駒散馬耳圉馬正校人員選馬八尺以上為龍七尺以上為騋六尺以上為馬佚音逸駣音兆上時掌反下士閑二人掌十有二閑之政教而名官曰廋人者廋隠也以閑者馬之所隠故也掌十有二閑之政教則政以正之教以導之也阜馬者養而阜之也佚特者佚而蕃之也教駣者教而成之也攻駒者攻而治之也及祭馬祖至圉馬見新經謂之閑之先牧則始為閑以養馬者也與校人所謂夏祭先牧異矣正校人員選見新經馬地類也龍天類也馬出其類疑其龍也故八尺以上則稱龍月令言駕蒼龍之類以此駕人所賤則人所貴者必高其賈以來之故馬七尺以上則稱騋若夫六尺以上則非龍非騋也適當其類而已故正名其為馬小大異同則使各從其類以待乘頒及以為種也圉師掌教圉人養馬春除蓐釁廐始牧夏庌馬冬獻馬射則充椹質茨牆則剪闔蓐音辱庌音訝茨在私反闔户臘反圉師乘馬一人圉人良馬匹一人以教圉人養馬故以圉師名官春除蓐釁廐者蓐所以藉馬馬既出而除之釁廐以厭不祥所以神之也傳曰凡馬日中而出日中而入日中而出謂春分也日中而入謂秋分也故春始牧夏庌馬也序謂之廡以庇之也冬則馬成矣故獻之射則充椹質者謂選士射澤宫也司弓矢共其弓矢圉師則充椹質也茨牆則翦闔者次草謂之茨詩曰牆有茨以蒺藜之生亦可以茨牆也苫謂之闔以剉草為苫則用以作蓋也椹質翦闔皆圉人所習也故因而使之圉人掌養馬芻牧之事以役圉師凡賔客䘮紀牽馬而入陳廞馬亦如之芻以食馬牧以放馬皆所以養之也故掌養馬芻牧之事圉人良馬匹一人受教於圉師者也以役圉師凡賔客䘮紀牽馬入陳者詩曰雖無予之路車乘馬則賔客之馬王所以賜之也大司馬䘮祭奉詔馬牲則䘮紀之馬遣車所用也圉人牽馬而入陳焉廞馬亦如之則亦牽入陳之職方氏掌天下之圖以掌天下之地辨其邦國都鄙四夷八蠻七閩九貉五戎六狄之人民與其財用九榖六畜之數要周知其利害閩亡中反貉孟白反畜許六反大司徒掌建邦之土地之圖以天下土地之圖知九州之地域廣輪之數則其掌者特圖而已職方氏掌天下之圖以掌天下之地則其掌者非特圖也又掌其地焉盖天下之地至廣而職方氏不能躬至而徧曉按其圖以掌之而已大司徒以圖而知天下土地之數則要在於上也職方氏以天下之圖而掌天下之地則詳在於下也邦國諸侯之國也都鄙邦國之采邑也東方曰夷其種有四南方曰蠻其種有八東南曰閩其種有七東北曰貉其種有九西方曰戎其種有五北方曰狄其種有六夷言其易而無文蠻言其慢而有厲貉言其辨而各戎言其好戰鬭狄言其地苦寒而不火閩以其至治順則開之否則閉之自邦國都鄙以至於夷蠻閩貉戎狄其地雖有内外之殊逺近之别然先王之政由内以及外自近以及逺一視而周仁徧覆而周被雖分詳畧之異而其人民之所聚財用之所出九榖之所生六畜之所産其數要不可以不辨之也其利害不可以不周知之也數則一二三四之數謂列而計之也要如月要之要謂總而計之也利則凡可以利人者也害則凡可以害人者也周知其利害則將以興其利除其害也乃辨九州之國使同貫利東南曰揚州其山鎮曰㑹稽其澤藪曰具區其川三江其浸五湖其利金錫竹箭其民二男五女其畜宜鳥獸其榖宜稻正南曰荆州其山鎮曰衡山其澤藪曰雲夢其川江漢其浸潁湛其利丹銀齒革其民一男二女其畜宜鳥獸其榖宜稻河南曰豫州其山鎮曰華山其澤薮曰圃田其川滎雒其浸波溠其利林漆絲枲其民二男三女其畜宜六擾其榖宜五種正東曰青州其山鎮曰沂山其澤藪曰望諸其川淮泗其浸沂沭其利蒲魚其民二男二女其畜宜雞狗其榖宜稻麥河東曰兖州其山鎮曰岱山其澤藪曰大野其川河泲其浸盧維其利蒲魚其民二男三女其畜宜六擾其榖宜四種正西曰雍州其山鎮曰嶽山其澤藪曰弦蒲其川涇汭其浸渭洛其利玉石其民三男二女其畜宜牛馬其榖宜黍稷東北曰幽州其山鎮曰醫無閭其澤藪曰貕養其川河泲其浸菑時其利魚鹽其民一男三女其畜宜四擾其榖宜三種河内曰冀州其山鎮曰霍山其澤藪曰楊紆其川漳其浸汾潞其利松栢其民五男三女其畜宜牛羊其榖宜黍稷正北曰并州其山鎮曰恒山其澤藪曰昭餘祁其川虖池嘔夷其浸淶易其利布帛其民二男三女其畜宜五擾其榖宜五種㑹古外反藪素口反區起俱反浸子鴆反湛直咸反又音沈華胡化反圃布古反滎户扄反溠音詐枲思似反沂魚祈反沭音述泲子禮反盧維註作雷雍又如字雍於用反汭如鋭反貕音兮紆音迂潞音路虖喚胡反池徒多反嘔烏侯反淶郎才反夫天之所生地之所成其才為可用其備為可食盈乎天地之間者無非物也職方氏能辨人民財用榖畜之數要周知其利害惟知其數要然後可以周其事惟知其利害然後可以同其利事之有條謂之貫凡可以生養人者謂之利盖能辨其数要故能作其事惟作其事故能同其貫周知其利害致其利也惟致其利故能同其利此辨九州之國而同其貫利所以在於辨人民財用九榖六畜之數要周知其利害之處也九州之東西南北之異方山澤川浸之異宜男女異數玉石異産黍稷稻粱之異種丹漆絲枲之異利能辨之如此則雖廣谷大川異致民生其間異俗剛柔輕重遲速異齊五味異和器械異制衣服異宜而先王則修其教不易其俗齊其政不易其宜彼其嗜欲好惡雖不同而同於作其事則一也彼其財物有無雖不同而同於致其利則一也夫是謂不同而同之歟然而其山其澤其川其浸則舉其大者如此也其利其畜其榖則舉其利而宜者如此也山澤川浸材物之利其産自然賴人力者少六畜五榖之利有待於人而賴其力者為多故言山澤川浸於民之前而言畜榖於民之後者其序如此九州之山皆言其山鎮者盖國主山川而保之山之大者可以鎮安其地也揚州山鎮曰㑹稽昔太史公以為禹㑹諸侯於江南計功而崩因葬焉命曰㑹稽也荆之山鎮曰衡山荆正南也地下嶽高如衡適平也豫之山鎮曰華山以山在華隂指所生物言之也青曰沂山以沂水出於此也兖曰岱山以易姓則於此告代也雍曰嶽山以廵所守則於此問事考言也幽曰醫無閭無閭遼東之地名其俗則善醫也冀曰霍山以其地名之也并曰恒山并州正北方而北者復命之地也其澤薮者水所鍾曰澤澤草所生曰藪自揚之具區至并之昭餘祁亦各以其地而名之也以逹水者謂之川其川三江則禹貢揚州所謂三江既入是也其川江漢則禹貢荆州所謂江漢朝宗于海詩所謂滔滔江漢南國之紀是也其川滎雒則禹貢豫州所謂伊雒􅈆澗既入于河滎波既豬是也其川淮泗則禹貢所謂導淮自桐栢東㑹于泗沂是也其川河泲則禹貢所謂濟河惟兖州是也其川涇汭則禹貢雍州所謂涇屬渭汭是也其川河泲幽之川亦與兖同者盖兖在河東北二州相連皆有河泲也盖禹貢又北播為九河同為逆河入于海導沇水東流為濟則幽兖皆河泲所經之地也其川漳則禹貢冀州所謂覃懷底績至于衡漳是也其川虖池嘔夷先儒謂虖池出鹵城嘔夷出平舒也以水浸田謂之浸自揚之其浸五湖以至并之淶易者皆其地之水可引以浸灌者也然涇漳之屬後世更引以浸焉荆民之利丹銀齒革豫之其利林漆絲枲青兖之其利蒲魚雍之其利玉石幽之其利魚鹽冀之其利松栢并之其利布帛以禹貢惟金三品瑶琨篠簜則金錫竹箭固揚州所産也荆之厥貢羽毛齒革惟金三品以及夫礪砥砮丹則丹銀齒革固荆州所産也豫之厥貢漆絲絺紵則林漆絲枲固豫之所産也然則餘州皆以其地所産之多者而言之也以此推之則九州之男女異數榖畜異宜皆據當時所辨而計之者其大概如是也然九州之序禹貢始於冀次以兖而終於雍職方氏則始於揚次以荆而終於并者盖禹貢言治水之序也職方言逺近之序也治水則自帝都而始然後順水性所便自下而上故由兖至雍而止也以逺近言之則周之化自北而南為逺故關雎鵲巢之詩分為二南漢廣亦言文王之道被於南國德化之所及以逺為至也始於揚則以揚在東南次以荆則以荆在正南終於并州以并在正北先逺而後近也且禹别九州載於禹貢則堯之時固九州矣至舜分青為營分冀為幽并則肇十有二州矣至周公時又止於九州而已盖禹治水之初草木鬯茂禽獸繁殖人民寡矣故止九州至舜時險阻既逺鳥獸之害人者消人民衆矣故分而為十有二州至周又為九州盖商之亂夷羊在牧蜚鴻滿野雖及周公之時尚如禹治水之初也州或九或十二亦因時而已聖人豈樂改革而好為異哉乃辨九服之邦國方千里曰王畿其外方五百里曰侯服又其外方五百里曰甸服又其外方五百里曰男服又其外方五百里曰采服又其外方五百里曰衛服又其外方五百里曰蠻服又其外方五百里曰夷服又其外方五百里曰鎮服又其外方五百里曰藩服凡邦國千里封公以方五百里則四公方四百里則六侯方三百里則七伯方二百里則二十五子方百里則百男以周知天下凡邦國小大相維王設其牧制其職各以其所能制其貢各以其所有大司馬謂之九畿者以施邦國之政職正其地之大小為主故也職方氏謂之九服者以制職貢賦之服王事為主故也惟其施政職正其地之大小故謂之國畿以别於邦國之畿也惟其制職貢使之服王事故謂之王畿以言其小大相維莫不屬於王也凡邦國千里封公以方五百里則四公至方百里則百男者蓋邦國有正封之地有廣封之地公侯方百里伯里七十里子男五十里此正封也諸公之封疆方五百侯四百里伯三百里子二百里男方百里此廣封也職方氏兼廣封之地而計之故與大司徒以土圭土其地而制其域同也夫禹之治水弼成五服至于五千而禹貢自甸服至荒服五服各靣五百里則凡方五千里矣周官之制自王畿千里之外由侯服以至藩服皆方五百里而已以邦國千里之地而以開方言之則方千里者為方百里者百故封公以方五百里則四公蓋方五百里則面二百五十里而四公之地凡面一千里也方四百里則六侯而六侯之地凡面一千二百里方三百里則七伯而七伯之地凡面千五十里方二百里則二十五子而二十五子之地凡面二千五百里方百里則百男而百男之地凡面三千五百里矣合五等之國其地方面方有七百五十里則千里之地開方為方百里者百然後足以容之也然王制言百里之國三十七十里之國六十五十里之國百有二十凡二百一十國而與周官之制不同者盖王制所言者夏商之制也以周知天下者以一千里度之則天下之地可以周知矣凡邦國小大相維者使小事大大比小則相維屬而不散也王設其牧則凡州之牧所謂建牧立監以維邦國者謂此也制其職各以其所能則不强其所不能也制其貢各以其所有則不責其所不有也王將廵狩則戒於四方曰各修平乃守攷乃職事無敢不敬戒國有大刑及王之所行先道帥其屬而廵戒令王殷國亦如之王廵狩則諸侯各朝於方岳故戒於四方也修平乃守則諸侯所守之土也攷乃職事則諸侯所治之職事也天子適諸侯曰廵狩廵狩者廵所守也故戒以修平乃守戒以修乃守則使不至於壞也戒以平乃守則使各當其分也諸侯朝於天子曰述職述職者述所職也故以攷乃職事有所受而聽上者職也戒以攷焉則慮其有曠職矣有所作而行之者事也戒􅈈以攷焉則慮其有廢事矣無敢不敬戒者敬則不敢怠而違命也戒則不敢怠忽而荒政也國有大刑者違其所戒則刑之所取也戒以國有大刑則非小常刑而已致其嚴之至也及王之所行先道帥其屬而廵戒令者以職方氏掌天下之地故於王所行則先道以帥其屬而廵其前日所戒四方之令也若王國廵狩則衆國諸侯各隨四方分四時而来見故謂之殷國殷國則王亦出而與之會為壇於國外以命事職方氏亦先道帥其屬而廵戒令故曰亦如之掌客王巡狩殷國則國君膳以牲犢令百官百牲皆具則諸侯殷國其禮亦與廵狩同也土方氏掌土圭之灋以致日景以土地相宅而建邦國都鄙以辨土宜土化之灋而授任地者王廵守則樹王舍相去聲大司徒以土圭之法測土深正日景以求地中凡建邦國以土圭土其地而土方氏掌土圭之法以致日景以土地相宅而建邦國都鄙則輔成司徒建造之而已大司徒掌土宜之法而土方氏亦辨土宜土化之法而授任地者則輔相司徒草人任土糞種之事而已司徒草人所掌止於王畿而土方氏所掌則盡於四方故名官以土方氏焉相宅而建邦國都鄙則邦國賴之以有其居此豫之利建侯之事也辨土宜土化之法而授任地者則萬民之賴以有其宅此臨之容民之事也故廵狩使樹王舍邦國都鄙有其民居有其民宅然後上得保其居而安其宅故也懷方氏掌來逺方之民致方貢致逺物而送逆之達之以節治其委積館舍飲食食音嗣逺方之民則四夷之民在逺方者也孔子曰逺人不服則修文德以來之来者諭德延譽以求之也致方貢則致逺方所貢之物猶所謂西旅底貢厥獒也致逺物則致逺方所獻之物猶所謂無有逺邇畢獻方物也逺方之有貢猶六服之貢則世一見各以其所貢為之先也逺方有所獻之物則猶六服諸侯之獻國珍是也貢以致其臣子之禮獻以達其享上之誠懷方氏則致之使自至而已送逆之所以送往而迎来也達之以節達民以旌節達貢物以璽節也治其委積所以備其用也治其館舍所以安其居也治其飲食所以順其嗜好也送逆之以為之禮達之以節使無留難治其委積舘舍飲食使有所資賴此所以懷之也名官謂之懷方氏其以此與合方氏掌逹天下之道路通其財利同其數器壹其度量除其怨惡同其好善好呼報反通其財利同其數器一其度量使無異事除其怨惡同其好善使無異情此所以合之也懷之然後可合此合方氏所以次於懷方氏之後也千夫有澮澮上有道萬夫有川川上有路道路所以通往来達之則往來有不窮之通矣千夫之才謂之財和而制之謂之利財利出於土地之所生而有無多寡常不能以相資通之則有無懋遷而多寡相濟矣十百千萬之所計謂之數吉凶禮樂之所用謂之器尊卑異數貴賤異器無以同之則卑或得以踰尊賤或得以越貴惟有以同之使無異焉則自一命至於九命者莫非數之所由制凡用於冠昏䘮祭飲食之器者無非禮之所寓物名以眀分守以嚴而僣竊之患無自啓矣體有長短撿以度物有多寡校以量無以一之則長短有時而不齊多寡有時而不均姦縁以生偽因以起惟有以一之而使不貳則民之私欲不得行而童子適市亦無敢肆欺於其間矣然於數器言同而度量言一者記曰一道德以同風俗書於亂臣言同心同德於臣三千言一心則一之然後能同矣一者同之始同者一之終數器度量皆一而同之然以數器比度量則數器尤禮之所重故於數器言同而度量言一也質人曰同其度量一其淳制比淳制而度量又重於淳制故也生於心而有所恨者怨也人之所醜而有餘者惡也無以除之則無良者或相怨於一方惡積者或至於大而滅身惟有以除之則惡將有所改而遷善怨不敢妄作而當理矣情之所樂謂之好性之所欲謂之善好出於情而見乎物善出於性而至乎道苟役物以為好則好失之僻離道以為善則善失之竒好僻而善竒則異政殊俗之所由作欲以中國為一人其可乎故必有以同之然先王不貴異物不寶逺物不殖貨利不邇聲色是以教而同其好也作竒技者誅被異服者誅靡者抑之使微害者禁之使亡此以法而同其好也聯之以師儒而教誘協乎上聯之以朋友而講習比乎下諸侯必受命於天子然後為學卿大夫必受法於司徒然後為教此以教同其善也事親不孝事長不悌造言而不信亂民而不治則糾之以八刑言僞而辨行僞而堅順非而澤學非而博則嚴之以四誅此以刑同其行也惟同之如是則道德奚患乎不一風俗奚患乎不同哉名官以合方氏殆謂是與訓方氏掌道四方之政事與其上下之志誦四方之傳道正嵗則布而訓四方而觀新物先王之於逺方之人民有以懷而來之然後可以合而聚之有以合而聚之然後可以訓而道之此訓方氏所以次於合方氏之後歟掌道四方之政事者道其君所行之政事也凡有所正者皆政也凡有所作者皆事也政為大事為小孔子問冉有退朝何晏對曰有政孔子曰其事也如有政雖不吾以吾其與聞之此政事之辨也與其上下之志者上而君下而臣其志皆道焉傳則或出於衆人之所傳道則或出於一人之所道誦四方之傳道則將以所聞至於推而行之然後可以為治矣與孟子為王誦之同意訓方氏於誦皆以告王也正嵗則取其可以訓四方者布告之新物謂新所用之物也觀新物則將以觀民之好惡者正嵗者一嵗之所始新物者民情之所尚以一嵗之始而觀民情之所尚將以訓其志趣好惡也然則道四方之政事則將以訓其事道上下之志則將以訓其情誦四方之傳道則又將博衆􅍇以訓焉如是則既有以訓道之而王之所聞益聰所見益明矣正嵗而訓四方則既訓以所道又訓以所誦又觀新物察其好惡而訓焉如是則四方之逺所間者無非正言所見者無非正行而道德由之而一風俗由之而同矣夫先王所以致天下之大順以中國為一人者曾何容心哉置設官屬取田方之善以同之而已必於正嵗則以正嵗者先王之正也百官當取正於先王則其所訓者非特民而已形方氏掌制邦國之地域而正其封疆無有華離之地使小國事大國大國比小國華苦蛙反邦國之地域小大廣狹各有形體先王設官以制其形體故謂之形方氏大司徒凡建邦國以土圭土其地而制其域自諸公而下逓至於子男其封疆各有多寡之數形方氏又掌制邦國之地域而正其封疆則形方氏之所掌凡以成大司徒之所建而已謂之正其封疆則非特制之地域而已又正之使各止於一而無侵土攘奪也無有華離之地者析而不絶為華則絶而不屬為離有華離之地則封疆不正使其相絶無華也使其相屬則無離也見新傳以小事大者智也以大比小者仁也仁智交修而不廢此萬邦之所以協和歟山師掌山林之名辨其物與其利害而頒之於邦國使致其珍異之物川師掌川澤之名辨其物與其利害而頒之於邦國使致其珍異之物山林川澤皆有虞衡而山師川師又設於夏官者則以其所掌有及於邦國故也新經云云邍師掌四方之地名辨其丘陵墳衍邍隰之名物之可以封邑者邍原同大司徒辨山林川澤丘陵墳衍原隰之名而辨其邦國都邑之數而溝封之而邍師所掌如此亦以輔成司徒之事而已新經云云匡人掌達灋則匡邦國而觀其慝使無敢反側以聽王命慝他得反匡之言正也大司馬制畿封國以正邦國所以正其地之大小也以九伐之法正邦國所以正其惡之輕重也若夫使之考禮正刑一德以尊於天子必有法則以正之而已此匡人所以達法則以匡邦國也法即大宰所謂以八法治官府者是也則即大宰所謂以八則治都鄙者是也八法雖以治官府為主八則雖以治都鄙為主其於治邦國亦如是而已匡人則用所以治官府都鄙者推而達之以正邦國而已行人十有二嵗所以修法則者修此故也而觀其慝者惡之𨼆乎内謂之慝雖未著而其兆已有可見之迹匡人則觀而知之盖其職以達法則匡邦國為事其有違法則而不正者推此則其慝可觀矣然觀其慝者亦將以止其惡於方然銷禍患於未萌矣故能使之無敢反側以聽王命書曰無反無側王道正直盖偏不正乃至於反陂不正乃至於側無偏乃能無反無陂乃能無側然則使無敢反側乃歸於正直矣邦國無反側之慝而惟正直之歸則又孰敢不來享孰敢不來王則聽王命者亦其常矣撢人掌誦王志道國之政事以廵天下之邦國而語之使萬民和説而正王面語魚據反説音悅夫君者民之唱上者下之儀唱嘿則民無應儀𨼆則下無效又況堂上逺於百里堂下逺於千里門外逺於萬里而王之志意政事茍無人以宣布通達之於外則邦國之逺亦不能無壅遏之患矣此撢人之職所由設也撢之字從手從覃撢之為言取也所覃及乃能撢之取主之志意與國之政事廵天下之邦國而語之故也掌誦王志者心之所之者為志以述志者為言志存於心非言則不見誦志則誦王言之可以見志者也道國之政事謂王國之政事也王國其大則有政其小則有事其政之善則薰陶漸漬出於精神之運其事之善則立作興造形於經緯之際撢人取而道之則天下皆俛首傾聽入於耳而著於心矣懼其或不聞也又以廵天下之邦國而語之非獨語之於近也而又語於逺非獨語於寡又語於衆無有逺邇衆寡之不聞則感於此者盖有謳歌而樂王之德者矣盖有竭蹶而趨王之治者矣盖有草自狥之情而丕應徯志者矣盖有達播告之㫖而罔不是孚者矣所以能使萬民和説而正王面也和則不乖其所為説則喜生於心悉皆延頸舉首而面於王矣又安有僞從而不誠慕靣革而不心服者哉然匡人之與撢人二官亦相待而相成必匡人能達邦國之慝而勝之然後撢人能使萬民和説而正王面矣撢人之職序於匡人之後厥有㫖哉都司馬掌都之士庶子及其衆庶車馬兵甲之戒令以國法掌其政學以聽國司馬家司馬亦如之政音征司馬掌政之官而凡車馬兵甲之事屬焉先王之政豈特施於近而已雖逺而邦國無所不施又況三等之采地列於王畿之四方而政之所施其可後乎此都家司馬之職所由立也掌都之士庶子及其衆庶兵甲之戒令者士謂公卿大夫之子謂其適而已命者也庶子謂其庶而未命者也及其衆庶則凡在都之人民皆是以國法掌其政學則以師氏保氏大司樂所以教國子之法而掌其政學則以其學而後從政也盖學所以致其道以道而施之政則物奚足應事奚足治哉此君子所以學優則仕學古入官而子産亦曰聞學而後從政未聞以政學者苟為安此則不學墻面蒞事惟煩此子路使子羔為費宰孔子所謂賊夫人之子也以聼於國司馬者則以所掌者車馬兵甲之戒令故也國司馬謂大司馬兵甲之法出於大司馬故都司馬聽之家司馬亦如之者都司馬掌大都之士庶子也家司馬掌家邑亦如都司馬之事而巳周禮詳解卷二十九
