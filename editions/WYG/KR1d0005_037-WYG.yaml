body:
  text: 周禮詳解卷三十七宋王昭禹撰鳬氏為鍾兩欒謂之銑銑間謂之于于上謂之鼓鼓上謂之鉦鉦上謂之舞舞上謂之甬甬上謂之衡鍾縣謂之旋旋蟲謂之幹鍾帶謂之篆篆間謂之枚枚謂之景于上之攠謂之隧欒本又作鸞力端反銑先典反鉦音征甬音勇縣與懸同篆直轉反攠音靡又亡竒反隧音遂有翼而能飛者鳬也無翼而能飛者聲也有翼而能飛則其舉為有限無翼而能飛則其作或無節先王以無節之飛聲而託名於有限之飛鳬凡以為用聲者之戒而已此為鍾之工所以名官而謂之鳬氏非特此也鳬之為物入水而不溺勝水而不淫先王于樂之聲亦欲其無淫溺故也兩欒謂之銑者鍾口兩角謂之欒亦謂之銑欒言如木之欒也斷而欒焉欲其有分故也銑言其浄而如洗以其無篆隧之文故也銑間謂之于者記曰易則易于則于其動也直天道也其動也于地道也鍾口兩角間屈而不直故謂之于于上謂之鼓者鼓以作為事凡作樂則謂之鼓于上作而擊之之處也故謂之鼓鼓上謂之鉦者止鼓不作不作故謂之鉦鉦上謂之舞者夫物既豐則用舞而舞則蹈厲有節鉦上其形豐而聲之所發者莫不有節故謂之舞欒銑所以名鍾之用于鼓征舞所以名鍾之體若夫甬也衡也又所以名鍾之柄也舞上謂之甬甬者往來不窮之謂也以舞上鍾柄所接之處有不窮之用焉故謂之甬甬上謂之衡衡用權以角物以平為主也甬上其勢正而鍾賴之以取平焉故謂之衡鍾縣謂之旋所以屬鍾柄而縣之故謂之旋以盤旋而係之故也旋虫謂之幹者飾旋以虫所以屬鍾而固之故謂之幹以貞固足以幹事故也鍾帶謂之篆者帶所以介鍾介在于鼓鉦舞之間而其形條而細若帶焉故謂之鍾帶以介鍾而正其名如篆籀之文而義隠于其中故又謂之篆篆間謂之枚者數事以條數物以枚篆間有鍾乳以夾鼓與舞故篆間謂之枚枚謂之景者日在上景在下精入乎神而幽景出乎明而大枚别而可數故枚又謂之景于上之攠謂之隧者詩曰大風有隧隧道也鍾所擊之處謂之攠聲出乎此若隧為出入之所自焉故又謂之隧也十分其銑去二以為鉦以其鉦為之銑間去二分以為之鼓間以其鼓間為之舞脩去二分以為舞廣以其鉦之長為之甬長以其甬長為之圍參分其圍去一以為衡圍參分其甬長二在上一在下以設其旋鉦音征甬音勇前言鍾之形體有一名此又言鍾體之大小長短之制也夫細鈞有鍾無鎛尚大故也大鈞有鎛無鍾尚細故也鍾之所尚既有大小之不同則長短亦隨之而異矣自十分其銑去二以為鉦至以其鼓間為之舞脩去二分以為舞廣此言鍾之制有大小長短之異也凡鍾之制皆下侈而上斂故鉦之徑居銑徑十分之八而銑間則與鉦同也鼓與銑間同而鼓間則又去二分則鼓間居銑徑十分之六也以其鼓間為之舞脩則舞長與鼓間等矣又去二分以為舞廣則徑舞廣居銑徑十分之四矣以此推之則銑間與鉦之相應鼓間與舞脩相應也然舞上下既促則當以横為脩從為廣則上不失於太斂下不失於太侈矣先王為鍾之制大率以律為之度數凡其廣長圍徑皆隨鍾之大小而制之爾以其鉦之長為之甬長以其甬長為之圍三分其圍去一以為衡圍此又鍾柄之制也三分其甬長二在上一在下以設其旋此又所以屬鍾柄之制也薄厚之所震動清濁之所由岀侈弇之所由興有説鍾已厚則石已薄則播侈則柞弇則鬱長甬則震説始鋭反柞側百反樂之作以聲為主鍾之所尚者聲聲之所出者形形有不同則聲亦隨異薄厚侈弇者形也清濁者聲也然則鍾聲之清濁乃出于鍾形之薄厚侈弇原其所自豈无説乎葢六合之外聖人存而不論六合之内聖人論而不議凡器之所形莫不有數數之所陳莫不有理則其精可以意致其粗可以言論又况聲之所係乎此薄厚之所震動清濁之所由出侈弇之所由興所以必有説也物之成理雖具於不説之間而器之制作則有可説之義記曰工依於法㳺於説蓋謂是也作而起謂之動動而逺聞謂之震薄厚之所震動侈弇之所由興即形而言其聲也清濁之所由出即聲而原其形也聲出於形之不同形出於制之異度是故其形厚者其聲石而不出其形薄者其聲播而多散其形侈者其聲迫柞而出疾其形弇則其聲鬱而不發其甬長則其聲震而逺聞凡此皆是人之失度而其聲之失中也是故大鍾十分其鼓間以其一為之厚小鍾十分其鉦間以其一為之厚鍾大而短則其聲疾而短聞鍾小而長則其聲舒而逺聞為遂六分其厚以其一為之深而圜之聞音問是故大鍾者必十分其鼓間以其一為之厚小鍾者必十分其鉦間以其一為之厚葢鉦間鼓間皆居其銑十分之六則取此以為之厚而已如此然後无已厚則石之失也鍾大則形長大而失於短故聲躁疾而短聞鍾小則形短小而失於長故聲舒緩而逺聞遂則于上之攠謂之隧是也六分其鍾之厚取其一以為隧之深而又圜之而不方深取其厚之一則不傷于鍾之體勢取其圜而不方則有運而行之意典同凡為樂器以十有二聲為之齊量髙聲䃂正聲緩下聲肆陂聲散險聲斂達聲贏微聲韽回聲衍侈聲筰弇聲鬱薄聲甄厚聲石則鳬氏之為鍾亦以此為齊量可知矣伶州鳩曰細抑大陵不容于耳非和也聽聲越逺非平也然則鍾之形或大或小鍾之聲或逺或近不可不察也㮚氏為量改煎金錫則不秏不秏然後權之權之然後準之準之然後量之量之以為鬴深尺内方尺而圜其外其實一鬴其臋一寸其實一豆其耳三寸其實一升重一鈞其聲中黄鍾之宫槩而不税其銘曰時文思索允臻其極嘉量既成以觀四國永啟厥後茲器維則臋徒門反中丁仲反索所白反㮚之為果縮而栗者也有堅栗難渝之意先王之為量使四方觀之以為則萬世守之以為法以立天下之信而无敢渝焉所以名官謂之㮚氏夫六分其金而錫居一謂之鍾鼎之齊量之用金錫與鍾鼎同齊矣金錫之為物必鍊之使精以之為器則可以久其傳而无息故改煎金錫至于不耗然後可用焉夫權與物均而生衡衡運生規規圜生矩矩方生繩繩直生準㮚氏之為量始於權之以眂其輕重之齊次于準之以眂其髙下之平終於量之以眂其多寡之均然後以之為鬴焉故曰不耗然後權之權之然後準之準之然後量之晏子曰六斗四升為鬴管子曰百升而成釡以㮚氏攷之則鬴為百升而所謂鬴則斛也夫五量之法躍於龠合於合聚於升登於斗角於斛其數本起于黄鍾之龠也合龠為合十合為升十升為斗十斗為斛律厯志曰其法用銅方尺而圜其外旁有庣焉其上為斛其下為斗左耳為升右耳為合梓人曰爵一升觚三升獻以爵而酬以觚一獻而三酬則一豆矣所謂豆則斗也然則深尺内方尺而圜其外其實一鬴則仰其上而為斛矣其臋一寸其實一豆則覆其下而為斗矣其耳三寸其實一升則言其左耳矣至于右耳則其實一合而已内方而外圓則天地之象也其臋一寸其耳三寸則隂陽竒耦之義也其重一鈞則權衡之法寓焉其聲中黄鍾之宫則律吕之法寓焉夫黄鍾為律之本而宫為五聲之綱量之所制其本起于黄鍾之龠其成也聲又復于黄鍾之宫豈非以天下之法于此乎出而五量之法于此乎成歟非特此也宫於五行為土而於五常為信則以量為法度之主且以立信于天下故也惟其立信于天下故於天下為公平而不敢私焉用槩以為平不税所以為公是以施之官府以縻廩禄則貴者取多賤者取少而各當其分矣施之㳄序以量百物則詐偽不得作而童子莫之欺而各得其所矣先王以天下之法所以摧壞而不明者常自器始禮樂之器所以僭差而不一者常自量始五量之法苟或亡焉則後世无所取則矣故為之銘焉所以識之使不忘也夫銘雖以示不忘之意而所以述其意者實在乎言以為之文使天下後世由是文而思索以通其意則五量之法信其歸于中而有以芘民也故曰時文思索允臻其極嘉者美之至而合禮之善也五量之既成則其為器也實以藏禮其為禮也實以教中故謂之嘉量嘉量既成以示四國則四國莫不于是而取中以示後世則後世莫不于是而取法故曰嘉量既成以觀四國永啟厥後茲器維則然則先王出之以内宰掌之以司市一之以合方同之以行人凡以觀四國而使有所則焉故也昔舜之巡狩所以同度量而孔子亦曰謹權量四方之政行焉凡以天下之法于此為重故也後世諸侯之臣有以變亂是則者乃以公量收家量貸此陳氏所以竊民譽莊周欲剖斗折衡而民不爭者亦以其有激而云然爾凡鑄金之狀金與錫黒濁之氣竭黄白次之黄白之氣竭青白次之青白之氣竭青氣次之然後可鑄也凡用金為器者皆和之以錫其用金錫必鎔鍊之使精然後鑄焉葢其改煎也雖至於不耗然金錫之在冶有氣象之可觀故自黒濁之氣竭終乎次之以青氣是乃鑄金之狀則所謂氣象是已夫金之為物資始於木以有氣資生於土以成形木金父也土金母也木父之氣青土母之氣黄木土之子為金而其氣為白青陽也其氣純而不雜黄白隂也其氣雜而不純故始而鎔之則隂雜之氣多而為黒濁黒濁之氣既竭然後金土之氣見焉故黄白次之黄白之氣既竭然後金木之氣見焉故青白次之青白之氣既竭然後木之氣獨見焉故青氣次之隂雜之氣皆竭所存者陽純不雜之氣而已則其金純矣然後可鑄也且錫青金也稟氣于東方之陽金之隂氣畢盡而青陽之氣獨存亦金之反本復始以從木父之氣故也然則古之為金器者其器用而无敝久而獨存可以垂无窮而傳不朽豈非鎔鑄之有術乎段氏闕函人為甲犀甲七屬兕甲六屬合甲五屬犀甲壽百年兕甲壽二百年合甲壽三百年凡為甲必先為容然後制革權其上旅與其下旅而重若一以其長為之圍凡甲鍛不摯則不堅已敝則橈屬之樹反摯音至孟子曰函人惟恐傷人葢函能包而入亦能吐而出焉此為甲所以名官謂之函人戎之事以甲為主以兵勝敵故古之言兵者多先以甲胄自衛傳説戒髙宗則日惟甲胄起戎魯侯之誓則曰善穀乃甲胄然則甲以自衞其用革不可以不堅此所以必擇犀兕之皮而為之也札續之數謂之屬犀甲不若兕甲之尤堅則札長故犀甲七屬兕甲六屬合甲則合革而為之比兕甲又為堅故五屬而已犀甲則歴久而後敝犀甲之壽則不若兕甲兕甲則不若合甲故犀甲則壽百年兕甲則壽二百年合甲則壽三百年凡為甲必先為容者因服者之形而為之容也葢人之身有大小長短之不齊過則為有餘不及則為不足必也其甲足以容其身而後可夫為劍者必審乎上下之制為弓者必辨其安危之人則為甲者亦然矣惟因人之身小大長短而為容然後以之制革則无贅虧之患故曰然後制革脊骨謂之脅上旅謂腰以上也下旅謂腰以下也權以知其輕重使上下等而若一則无偏重之患以其長為之圍則從横欲周其身而已凡甲必鍛革而為之摯之為言至也不摯謂鍛之不熟不熟則革不堅而易壊太熟則過耎而易曲故曰凡甲鍛不摯則不堅已敝則橈矣凡察革之道眂其鑚空欲其惌也眂其裏欲其易也眂其朕欲其直也櫜之欲其約也舉而眂之欲其豐也衣之欲其無齘也眂其鑚空而惌則革堅也眂其裏而易則材更也眂其朕而直則制善也櫜之而約則周也舉之而豐則明也衣之無齘則變也鑚作官反空音孔惌於阮反易以豉反朕直忍反櫜音羔衣於既反齘户界反更音庚凡戎事所以自衞者在甲所以為甲者在革革之美惡在人制治之有善否而已則用革不可以不察也鑚空則欲其小而無縫小而無縫則其革堅而難壊也故曰眂其鑚空欲其惌繼之以則革堅也革之裏則欲其易而無敗薉易而無敗薉則其材歴久而難敝故曰眂其裏欲其易繼之以則材更也革之制欲其直而無橈直而無橈則其制善而無惡故曰眂其朕欲其直繼之以則制善也卷而置櫜中則欲其約而不豐約而不豐則密緻而能周故曰櫜之欲其約繼之以則周也舉而眂之則欲其勢之豐大則炳然可觀故曰舉而眂之欲其豐繼之以則明也衣之於身則欲其迴旋而無不齊迴旋而無不齊則隨其身而便利故曰衣之欲其無齘繼之以則變也鮑人之事望而眡之欲其荼白也進而握之欲其柔而滑也卷而摶之欲其無迆也眡其著欲其淺也察其線欲其藏也革欲其荼白而疾澣之則堅欲其柔滑而腛脂之則需引而信之欲其直也信之而直則取材正也信之而枉則是一方緩一方急也若苟一方緩一方急則及其用之也必自其急者先裂若苟自急者先裂則是以博為帴也卷而摶之而不迆則厚薄序也眂其著而淺則革信也察其線而藏則雖敝不甐荼音徒卷上聲摶注讀為縛著直畧反幹户管反腛於角反需人兖反信音申帴音淺甐音吝先儒以鮑為柔革之工也柔革之工而曰鮑人之事者夫自下徹上无非事也而鮑人之治革雖以一物之微而作治之功為最多或用之為鞔飾或用之為器物一皆取足于鞄人所以獨言鞄人之事也與夫畫繪之事車人之事皆言事同意望而眂之欲其荼白者謂逺而眂之欲如茅秀之色白也進而握之欲其柔而滑者謂以手煩撋之欲柔順而滑利也之卷而摶之欲其无迆者卷謂斂其舒也摶謂以手專也卷而摶之欲其无敝撓而下迆也眂其著欲其淺者謂鍛治之而善鋪著則雖厚如薄也察其線欲其藏者謂縫革之縷欲其隠而不露也革欲其荼白而疾澣之則堅者謂革色白如荼秀其質雖美必疾澣之而不使久居水中則堅而難壊也欲其柔滑而腛脂之則需者謂其柔順滑利而厚脂之則柔耎也引而信之欲其直者謂以手展而舒之欲其直而無橈也信之直而無橈以其裁制之其材正而不偏也信之而枉則橈而不直則其體緩急不均也苟一方緩一方急而不均則急者易敝故先裂也若苟急者先裂則革雖博而如淺也是以廣為狹矣卷而摶之而不迆以其體均而厚薄各得其叙也眂其鋪著雖厚而如淺斯其革信而无縮鰀之偏也察其線而藏則縫縷隠于革雖敝而无刮摩之傷也又何甐之有韗人為臯陶長六尺有六寸左右端廣六寸中尺厚三寸穹者三之一上三正鼓長八尺鼓四尺中圍加三之一謂之鼖鼓為臯鼓長尋有四尺鼓四尺倨句磬折凡冒鼓必以啟蟄之日良鼓瑕如積環鼓大而短則其聲疾而短聞鼓小而長則其聲舒而逺聞韗况萬反衆家並音運鼖扶云反聞音問註同樂以鼓進以金止鍾鼓樂之大者也故詩人言樂多以鍾鼓言之或言鍾鼓既設或曰於論鼓鍾或曰鍾鼓樂之則聖人所以立鍾鼓之工者意以此也然鼓之為物其冒雖以韋其質必以木其大小長短方圓之制以粗言之則其數為可陳以精言之則其義為難知其創之雖本于聖人之智其述之必成于百工之巧然則韗人為臯陶實數之所在義之所寓也韗之字從韋從軍以韋包木而為鼓也鼓之木謂之臯陶臯言始也陶言中虚而如陶穴然也為鼓者始于斵木以為質終于制韋以成聲謂之臯陶意如此鼓人教為鼓而辨其聲用葢六鼓之制各有數義存焉鼓人能辨其聲用則其教者教韗人之為鼓也長六尺有六寸左右端廣六寸中尺厚三寸者左右端謂兩頭也版中廣而兩頭狹所以為穹隆也左右端與中其廣雖不同而版之厚則同于三寸也穹者三之一上三正者謂鼓中穹隆而起者特如兩端三分之一也正曲為直正直為正兩端與中其相取之數又貴乎直而正也然則穹隆居兩端三分之一則鼓面四尺者版穹加一尺三寸三分寸之一也兩端與中各相取之數正則其長六尺六寸三分寸之二而其數居二尺二寸也先儒謂晉鼓大而短以此近晉鼓理或然也鼓長八尺鼓四尺中圍加三之一謂之鼖鼓道之大謂之路事之大謂之賁鼖鼓以鼓軍事事之大者非道之大者也故司馬辨鼓鐸鐃鐲之用王執路鼓諸侯執鼖鼓以諸侯敵王所愾故軍事之大者在所執焉王以道御衆而已事非所預也故執路鼓惟鼖鼓以鼓軍事為主則以義制物貴乎有别而已故其長八尺以八左右戾則為能有别故也鼓四尺中圍加三之一凡圍三徑一面四尺則圍十有二尺中圍加以三分之一則丈有六尺矣其圍如此則其徑五尺三寸三分寸之一也面四尺則取其聲之四達也面圍十二尺則法天數以其致天討也中圍十有六尺則二八之數别之至也為臯鼓長尋有四尺鼓四尺倨句磬折者臯鼓以鼓役事宜節之而使緩也昔魯築郎囿季平子欲其速成叔孫昭子曰焉用速成以勤民也然則用民之力其可趣之使疾乎詩曰百堵皆興鼛鼓弗勝者葢以臯鼓節之使緩而有不能勝之疾也鼓四尺亦面徑四尺然其中之穹隆或倨或曲一取于磬折而已無取于過隆焉凡冒鼓必以啟蟄之日葢凡蒙鼓以韋必用仲春之日者葢於是時蟄虫咸動雷乃發聲鼓所取象也良鼓瑕如積環者革之調急而瑕隨臯陶周圍若環之積于内而著見于外也其瑕如此則其鼓聲清越而逺聞非良而能然乎鼓之聲隨其形之大小長短鼓大而短則其勢促而迫故其聲疾而短聞鼓小而長則其勢展而伸故其聲舒而逺聞則為鼓者不可不審也韋氏闕裘氏闕畫繢之事雜五色東方謂之青南方謂之赤西方謂之白北方謂之黒天謂之𤣥地謂之黄青與白相次也赤與黒相次也𤣥與黄相次也青與赤謂之文赤與白謂之章白與黒謂之黼黒與青謂之黻五色備謂之繡隂陽裂而為五行章而為五色播五行于四時者皆隂陽之序雜四時于五色者皆隂陽之理然則畫繢之事雜五色而彰施者豈徒以為設飾之觀而已哉固有法而不説之意焉此五色之彰施所以不能無謂也畫繢之事不過五色而已摸成物體而各有分畫則謂之畫分布五色而㑹聚之則謂之繢所謂青與白相次赤與黒相次此之謂績也所謂山以章此謂之謂畫也故司几筵有所謂繢純則繢而後純有所畫純則純而後畫此畫繢之别也東以始事生物而色始生焉故生丹而為青西以物成得已而數始成焉故入二為白南明之盛而赤以宣布為義故大火為赤北物之辨而黒以至隂為色故火炎為黒天位乎上其分于人也逺其色可見者為最微故入𤣥而為𤣥地位乎下則近人而親其美之可見者為至盛故得中而光為黄于方為東于時為春春者草昧而生之故于青言色所生于方為西于時為秋秋者禾成而入之時故于白言數所入南交于夏為又明故于赤質其物北辨于冬而復幽故于黒探其本天則以其體變而歸根故推其陽之正色言之地則以其赤收功而致養故以其隂之盛色言之言青而繼之以言白而繼之以黒此五行之相生也言青而次以白言赤而次以黒此五行之相剋也言天而繼以地言𤣥而次以黄此天地之相偶也相偶所以相合相生所以相繼相尅所以相治相合如夫婦而相繼如父子相治如君臣隂陽自然之理也一往一來迭王迭廢周旋如轉輪反復如引鐻萬物由之以出入者也古人合此數者用之以為設飾凡以明其理而已物相雜而為文文之成而為章東之青則純乎陽南之赤則雜乎隂陽剛而隂柔以雜之故青與赤謂之文南之赤則陽之生氣于是乎極西之白則隂之殺氣于是乎中隂出而以成陽為事故赤與白謂之章文者章之始章者文之就剛柔雜于東南而為文至西南而後章就固其所也黼為斧形有父之用取其斷也斷主于義而必有智以濟之則不失于黯闇而不通白為義而水為智故白與黑謂之黼也敝兩已相背有相弗之義取其辨也辨主于智而必有仁以濟之則不失于苛察而寡愛黒為智而青為仁故黒與青謂之黻先王以是五色而彰施之以為明設飾之以為服在上則為衣而作繪在下則為裳而絺繡繪于衣者以象天之輕清繡于裳者以象地之重濁然備五采以為繡者豈徒為觀美哉凡以使見者尊其德而有肅心焉夫成象之謂乾效法之謂坤繢陽也故成象于衣繡隂也故效法于裳其用五采亦以象備成之文歟土以黄其象方天時變火以圜山以章水以龍鳥獸蛇雜四時五色之位以章之謂之巧凡畫繪之事後素功古之畫繪之事見於衣服車旗宫室器械之間者其為象豈一端而已哉仰以觀天之文俯以察地之理近取諸身逺取諸物或象其形與其性或象其色與其用道德之義性命之理皆寓乎其中將使天下之人目擊心喻而得乎不説之大法土以黄則象其色者也其象方則象其形者也天時變則象其用者也火以圜則象其性者也至於山以章水以龍鳥獸蛇之類亦象其形也夫天𤣥而地黄則黄者地之盛色也故土以黄天圜而地方則方者地之正體也故其象方地道静而有常天道動而無常則化者地之用而變者天之用也故天時變地二生火其于物也為神其體非體而託於物以為體其用非用而因於物以為用其形雖鋭而其性則圜而無乎不周故火以圜爾雅釋山曰上正章星辰天之章草木地之章畫山者雖象其文之成章而必取其上正之形葢無為而仁者山也有君道之象焉詩曰髙山仰止夫山者人之所仰以喻君為民之所仰也上苟不正下將何觀故繪山必為上之形也莫非山也上窮而卒乎下則為崒上窮而垂乎下則為崜截斷若截孽生若孽崛屈而起巖有衆口皆非山形之上正者也豈君德之比哉故曰山以章取其上正而成章故也龍能作雨以澤物然非澤則無以致其不窮之用故畫龍必以水而曰水以龍凡此皆畫之于服者也烏則鳥隼之旟所以示摯速獸則熊虎之旗所以示猛毅蛇則龜蛇之旐所以示完果此皆畫之於旗者也服有九章而獨言火山龍非特舉章之上者以見下也旗有九物而獨言鳥獸蛇者非特舉物之卑者以見尊也亦藻繪之文設飾之功施于六者為甚焉者故也夫五行播于四序而人觀以為時五行發於五氣而人觀以為色者青於方為東于時為春赤於方為南於時為夏白于方為西于時為秋黒于方為北于時為冬黄配四時之間而位在中四時之錯行五行之迭運然後嵗功待之以為成物曲資之以為利矣四時之協比五色之間施然後服飾得之以為盛彰施因之以為明矣然所以雜之者在乎章也所以章之者在乎巧也非聖人則不能作而探其道非智者則不能創而明其法而巧者則述聖人之道循智者之法以為之而已故曰雜四時五色之位以章之謂之巧天下之事無本則不立無文則不行故内有可貴之質然後外飾之以備成之文素功者質也畫繪者文也惟白為能受采故素功為先而畫繪為後孔子曰繪事後素殆謂此也故凡畫繪之事後素功鍾氏染羽以朱湛丹秫三月而熾之淳而漬之三入為纁五入為緅七入為緇湛子潛反秫音述纁許云反緅側留反天官有染人而冬官又有鍾氏掌染色者葢染人以染絲帛鍾氏之所染者羽而已染羽則難于絲帛故名官謂之鍾氏葢鍾有止聚之意以染羽必湛漬至三月之久然後可熾故也羽之為物雖微而旌旗車服之用衆而不可廢此先王所以獨立官以染歟朱謂采沙以為朱也丹秫先儒謂赤栗也以朱湛漬赤栗以染羽至于天時之一變而後炊熾之以羽之入色為難故也既湛而熾之矣然後又淳而漬之淳與㡛氏所謂渥淳其帛之淳同熟之使洎厚也葢始以朱秫湛熾之其色為未深故又從而淳熟而漬之謂之漬則非一朝一夕之故浸而入之有漸次爾雅一染謂之縓再染謂之䞓三染謂之纁纁者黄而兼赤色其字從熏從炎火之未赤黄色也其熏而黑則猶纁可上達而為𤣥也先儒謂染纁者三入而成又再染以黑則為緅又復再染以黒則為緇矣五入為緅七入為緇則𤣥六入矣𤣥有黒有赤出而大則赤入而幺則𤣥纁事也𤣥道也緅舍纁而取𤣥可謂知取矣以其自事而入於道故也緇又黒于𤣥矣故其字從甾葢隂雍而緇水之所以為赤者隠田之所以為黄者廢矣易于坎言為赤于乾言為大赤以坎為赤則陽在中故也則知離為黒矣以乾為大赤則六爻皆陽故也則知坤為大黒矣易曰其於地也為黒所謂大黒也大黒則緇是矣以𤣥對緇則𤣥猶為德故老子曰是謂𤣥德曰𤣥而達于緇則深矣逺矣不可復加焉則道之至也莊子所謂至道之極昏昏黙黙者是也凡六冕之服其衣皆𤣥其裳皆纁德成而上事成而下之意冕服以𤣥而不以緇以𤣥能隂能陽降道而出為事故也筐人闕㡛氏湅絲以涚水漚其絲七日去地尺暴之晝暴諸日夜宿諸井七日七夜是謂水湅湅帛以欄為灰渥淳其帛實諸澤器淫之以蜃清其灰而盝之而揮之而沃之而盝之而塗之而宿之明日沃而盝之晝暴諸日夜宿諸井七日七夜是謂水湅湅音練涚書鋭反漚烏豆反暴步卜反欄音練渥烏豆反蜃當軫反盝音鹿治絲帛而熟之謂之㡛絲帛熟然後可設飾為用故其字从巾从荒荒言治之使熟也猶荒土以為田焉巾則設飾之物也練絲必以灰以水和解其灰而浸漬之故曰以涚水漚其絲七日則取而出之去地尺而暴之晝暴諸日則以陽氣温之也夜宿諸井則以隂氣寒之也謂之水湅則非渥淳之使熟也以隂陽之氣使之熟而已練帛以欄為灰渥淳其帛者燒爛木以為灰煮而熟之使洎厚故曰渥淳實諸澤器淫之以蜃既渥淳之又盛之以津澤之器從而浸淫之以蜃灰既澄而清則盝而出之而擇去其所惹之蜃灰而沃之以水又從而盝出之既盝出矣又從而塗之以蜃灰而宿之則使經宿焉明日則以水沃洗之乃盝而出之又從而暴諸日而温之以陽氣宿諸井而寒之以隂氣始乎渥淳以欄灰而淫塗之以蜃則致人事焉終乎暴諸日宿諸井至于七日七夜則成以天理為人事天理雖一練之微且不可偏廢自非深達乎性命之理者烏能至此哉周禮詳解卷三十七
