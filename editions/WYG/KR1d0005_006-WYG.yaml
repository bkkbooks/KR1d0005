body:
  text: 周禮詳解卷六宋王昭禹撰􅅑醫掌腫􅅑潰􅅑金􅅑折􅅑之祝藥劀殺之齊祝注讀作注劀音刮齊才細反人之初生因精集神精化而為氣氣化而為血氣中不和則為病血壅不行則為􅅑病以氣而其傷在臟腑􅅑以血而其傷在肌膚先王使人内無病患而不傷其臟腑外無􅅑痛而不傷其肌膚此疾醫有以治内而􅅑醫又有以治外腫􅅑聚而不潰潰􅅑潰而不聚金􅅑兩創未必折骨折􅅑折骨未必兩創腫􅅑潰􅅑自内作而潰􅅑為重金痬折􅅑自外作而折痬為重故先腫􅅑後潰痬先金􅅑後折􅅑也古者於疾則有禱於􅅑則有祝素問曰上古移精變氣祝由而已醫之用祝尚矣而􅅑尤宜祝後世有以氣封􅅑而徙之者葢變氣祝由之遺法也藥者以藥發其所傷劀者謂刮去其膿血也殺者謂以藥食其惡肉也祝之不勝然後藥藥之不勝然後劀劀之不勝然後殺此治􅅑之事凡療􅅑以五毒攻之以五氣養之以五藥療之以五味節之治以止其病謂之療必明見其源如燎然後可以止病故其字從療五毒五藥之有毒者如兵之毒天下乃所以制而生之也然則五藥雖以毒攻殺其惡肉亦所以生之也氣者五臓之氣飬以生之使充實焉素問曰形不足者温之以氣􅅑之治宜以氣也􅅑之治宜以氣而不以五氣飬之反在以五毒攻之之後則必先除其惡然後可飬也五藥正所以治病也治病以五藥為主故獨曰以五藥療之五味所以飬精也精全則氣壮氣壮則形强凡療痬而成之者在乎食之五味故以五味節之節所以成之也夫竹有節物之自然也人即物自然而制節焉乃所以成之也然則五味生精亦物之自然人因其自然而節以五味亦所以成之也葢物有節則剛柔不偏中正以通故天地節則四時所以成也節以制度不傷財不害民而治道所以成也疾醫以五味五穀五藥飬其病而􅅑醫以五藥療之然後以五味節之者疾醫所言者飬也且病以治内為主故先味而後藥􅅑醫所言者療也且􅅑以治外為主故先藥而後味至於飬之以味而療痬之事成於此矣凡藥以酸養骨以辛養筋以鹹養脉以苦養氣以甘養肉以滑養竅凡有􅅑者受其藥焉素問曰酸收辛散鹹耎苦堅甘緩夫肉以骨為體骨收則强故以酸收之肉以筋為節筋散則不攣故以辛散之脉所以行血脉耎則和故以鹹耎之氣所以充體氣堅則强故以苦堅之肉緩則不壅故以甘緩之竅利則不滯故以滑利之且腎主骨腎水屬也故欲收肝主筋肝木屬也故欲散心主脉心火屬也故欲耎肺主氣肺金屬也故欲堅脾主肉脾土屬也故欲緩至於竅則以骨為體而以肉為包所以通氣也素問曰骨肉滑利可以長乆惟滑則無所凝止則竅亦水屬也故以滑利為主於􅅑醫言飬骨筋脉氣肉竅則善飬其六者􅅑無所生也及其生也則亦以此養焉則肌膚可復完矣凡有􅅑者必於焉受藥則􅅑醫之設凡以為是故也疾醫言死終則必書其所以入於醫師而此不言者葢醫師言凡邦之有疾病疕􅅑者造焉繼之以嵗終則稽其事以制其食則疾痬醫皆書所以而入於醫師以疾醫見之也獸醫掌療獸病療獸􅅑愛人而已非仁之至也物之㣲無不愛焉然後可以為仁之至治人而已非政至也物之㣲無不治焉然後可以為政之至先王於獸雖有所不仁而常致其愛雖苦之為多而亦有所治此獸醫之職所以立也且人之與獸其賦形禀性雖不同而其資氣於隂陽則一故其血氣不和亦不能無病與􅅑然獸之可醫者若牛馬之屬係乎人之所畜養者也與􅅑同醫賤物故也凡療獸病灌而行之以節之以動其氣觀其所發而養之凡療獸􅅑灌而劀之以發其惡然後藥之養之食之食音似惟人之能言則可以知其病之所在獸不能言則病状難知故必灌之以藥使行焉又從而節止之以是而動作其氣氣既動作則脉候可視因以觀其病之所發而飬之則其病可療矣􅅑則血之所結聚或腫或潰猶或為易知故先灌而攻之以刮去其膿血而發其惡然後可療焉故發之以藥飬之以佚其體食之以充其體此療獸􅅑之序也凡獸之有病者有􅅑者使療之死則計其數以進退之先王雖貴人而賤物然而療獸􅅑者有能否亦不可以無勸沮之術故計其生死多寡之數以為之進退焉醫師言主其醫事以制其食獸􅅑言死則計其數以進退之者制其食則有進退進退之則因制其食矣人死言終獸言死則亦以物之所以死不可察故也不稽其全失為上下而計其生死為進退則以是故也酒正掌酒之政令以式灋授酒材凡為公酒者亦如之灋古法字夫酒之為物以承祭祀以接賔客以養老病以行愛恭之情其用可謂博矣一事之不可遺一禮之不可闕先王由是設官以掌之分職以治之此酒人漿人之類所以立而又有酒正以為之長也惟其為酒官之長故酒之政令皆以掌之政有所正令有所為豈特見於醸造供承之際哉夫豢豕為酒非以為禍而酒之流實生禍故以禮飲酒者始乎治常卒乎亂則酒正之掌政令亦所以謹酒也式其給用之式若米麯多寡之數也法其造醸之法若水火齊量之差也酒材則凡資之以為酒者皆是也月令曰乃命大酋秫稻必齊麯蘖必時湛饎必潔水泉必香陶噐必良火齊必得亦此意也凡為公酒則非私法之造醸若鄉射飲酒之類以公事而為酒也亦酒正以式法授酒材於酒人故曰亦如之辨五齊之名一曰泛齊二曰醴齊三曰盎齊四曰緹齊五曰沈齊盎烏浪反緹音體五齊用以祭祀非人所飲每有祭祀其造作必有量數故曰齊焉以其成而滓浮泛泛然則謂之泛齊以其滓汁相將而一體則謂之醴齊以其色葱白如盎於背然則謂之盎齊以其成而有紅赤之色則謂之緹齊以其成而滓況於下則謂之沉齊禮運曰𤣥酒在室醴醆在戸粢醍在堂澄酒在下葢𤣥酒則泛齊也醆則盎也澄則沉也五齊用之以祭祀不致其味致其義而已故酒正辨其名名者義之所出故也辨三酒之物一曰事酒二曰昔酒三曰清酒事酒酌有事者之酒也昔酒熟而乆者也酒生則清熟則醇清酒酒之生者也詩或言祭以清酒或言清酒百壺盖酒清則為近本故於事神接人之際皆以清為尚焉然泛齊以薄而近本五齊用以祭故以泛齊為先清酒以生而近本三酒用以飲故以清為後五齊言辨名三酒言辨物者葢三酒以飲非若齊之致其義務致其實而已物實之所效故言辨其物辨四飲之物一曰清二曰醫三曰漿四曰酏醫於已反酏以支反清酒醴之泲者葢醴酒而泲之斯清矣醫則内則所謂或以酏為醴者葢以酏爲醴則少清矣漿所将食成而米汁亦相将矣酏粥之薄者與内則所謂黍酏類矣漿於三酒為薄於五齊為厚亦人所飲者故亦言辨其物與三酒言物同意然漿人有六飲此言其四而不言水凉者葢水凉無厚薄之齊非酒正所辨故也掌其厚薄之齊以共王之四飲三酒之饌及后世子之飲與其酒齊才細反五齊三酒四飲皆酒人漿人所造酒正特辨其厚薄之量而已故曰掌其厚薄之齊共王四飲三酒不言五齊則五齊獨用於祭祀故也食用之有節不一而止者謂之饌酒正於王非特共其四飲三酒又為之共其饌也后世子之飲與其酒共之而已弗為之饌也故但及后世子之飲與其酒然酒正於其所辨則先三飲而後四飲厚薄之序也於其所共則先四飲而後三酒輕重之序也凡祭祀以灋共五齊三酒以實八尊大祭三貳中祭再貳小祭壹貳皆有酌數唯齊酒不貳皆有器量凡祭祀者徧言天地宗廟社稷諸神之祭祀也祭祀雖不一其共五齊三酒則一而已葢以神事焉故用五齊以人飬焉故用三酒五齊三酒物各一尊凡八尊而其所實又皆有法也大祭三貳中祭再貳小祭壹貳皆有酌數者非此八尊所實齊酒則皆有貳所以備其少也大祭則王服衮冕而祭者大祭所酌度用一尊則以三尊副之中祭謂王服鷩冕毳冕而祭者中祭所酌度用一尊則以兩尊副之小祭謂王服希冕𤣥冕而祭者小祭所酌度用一尊則以一尊副之而其所實又皆有酌數也必有酌數将以量所用之多寡而備之也大祭所貳尤多則尤致其嚴矣惟齊酒不貳皆有噐量者惟所實八尊五齊三酒則無尊以副之而其尊所實亦皆有噐量也為其弗酌也故有噐量而無酌數也凡祭祀必設此五齊三酒而弗酌則所以致事養之意而非以為味是所謂禮之敬文也共賔客之禮酒共后之致飲于賔客之禮醫酏糟皆使其士奉之禮酒謂致饗於賔客之酒饗以訓恭儉爵盈而不敢飲為禮而已故曰禮酒后亦致飲于賔客者葢建國則王立朝后立市祭祀則王耕以供粢盛后蠶以為祭服王獻尸后亞祼王親執紖牽牲后親薦徹豆籩賔客則王亦祼獻而后亞之王致酒后致飲夫婦相成之義也醫酏糟者與漿人所謂清醴醫酏糟而奉之同意夫醴有清糟謂之清醴則非糟矣醫酏糟而奉之則所謂醫酏者非清矣使其士奉之者酒正中士四人下士八人所謂酒正則中士也所謂士則下士也王致酒后致飲不若酒之厚也必并糟而奉之矣糟不若泲之清也凡此皆亦其所厭於王矣凡王之燕飲酒共其計酒正奉之夫饗以訓恭儉以禮為主燕以示慈恵以恩為主故燕飲則取醉而已不若饗之為有節然當防其過焉故共其多寡之計使知其不節則自戒矣葢至尊不可以有司法數制之故但共其計而已然則於后何以不共其計后王所帥也王知自戒則亦已矣凡饗士庶子饗耆老孤子皆共其酒無酌數饗士庶子耆老孤子雖云以禮為主然王施徳恵取醉之而已故無酌數葢王於士庶子饗之所以任之於􅂄老孤子饗之所以親之取醉而無酌數則所以厚之任之而致其厚則彼将忘其勞親之而致其厚則彼捋忘其死詩曰厭厭夜飲不醉無歸凡王施徳惠皆以醉為度則酌數非所拘矣掌酒之賜頒皆有灋以行之凡有秩酒者以書契授之賜出非常所以為私恩頒為有常所以為公義然或賜也或頒也亦皆有度數焉傳曰名位不同禮亦異數葢先王制禮有名然後有位有位然後有數禮數之多寡實因名位而制之雖一頒賜之㣲又安可以無法哉大宰於匪頒賜予皆有式以均節之則酒之頒賜其有法可知矣凡有秩酒者有常賜之酒也鄭氏以王制九十日有秩而謂有秩酒者老臣也老臣故宜有秩酒然有秩酒則非特老臣而已如宫伯里宰所謂行其秩叙者豈必老臣哉以書契授之者書簡牘也契合而驗之取予之要也授以書者使知其所得之數授以契者使執以取酒也酒正之出日入其成月入其要小宰聼之嵗終則㑹唯王及后之飲酒不㑹以酒式誅賞酒正之出謂出以給用也日入其成旬計也月入其要月計也入謂入其書於小宰也必使小宰聼之則小宰執九式之貳當守出納之政止其不如法者也於酒特謹其出異於餘物先王所以防患之意可謂㣲矣豈特是哉彛有舟以示其沉溺之禍尊有罍以示其浸滛之患觚言其窮而為孤觯言其窮而為單醆以言其殘散以言其散先王以禮用每每致戒焉况於給用之際乎宜其設官有以毖之也嵗終㑹則一嵗用酒之數總計其多寡而入於太宰焉唯王及后之飲酒不㑹則雖世子之貴亦在所㑹所以防荒侈也以酒式誅賞者葢酒正於授酒材之初既有給用之式則於造成之後必以式計其贏不足羙惡之數然則如式者在所賞而不如式者在所誅矣酒人掌為五齊三酒祭祀則共奉之以役世婦酒正掌酒之式法故於五齊三酒特辨其名物而已酒人則授酒材於酒正而造醸之故曰掌為五齊三酒世婦宫卿之官掌女宫之宿戒及祭祀比其具酒人則共其物奉其事以為世婦之役也共其物則如下文所謂祭祀共酒以往是也奉其事則如下文所謂共禮酒飲酒而奉之是也詩於采蘋言共祭祀采蘩言奉祭祀與此同意共賔客之禮酒飲酒而奉之禮酒者饗酒也飲酒者燕酒也饗以訓恭儉爵盈而不飲為禮而已故饗酒謂之禮酒燕以示慈恵其飲以醉為度故燕酒謂之飲酒饗必行於廟示之以尊燕必行於寢示之以親其意亦可見矣酒人共禮酒飲酒非特共其酒而又奉其事故曰共而奉之凡事共酒而入于酒府凡祭祀共酒以往賔客之陳酒亦如之酒正掌辨酒物及厚薄之齊故凡事共酒入於酒府酒正焉而後共之酒正言共賔客之禮酒酒人言共賔客之禮酒飲酒而奉之凡事共酒而入於酒府則酒正所共禮酒而已其飲酒則自酒人之所共酒人之共禮酒則共之入于酒府酒正之共禮酒則酒人之所入而共之酒正共之而已酒人又奉之也葢雖飲酒亦必酒正眡焉而後共之以酒人凡事共酒入於酒府也凡祭祀共酒以往不自奉之往待其令而已賔客之陳酒亦如之者見傳漿人掌共王之六飲水漿醴凉醫酏入于酒府酒漿皆人所飲有酒人又有漿人者酒與漿之造釀異法故異職爾葢凡造酒者以土之甘合水作酸以木之酸合土作辛而酒成焉漿人之為六飲則異於此大槩煮酏而為之故分為二職也以其味薄而淡則謂之水以其煮寒粥而為之則謂之凉酒正但辨四飲而不辨水凉以其無厚薄之齊故也夫酒雖人所飲而以用於祭祀為主若漿則主於飲而已故漿人但言共王之六飲而未嘗及祭祀然漿人所謂醴即酒正所謂清清與醴一物也言清則知所謂醴者清言醴則知所謂清者醴酒正言清漿人言醴互見也然酒正必言清則以醴有清有糟而漿人掌共王之醴者皆清醴也夫人致飲於賔客之禮所謂清醴者此也漿人不言共后世子者水凉自其宫屬共之四飲則酒正共之矣漿人不共水凉則與膳夫不共薦同意水凉無厚薄之齊又非酒正所共而亦入于酒府則以共王故酒正眡之也共賔客之稍禮共夫人致飲于賔客之禮清醴醫酏糟而奉之凡飲共之稍禮與稍食之稍同非禮之盛者王稍稍給用於賔客也若庖人繼肉廩人繼粟稍給其物也漿人不主酒則稍禮所給六飲而已夫人有致飲于賔客之禮則猶冢宰之有好賜予也葢上下内外大小相成焉禮之所以立也后致飲則醫酏糟而已厭於王也夫人致飲則又有清醴焉卑者不嫌故無厭也其厭也乃所以為貴也禮有以少為貴此之謂也凡王之饋飲用六清則上文共王之六飲者乃饋食所共也此言凡飲共之則非必饋食始共但王凡所用皆共之凌人掌冰夫水得重隂而為氷凌人伐之則為凌氷凝而為氷者天也伐氷以為凌者人也先王通寒暑之序以應隂陽之㑹則斬氷而藏之者凡以相天而已則在人者又烏知其非天耶凌人掌氷謂是也夫藏氷将以備暑而亦所以逹陽出氷雖以禦暑而亦所以助隂葢隂陽之氣流行於天地之間一氣之不至則閉塞而為灾一氣之或過則乖戾而為疾善防患者或飬其弱而抗其强故方隂之盛而陽之㣲也則鑿氷以達陽以損其有餘以補其不足故方陽之隆而隂之消也則出氷以禦暑如此則無愆陽無伏隂無閉塞乖戾之患矣則氷之為物雖㣲而先王設官以掌之不為小補矣正嵗十有二月令斬氷三其凌令力證反正嵗夏之正也十有二月則建丑之月詩曰二之日鑿氷冲冲三之日納於凌隂二之日建丑之月也三之日建寅之月也斬而取之以建丑之月納而藏之以建寅之月也葢氷之為物感觱發之風而凝感栗烈之氣而壮之建丑月則氷壮之時故入山斬之且古之斬氷深山窮谷凅陰冱寒於是乎取之日在北陸於是乎藏之葢陰積而為冬至建丑之月是時也陰雖已退而其氣猶盛陽雖已萌而其氣未浮則隂有餘而强陽氣不足而弱則斬而藏之者乃所以宣助陽氣也必三其凌者葢陽至於乾隂至於坤皆三而後成也先王斬氷而藏之亦以應隂陽之數備消息之患而已故亦三其凌也春始治鑑凡外内饔之膳羞鑑焉凡酒漿之酒醴亦如之鑑胡暫反鑑盛氷之噐也出氷則必有噐以盛之故治鑑治鑑敗非適春時以春為始故春始治鑑膳羞盛暑氣則易酒醴感暑氣則易酸必共氷以寒之故凡外内饔之膳羞鑑焉凡酒漿之酒醴亦如之祭祀共氷鑑賔客共氷祭祀賔客共氷皆所以禦暑患也祭祀則氷與鑑并共之賔客則共氷而已葢祭祀則盡物於一日之間故必共氷鑑賔客則不必用一日之乆若以鑑共之則非所以待斯湏也故不共鑑大䘮共夷槃氷實氷於夷槃置於尸牀之下所以塞尸也夫死必臭腐自然之理神去而尸陳先王豈不通乎遒區區有累於是哉誠不忍其親之速朽故用氷以塞之夷之言傷也氷盤曰夷槃移尸於堂曰夷堂牀曰夷牀衾曰夷衾皆以哀傷為主也夏頒氷掌事秋刷刷所劣反陽氣積而為夏則蟲蟲而熱炎炎而暑陽氣過盛而無以制之則非徒致煩縟之患而隂陽不和反傷人之形則疾癘作矣故夏時之痒疥則以陽溢於皮膚故也秋時之痎瘧則以夏陽之傷於腑臟故也先王至是而頒氷者所以禦暑患也葢氷之為物用之以食則有以消夫暑之自内生用之以寒則有以消夫暑之自外至故夏則頒氷於羣臣而凌人掌其事也傳曰古者日在北陸而藏氷西陸朝覿而出之葢冬至之後日在北陸時斬氷而藏之於以泄陽而制隂夏至之後日在西陸出氷而頒之於以發陰而制陽先王之政裁成天地之道輔相天地之宜以左右民則雖隂陽亦在所治也及乎政事之不修時令之不節而隂之過有至於為雹霰之患則其所以左右民者殆矣陽氣時極而陰氣或包之此所以為雹隂氣時極而陽盛散之此所以為霰陰陽磅礴而相和此所以為雨雨者陰陽之和故先王於秋則刷氷室以待冬之所藏矣籩人掌四籩之實先王之祭祀内盡志以致其内心外盡物以致其外心水草之菹陸産之醢則細物備矣三牲之爼八簋之實則美物備矣昆蟲之異草木之實則隂陽之物備矣凡天之所生地之所産而可薦者莫不咸在一物不可遺則一噐不可闕籩豆簋爼禮之噐也噐以薦物而致禮則籩豆之事各有司存此籩人醢人之職所以立也籩人醢人非特掌其噐而已并與其實而掌之此籩人所以掌四籩之實也四籩則朝事饋食加籩羞籩是已四籩之實則麷蕡白黒糗餌粉餈之類是也朝事之籩其實麷蕡白黒形鹽膴鮑魚鱐蕡符文反鱐所求反朝事之籩則象朝事其親之所進也古者宗廟之祭有九獻之禮二祼之後王殺牲以獻則所謂朝事也后於是乎薦此八籩之所實則麷蕡白黒形鹽膴鮑魚鱐之八物熬麥謂之麷枲實謂之蕡白熬稻也以其色白故謂之白黒熬黍也以其色黒故謂之黒形鹽則築鹽以為虎形也膴則䐑肉為大臠也鮑則魚之鮮者包以致之也鱐者魚之乾者肅以致之也於中言魚則鮑鱐皆魚也王使周公閱來聘魯饗有昌歜白黒形鹽辭曰國君文足昭也武可畏也則有備物之饗以象其徳羞嘉穀鹽虎形麷蕡白黒則公閱所謂羞嘉穀也形鹽則公閱所謂鹽虎形也公閱以鮑羞嘉穀鹽虎形為備物之饗推類而言之則膴為大鱐為備魚之鮮薧皆所謂致其盛者也孝子之事親欲致其養其養也欲致其盛故朝事之籩其實如此記曰鼎爼竒而籩豆偶隂陽之義也葢籩豆之實物産之雜也其數宜偶故朝事之籩其實麷蕡而下凡八物矣加籩之實蓤芡栗脯兩言之者皆偶也朝事之禮在司尊彛或謂之朝踐或謂之朝獻者交相備也曰事者其事親也曰踐者言籩豆有踐也曰獻齊酒之物也掌籩豆之實則致其事而踐與獻則所以為禮故不言也饋食之籩其實棗㮚桃乾䕩榛實䕩力到反榛側巾反饋食之籩以象食時所進也朝事薦血腥之後王饋食以獻則所謂食也后於是乎薦此棗栗之類則所謂饋食之籩也棗有早意栗取其肅榛取其至桃乾䕩則物之細者也棗栗榛實女所用摰以告䖍也凡此所謂備其細且致其敬也孝子之飬欲致其盛以為不足則又傋其細既備其物以為是飬而已弗敬不足以為孝則又致其敬焉故傋食之籩其實如此朝事之籩凡八物而此不足其數者葢籩豆之噐以八為數而五者之實或乾或生相足而為八籩之實也饋食之禮在司尊彛或謂之饋獻或謂之再獻者亦互相偹也以食言之則謂之饋食以齊酒言之則謂之饋獻以祭之序言之則謂之再獻豆之食以食為主故言其實而獻與序則尊彛之事故不言也加籩之實蔆芡㮚脯蔆芡㮚脯蔆音陵芡音儉加籩以象饋愛之有加也尸食後王酳尸后亞王酳尸於是薦蓤茨栗脯所謂加籩也菱芡非園囿所産則取之難矣栗脯非桃乾䕩之味則味之美者也此致其難且致其美矣夫孝子之飬致其敬則亦已至矣然而孝子之心則又欲致其難且致其美故加籩之實所用如此饋食之籩以栗為敬此又以栗為美者葢栗之為物以形言之則有嚴栗之象故可以為敬而其味則又人之所美故又可以為美故兩言之羞籩之實糗餌粉餈餌而志反餈昨資反羞籩則象其飬之有羞也此王酬尸之時内饔進之也餌說文以為粉餅糗餌則糗之而為餅也餈鄭氏以為餈之黏著以粉之耳羞擣米為餈用粉恐其黏著矣餌與餈皆糗而粉之或言粉或言糗互相足也糗餌粉餈其穀出於耕耨而用春治之力為多此所謂服勤以自致也夫孝子之飬以為致其難且致其美是亦有力者所易也則又欲自致焉故羞籩之實所用如此凡祭祀共其籩薦羞之實薦羞皆進也薦籩則所進之物薄羞籩則致滋味焉上言四籩之實皆宗廟之祭也此言凡祭祀則凡諸神之祭祀皆是已宗廟之祭祀王所親預則籩豆之噐王官共之凡祭祀則不必王之親預而籩豆之噐自有共之者籩人特共其實而已䘮事及賔客之事共其薦籩羞籩䘮事賔客之事皆王之事籩人共其實亦共其籩故曰共其薦籩羞籩薦若果蓏之属羞則致滋味矣為王及后世子共其内羞凡籩事掌之内羞房中之羞也内羞之物世婦涖陳之則内羞所用主於祭事而王及后世子所共籩人為王及后世子共之而已凡籩事則凡籩之實與其用皆掌之也曾子曰君子所貴乎道者三籩豆之事則有司存然則動用周旋中禮盛徳之至也守其數不知其義一介之有司也籩豆之為禮皆王之所親籩豆之為噐則掌於奄人女奚之属所謂本在上末在下本末並由而不徧廢此道之所以立也醢人掌四豆之實醢呼改反掌四籩之實以籩名官掌四豆之實不以豆名官者葢籩豆噐也籩豆之實皆物也噐所以盛物物所以効實有其噐則物從之矣有其物則噐從之矣或言噐式言物互相備也相備而必於醢人言物則以四籩之實其物不一不可以物名官四豆之實皆醢而已故以醢人名官四豆之實則五齊七菹三臡之類是也合而言之則皆醢之屬也朝事之豆其實韭菹醓醢昌本麋臡菁菹鹿臡茒菹麇臡韭音乆醓吐感反臡乃兮反菁作寧反茆音茅麇京倫反朝事則籩人朝事之節也齊菹則土之和氣也醢臡則天産之所成也韭菹以韮為菹詩曰四之日其蚤獻羔祭韭以此薦新則韭亦祭之所貴也昌本則昌歜也魯饗周公閱有昌歜者饗之所貴也菁蔓菁也菹鳬葵也亦用之所貴也醓肉汁也醓醢以肉汁為醢也醢以肉為之臡以肉之附骨者為之麋鹿麇非人所畜肉味所貴也故用之為臡韭菁茒言菹而昌本不言則昌本乃韲也朝事之豆所以致其盛故其實如此饋食之豆其實葵菹蠃醢脾析蠯醢蜃蚳醢豚拍魚醢蠃戸禾反析星歴反蠯薄隹反蜃市軫反饋食則籩人饋食之節也葵草之細者也傾心向日則有敬意脾析則析脾為之豚拍則拍豚而為之脾析豚拍皆物之小體蠃蠯蜃蚳及魚則亦皆物之細也饋食之豆備之豆備其細且致其敬故其實如此朝事之籩其實有魚而饋食之豆亦有魚者魚䴡美萬物盛多能備禮則魚可以為盛亦可以為備故也朝事之籩貴其盛饋食之豆備其細故皆用魚也加豆之實芹菹兎醢深蒲醓醢箈菹鴈醢筍菹魚醢芹音勤箈音迨筍息尹反加豆則籩人加籩之節也芹楚葵也深蒲則蒲始生者於水為深也箈箭萌也筍竹萌也葵棗之類取諸園圃而足芹與深蒲箈筍則取之逺矣兎則物之狡者鴈則能飛魚則能潛蠃蠯蜃蚳則可掇而取兎鴈魚則不可以掇而取之矣醓於醢為盛而於味為美故朝事之豆有醓醢而加豆之實又有之魚則於物為細於味亦為美故饋食之豆有魚而加豆亦有之凡加豆之實所以致其難且致其美故其實如此羞豆之實酏食糁食糁素感反食音似羞豆則籩人羞籩之節也酏食則以酏為食若酒酏然故謂之酏食也糁食則以糁為食合肉與末煎之故謂之糁食也羞豆之實所以服其勤而致新以獻之故其實如此葢酏食其穀出於耕耨而皆用舂治之力所以為服其勤也又其物非若菹醢之屬可以乆所以為致新也夫籩與豆所以相湏而成禮其為噐雖異而其用則同其為用雖同而其實則異矣鼎爼竒而籩豆偶則籩豆皆隂也此其用所以同陰陽之中又有陰陽焉籩以竹為之豆以木為之此其實所以異記曰籩豆之實水草之和氣也然此所實不特水草之和氣而已葢天子之孝内盡志外實物非若諸侯之為道也以天産作隂徳則豆之所實宜以醢為主以地産作陽徳則籩之所實宜以植物為主然籩之實或有天産豆之實或有地産則隂陽亦宜相資故也凡祭祀共薦羞之豆實賔客䘮紀亦如之為王及后世子共其内羞上文言四豆之實則宗廟祭祀之禮也此言凡祭祀則凡祀典所秩者皆是也凡祭祀則不共其噐共其實而已故曰凡祭祀共薦羞之豆實賔客則非所謂賔客之事也䘮紀則非所謂䘮事也賔客䘮紀則掌客職䘮之屬匄有共其噐者醢人所共其實而已故曰賔客䘮紀亦如之籩人先䘮事後賔客尊卑之序此先賔客後䘮紀吉凶之序也籩人言共其籩薦羞之實此言共薦羞之豆實則籩人以籩名官而醢人不以豆名官故也王舉則共醢六十罋以五齊七醢七菹三臡實之賔客之禮共醢五十罋凡事共醢齊子兮反菹荘魚反臡乃兮反膳夫凡王之饋醤用百有二十罋此言共醢六十罋者葢醯醢合而為百有二十罋醢人共其半故也五齊則昌本脾析豚拍蜃深蒲是也七醢則醓蠯蠃蚳魚兎鴈是也七菹則韭菁茒芹葵箈筍是也三臡麋鹿麇是也雜用此五齊七醢七菹三臡以實六十罋故曰共醢六十罋以五齊七醢七菹三臡實之凡言賔客則賔客之所常用也賔客之事則王親禮賔客所行之事也賔客之禮則使人待賔客所致禮也事則多故禮則多儀事生於所作禮出之於所恭此所醯以有賔客之事與所謂賔客之禮也掌客之禮上公醢百有二十罋侯伯百罋子男八十罋此共醢五十罋合醯人所共醯五十罋共百罋則指侯伯而言舉中以見上下也凡事共醢則非特祭祀賔客䘮紀之事而已凡邦之事有用醢者皆共之也醯人掌共五齊七菹凡醯物以共祭祀之齊菹凡醯醤之物賔客亦如之齊子兮反菹荘魚反醢人有五齊七菹而醯人亦共之者葢齊菹有湏醤以成者有湏醯以成者則醢人醯人各有五齊七菹也凡醯物則凡以醯成之物也凡醯醤之物則凡以醯成之之醤也醯人所共齊菹幽莫大於祭祀以事神明莫重於賔客以接人故先言祭祀繼以賔客亦如之王舉則共齊菹醯物六十罋共后及世子之醤齊菹賔客之禮共醯五十罋凡事共醯醢人王舉則共醢六十罋醯人共醯六十罋膳夫所謂醤用百有二十罋者此也若后及世子之醤齊菹凡醤齊菹用醯以成之者皆共之也賔客共醯五十罋合醢人五十罋則掌客所謂醯醢百罋也凡事共醯則非特祭祀賔客凡邦用醯皆共之也鹽人掌鹽之政令以共百事之鹽政有所正以聚百物也令有所使以共百物也醢人醯人皆不言政令而鹽人言之者則鹽之為物其用博其利厚異於醯醢必有政令以治之也先王之時山有虞川有衡物為之厲而為之守禁至於鹽則其守禁尤嚴則政令其可廢乎後世有榷山海之利而歸之公上者葢亦出於此矣彼漢儒徒有惡利之說欲一切㢮之以與民是豈知先王為政之法哉以共百事之鹽者鹽之為用非一若鹽人所掌有祭祀賔客及王后世子膳羞之所共者是也祭祀共其苦鹽散鹽賔客共其形鹽散鹽王之膳羞共飴鹽后及世子亦如之凡齊事䰞盬以待戒令苦音盬䰞音煑苦鹽鹽之苦者葢今顆鹽是也散鹽鹽之散者葢今末鹽是也散鹽不如苦鹽之顆又不如戎鹽之甘故不以味名之而名其體也形鹽則鹽之為虎形者賔客共形鹽則備物之饗且象其武之可畏也為虎形而必以鹽則鹽可以柔物而從革之所生潤下之所作求其生作之方則西北也故以為虎形以象天下之武以天道致剛於西北故也朝事之籩有形鹽而鹽人不言者賔客共之則祭祀從可知矣飴鹽鹽之甘者葢今戎鹽是也祭祀共苦鹽則以盡物為主賔客共形鹽則以昭徳為主后世子共飴鹽則以致味為主祭祀不言共飴鹽后世子共之則祭祀從可知矣齊事則食醫所謂和王之食飲膳羞珍醤之齊是也言凡齊事則不特共事之齊事凡和五味之類皆是也故䰞盬以待戒令而已葢已作成為鹽未作成為盬鹽於鹽為今盬於鹽為古䰞盬則煮之以為鹽也凡齊事有待於煉治以成鹽則不可無戒以勑其偹預也不可無令以使之行用也鹽之為物雖㣲而先王立官以掌治之其戒令如是之嚴則不弛其利以委於貨殖之豪傑可知矣幂人掌共巾幂用以幂物通上下而有之者巾也故巾之字從冂從丨然巾之為物非止於覆幂而已葢以事言之則主於覆物由禮言之則主於設飾覆以昭其用也設飾以昭其文也幂人掌共巾幂或以冪八尊或以幂六彛其職主於覆以為用故以幂人名官内則子婦事父母舅姑佩紛帨此用之於佩者也又曰盥卒授巾此用之於盥者也其用不一而名官以冪人豈非巾之設以覆幂為大歟祭祀以疏布巾幂八尊以畫布巾幂六彛疏布布之疏而質者畫布布之畫而宻者葢言畫則知疏布之素言疏則知畫布之宻疏而素者質也畫而宻者文也八尊則酒正凡祭祀共五齊三酒是也六彛則司尊彛所用以祼之六彛是也八尊實而不酌是禮之文也禮之文成之以質故以疏布巾幂八尊六彛用之以祼是禮之質也禮之質成之以文故以畫布巾幂六彛尊尊而彛卑故先尊而後彛畫布巾先儒謂畫雲氣非是也以經攷之下文言凡王巾皆黼則畫布巾亦皆畫黼矣葢巾以覆物以象天事之武固其宜也凡王巾皆黼考工記曰白與黒謂之黼則黼為斧形以白黒為之西北方之色天道致剛於西北而其事武巾以覆物宜象天事故王巾皆黼且天道申於東南而屈於西北其出有方以仁而致其柔所以生萬物也其入無方以義而致其剛所以成萬物也天地之大徳曰生不以義而致其剛則無以終萬物之功王以道而覆萬物其可一於柔乎巾以象天事之武以法天而成物也周禮詳解卷六
