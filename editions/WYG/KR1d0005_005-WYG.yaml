body:
  text: 周禮詳解卷五宋王昭禹撰甸師掌帥其屬而耕耨王藉以時入之以共齍盛耨乃豆反齍音資郊外曰甸田庖於洫甸法正在是也甸師以下士二人為之而其徒有三百之衆名其官曰師則主教其屬故也公田謂之藉以其借民力冶之故也王所親耕謂之藉則亦借民力終之故也王與諸侯各有藉田故甸師所耕耨謂之王藉王者以孟春之月躬秉耒以耕其藉天子三推三公五推卿諸侯九推庶人終於千畆庶人則甸師之屬其徒三百是也所謂帥其屬者此也以耒而利地則謂之耕以金而芸草則謂之耨孟子所謂深耕易耨是也王必三推者身先以帥天下也以庶人耕耨之者續終以尊天子也以時入之則春稼而徃秋穡而來入其粟而藏之倉人也以共粢盛者在穀曰粢在器曰盛共之所以祭祀也且四海之内各以其職來祭而王必親耕以共粢盛者服勤以自致也以天子之尊而必親耕則天下之為農者孰不勸於耕以天子所親耕者共粢盛則天下之為子者孰不勸於養行一物而其義兩得之矣傳曰民之大事在農上帝之粢盛於是乎出民之蕃庶於是乎生事之供給於是乎在和協輯睦於是乎興財用蕃殖於是乎始敦龎淳固於是乎成天子親耕藉田者敦本之道孰大於是祭祀共蕭茅杜子春曰蕭香蒿也取蕭祭脂郊特牲曰蕭合黍稷臭陽逹於牆屋蓋宗廟之祭既薦之後取蕭與脂及黍稷焫之俾其香氣上逹所以求神也亦其交神明之徳當如此也凡鬼亨祼鬯求諸陽索祭祝於祊求諸隂陽之間游魂為變無不之無不為也故求之不可以一處茅以藉祭祀之物以縮酒易曰藉用白茅為苴以藉祭也齊桓公責楚不共苞茅而曰王祭不共無以縮酒是取茅以縮酒酌也然必用茅者為其體順理直柔而潔白承祭祀之徳當如此也必使甸師共之以其出於王藉乃所以盡志也共野果蓏之薦蓏力果反郊外曰野甸在逺郊之外稱野植生曰果若梅李之屬是也蔓生曰蓏若瓜瓞之屬是也先王之祭内盡志外盡物致誠也致信也盡志之謂也致逺也致衆也盡物之謂也果蓏之薦所以盡物必共於王藉所以盡志盡物以致其外心盡志以致其内心記曰孝子為能養親謂是也喪事代王受眚災眚生景反過誤謂之眚天火謂之災眚者人為也災者天為也受眚則以眚為在已受災則服災而弗拒使甸師代則以方宅喪不可以接神甸師掌共祭薦之物神所依也王之同姓有辠則死刑焉辠古罪字文王世子曰公族有罪則磬於甸人又曰公族無宫刑獄成致刑於甸人死於甸者罪之重者也刑於甸者罪之輕者也同族之死刑必于甸師氏者刑於隱也先王之用刑以義為主以仁為助同姓有罪不免於死者義也刑而不暴於外者仁也非義無以公天下之法非仁無以顯同姓之恩記曰刑於隱者不與國人慮兄弟也刑於隱必於甸師氏以甸師共祭薦之物故也共祭薦物所以事宗廟之親而致死刑焉則正法然後能保天下國家能保天下國家然後宗廟可得而事也然則親而致死刑乃所以事宗廟也帥其徒以薪蒸役外内饔之事夫官不能兼事故外内饔掌割亨之事至於薪蒸則使甸師給之大木曰薪小曰蒸謂之薪者以木斬之而於薪為新故也謂之蒸木小而所續衆故也甸師其徒三百人則非特以耕耨王藉亦以供役於外内饔故也蓋甸師之地有田有萊田則共粢盛萊則共薪蒸此天下所以無曠土也然則有言帥其屬有言帥其徒者蓋言其所統則曰屬言其所役則曰徒獸人掌罟田獸辨其名物獸綱謂之罟以柔而守之為義也掌罟田獸則以罟取所當罟之獸也四時之田與田畆之田同字者以其養禽獸而取之以為人利與田同也蓋為之圍則與疆理同攻蟄獸掎猛鳥則與耘同度可殺然後取則與擭同夫春田用火夏田用車秋田用羅冬田用徒而此獨言罟者蓋四時之田兼用罟也名物則庖人所謂體名􅁏物也庖人共膳羞辨之宜矣而獸人亦辨之者蓋先辨其名物然後入於庖人冬獻狼夏獻麋春秋獻獸物獸人之獻獸雖以共膳羞之用然其大概以除民物之害為主則獸人之立官非適為一人之奉養也冬獻狼者冬物成之時狼害物之尤者故冬獻之夏獻麋者夏田稼之時麋害稼之衆者故夏獻之春秋書多糜為是故也冬於其尤害物之時罟而獻之也春春秋獻獸物者雍氏春令為阱擭溝瀆之利于民者則獻獸物亦以除害與雍氏令為阱擭同意大司馬秋田羅弊則秋獻獸物自其用罟之時也時田則守罟及弊田令禽注于虞中時田四時之田也當四時之田獸人則守罟者所以備獸之觸擾也田止謂之弊大司馬春田火弊夏田車弊秋田羅弊冬田徒弊皆謂田止也山虞曰若人田則萊山田之野及弊田植虞旗于中致禽而珥焉則令禽注于虞中者令田衆以所獲禽置虞旗所植之中野注則衆赴而徃焉若水之注也凡祭祀喪紀賔客共其死獸生獸凡獸入于腊人祭祀賔客有薦羞喪紀有奠祭為或用鮮故共其生獸為給常用故共死獸凡獸入於腊人則當乾之以為用故入於腊人皮毛筋骨入于玉府凡田獸者掌其政令玉府掌王之玩好等物與凡貨賄之藏則入于玉府以共王之服噐等用也獸人皮毛筋骨入于玉府而􅈄人凡魚征亦入於玉府周之初園囿沛澤多而禽獸至人常患其偪矣唯周有以勝之然後中國之患除而人更頼其所獲以共服食噐用然則獸人之官脩寕百姓之大者也魚之為物潜逃深渺難及以政方周盛時乃能使之莘其尾頒其首浮沉大小備得其性則以有法度加焉而已然則魚人之官脩養萬物之悉者也以獸人之官修為寕百姓之大以魚人之官修為養萬物之悉故使入其物於玉府以為王者仁民愛物其施如此然則可以兼百姓之奉備萬物之養以足其燕私玩好之欲也然則冥氏穴氏翨氏攻鳥獸之猛而其所獻皮革齒湏備羽翮之類不入於玉府者冥氏穴氏特除其害而已獸人凡田之政令掌焉則其所脩之利衆所除之害悉所頼之獲多王施及人於是為大矣􅈄人掌以時􅈄為梁詩曰敝笱在梁又曰毋逝我梁毋發我笱則梁水偃也偃水為闗空以笱承其空俾魚入焉月令季冬命漁師為梁王制獺祭魚然後漁人入澤梁則為梁者乃季冬之時也盡取魚也以時故其為梁也亦以時故曰以時􅈄為梁春獻王鮪鮪以時至為能有者也先王以其時至則薦新焉故􅈄人獻之月令季春薦鮪于寢廟是也莫非鮪也必取其大者以致其美故獻王鮪王言其大也凡物之大者多謂之王若祖父謂之王父祖母謂之王母是也辨魚物為鱻薧以共王膳羞凡祭祀賔客喪紀共其魚之鱻薧凡􅈄者掌其政令凡王之膳羞有用鱻魚有用薧魚而魚之或鱻或薧亦各有所宜故辨之以共王不言后世子者以王為主故也凡祭祀賔客喪紀所共者入於庖人外内饔之属也取魚亦有政令者以􅈄人知所取之時與所取之地故掌政以正其徒掌令以役其徒凡􅈄征入于玉府􅈄人之官脩為養萬物之悉故入其征於玉府以充先王之奉養也凡獸莫不有皮毛筋骨之属而魚之所利止於肉而已故特征其衆物然文王之時澤梁無禁而周公之法則􅈄人有征何也蓋方商之季山林川澤宜施以與民故無禁成王之時則民之財用已足苟若無征則民之棄本者衆故征之所以抑末周公制法豈與文王異意哉鼈人掌取互物以時簎魚鼈龜蜃凡貍物以味之美而敝者鼈也先王名官亦取其物之美而名之故簎魚鼈龜蜃之官獨名之以鼈人互謂有甲介者若龜鼈之類是也以時簎魚鼈龜蜃取之有時故也先王之於物愛之而弗仁唯其弗仁故有以取之唯其愛之故取必以其時藏伏於泥者謂之貍物則不止於魚鼈龜蜃之類而已互物言其體貍物言其性春獻鼈蜃秋獻龜魚先王之於物交之有道用之有禮肓之以仁使之得以遂其生盡其性而無殀夭之傷此交之之道也制之以義必其可取然後殺而無非時之害此用之之禮也鼈蜃龜魚雖㣲物也先王豈以其㣲而輕取之哉要之交有道用有禮而已鼈及龜魚字乳以夏而蜃以夏秋春獻鼈蜃秋獻龜魚則避其字乳之時獻龜以秋者龜取以卜全而用之故取其堅成之時魚美於秋冬而冬為尤美不以冬獻則鼈人所獻以簎得之故先為梁之時而獻鼈尤美於夏然以避其字乳之時而弗獻唯王不以飲食之養害仁政之法度如此然後能率天下之民以成魚麗之功昭告於神明矣祭祀共蠯蠃蚳以授醢人掌凡邦之簎事蠯薄佳反蠃郎戈反蚳直其反授醢人將以為醢也先王之祭祀内以盡志外以盡物故凡隂陽之㣲物莫不畢具所以為盡物也故雖蠯蠃蚳有所不廢焉腊人掌乾肉凡田獸之脯腊膴胖之事凡祭祀共豆脯薦脯膴胖凡腊物賔客喪紀共其脯腊凡乾肉之事胖普半反膴大吳反小物全乾曰腊指昔之全體而言之也析肉而薄之曰脯大物解肆而乾之曰乾肉所掌不一而名官曰腊人者以全體而乾者尤為難焉故也膴胖既掌共於内外饔腊人又掌共之者蓋由獸人入於腊人由腊人而入於内外饔則腊人所謂掌共者掌其物而共之於内外饔也脯非豆食而祭祀共豆脯鄭氏當作羞脯理宜然也祭祀賔客喪紀隨所用而共之故所共不一也且獸之所獻有獸人而又有腊人魚之所獻凡鮮薧獨掌於􅈄人何也蓋獸之名物至多而肉味各異故獸人辨其名物又有腊人掌其乾肉脯腊膴胖之事也魚則名物雖多而肉味則一而已此所以鮮薧獨掌於􅈄人而已醫師掌醫之政令聚毒藥以共醫事人之身有五臟六腑百骸九竅而氣之所以行猶海之有百川九河而水之所以通也水失其道則海之經絡壅遏而不通氣失其度則身之血脈乖戾而生疾先王豈忍坐視其苦恬不為之恤哉此醫師之職所以立也醫之字從酉酉隂中也動與疾遇所以醫能已從矢醫者疾也如矢為之醫使傷人者不得作從殳者疾作矣攻而勝之從酉者酉時也且然無止有疾而恃治如此而已醫師者醫官之長所以教其屬者也以其聚毒藥以共醫事故有政凡疾病疕􅅑者使醫分而治之故有令此所以掌醫之政令也毒謂五毒藥謂五藥五藥疾醫之所用也五毒􅅑醫之所用也醫師則聚之所以共衆醫之所用也以其攻疾而使主焉則謂之毒以其瘳疾而使樂焉則謂之藥毒與易所謂毒天下之毒同藥與莊子所謂至言藥也之藥同凡邦之有疾病者疕􅅑者造焉則使醫分而治之凡人以血氣為榮衛氣壅遏而不通則為疾病血凝結而不流則為兆瘍語曰子疾病由疾然後至於病則疾輕而病重也疾在陽而為熱於外者痬也􅅑在首而有害於已者疕也凡醫各有所能故使醫分而治之疾病則使疾醫治之疕瘍則使瘍醫治之嵗終則稽其醫事以制其食十全為上十失一次之十失二次之十失三次之十失四為下醫之事有能有不能醫之功有全有不全先王於一歳之中有以書其功狀而醫之得失功之多寡可以周知故歳終則稽其事而制其食稽謂攷而計之也既稽以見其功然後因其功之全否而為之制其食之厚薄凡以稱其事而已苟醫事為上而其食薄則能者無所勸醫事為下而其食厚則不能者無所勉故必餼廩稱事然後能者勸不能者勉矣周而無缺謂之全夫射者百發一失則不足為善射然則醫者九中一失亦不足以謂之十全矣鄭氏謂全猶愈也人之疾固有不可治者苟知不可治而信則亦全矣何必愈哉音晋侯有疾醫緩曰疾不可為也在肓之上膏之下公曰良醫也晋侯果卒然則全者但知其可治不可治而騐焉者皆全矣黄帝曰知一為下工知二為中工知三為上工與此不同何也蓋黄帝以治疾者為功於五臟有明其二則為中有眀其三則為上故分為三等以命工周官以工之能而制食故寛以馭之而分為五等矣食醫掌和王之六食六飲六膳百羞百醬八珍之齊易之頥君子以節飲食葢疾病之起本於氣體之不和氣體之不和始於飲食之不節蓋飲食人之本也本得其養則無物不長本失其養則無物不消於無事之時而順養之有道可謂善其本矣疾厲何自而生哉此食醫之官所由設也六食則所謂食用六穀是也六飲則所謂飲用六清是也六膳則所謂膳用六牲是也百羞則羞用百有二十品是也百醬則醬用百有二十罋是也八珍則珍用八物是也凡此皆膳夫所掌以共王之饋者而食醫則掌調和之而已齊者調和其味而使多寡厚薄各適節之謂凡食齊眡春時羹齊眡夏時醬齊眡秋時飲齊眡冬時食音嗣齊才細反一氣判而為隂陽隂陽運而為四時春為陽中而其氣温夏為陽盛而其氣熱秋為陰中而其氣涼冬為隂盛而其氣寒温熱涼寒天地所以生成萬物者也順天之經明地之理合四時之序則人所以安拂天之經違地之理反四時之序則人所以厲故先王無所徃而不以四時為本者其知善養之道乎以春為陽中而其氣温食地産以養形而作陽德形以聚氣形温則氣和而疾不作故食以温為齊而眡春時以夏為陽盛而其氣熱羮天産以養精而作陰德精以集神神墮三數而於物為火精熱則神從之而不離故羮以熱為齊而眡夏時以秋為隂中而其氣涼醬之味鹹鹹所以養脈而脈耎則和醬涼則除煩熱而脈得之以耎故醬以涼為齊而眡秋時以冬為隂盛而其氣寒飲所以陽氣氣之暴在陽濟之以寒則為不暴故飲以寒為齊而胝冬時凡和春多酸夏多苦秋多辛冬多鹹調以滑甘和胡卧反夏户雅反夫濕熱寒涼天之所造以養萬物者也酸苦辛鹹地之所化以養萬物者也人之一身常與天地流通則其氣味之所養又安可違天之所造地之所化哉此温涼寒熱之所御所以必在順四時之氣而酸苦辛鹹之所節所以必在順四時之味矣夫春於方為東於行為木陽動以散而生風風生木木之氣散而其味則收故木之味酸以春主發散宜多酸以收之故其和多酸夏於方為南於行為火南方陽極而生熱熱生火火之氣耎而其味則堅故火之味苦以夏主解緩則宜多苦以堅之故其和多苦秋於方為西於行為金陰止以收而生燥燥生金金之氣收而其味則散故金之味辛以秋主揫歛宜多辛以散之故其和多辛冬於方為北於行為水北方隂極而生寒寒生水水之氣堅而其味則耎故水之味鹹以冬主堅栗宜多鹹以耎之故其和多鹹酸苦辛鹹其味則因四時以為之節若淡與甘則無所加損焉以其為五味之主而生於土故也淡則所以利之甘則所以緩之唯利故能養竅唯緩故能養齒利之緩之所以調之也黄帝書曰肺欲收急食酸以收之肝欲散急食辛以散之心欲耎急食醎以耎之腎欲堅急食苦以堅之脾欲緩急食甘以緩之亦謂是也凡㑹膳食之宜牛宜稌羊宜黍豕宜稷犬宜粱鴈宜麥魚宜苽稌音社苽音孤凡人所資以生者莫大乎形氣形氣所資以養者莫大乎膳食膳天産也食地産也天産以養形而得諸陽地産以養精而得諸隂隂陽之氣判而為五行而膳食皆䴡乎五行之氣五行之氣有畏忌相反一有不宜則不惟不足以養形氣而疾病且乗機而作可不擇歟先王由是觀膳食之宜而為之㑹焉或以五行相生而為之宜或以五行同氣而為之宜或以五行相配而為之宜牛土畜也稌金穀也牛宜稌則以土生金而為宜也羊火畜也黍火穀也羊宜黍則以火同氣而為宜也豕水畜也稷土穀也豕宜稷則以水配土而為宜也犬金畜也梁土穀也犬宜粱以金生於土而為宜也鴈大禽也麥木穀也鴈宜麥則以火生於木而為宜也魚水物也苽水穀也魚宜苽以水同氣而為宜也凡此皆食物各有宜也物之所宜適此而已且有所宜則順之有所畏忌則避之此言其宜而不言其畏避相反以物類至多不可勝言也言其所常食則推類而可知矣凡君子之食恒放焉放甫徃反食醫雖以養王為主凡君子所以自養者亦可以常放焉蓋君子與王其貴賤之分為不同而所以養生之理則未嘗異故膳食所㑹之宜皆得以倣王而自養焉則所以養生之道豈擅為一已之利哉皆天下共之而已易曰君子以節飲食於此可見矣然謂之常則非暫也始終用焉不可一日廢之矣疾醫掌養萬民之疾病夫人雜乎芒芴之間氣變而有形形變而有生然則生之本在乎形形之本在乎氣形之安强得於氣之和形之疾病由乎氣之乖和與乖在乎養之得失而已善醫者審其源亦貴乎以養之為本蓋五臟六腑之氣均則疾病無自而作一或盈而有餘一或羸而不足則偏勝而疾病由之以起故必損其有餘以益其不足然後臟腑之氣均而無過不及之偏也所謂養者育之使其氣一於充實而後已下文所謂以五味五穀五藥養其病者是也苟養之使其氣和氣和則形和形和則生和而疾病可已矣此疾醫之治萬民疾病必先之以養者其知治之本歟四時皆有癘疾春時有痟首疾夏時有痒疥疾秋時有瘧寒疾冬時有𠻳上氣疾痟音霄痒以掌反夫隂陽判而為五行五行運而為四時或為寒暑或為温清資其氣以生者孰不為之制役哉惟善攝生者消息盈虗與時偕行則邪氣不能襲癘疾又烏能為之患彼蒙蔽之徒天機存於肝膈之上氷炭結於五臟之間嗜慾既深天和滋喪客邪輙蹈其舍則疾病交起隂陽之患唯命是從而已四時安得無癘疾哉若蠆之螫而厲人者癘也夫氣和則安厲乖而不和者豈氣之罪哉實使氣者有以召之也列子曰指摘無痟癢痟痛也痛言通之而愈痟言消之而愈素問曰冬傷於寒春必病瘟病瘟則痟首之疾也葢方冬之時陽為主於内寒雖入之而勢未能動及春陽出而隂為主於内然後寒動而摶陽為痟首之疾矣故春時有痟首疾痒美疾也而實非美難經曰痒為虚虚非充實之謂也疥介也主於皮膚之上而有辨焉介䖝謂之介以有辨故也夏陽溢於皮膚風搏而滛之為痒疥之疾故夏時有痒疥疾素問曰夏傷於暑秋必痎瘧痎瘧則所謂瘧寒之瘧言如虎之虐痎言該時而發方夏之時雖傷於暑然隂為主於内暑雖入之勢未能動及秋隂出而陽為主於内然後暑動而搏隂為瘧寒之疾故秋時有瘧寒疾𠻳欬也其原生肺腑藏氣屬金而主聲陽溢於臟腑隂乘而逆之則肺動而為𠻳上氣之疾矣以五味五穀五藥養其病人之生也精得於杳㝠之中氣雜於芒芴之間形具於物成之後易曰精氣為物則精全而氣從之而精者氣之本也莊子曰氣變而有形則氣聚而形從之而形者氣之舍也精全則氣壯氣壯則形强而人之所以安也精虧則氣耗氣耗則形衰而人之所以病也醫者必究其病之所由起蓋亦有以養之而已五味天産也所以養其精五穀地産也所以養其形五藥則雜出於天地之産所以療其病素問曰氣不足補之以精精不足補之以味然則養精而氣從之矣此疾醫所以不言養氣養精為本養形次之療病為末此治之序也以五氣五聲五色眡其死生五行運而為五氣發而為五聲章而為五色一身之間五氣五聲五色莫不備焉五氣則五臟所聚之氣心氣熱肝氣温脾氣和肺氣涼腎氣寒是也五聲則言語所出之聲宫聲和商聲剛角聲清徴聲疾羽聲弱是也五色則面貌所發之色木色青火色赤金色白水色黒土色黄是也望其氣矣又聼其聲聴其聲矣又觀其色以此三者審其王相休廢與夫相生相勝而死生可以預知素問曰五臟之象可以類推五臟相音可以意識五臟㣲騐可以自察五氣可以類推者也五聲可以意識者也五色可以自察者也兩之以九竅之變參之以九藏之動竅古弔反九竅謂陽竅七隂竅二合而為九也九藏謂神藏五形藏四合而為九九竅固有常矣俟有變而後占九藏隱於内矣必診其動於脉兩之也以隂陽參之也以隂陽中氣蓋人之身負隂而抱陽中氣以為和九竅有隂陽故占之以隂陽之變九藏以中氣為和故診其脉候之所動中氣所動醫經所謂胃氣也九藏以胃氣為主胃氣不至則死之候也診脉者察其胃氣至不至而已望其氣矣則又聴其聲聽其聲矣則又視其色以此眡死生又以為未至也故又占九竅之變診九藏之動如是則死生之辨灼如觀火矣難經曰望而知之謂之神視而知之謂之聖問而知之謂之工切脉而知之謂之巧望以五氣所謂望而知之者也聽以五聲所謂問而知之者也視以五色所謂視而知之者也診九藏之動所謂切脉而知之者也難經不言九竅之變以九竅之變其然易知故也凡民之有疾病者分而治之死終則各書其所以而入於醫師夫人之一身内有五臟六腑外有百骸九竅而疾病之作非一端也疾病既非一端而醫術亦各有能此凡民之疾病所以使分而治之也醫師言邦之有疾病疾醫言民之有疾病治及民則餘可知矣或言邦或言民相偹而已醫師言使醫分而治之疾醫又言分而治之者醫師分疾病疕􅅑使各治之而疾醫所治又各有能也至於􅅑醫言凡有瘍者受其藥焉則腫􅅑潰􅅑金痬折痬同科而已記曰君子曰終小人曰死盡其道而死者所謂君子曰終是也終亦有所以而非醫之罪也亦書所以焉使知如此者在所不治也獸醫獨言死者以其異於人故也周禮詳解卷五
