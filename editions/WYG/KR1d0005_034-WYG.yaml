body:
  text: 周禮詳解卷三十四宋王昭禹撰行夫掌邦國傳遽之小事媺惡而無禮者凡其使也必以旌節雖道有難而不時必達居於其國則掌行人之勞辱事焉使則介之傳張戀反遽其庶反使色吏反難乃旦反焉故書作夷鄭司農讀夷使為句大行人掌邦國賔客往來之大禮小行人掌其禮籍以待四方之使者是職雖分小大而皆以行為主故名官謂之大小行人若行夫則行人之屬官而掌國使之小禮雖所掌者小而非智足以帥人者亦不足以􅂶其任故名官謂之行夫掌邦國傳遽之小事媺惡而無禮者傳鄭氏謂乘傳騎驛而使者葢事雖小而欲急達故也媺惡謂吉凶之事葢事小而禮籍有所不載故也若夫載于行籍之大事則有大小行人存焉非行夫所掌矣凡其使也必以旌節則道用旌節以表之雖道有難而不時必達則雖以他故後時而王命不可廢也居于其國則非以王命出行之時也掌行人之勞辱事則凡大小行人有煩勞汙辱之事皆行人掌之也夷使則介之者謂行人若使于四夷行夫則為之介也環人掌送逆邦國之通賔客以路節達諸四方舍則授館令聚􅈀有任器則令環之凡門闗無幾送逆及疆疆居良反夏官有環人秋官復有環人者葢夏官環人掌環四方之故取周巡往來若環之無端也秋官環人掌環賔客之任器取周圍保䕶若環之無隙也官雖同而所主之意則異也掌送逆邦國之通賔客謂邦國賔客取道往來者而環人則逆送之通與易所謂往來不窮謂之通同意以路節達諸四方謂無節者有幾則不達故以路節達諸四方則掌節所謂道路用旌節是也舍則受館者國野之道五十里有候館賔客至則環人受之也令聚􅈀者謂野廬氏若有賔客則令守涂地之人聚􅈀則環人乃令野廬氏也有任器則環之者謂賔客有任用之器環人則令其屬合守涂地之人環衞之也凡門闗無幾者謂賔客出入環人以路節達之故門闗無幾也送逆及疆者疆謂王畿四方之界也賔客始來而逆之終去而送之皆至王畿之界所也象胥掌蠻夷閩貉戎狄之國使掌傳王之言而諭説焉以和親之若以時入賔則協其禮與其辭言傳之凡其出入送逆之禮節幣帛辭令而賔相之凡國之大喪詔相國客之禮儀而正其位凡軍旅㑹同受國客幣而賔禮之凡作事王之大事諸侯次事卿次事大夫次事上士下事庶子閩亡巾反使所吏反賓相之賓註作儐象胥掌四夷之言者也東方曰寄南方曰象西方曰狄鞮北方曰譯寄言託鞮言知譯言易此獨以象言者舉一以互見也必言象以周之化自北而南以言其所致者逺也先王立官以道夷狄之言凡以相之而已故名官以象胥先王以治治中國以不治治夷狄故夷于中國疆以周索有教以導其志有政以齊其行於狄疆以戎索則立官以寄象鞮譯而已此詳畧之辨也夫天下有道守在四夷殊方異俗莫不同風承德梯航而來則蠻夷閩貉戎狄之國使歸欵輸誠嵗無虚月象胥之譯其言又曷可少哉故掌傳王之言而諭説焉諭則使之俞其言説則以言明其理彼聞吾王之言將心悦而誠服如五音之和于耳又安有乖而不和者如嬰兒之親父母又安有疏而不親者哉然在職方氏言四夷八蠻七閩九貉五戎六狄皆有圖地掌于職方而可辨數要者也象胥言掌蠻夷閩貉戎狄之國使不言其國數則象胥所掌非特職方可辨數要之國也故不言其數焉若以時入賔則協其禮與其辭言傳之者入賔則行人所謂世一見者是也不謂之入王而謂之入賔則或非王政所加焉故也協其禮則四海之諸侯其爵不過子而已以禮待之協之則有同而無異矣然則協其禮豈特見于饔餼饗食之間哉蓼蕭之澤及四海有所謂既見君子鞗革沖沖和鸞雝雝萬福攸同則天子又有乗馬路車以致其好而成之以禮也與其辭言傳之則接之以辭言象胥則協其辭言傳而通之也王制曰達其志通其欲與此所謂協其辭言傳之同意也凡其出入送逆之則送往而逆來也禮節幣帛辭令而擯相之者禮節所以相接幣帛所以致享辭令所以相與象胥則掌擯而相之也凡軍旅㑹同受國客幣而擯禮之者謂軍旅以征伐時㑹以發禁殷同以施政四海之諸侯或遣臣以聘問則象胥擯而禮之也凡作事謂作四夷之事也王之大事諸侯者國之大事在祀與戎則作大事于四夷者謂有戎事于四夷也諸侯以敵王所愾為事故大事在諸侯然則彤弓錫有功諸侯則蠻夷衰而諸夏盛故六月之序曰彤弓廢則諸夏衰矣次事則非戎事謂威讓之令文誥之辭或施於四夷者則量其事之輕重或以卿或以大夫或以上士也若夫下事則事之尤小者故以庶子而已言下事庶子則包中士矣掌客掌四方賔客之牢禮餼獻飲食之等數與其政治王合諸侯而饗禮則具十有二牢庶具百物備諸侯長十有再獻王巡守殷國則國君膳以牲犢令百官百牲皆具從者三公眡上公之禮卿眡侯伯之禮大夫眡子男之禮士眡諸侯之卿禮庶子壹眡其大夫之禮長上聲守去聲從才用反傳曰名位不同禮亦異數四方賔客之牢禮餼獻飲食之等數以其名位而差之也政以正之治以理之掌客掌其等數而并掌其政治者葢先王之制凡禮殺賔客國新殺禮凶荒殺禮札喪殺禮禍烖殺禮在外禮則有政治矣王合諸侯則五等之國君咸在則其禮必有以優異之故享禮用十有二牢以王禮之數而庶具百物焉諸侯長謂上公九命作伯者也禮用十有再獻則非特具十有二牢而已干獻又所以致天子之厚意矣王或巡狩殷國國君膳以牲犢則貴誠而不貴味也故郊特牲亦曰天子巡狩諸侯膳以牲犢令百官百牲皆具則備物也言王合諸侯而饗禮遂言天子巡狩殷國而國君膳以牲犢禮務施報也葢天子施禮于諸侯備十有二牢以多為貴也諸侯報禮于天子膳以牲犢以少為貴也以多為貴者外心也以少為貴者内心也禮器曰古之聖人内之為尊外之為樂少之為貴多之為美諸侯之于天子觀天下之物無可以稱其德者得不以少為貴乎郊特牲曰牲孕弗食祭帝弗用諸侯之膳天子上同乎帝尊貴之也天子之于諸侯為之牢禮之數而諸侯之待王官也令百牲皆具樂美之也葢謂待王以多則為䙝待百官以少則為簡故禮器曰先王之制禮也不可多也不可寡也唯其稱也王之三公八命出封則加一命而為上公故從者三公眡上公之禮王之卿六命出封則加一命而為侯伯故卿眡侯伯之禮王之大夫四命出封則加一命而為子男故大夫眡子男之禮士眡諸侯之卿則王之上士也庶子壹眡其大夫之禮庶子包中士下士而言之也葢百官雖令百牲皆具而亦不可無隆殺之等故從其爵命之數而有所眡焉凡諸侯之禮上公五積皆眡飱牽三問皆脩羣介行人宰史皆有牢飱五牢食四十簠十豆四十鉶四十有二壺四十鼎簋十有二牲三十有六皆陳饔餼九牢其死牢如飱之陳牽四牢米百有二十筥醯醢百有二十罋車皆陳車米眡生牢牢十車車秉有五籔車禾眡死牢牢十車車三秅芻薪倍禾皆陳乗禽日九十雙殷膳大牢以及歸三饗三食三燕若弗酌則以幣致之凡介行人宰史皆有飱饔餼以其爵等為之牢禮之陳數唯上介有禽獻夫人致禮八壺八豆八籩膳大牢致饗大牢食大牢卿皆見以羔膳大牢侯伯四積皆眡飱牽再問皆脩飱四牢食三十有二簠八豆三十有三鉶二十有八壺三十有二鼎簋十有二腥二十有七皆陳饔餼七牢其死牢如飱之陳牽三牢米百筥醯醢百罋皆陳米三十車禾四十車芻薪倍禾皆陳乗禽日七十雙殷膳大牢三饗再食再燕凡介行人宰史皆有飱饔餼以其爵等為之禮唯上介有禽獻夫人致禮八壺八豆八籩膳大牢致饗大牢卿皆見以羔膳特牛子男三積皆眡飱牽一問以脩飱三牢食二十有四簠六豆二十有四鉶十有八壺二十有四鼎簋十有二牲十有八皆陳饔餼五牢其死牢如飱之陳牽二牢米八十筥醯醢八十罋皆陳米二十車禾三十車芻薪倍禾皆陳乗禽日五十雙壹饗壹食壹燕凡介行人宰史皆有飱饔餼以其爵等為之禮唯上介有禽獻夫人致禮六壺六豆六籩膳眡致饗親見卿皆膳特牛積音恣鉶音刑牲註作腥筥姜吕反罋烏弄反籔素口反秅丁故反乗去聲大音泰食音嗣見賢遍反先王之待諸侯何其至也未至也致積始至也致飱及其朝享之後又致饔餼之大禮饗食之盛禮有牢有獻有膳有燕鉶鼎簠壺之類醯醢禾米之屬禮備其物物備其數然食之弗愛是以豕交之也則有問勞送逆之示其勤愛之而弗敬是以獸畜之也則有辭受揖遜之示其恭然恭而無實君子不可以虚拘又况其愛之乎拜揖辭受恭之文也禮而祼之則又盡其恭之之實也問勞送逆愛之文也後夫人致禮則又盡其愛之之實也先王所以致愛與恭如是其至而諸侯又安得不一德一心以親其上哉大者以仁比小小者以智事大相朝之君相聘之使旌節繼道講信修睦未嘗或絶者實有以致之也上公五積侯伯四積子男三積皆眂飱牽者賔始至則有夕食之飱其致飱也羊則牽而致焉上公飱五牢侯伯飱四牢子男飱三牢皆眂飱牽者各眂其數而已上公三問皆脩侯伯再問皆脩子男一問皆脩于其始至以問間濶有脩焉脩者脯之加薑桂者也羣介行人宰史皆公所以從行者也尊其君以及其臣故于其方致問之始亦有牢也鄭氏謂臣有牢而君用脩疑其非禮恐有脱誤葢上公致積則有飱牽問禮隨而至故加以脩而已由此觀之則羣介行人宰史之有牢不為過也至于侯伯子男則不言者以上公其爵命為隆其禮為獨優故也上公食四十侯伯食三十有二子男食二十有四食謂庶羞美而可食者也其設葢陳于楹外東西共四列也上公其列之數則十侯伯列之數則八子男列之數則六也上公簠十侯伯八子男六簠所以盛稻粱者也公堂上六東西夾各二侯伯堂上四東西夾各二子男堂上二東西夾各二上公豆四十壺四十侯伯豆三十有二壺三十有二子男豆二十有四壺二十有四葢豆公堂上十六東西夾各十二侯伯堂上十二東西夾各十子男堂上十二東西夾各六禮器言天子之豆二十有六諸公十有六諸侯十有二以聘禮差之則堂上之數與此同也壺所以盛酒者也其設于堂夾亦如豆之數也上公鉶四十有二侯伯鉶二十有八子男鉶十有八鉶羹器也則公堂上二十有二東西夾各十侯伯堂上十有二東西夾各八子男堂上十東西夾各四也上公鼎簋十有二侯伯與子男亦皆十有二者鼎牲器也簋黍稷之器也牲天産以養精黍稷地産以養形二者相資以為養皆食之至也故合鼎與簋而言之皆常食也未始有加損焉故其數皆止于十二鼎正鼎九陪鼎三皆設于西階前也簋堂上八東西夾各二也上公牲三十有六侯伯腥二十有七子男牲十有八牲即牲之腥者或言牲或言腥互見也三牲具為牢而每牢皆九為列上公牲四牢則凡三十六也侯伯腥三牢則凡二十七也子男牲二牢則凡十有八也皆陳于阼階前也饔餼上公九牢侯伯七牢子男五牢饔食熟焉其氣和之至也餼可食之物生氣存焉此乃朝享之後所致之大禮也其死牢如飱之陳則上公五牢侯伯四男子男三皆陳於門西也牽生牢也上公四侯伯三子二皆陳于門西如積也上公米百有二十筥侯伯百筥子男八十筥十斗曰斛十六斗曰籔十籔曰秉四秉曰筥皆横陳于中庭也上公醯醢百有二十罋侯伯百罋子男八十罋車皆陳以車盛罋而陳之也醯陳于碑東醢陳于碑西也既陳則不復用車矣故侯伯子男言皆陳而不言車也車米眂生牢牢十車車秉有五籔車禾眂死牢牢十車車三秅芻薪倍禾皆陳車米載术于車也米四牢四牢分為四列然則牢十車則車米凡四十車也十六斗曰籔十籔曰秉每秉有五籔則二十四斛也車禾載禾于車也禾槀實并刈者也車禾眂死牢牢十車車三秅夫死牢如飱之數上公飱五牢牢十車則車禾凡五十車也四秉曰筥十筥曰稯十稯曰秅每車三秅則三十稯也芻薪倍禾則凡百車也皆陳謂陳于門外也米在門東禾在門西芻薪雖取數于禾而薪從米芻從禾也侯伯米三十車禾四十車芻薪倍禾則降於公也子男米二十車禾三十車芻薪倍禾則降於侯伯也上公乗禽日九十雙侯伯七十雙子男五十雙者乗禽謂乗行羣處之禽雉雁之屬是也殷膳大牢殷中也謂于中又以大牢膳賔示儉文而不忘賔也侯伯言膳大牢子男不言則䝉上文可知也然獨于上公言以及歸則侯伯子男亦以及歸可知也上公三饗三食三燕諸侯再饗再食再燕子男壹饗壹食壹燕饗以酒為主食以食為主燕以恩為主唯以恩為主故異于饗食之禮示以慈惠以毛為尚其樂無算也取其歡而已其爵無算也取其醉而已取脯以降奏陔而去則王所以致愛于諸侯于是為至矣其數或三或再或壹亦隆殺之節也若弗酌則以幣致之者謂君或有故不親饗食燕也且饗有酬幣食有侑幣不饗則以酬幣致之不食則以侑幣致之所以將意而致敬者不可失故也凡介行人宰史皆有飱饔餼以其爵等為之牢禮之陳數唯上介有禽獻凡此皆邦國之諸臣從諸侯之賔者也尊其君以及臣臣故有飱饔餼之禮焉然其禮之隆殺各以其爵等之上下而為之也上介則以其於諸侯之臣為尊宜有以優異之故獨有禽獻而其餘則無有也上公大夫致禮以八壺八豆八籩膳大牢致饗大牢食大牢夫人致禮所以助王養賔亦夫婦相成之義也壺陳于東序籩豆陳于户東凡夫人致禮于諸侯皆使下大夫致之也夫人致禮侯伯與上公同不言食大牢則殺于上公也夫人致禮于子男六壺六豆六籩膳眂致饗則又殺于侯伯也然此特言膳眂致饗者言夫人致膳于小國君以致饗之禮則是不復饗也上公卿皆見以羔膳大牢侯伯卿皆見以羔膳特牛子男親見卿皆膳特牛卿皆見者見于賔也以羔則以其摯見焉子男獨言親見者言卿於小國之君有不造館見者必親見乃致膳矣不言羔則蒙上文可知也既見之又膳之者亦所以助王養賔也或用大牢或用特牛亦禮之殺也先王之于祭祀致愛致敬其于承賔也亦如之方其祭祀也王耕以供粢盛后蠶以為祭服王祼而后亞祼王獻而后亞獻而終之以諸臣之所昨也及其承賔也亦王祼獻而后亞之王致酒后夫人致飲終之以卿皆見而膳之也夫唯以所承神者而承賔則致愛致敬可謂至矣諸侯眂王所施如此又孰不思所以厚報之也哉凡諸侯之卿大夫士為國客則如其介之禮以待之凡禮賔客國新殺禮凶荒殺禮札喪殺禮禍烖殺禮在野在外殺禮凡賔客死致禮以喪用賔客有喪唯芻稍之受遭主國之喪不受饗食受牲禮稍所教反牲音腥前言凡介有飱饔餼以其爵等為之牢禮之陳數謂其從君而來也今此言卿大夫士為國客則以聘問而來也若以聘問來而自為客則王所以待之亦如其為介之禮也先王待賔客其禮為有常制而其用則因時而制宜以財之所入為有限而其用則不可以無節也故國新凶荒札喪禍烖在野在外皆殺禮焉國新謂新建國也凶荒謂無年也禍烖謂兵寇水火之變也國之所費既多則宜節用焉故禮不得不殺然制其正不制其殺則禮之本寧儉故也掌訝掌邦國之等籍以待賔客若將有國賔客至則戒官修委積與士逆賔於疆為前驅而入及宿則令聚􅈀及委則致積至於國賔入館次於舍門外待事於客及將幣為前驅至於朝詔其位入復及退亦如之凡賔客之治令訝訝治之凡從者出則使人道之及歸送亦如之凡賔客諸侯有卿訝卿有大夫訝大夫有士訝士皆有訝凡訝者賔客至而往詔相其事而掌其治令復扶又反從才用反相去聲秋官有訝士又有掌訝者葢訝士以訝四方獄訟為主掌訝以訝賔客為主唯以訝獄訟為主故謂之訝士士刑官也唯以訝賔客為主故謂之掌訝所掌者訝而已掌邦國之等籍以待賔客等籍謂九儀差數之籍也所以訝賔客者必以其籍之差數而為隆殺之節焉異於小行人掌邦國賔客之禮籍也若將有國賔客至則戒官修委積謂戒牛人羊人倉人委人之屬葢牛人共積牛羊人共積羊倉人共道路之榖積委人共委積之芻薪掌訝戒之使各早正素備以給賔客之用也與士逆賔于疆為前驅而入謂與訝士也以訝士邦有賔客則與行人送逆之入于國則為之前驅而辟故也及宿則令聚􅈀謂令野廬氏也以野廬氏若有賔客則令守涂地之人聚􅈀也及委則致積以王命致之于賔也至于國賔入館次于舍門外待事于客謂賔有所求索則為通之也及將幣為前驅則道之以至于朝也至于朝詔其位入復則掌訝入復于王也及退亦如之亦復于王若孔子所謂賔不顧矣是也凡賔客之治令訝訝治之治謂理其事也賔客之理其事則以告訝掌訝為如朝而理之也凡從者出則使人道之謂凡賔客從行之人或出則掌訝使其屬道之也及歸送亦如之賔至逆之於疆則其歸也亦送之至于疆也凡賔客諸侯有卿訝卿有大夫訝大夫有士訝士皆有訝謂賔客之爵命有尊卑王所使訝賔客之人亦不同也諸侯之為賔以其有君道焉故皆訝之以卿以王之卿則六命卿其出封則為侯伯王之禮於上公王之禮於諸侯則皆見而致膳焉使卿而訝諸侯固其宜也若卿而訝之以大夫大夫而訝之以士亦其宜矣士皆有訝謂公侯伯一命之士也亦以士訝之而已故曰皆有訝焉凡訝者賔客至而往詔相其事而掌其治令詔以言告之相以力賛之賔客方至則掌訝往而詔相其事也治謂理其事令謂有所使賔客有治令而掌訝則為之掌也掌交掌以節與幣巡邦國之諸侯及其萬民之所聚者道王之德意志慮使咸知王之好惡辟行之好呼報反惡烏路反辟音避天地不交而萬物不生上下不交而功勲不成先王設官掌邦國之通事而結其交好此其名官所以謂之掌交歟掌以節與幣者節謂道路用旌節以表之也幣謂掌邦國之通事而結其交故也巡邦國之諸侯及其萬民之所聚者先王規方千里以為甸服其餘以分公侯伯子男使各有守然邦國之諸侯衆矣非若左右之近邦國之萬民衆矣非若畿甸之近也然則茍非播告之修不匿厥指彼將何從而為之儀唱乎君者臣之唱也彼將聽唱而應矣上者下之儀也彼將視儀而動矣道王之德意志慮所以為之儀唱王之得于已者德也王之心有所感發者意也王之心有所之者志也王所思患而豫防之者慮也德之所存意之所發志之所之慮之所定好惡之實存于其間矣掌交道王之德意志慮使之咸知王之所好而行之咸知王之所惡而辟之葢王之所好非作好也無非遵王之道而已王之所惡非作惡也無非遵王之路而已遵王之道以為好則所好者皆上下之所同人孰不歡然而行之乎遵王之路以為惡則所惡者皆逺近之所同人孰不協然而避之乎其行之也若趨利而不自已其避之也若畏法而不敢犯天下人豈有私好惡哉先王之時道德一風俗同天下如一家中國如一人者掌交與有力矣然而掌交之道王志則與撢人誦王志異葢道則道其實誦則誦其言道其實以交邦國萬民者刑也故屬之秋官誦其言以正邦國萬民者政也故屬之夏官使和諸侯之好達萬民之説掌邦國之通事而結其交好先王於諸侯裂地以封之疏爵以貴之欲其為王國之屏也則好之可謂至矣先王于萬民受田里以安之頒職事以任之欲其為王心之體也則説之可謂至矣王好諸侯則諸侯果何好哉莫不惟王之好也王説萬民則萬民果何説哉莫不唯王之説也莫不好王而其好或乖者無以和之而已莫不説王也而其説或壅而不宣者無以達之而已如是則猜疑怨忌之隙往往縁之而起諸侯萬民雖欲致其臣子之情有不可得也唯有以和其好則諸侯所以好王之情協而不乖矣惟有以達其説則萬民所以説王之心宣而不壅矣尚何逺近内外之間乎然所以至是者以掌交巡邦國之諸侯及其萬民之所聚者道王之德意志慮使咸知王之好惡辟行之乃能然也掌邦國之通事而結其交好者夫三等之邦國星分棊布于九州之内其勢疑若睽間而相絶然先王制為朝覲聘問之禮行于其間則有往來不窮之通矣掌交又以幣將其意而結其交好則又推而行之以致其通矣謂之通事如斯而已往來不窮者天之道也推而行之者人之道也先王立掌交之職亦所以和同天人之際矣以諭九税之利九禮之親九牧之維九禁之難九戎之威先王之于諸侯分土而與之守分民而與之治患其擅一國之名寵則或至于􅀝勢以自驕專制節之大權則或至于怙侈以滅義將欲防微杜漸折衝消萌柄使之懷德而不敢擕畏威而不敢侮則王者威福之其可不謹乎然則掌交諭之以九税之利九禮之親九牧之維是盡其所以福之之道也諭之以九禁之難九戎之威是盡其所以威之之道也九税九職之税也方其裂地以封之固已使之得征其民而莫不知有之以為利也今又諭之以九税之利使知任土焉九禮九儀之禮也方其列爵以等之固已使之各守其爵而莫不知守之以為分也今又諭以九禮之親使知分守焉九牧九州之牧也太宰于施典之際固已建其牧而莫不知小大以相維也今又諭以九牧之維使知聽令焉九禁九法之禁也九戎九伐之戎也大司馬以九伐之法固已正之而莫不知奉法而畏威也今又諭以九禁之難使知辟禁諭以九戎之威使知免兵焉彼又安有弛慢悠忽以違王命者哉然則宗周之時六服承德庶邦丕享比小事大以蕃王室者掌交之諭豈小補哉掌察闕掌貨賄闕朝大夫掌都家之國治日朝以聽國事故以告其君長國有政令則令其朝大夫凡都家之治於國者必因其朝大夫然後聽之唯大事弗因凡都家之治有不及者則誅其朝大夫在軍旅則誅其有司長丁丈反掌都家之國治其官以上士二人下士四人為之而名官謂之朝大夫者以其日朝以聽國事故以告其君長有以智帥人之義故謂之朝大夫也掌都家之國治者謂公卿王子弟之都大夫之家凡有治于國則朝大夫掌之也所作謂之事所遭謂之故朝大夫日朝以聽其事故以達之于都家之君長君謂其國君也長謂其卿大夫也凡有所正者皆政也凡有所使者皆令也國有政令則令朝大夫以告都家之吏也凡都家之治于國也必因其朝大夫然後聽之以朝大夫掌都家之國治故凡事之小者有治于國皆因朝大夫以達于國然後聽之也若事之大者則非因于朝大夫必都家之君長自達于國也都家之治有不及以朝大夫弗達之故則罪在所誅也在軍旅則朝大夫弗預焉都家司馬弗達之過也故誅其有司有司謂都司馬家司馬也先王置朝大夫之君使都家之治因之以達于國使國之事故因之以告於都家則下之事無不上聞上之政無不下達則自國中以至于數百里之逺不啻若左右之近若耳目之前又安有壅遏蔽塞之患哉彼有堂上之逺于百里堂下逺于千里户外逺于萬里者葢失于此矣都則闕都士闕家士闕周禮詳解卷三十四
