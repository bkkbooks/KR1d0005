body:
  text: 周禮詳觧卷二十二宋王昭禹撰典庸􅄊掌藏樂􅄊庸􅄊及祭祀帥其屬而設筍虡陳庸􅄊饗食賔射亦如之大喪廞筍虡典庸器而掌蔵樂器則樂之作也凡以象民功而筍虡則象業故也筍虡所以縣鐘磬之属也横曰筍植曰虡筍上設板謂之業盖聚衆飾焉而措之虡上則以象業也業陳于上然後作樂乎下未有無其業而作樂者也而王業以民功為主故其所掌也如此陳庸噐者盖非以道勝滛不能伐而俘之非以徳服天下不能𫝊而守之祭祀饗食賔射皆出而陳之示為先者能俘而𫝊之以為榮為之後者能守其𫝊以為善也司干掌舞􅄊祭祀舞者既陳則授舞􅄊既舞則受之賓饗亦如之大喪廞舞􅄊及葬奉而藏之樂有文舞有武舞揖讓征誅之義盡此矣文舞則籥師教之武舞則司干掌之夫羽舞干舞皆樂師以教國子矣籥師于羽舞又教之至于司干則特掌舞器而已則先王之于文事尤致其詳也然文舞有羽籥而名官則以籥武舞有干戈而名官則以干盖文則優游而静籥則其聲静而可聞也干則以有扞而自衛而武事以扞敵自衛為先故也名官之義各有攸趣大卜掌三兆之灋一曰玉兆二曰瓦兆三曰原兆其經兆之體皆百有二十其頌皆千有二百大卜以下大夫為之而其官属為甚衆盖先王重其事故也卜之字從丨從一卜之所通非特數也致一所以卜也夫木之有火明矣不致一以鑚之則不出龜亦何以異此物生而後有象象而後有滋滋而後有數蓍者陽中之隂也故植而後知數龜者隂中之陽也故動而知象先王成天下之亹亹定天下之吉凶莫大乎蓍龜而名官謂曰大卜者以龜為主也左𫝊所謂蓍短龜長不如從長者是也掌三兆之法者皆以火灼龜其象可占謂之兆三兆先儒以為其象似玉瓦原之璺罅是也玉兆陽也瓦兆隂也原兆隂陽之半也陽精之純者玉也兆之象色如玉故以為玉兆隂物之陶者瓦也兆之象色如瓦故以為瓦兆爾雅曰髙平曰原左傳曰原田毎毎則原于城為中是隂陽之半也兆之象色如原故以為原兆其兆不同與所命之名亦異焉經常也其經兆之體則龜常兆之故也三兆之體皆百有二十頌謂繇也乃占兆之書常兆之體百有二十毎體十繇故頌皆千有二百掌三易之灋一曰連山二曰歸藏三曰周易其經卦皆八其别皆六十有四龜動物也占其象蓍植物也占其數象之所造為精而數之所索者為粗故以三兆之法為先而三易之法次之夏曰連山言如山之出納氣相連而不絶也體商曰歸藏言萬物歸而藏乎其中也周曰易者言其出于無體其用出于無用變易而未始有窮也夏得人統連山以艮為首而交乎寅故也商得地統歸藏以坤為首地主藏故也周得天統周易以乾為首而乾主變故也夫開物成務以冐天下之道者易也則易之道未嘗不一寂然不動感而遂通天下之故者易也則易之用未嘗不殊以未嘗不一之道而求于未嘗不殊之用此所以隨時制名而有三易之法也其實則一而已其經卦皆八則易八卦是也其别皆六十有四易六十四卦是也掌三夢之灋一曰致夢二曰觭夢三曰咸陟其經運十其别九十夢之字從瞢從夕向隂而夢則有夢也又或從􅬤從状從從一穴之下状之上若反一也然方向隂而夢有妄見焉夫形接為事神遇為夢神凝者想夢自消則聖人宜若無夢也然聖人方其渉世而為徒于人夢亦不能無也故髙宗夢得說文王夢臧丈人武王夢帝予九齡孔子之夢周公則晝想夕夢雖聖人亦不能免也然夢者精神之運也人之精神徃來常與隂陽流通而禍福吉凶皆通于天地應于物類則由其夢以占之固無所逃矣周官所以有占夢之官而大卜掌三夢之法盖謂是矣三夢之道法雖不可考然三者不過乎精神之所交感而已一曰致夢者致者有所使而至也盖道則不可致命則莫之致致則出于思慮之間而已然則致夢者非出于自至也二曰觭夢者角一􅀝一仰為觭人之晝俯仰于事為之間夜則感而成夢雖非出于思慮而至亦有所因也三曰咸陟者以心咸物為感無心感物為咸咸則以虚受物因時乗理無所偏係陟之為言升也升則無所拘滯焉則其夢非干于思慮非因于事為一出于自然而已謂之咸陟義盖如此三者之夢雖或不同然皆精神之所交感故以經運占之經則占夢所謂嵗時日月星辰是也運則嵗時日月星辰之運也經以占其常運以占其變先王占夢之法亦縁人情以考吉凶而已曷嘗區區以狥乎哉彼幽王廢本逐末乃召彼故老訊之占夢宜乎詩人之所刺以邦事作龜之八命一曰征二曰象三曰與四曰謀五曰果六曰至七曰雨八曰瘳所作謂之事邦事者凡邦之事也夫時運無窮事變亦不一得失成敗之不同是非可否之不决古之作事者不憚一己之思慮明則謀之人幽則謀之鬼謀之人所以盡其智謀之鬼所以盡其神其所以作龜而命事者有八焉征謂小行役征討之事而命龜也象謂卜天象變動而命龜也與謂與人共事卜其得失也謀謂圖事于人卜其信否也果謂有為而卜其果否也至謂有行而卜其至與否也雨謂卜時之雨與不雨也瘳謂卜疾之瘳與不瘳也凡此八者于卜也皆以辭命龜大卜則作其命龜之詞而已故曰以邦事作龜之八命也征事大起衆故一曰征征人事之大也象天事之大也天道逺人道邇由邇以及逺故二曰象與則人事之次不及征與象之大故三曰與有所與宜慎甚于有所謀故四曰謀謀者指事而圗之宜先于果與至盖果既有為也卜其果而已至既有行也卜其至而已故五曰果六曰至雨則天事之小故七曰雨瘳不及衆私憂而已故八曰瘳以八命者贊三兆三易三夢之占以觀國家之吉凶以詔救政吉凶之變休戚之情見于蓍龜動于四體見于蓍龜故取于朽骨之象枯莖之數動于四體故取于精神之寓魂氣之交則龜蓍夢三者未嘗不相湏以為用焉洪範大疑謀及卜筮両眡其從違以㫁吉凶而武王曰朕夢協朕卜戎商必克大卜以八命贊三兆三易三夢之占則亦以龜蓍夢合而占也八命者邦事之八命也以邦事卜之龜故用三兆之法以占之以邦事筮之蓍故用三易之法以占之以邦事考之夢故用三夢之法以占之作八命非特占之于龜亦騐之于筮協之于夢而後已故有贊其占者焉盖以三兆三易三夢為正以言詞之命贊而已如是則國家之吉凶可以前知凶則詔王正厥事以救之也所謂救正之者修政以救凶災也盖吉凶之變雖出乎天而以其所以感召之者實自乎人知凶而修政以救之則可以轉禍而為福矣古之人固有以君人之言三而致熒惑之退舍孰謂救正之不可為與凡國大貞卜立君卜大封則眡髙作龜大祭祀則眡髙命龜凡小事涖卜國大遷大師則貞龜凡旅陳龜凡喪事命龜貞之字從卜從貝吉凶以貞勝者也從卜從貝則以言利貞也大貞謂大事卜于龜而以正之也立君以定􅁇嗣天下之本也大封以命諸侯一國之本也無為人事之大非可茍故也作龜謂以火灼之作其兆也大祭祀所以事神也命龜以所卜之事也大遷謂遷國也大師謂征伐之大者也貞龜謂以象正定吉凶作龜命龜皆眡龜者則以龜天産其兆象天事也眡髙謂眡龜骨髙可灼處作之命之也凡小事涖卜者盖大事大宗伯涖卜矣故宗伯之職事大神享大鬼祭大示帥執事而卜日大卜卑于宗伯故凡卜事涖卜旅謂卜旅祭也其事輕于大祭祀特陳龜而已凡喪事用龜重喪禮故與大祭祀命龜同然則士喪禮有筮宅卜日天子卜𦵏兆之類亦大卜以事告龜也卜師掌開龜之四兆一曰方兆二曰功兆三曰義兆四曰弓兆凡卜事眡髙揚火以作龜致其墨凡卜辨龜之上下左右隂陽以授命龜者而詔相之卜師以上士四人為之所以教卜官之属而贊大卜也開龜之四兆謂開出其占兆之書也其經兆之體百有二十今此有四兆則分之而為四部也先儒謂若易之二篇金縢開籥見書是也然其書則不可得而考矣凡卜事眡髙則以龜天産其兆象天事也大卜尊于卜師故國大貞大祭祀則眡髙卜師卑于大卜故凡小事眡髙以尊者其事畧而卑者其事繁也揚火以作龜致其墨者揚如火烈具揚之揚謂揚其火也揚其火􅅡灼之以明其兆墨謂兆廣之大小也龜有上下左右隂陽之不同將卜則不可以不辨也上謂仰也下謂俯也左左倪也右右倪也隂後弇也陽前弇也卜師辨之以授命龜者謂授大卜也詔謂告以言相謂贊其事龜人掌六龜之屬各有名物天龜曰靈屬地龜曰繹屬東龜曰果屬西龜曰靁屬南龜曰獵屬北龜曰若屬各以其方之色與其體辨之夫龜所以卜不預修焉則無以共卜事故先王立龜人之官取龜則用秋時攻龜則用春時所以預偹而待之也六龜則天地四方之属也名所以命之物所以色之以龜之類不一也爾雅曰俯者靈仰者繹前弇果後弇獵左倪不類右倪不若天龜曰靈属則爾雅所謂俯者靈是也盖其形如天下俯而向地天神而地靈下俯向地則神降而為靈故曰天龜曰靈属地龜曰繹属則爾雅所謂仰者繹是也盖其形如地上仰而向天天造始而地續終繹則有續終之義故地龜曰繹属東龜曰果属則爾雅所謂前弇果是也以其形前長而弇則有進取之意東陽作而生故曰果西龜曰雷属則爾雅所謂左倪不類是也以其形左倪則左有餘而向乎陽雷陽物以隂而成陽也故曰雷南龜曰獵属則爾雅所謂後弇獵是也以其形後弇則後長而其行獵地南相見于有事之地故曰獵北龜曰若属則爾雅所謂右倪不若是也以其形右倪則右有餘而向乎隂隂為柔順故曰若西龜曰雷属而爾雅言左倪不類者盖西隂之所而左為陽方陽衮而隂衆圍之相薄而成雷是以隂而成陽也故龜人于左倪之西龜則命之雷属爾雅言不類乃所以甚言其類也以西龜為隂方今反左倪而向陽故言其甚類于陽也以此觀之則北龜曰若属而爾雅曰右倪不若亦所以甚言其若也與詩言不顯乃經所以言其顯同意先儒謂東龜南龜長前後在陽象也西龜北龜長左右在隂象緯也天龜俯地龜仰之東龜前南龜卻西龜左北龜右其說是也各以方色與其體辨之者盖天𤣥地黄東青西白南赤北黒其方之色也天俯地仰東前南卻西左北右此其龜之體也先辨體色然後可以用之凡取龜用秋時攻龜用春時各以其物入於龜室上春釁龜祭祀先卜若有祭祀則奉龜以徃旅亦如之喪亦如之取龜用秋時者以隂中也攻龜用春時者以陽中也凡物以陽熈以隂凝取龜于隂中欲其凝而堅攻龜于陽中欲其熈而觧物至秋而成實用是時以取之則不夭矣物至春而甲拆用是時以攻之則不耗矣各以其物入于龜室則六龜各有室也祭祀先卜則祭祀始用卜者夫耕則祭先嗇馬則祭先牧食則祭先飯不忘本也况卜者以吉凶前民用安可忘之乎祭祀先卜所以仁之也天言祀地言祭先卜兼言祭祀者盖天神地明而不測卜能通之在所尊焉天地之道也菙氏掌共燋契以待卜事凡卜以明火􅅡燋遂龡其焌契以授卜師遂役之燋音爵菙荆木也灼龜用荆猶捶之類以下士二人共其事故名官以菙氏燋即荘子所謂爝火之爝盖灼龜之木也契即詩所謂爰契我龜之契盖開龜之鑿也卜則用燋以灼龜鑿以開龜菙人則共之以待事也故曰掌共燋契以待卜事凡卜必以明火者明火謂以陽遂取火于日取其潔而明之至也盖火生于木縁物以為氣古之人或取于榆栁或取棗杏或取槐檀或取桑柘隨所取而得之非不明也然非明之至非不潔也然非潔之至惟日為陽精之純取于陽精則為至明隂精之純則為至潔惟致其明潔之至然後可以鑽精􅀝神相知休咎則明火之用不為小補矣􅅡燒也用所取之明火以燒灼龜之木故曰以明火􅅡燋契之鋭頭謂之焌曲禮曰進戈者前其鐏盖以契之鋭頭火而吹之其頭若戈鐏焉故曰遂吹其焌契焌契既燃乃授卜師以卜師揚火作龜以致其墨焉菙氏因而贊相其事為卜師之所役也占人掌占龜以八簭占八頌以八卦占簭之八故以眡吉凶易曰以卜筮者尚其占盖占事知來以視兆吉凶則謂之占人占之字從口者占必有言占人占龜以八筮占八頌以八卦占筮之八故豈徒占之哉必析之以言也書言三人占則從二人之言者謂是也然言無當必如所占而已故從口不從言占非特卜也而尚卜焉八筮知數而已卜之所通非特數也故從卜盖以龜為主也故占人亦先言掌占龜然以八筮占八頌以八卦占筮之八故以眡吉凶則龜筮合而占焉筮有八故龜有八命命言所以令龜故言所以令筮或言故或言命相偹也八筮則八故之筮八頌則八命之頌八卦則八筮之卦由此而推之則占人雖以占龜為主亦合筮而占焉兩眡其從違以㫁吉凶也凡卜簭君占體大夫占色史占墨卜人占坼凡卜簭既事則繫幣以比其命嵗終則計其占之中否卜以龜筮以蓍占體占色占墨占坼皆占龜而曰凡卜筮則筮亦占體故也詩曰爾卜爾筮體無咎言筮占體于此見矣君占體謂占其體兆之吉凶言體則色墨坼皆偹如四體之體矣大夫占色則色有善否史占墨則墨有貞明卜人占坼則坼有大小卜之事龜坼而後墨見墨見而後色著色著而後體偹卜人先占坼史占墨次之大夫占色又次之衆占偹焉而後君占體以㫁吉凶事之序也先言君占體則以尊卑之序言之周官之法如此而玉藻乃謂卜人定龜史定墨君定體者周官之言尊卑之序也玉藻所記先後之序也凡卜筮既事則繋幣以比其命謂禮神之幣也比其命謂書其命龜筮之詞而比之嵗終則計其占之中否則以考官箴之得失而進退其人故也既廪稱事將使能者勸不能者勉此所以馭卜筮之官與簭人掌三易以辨九簭之名一曰連山二曰歸藏三曰周易九簭之名一曰巫更二曰巫咸三曰巫式四曰巫目五曰巫易六曰巫比七曰巫祠八曰巫參九曰巫環以辨吉凶凡國之大事先簭而後卜上春相簭凡國事共簭易以卦言筮以數言定數然後成卦則筮定數于始卦成體于終繫詞蓍之徳圓而神卦之徳方以智以蓍始于數而數無定名卦成于爻而爻有定體也易有三則所立之名不同也筮有九則所筮之事不一也自一曰巫更至九曰巫環鄭氏皆讀作筮理宜然也九筮之名盖古有其書如逸書之類其書既不存于後世則其爻不可得而考矣特先儒以意縁㑹而推之筮更謂遷都邑也筮咸謂筮衆歡否也筮式謂筮制作法式也筮目謂事衆筮其要所當也筮易謂民衆不説筮所改易也筮比謂與民和比也筮祠謂筮牲與日也筮參謂筮御與右也筮環謂如環人筮可致師否也凡國之大事先筮而後卜者兼用卜筮而尊龜焉故後之吉凶取斷于龜故也夫物生先象而後數卜筮則先筮而後卜者盖先象而後數者自幽而出乎明也先筮而後卜者自明而稽乎幽也上春相筮則筮有美惡亦如龜矣龜用元龜則筮亦相而擇其善者焉占夢掌其嵗時觀天地之㑹辨隂陽之氣以日月星辰占六夢之吉凶一曰正夢二曰噩夢三曰思夢四曰寤夢五曰喜夢六曰懼夢列子曰神遇為夢形接為事故晝想夜夢神形所遇一體之盈虛消息皆通于天地應于物類盖人之生受命于天地賦形于隂陽則其精神徃來與隂陽相為流通而禍福妖祥成敗得喪之見于吉凶者由夢以占之固無所逃矣掌其嵗時者掌占夢之嵗時也嵗時之所建固不同矣或在寅或在夘之類是也時之所運固不同也或曰為春或曰為夏之類是也其者指物之詞指其所夢之嵗時故曰掌其嵗時天地之㑹先儒謂建厭所處之辰也隂陽之氣先儒謂休王前後也然則天地之㑹有升降徃來隂陽之氣有盈虚消息嵗之所建時之所運既有常數矣然後天地之㑹可以觀隂陽之氣可以辨日月之運星辰之次可由之以占夢之吉凶焉此占夢之官所以掌其嵗時觀天地之㑹辨隂陽之氣而以日月星辰占六夢之吉凶與正夢者謂平安自夢以其非噩非思非喜非懼而神非有所變故謂正也以平安自夢為正則噩思寤喜懼者變也噩如周書噩噩之噩辨察之意也謂心有所辨而後夢也思夢謂心有所思而後夢也寤夢謂寤時而夢如狐􅊳夢太子申生也喜夢謂心有所喜而後夢懼夢謂有恐懼而後夢夫六夢雖有正變之不同然皆精神之所感格故吉凶皆可預以占之于其吉也則由正道以應之于其凶也則修正道以禳之先王設官使之占夢豈徒然哉將以避凶而之吉永正厥事如此而已此其所以識感變之所赴而事至則知其所由然也與日月星辰在天者也六夢在人者也在人之夢必以日月星辰占之而後知其吉凶者所謂在人者庸詎知其非天耶惟逺者知通為一而後可以語此季冬聘王夢獻吉夢於王王拜而受之乃舍萌於四方以贈惡夢遂令始難毆疫萌亡耕反難乃多反占夢王官也其所占者以王為主王者樂以天下憂以天下者也吉凶與民同患而已王之于民吉與之同患惟恐其弗得季冬聘王夢獻吉夢于王王拜而受所以與天下同其樂也以凶與民同患惟恐其弗去故舍萌于四方以贈惡夢遂令始難毆疫所以與天下同其憂聘問也主夢而占之吉則獻于王也吉夢在王而所以祐其吉者則在天拜而受之所以尊天舍萌于四方謂舍菜以祭四方之神也盖吉凶之萌寔兆于夢因舍菜以祭焉故謂之舍萌于惡夢而舍萌以祭所以求其吉而欲其和也故謂之贈贈送也難者所以難鬼神之為厲疫者而毆之也于季冬既舍萌而贈惡夢然後令始難而毆疫者盖内無釁然後自外而至者可索而毆故也方相氏掌以時難則占夢所令者方相氏也夫占卜祈禳人情之所不能免也先王因人情而制禮則獻吉贈夢禮所不可無然教在其中矣盖人之精神徃來與天地隂陽相為流通故其夢與天地隂陽日月星辰相應而為吉凶各以其類而至詩以熊羆為男子之祥以虺蛇為女子之祥以魚為年之豐以旟旐為室家之衆而其意為若合符節所謂以其類至者也知此則可以言性命之理矣然禮有先後有緩急緩其所先而急其所後區區夢卜此召彼故老訊之占夢所以見刺與眡祲掌十煇之灋以觀妖祥辨吉凶一曰祲二曰象三曰䥴四曰監五曰闇六曰瞢七曰彌八曰叙九曰隮十曰想掌安宅叙降正嵗則行事嵗終則弊其事䥴思隨反隮子兮反易曰觀乎天文以察時變又曰天垂象見吉凶聖人則之盖自其異而觀之則天人異位宜相逺而不相及自其同而觀之天人同流宜相應而不相逺先王于天象必立法以觀妖祥辨吉凶所以和同天人之際而使之無間此眡祲之官所由設也賈氏謂日旁也氣為煇十煇自一曰祲至十曰想大率皆由旁之氣故總以十煇言之煇之字從火從軍以合并為光暉散為煇離為日為火故也物反為妖兆見為祥妖祥者吉凶之方萌吉凶則妖祥之成事故觀妖祥然後吉凶可辨焉氣祥謂之祲以日旁之氣相侵也形本謂之象謂氣在日旁未成形也鐫如童子佩鐫之鐫謂旁氣刺日也監如王啟監厥亂之監謂雲氣在日而臨日也闇謂晝晦成日蝕也瞢謂日無光也彌如彌縫之彌謂氣貫日叙如時叙之叙謂雲有次序在日上也隮如朝隮于西之隮謂虹氣見日旁也想謂雜氣有似可形想也十煇雖皆日旁之氣而其状貌不同而妖祥吉凶所繋有不同不可以不辨此眡祲掌之所以又有法也掌安宅叙降者謂人睹妖祥之氣則有不安其居者眡祲則掌以其法為之安其居處也又為叙其妖祥而降之使知偹其凶而應之吉若保章氏降豐凶之祲象是也正嵗則行事者行安宅叙降之事以豫告于下也嵗終則弊其事者盖十煇之法以天占人也弊其正嵗所行之事以考其占之中亦所以既廩稱事與然言弊而不言㑹則不可㑹弊之而已大祝掌六祝之辭以事鬼神示祈福祥求永貞一曰順祝二曰年祝三曰吉祝四曰化祝五曰瑞祝六曰筴祝人尚其口以接鬼神示謂之祝大祝祝官之長也大宗伯事鬼神示以其禮故曰以吉禮事邦國之鬼神示大祝事鬼神示以其辭故曰掌六祝之辭以事鬼神示若夫王則事鬼神示以其道者也然道非體不立非辭不通此宗祝之職皆所以佐王事鬼神示者也先王中心陳信于鬼神示而其誠不可見大祝以辭薦信于鬼神示然後可以祈福祥求永貞矣夫天所祐為福福所兆為祥鬼神示之所為也大祝則祈之祈求有所㫁也盖福莫長于無禍能㫁然後可以延故曰祈福祥歴年之永得正命謂之貞歴年正命人之祈禀也大祝則求之求者彼有所祐而此求之也盖天命明哲命厯年皆在人修之而已則有可祐之道然後可求也福祥出于神永貞本乎命先王所以祈求之者雖曰因人情所不能免然亦不可以茍矣則所以祈福祥求永貞固有道矣福祥者天事也永貞者人事也故先之以祈福祥而繼以求永貞聖人之所以和同天人之際而使之無間者也餘見𫝊掌六祈以同鬼神示一曰類二曰造三曰禬四曰禜五曰攻六曰說鬼神示之于人幽明則異域彼此則異𫝑疑若不可同也然與人異域而同理與人異𫝑而同情大祝掌六祝之詞以祈之其詞之所祈可以使同無異也此所以謂之同鬼神示與左氏曰鬼神聰明正直而壹者也依人而行聰明依人而行則神之視聴與人同矣正直依人而行則神之好惡與人同矣又且壹焉則與人同道人之所取捨神亦取捨焉視聴之理好惡之情取捨之道既與人同則吉凶不違于人矣六祈之詞何為而不能同乎自非通幽明之故知鬼神之情状烏能與于此盖凶禍灾變人之所惡也祈求鬼神示而去之福祥永貞人之所欲也祈求鬼神示而降之鬼神示去其所惡從其所欲雖幽而無異于明雖無形而無異于人此所謂同之也然而先王于鬼神合其吉則同鬼神固有道矣大祝之六祈其以陳信于鬼神示而已類合其類而祭之若類上帝之属造即其所而祭之若造于祖之属禬以㑹福若禬國之凶荒民之札喪之属禜灾若春秋祭禜之属攻之以治去其害若翦氏以攻禜攻之之属以詞責之謂說若庶氏以攻說禬之之属先王所祈如此亦以吉凶與民同患而已彼于禍福之際固未數數然也作六辭以通上下親踈逺近一曰祠二曰命三曰誥四曰㑹五曰禱六曰誄以言達意之謂辭易曰辭也者各指其所之太𤣥曰觀其施辭則其心之所欲者見矣盖禮之文待辭而後著禮之情待辭而後見明以通乎人幽以通乎神皆有待乎辭則上下親踈逺近皆待辭以通此大祝所以作六辭也上下以分言親踈以情言逺近以𫝑言幽而神明而人皆有上下親踈逺近故也求福之祭曰禱禱求有所延賽禱之祭曰祠與春祠同詞為主故也命以言命之使禀也誥以言告之使從也㑹謂詞之施于㑹衆之時也誄謂言其實而誄之也命誥誄言其事之辭祠㑹禱言其詞之事然則命用于祠故一曰祠二曰命誥用于㑹故三曰誥四曰㑹誄用于禱故五曰禱六曰誄詞之有命者若少牢饋食禮筮尸命曰孝孫某用薦嵗事至于嘏主人則曰皇尸命工祝致多福於汝孝孫是也㑹之有告則若士師五戒二曰誥用之于㑹同是也禱之有誄若子路請禱誄曰禱爾於上下神祗是也雖然有非祠而命事者若行人協詞命是矣有非㑹而告者若伊尹申告于王是矣有非誄而禱者若張老善禱者矣故分言六詞焉辨六號一曰神號二曰鬼號三曰示號四曰牲號五曰齍號六曰幣號齍音咨以實命物使有所辨則謂之名因名命物使無相害則謂之號是名為實之賓而號為名之美稱也致其美稱所以尊之乃禮之敬文也神號所謂皇天上帝也鬼號所謂皇祖烈祖也示號所謂后土地示是也牲號牛曰一元大武之類是也齍號黍曰薌合之類是也幣號幣曰量幣之類也神示鬼為之號者所以致其尊也牲齍幣之為號者所以致其敬文也辨九祭一曰命祭二曰衍祭三曰炮祭四曰周祭五曰振祭六曰擩祭七曰絶祭八曰繚祭九曰共祭衍音延炮白交反擩而泉反繚音了又音料共音恭注同飲食必有祭先王所以仁鬼神而不敢忘也盖飲食者人之大欲存焉昔上古之時未有火化食草木之實鳥獸之肉飲其血茹其毛非所以養生也後聖有作然後修火之利以炮以亨以炙以為醴而養之具實始乎此而先王豈忘本哉孔子言君子無終食之間違仁而况于王乎則大祝之辨九祭皆祭食之法而先王所以仁鬼神者尤致其詳矣命祭玉藻所謂若賜之食而君客之則命之祭然後祭也衍祭取尸祭之餘尊而祭之也少牢饋食云下佐食取牢一切肺以授上佐食以綏祭所謂綏祭即墮也盖尸祭之餘將受嘏亦尊而祭之也炮包物火之如封人所謂毛炮之豚而八珍亦有炮豚牂則炮祭盖取是而祭也周祭曲禮所謂祭食祭所先進殽之序徧祭也徧祭則周矣故謂之周祭然亦有所謂不祭者焉魚腊醤湆以其非物之盛則在所不祭也振祭儀禮所謂取肝擩于鹽振祭也擩祭儀禮所謂取菹擩於醢祭于豆間也絶祭儀禮所謂取肺坐絶祭也繚祭儀禮所謂右取肺左卻手執本坐弗繚右絶末以祭也然則繚祭以手從肺本循之至于末非若絶祭真絶之而不循其本也共祭膳夫之授王祭肆師饗食之授賔祭也凡此九祭其度數固不同而先王用之無遺禮者以有大祝之官辨之而已辨九􅉔一曰稽首二曰頓首三曰空首四曰振動五曰吉􅉔六曰凶􅉔七曰竒􅉔八曰褒􅉔九曰肅􅉔以享右祭祀􅉔音拜稽音啟褒音報其體衆出而進退以自通于所致者拜也故卑之于尊賤之于貴與夫自敵以上欲通其致敬之誠未有不用拜者矣非特是也舜拜臯陶之歌禹聞善言則拜太甲之拜首稽首伊尹武王之拜首稽首周公以至獻民數獻吉夢獻賢能之書而王皆拜而受之此又自尊自貴以屈服其體而通致敬之誠於其下也禮之情大小輕重固不一則拜之儀多寡低昂有不同大祝因其事以辨之而已此所以有九辨之别也稽首拜而頭至地也頓首拜而首叩地也空首拜而頭至手也振動謂􅀾栗變動之拜也吉拜謂吉事之拜拜而後稽顙也凶拜謂凶事之拜稽顙而後拜也竒拜一拜君所以答臣褒拜褒音報報謂再拜拜神與尸享獻也肅拜謂俯下手軍中拜也成十六年卻至三肅使者是也凡此九拜或用之于接人或用之于接神享尊在已上者右尊在已右者此用之于接人或偹物以祭或致道以祀此用之于接神故曰以享右祭祀凡大禋祀肆享祭示則執明水火而號祝禋音因大禋祀事天神之大者也致其精以祀故謂之禋祀大大肆享事人鬼之大者也致其敬以享故謂之肆享祭示事地示之大者也致其察以祭故謂之祭示于地言示則天神人鬼可知矣王于天神人鬼地示所致如此則大祝之陳信于鬼神宜有以攝之故使執明水火而號祝明水以鑒取水于月明火以遂取火于日至潔而清明者也惟潔為能革汚而物莫能染惟清為能察物而物莫能濁惟明為能燭理而物莫能蔽以此而號祝則禋祀而天神降肆享而人鬼格祭祀而地示出豈特王之致精致敬致察之效與大祝陳信而無媿詞不為無補矣所謂號則六號之属是也先號而後祝則號致焉而後祝也鬼神示之號則尊神而致之也牲齍幣之號則敬神而致之也禋祀肆享祭示皆禮之大者其事特嚴焉先期于致鬼神示而後以祝通其意故先號而後祝若夫小祝甸祝詛祝之類皆是也祝號者盖小祝掌侯禳禱祠之祝號甸祝掌表貉之祝號詛祝掌盟祝類造攻說禬禜之祝號皆其事之小者故先祝而後號然則小祝大師掌釁祈號祝亦先號後祝同也盖大師亦國之大事故與禋祀肆享祭示之大禮同也隋釁逆牲逆尸令鐘鼓右亦如之來瞽令臯舞相尸禮既祭令徹大喪始崩以肆鬯渳尸相飯贊歛徹奠言甸人讀禱付練祥掌國事隋許規反渳彌爾反國有大故天烖彌祀社稷禱祠隋尸祭之餘守祧所謂蔵其隋是也釁以牲血禦妖釁若小子釁邦器是也逆牲則二祼之辰王出廟門而迎牲則大司樂所謂牲出入則奏昭夏是也逆尸則向祭之晨王出廟門而迎尸則大司樂所謂尸出入則奏肆夏是也隋釁迎牲逆尸皆以鐘鼔為節大祝則令鐘鼓而已右謂尸食而侑之大祝亦令鐘鼓故亦如之大司樂言尸出入先于牲而大祝逆尸在迎牲之後者盖先逆尸而後迎牲事之序也大祝以詞事神所以接神而親之也牲以天産致味行吾愛敬而親神者也故以牲而先于尸來瞽令臯舞者来瞽則樂師詔之大祝来之也相尸禮則延其出入詔其坐作也既祭令徹盖九嬪贊后薦徹豆􅇼樂師帥學士歌徹内宗及以樂徹則佐傳豆􅇼然則大祝令徹者令九嬪之属而已大宗伯曰凡大祭祀王后不與則攝薦豆􅇼徹盖后雖不與而九嬪之属亦與徹事焉言甸人讀禱者甸師喪事代王受𤯝烖必有禱詞也大祝于甸人讀禱則言于匶使知焉以生事死以存事亡也付練祥掌國事者付音祔凢喪虞卒哭而有祔祭也十三月小祥而練二十五月而大祥祔也練也祥也皆大祝掌國事國有大故天烖彌祀社稷所遭謂之故大故則兵冦之大者也天烖謂之烖則水旱疫癘之類也大祝則彌祀社稷禱祠彌與小祝彌烖兵同彌所以止之也方其祈之則有禱及其賽禱則有祠皆大祝掌之也大師宜於社造於祖設軍社類上帝國將有事於四望及軍歸獻於社則前祝大㑹同造於廟宜於社過大山川則用事焉反行舍奠造七報反舎音釋宜造類皆祭名求有所利則謂之造合聚衆神之類而祭之謂之類宜于社造于祖在國内之禮也設軍社類上帝在國外之禮也國將有事于四望則軍行所過山川之禮也及軍歸獻于社則反而獻功之時也前祝則大祝前羣祝也大㑹同造于廟宜于社過大山川則用事焉以王之合諸侯于國外故也反行舍奠所以告知與然大師隂事也故先社而後祖大㑹同陽事也故先廟而後社此其序也建邦國先告后土用牲幣禁督逆祀命者頒祭號於邦國都鄙大宗伯曰王大封則先告后土今此言建邦國則惟建邦國為大封矣故詩之賚言封建諸侯亦曰大封于廟也先告后土則后土大示故先告之也詩言封于廟則先告后土後封于廟也用牲則以天産致味所以祭之也用幣則以人事致敬所以禮之也大宗伯不言用牲幣則以大祝見之也然必以大祝言之者則以大祝辨牲幣之號故也禮莫差于僣莫僣于祭故有其舉之而莫敢廢有其廢之而莫敢舉凡邦國都鄙之祀皆命于王焉故禁督逆祀命者命之祀而弗祀非所命而祀焉皆謂之逆祀命非所命而祀則在所禁命之祀而茆祀則在所督也頒祭號于邦國都鄙則頒其所得用之祭號也盖名位不同禮亦異數而名號者先王所以命其實者也又安可以假于人哉故天子之所用者諸侯不得僣諸侯所用者大夫士不得僣所以嚴其分也後世曲禮既廢季氏之旅泰山三家之以雍徹孔子所以病之也周禮詳解卷二十二
