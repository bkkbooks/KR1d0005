body:
  text: 周禮詳解卷九宋王昭禹撰地官司徒天賤生覆而為萬物之所資始者主乎道地職形載而為萬物之所資生者主乎化治無所不覆而以道為本故掌治者謂之天官教無所不載而以化為本故掌教者謂之地官天覆則無為而尊父道也地載則有為而親母道也故一曰天官而地官次之治教之序也官所以探本司所以伺末以探本故掌治者為天官掌教者為地官治以道為本教以化為本故也至於禮政刑事之官各分屬於四時亦然矣以伺末故教官謂之司徒政官謂之司馬司至於徒則教官之事無不舉司至于馬則政官之事無不舉至於刑官謂之司冦事官謂之司空亦然矣夫無車而行謂之徒行則役於人者也凡六官之屬皆有徒公家作民而用之亦謂之徒先王治徒以胥而教官謂之司徒者舉卑以見尊也教官之職大者有至於徳行則從而教之小者有至於徒役則從而司之司至於徒則教官所司皆舉矣於文反后為司盖后從一從口從口則所以出命司反之則守令而已從一則所以一衆司反之則分衆以治之而已從􅛣則承上世之庇覆以君天下也司反之則以君之爵為執事之臣而已六官之治或謂之司或不謂之司司徒以對冡宰而謂之司也司馬司冦司空則以對宗伯而謂之司也言司則畀不言司則尊或言或不言所以明分也惟王建國辨方正位體國經野設官分職以為民極乃立地官司徒使帥其屬而掌邦教以佐王安擾邦國六官之首皆言惟王建國而終以為民極者盖民心罔中惟爾之中治教禮政刑事莫非為民中也治以理之使中教以化之使中禮以節之使中政以正之使中刑以制之使中事以任之使中無動而不示之以中則民舉協乎大中至正之道尚安有過與不及之患哉曰掌邦教則教之法雖行于下而教之道實出于王也且正月之告始和布教之後乃施教法于邦國都鄙則逺而邦國之君近而都鄙之長其所受之教法一出于司徒司徒之所施又本于王則上下相承皆本乎一道逺近所守皆本乎一法此道徳所以同風俗所以一矣至于治禮政刑莫不皆然五官所掌皆謂之邦者以此佐王安擾邦國者盖因性而導之則謂之安拂性而制之則謂之擾荘子曰生於陵者安於陵則安者豈非因性而導之歟傳曰治擾謂之擾則擾者豈非拂性而制之歟今夫因其善父母而教之以孝因其善兄弟而教之以友因其善内親而教之以睦因其善外親而教之以姻以至因其信于朋友而教之以任仁于州里而教之以恤此安而教之之效也或紏之以不孝之刑而使之孝或紏之以不悌之刑而使之友不善内親則有不睦之刑不善外親則有不姻之刑以至于紏之以不任之刑而使之任紏之以不恤之刑而使之恤此擾而教之之效也教典教職皆曰安邦國而此曰安擾邦國則王之于邦國不特安之而又能擾之也至于擾邦國則王之事非教典之書所能及非教官之職所能專也故教典教職皆止于安邦國而已雖然王之于邦國或有所不獲擾焉故兼安擾邦國言之也教官之屬大司徒卿一人小司徒中大夫二人鄉師下大夫四人上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人六官之屬自鄉一人之下至于徒百有二十人其尊卑貴賤之員數未嘗有増减者盖六官所掌雖不同而其屬皆六十賤職之所設凡以穪其事而已増之則為有餘减之則為不足矣至于治官之攷謂之宰夫政官之攷謂之軍司馬而于教官則謂之鄉師禮官則謂之肆師刑官則謂之士師者盖宰夫則因大宰而名之而攷治者宜以智帥人故曰宰夫軍司馬則因大司馬而名之而治政者特以軍為主故曰軍司馬師所以教之而教官所攷耆止于六鄉之教事故曰郷師至于禮也刑也無非所以教也故亦皆謂之師先王因事以名官各有攸趣爾鄉老二鄉則公一人記曰七十老而傳則老者徳成而無所任事矣老子曰容乃公公乃王則公者爵位甚大而其徳與王同矣鄉老公也尊之于鄉憲其言行而不累以事故稱老焉禮賓賢能而獻其書于王王再拜而受之則為道之存故也故以鄉老帥其事鄉老于司徒之官非屬而無職則以事道者尊職事者卑故也然鄉老二鄉而公一人則三公分主六鄉矣書曰三公官不必備惟其人則三公一人有時而兼掌六􅀸矣鄉大夫每鄉卿一人先王于郊則建六鄉于甸則建六遂鄉向也以其近而上逹向于王故也遂專也以其逺而治有所專于外故也鄉大夫每一人則六鄉盖六􅀸矣􅀸而謂之大夫者盖鄉有飬人之徳教官以善飬人非具􅀸之徳則不足為以智帥人之大者惟有飬人之德則其為智也因性而不失于鑿以是教人豈間間以為智哉鄉大夫之職必以􅀸為之良有由矣州長每州中大夫一人黨正每黨下大夫一人族師每族上士一人閭胥每閭中士一人比長五家下士一人二千五百家則聚而内比于鄉故五黨為州州長以中大夫為之降􅀸大夫一等矣其徳足以長于一州故稱長焉黨正每黨下大夫一人夫人不能無黨先王順而為之制要其為黨者以顯不以幽而已幽黨非所尚也故君子羣而不黨所以同乎人此周家所以五百家為黨也黨正降于州一等故以下大夫為之謂之正則一黨之所取正也族師每族上士一人者族所相親四閭為族則使之相保聚如人之族也師則道足以教人一族之所師也故謂之族師族師卑于黨正故以上士為之也閭胥每閭中士一人者二十五家為閭閭之字從門從吕則二十五家而同其門以往來相聨屬而中有胥以長之如人之吕也故謂之閭胥以中士為之則又降于族師矣比長五家下士一人者五族為黨則以其羣相黨也五家為比則以其兩相比也夫與天遊與道合者立乎萬物之上則疑獨矣降而與人道交者猶不能無所黨無所比又况凡民乎先王由是為之居民之法上自王族之衆旣名之以黨下自五家之寡又名之以比其所黨者顯也其所比者義也所黨者顯則幽者無所容所比者義則不義者無所比于内外小大如一焉若然則何惡乎比黨哉州長謂之長而比長才足以長五家而巳比長所統則為至寡于鄉官則為最􅹈故以下士為之然五家以一下士為之長則六鄉已一萬五千人矣則地之所入幾不足以禄之此學者所以疑周官也然飬而治之如此則六鄉之人皆仗節死難之士矣王畿受天下財貢所入而以財不足禄為患亦誤矣是變起于一旦而一方方伯連率所不能克然後六鄉之士出焉盖六鄉之士有不出出則無不勝矣大司徒上大司徒之職掌建邦之土地之圖與其人民之數以佐王安擾邦國書曰凡厥正人既富方穀論語曰既富矣又何加焉寧曰教之盖人之常情有餘則樂生不足則累至婦子于百室既盈之後禮節興于倉廪旣實之餘將欲教之必先于政以富之政以富之必先建其土地之圖與其人民之數也盖土地之圖既立則天下之廣狹可知人民之數既定則生齒之衆寡可悉如此則井地均榖祿平富民之政由是而始矣此大司徒掌邦教以佐王安擾邦國而必先于建土地之圖人民之數也邦之土地之圖即天下土地之圖萬國各自圖之以入于司徒則謂之天下之圖大司徒合而圖之則謂之邦圖也合天下圖之而可以謂之邦圖則天下莫非王土故也建土地之圖則土㑹土宜土均之法可施王之國地中可求邦國之地域可制焉建人民之數則地守地職地貢之事可令萬民之卒伍可㑹都鄙之室數可制焉夫然後可以佐王安擾邦國土地之圖湏作而立之而人民之數亦言建者非大司徒校登稽比有法則亦不立故也以天下土地之圖周知九州之地域廣輪之數辨其山林川澤丘陵墳衍原隰之名物而辨其邦國都鄙之數制其畿疆而溝封之設其社稷之壝而樹之田主各以其野之所宜木遂以名其社與其野大司徒所掌雖及于人民之數而邦之土地之圖其來乃本乎天下土地之圖推本其事而言之故曰以天下土地之圖周知九州之地域廣輪之數横曰廣從曰輪故馬融曰南北為輪東西為廣廣之字從黄地道光也從广東西而已此廣所以為横也輪則運而趍前不可以左右此輪所以為從也凡州之地域廣輪之數既按圖而知之矣然後辨五地之名地故繼之以辨山林川澤邱陵墳衍原隰之名物積石曰山竹木曰林注海曰川水鍾曰澤土高曰邱大阜曰陵水崖曰墳下平曰衍廣平曰原下濕曰隰名所以命其土物所以色其土五地之名物既辨而知之矣然後辨邦國都鄙之數四海之内九州州方千里州建百里之國三十七十里之國六十五十里之國百有二十八州州二百一十國天子之縣内方百里之國九七十里之國二十有一五十里之國六十有三凡九十三國此邦國都鄙之數也邦國都鄙之數既辨而知之矣然後制其畿而溝之以為之限制其疆而封之以為之守故繼曰制其畿疆而溝封之畿以為之限疆以為之守則神必有所依民必有所附設其社稷之壝則所以依神也立其田主則所以附民也故繼之設其社稷之壝而樹之田主社土神也稷榖神也勾龍為后土配食于社棄為后稷配食于稷田主則禮記所謂先嗇神農是也社稷皆有壇而有壇必有壝與其田主使各主其神民則又從而表之表之之法各以其野之所宜木遂以名為社與其野如土宜松則植以松而名之曰松社之野土宜栗則植以栗而名之曰栗社之野如此則新甿欲有所植不謀而知其土壤所宜公上欲有所歛不視而見其材木所出凡此皆先王所以制地之法富民之本也故序于大司徒之職首以土㑹之灋辨五地之物生一曰山林其動物宜毛物其植物宜皁物其民毛而方二曰川澤其動物宜鱗物其植物宜膏物其民黒而津三曰丘陵其動物宜羽物其植物宜覈物其民専而長四曰墳衍其動物宜介物其植物宜莢物其民晳而瘠五曰原隰其動物宜臝物其植物宜叢物其民豐肉而痺皁音皂㑹古外反覈音核介音界莢力果反晳音錫計物之數謂之㑹與嵗計謂之㑹同土㑹之法則以法計計物多寡以辨其所生之宜也動物天産也植物地産也民則資天地之産以為用者也故五土之物生其所辨者動物植物與其民而已積石曰山竹木曰林山林得木之氣為多其動物宜毛物毛物虎豹之屬也草木以枝葉生而為地之毛凡毛物皆禀木氣而然也故山林則宜毛物之動者其植物宜皁物則柞栗之屬柞栗資木氣而生于山林為多故也其民毛而方者民之資木氣為多其皮膚亦如木之有枝葉然所以多毛方則其民所禀之形也木曰曲直而民之形反方者盖一曲一直相雜而成勢所以方也注海曰川水鍾曰澤川澤得水之氣為多其動物宜鱗物鱗則魚龍之屬資水以生故也其植物宜膏物鄭氏以膏為櫜物理或然也櫜物蓮芡之屬有櫜韜生于水故也其民黒而津黒則水之色也津則水之澤也土髙曰邱大阜曰陵邱陵皆積土而成土火之所生也土本畀而隰邱陵積土而高燥則得火之氣為多其動物宜羽物羽物則飛禽之屬飛禽禀火氣而生故也其植物宜覈物覈物則桃李之屬火性外明而内晦内虗而外實故也其民専而長攷工記曰火以圜専園也圜火之性也洪範火曰炎上炎上則其形鋭而長長火之形也此其民所以專而長水崖曰墳下平曰衍夫土生金金生水墳衍以土為體而不離乎水也土金母也水金子也上資土母之氣下資水子之氣則得金之氣為多也其動物宜介物介物龜鼈之屬也其植物宜莢物莢物則薺棘之屬也金之性堅剛故動物宜介物植物宜筴物也其民晳而瘠晳則金之色瘠則金之形也廣平曰原下濕曰隰中夾隂陽交而生濕濕生土土者冲氣之所生也原隰禀隂陽之冲氣則得土之氣為少也其動物宜臝物臝物則鼃螾之屬禀氣于土而其體重遲也其植物宜叢物叢物萑葦之屬資土之氣而其枝條荗盛也其民豐肉而痺土之形則肥厚而其位則在下此民所以豐肉而痺也山林川澤邱陵墳衍原隰以物所生多寡為先後動植及民以㑹而辨之難易為先後因此五物者民之常而施十有二教焉記曰廣谷大川異制民生其間異俗剛柔遲速緩急異齊五味異和器械異制衣服異宜先王脩其教不易其俗齊其政不易其宜然則五地之物所生異宜五物之民所習異俗始乎故長乎性成乎命先王不能移易而使之變則此五物者乃民之常也其施教也豈能違其性習之常哉則其制器利用和味宜服亦因之而已易曰先王以省方觀民設教盖不省方則無以知五地之物所生為異宜不觀民則無以知五物之民所習為異俗以之設教則殆將違其性習之常民從之斯難矣此十二教之施所以必因乎民之常也夫民之常者天也施十有二教者人也以人而因乎天則其施教也亦以輔萬物之自然而已易曰範圍天地之化而不過五物者天地之化也十有二教聖人所以範圍其化而不過也一曰以祀禮教敬則民不苟二曰以陽禮教讓則民不爭三曰以隂禮教親則民不怨四曰以樂禮教和則民不乖五曰以儀禮辨等則民不越六曰以俗教安則民不愉七曰以刑教中則民不虣八曰以誓教恤則民不怠九曰以度教節則民知足十曰以世事教能則民不失職十有一曰以賢制爵則民慎徳十有二曰以庸制祿則民興功愉音偷又音榆虣薄報反安上治民莫善于禮移風易俗莫善于樂禮樂者人治之大故十二教必先之以禮樂焉然作樂所以應天制禮所以配地故先以禮施之而典教者亦地官而已以祀禮教敬則民不苟者惟民生厚良知良能具于不學不慮之間因物有遷則至于父母之不知飬鬼神之不知奉先王脩祭祀享鬼神使民效之内以盡志而致其内心外以備物而致其外心參之以時而不違乎怵惕悽愴之所感盡以誠信而不忘乎嗜慾居處之所思以存亡形以屬統紀則敬莫大于是矣躬行于上而民應于下孰有慢其親者乎此民所以不苟以陽禮教讓則民不爭者陽禮者鄉飲鄉射之類以作于外故謂之陽禮陽禮所以辨尊卑别能否以尊讓于卑以能讓于不能以教自卑而尊人也易曰謙尊而光卑而不可踰教讓者凡以使民知謙之為徳也三代之民知止乎義禮而不違者以知㣲而彰知柔而剛善則稱人而忠厚之教興過則稱已而强㬥之風息此民所以不爭也以隂禮教親則民不怨者隂禮則婚姻之數以其為内事故謂之隂禮男子生而願為之有室女子生而願為之有家先王之教使民樂所願而已以㑹男女以定室家在易之咸則以男下女而宜其室家在易之恒則以女承男而宜其家室男女以正婚姻以時又孰有怨哉盖關雎之徳備則政事無不脩桃夭之化行則財用無不足政事脩而財用足則何患乎男女之不正婚姻之不時哉此民所以不怨也以樂禮教和則民不乖者夫人生不能無樂樂不能無淫淫而不為導則不能無亂先王惡其亂也故制雅頌之聲以導之殷佑其良心蕩滌其邪氣使之遷善逺惡而不自知者樂而已樂不徒作必有禮焉樂所以和禮所以節和勝則流節勝則離以樂感之而不失乎倫數者和而能節矣其見于上下隆殺者皆禮之序也其形于俯仰綴兆者皆禮之容也夫是之謂樂禮樂和而有禮以節之則其聲足樂而不流其文足辨而不諰一蹈乎中正之雅而不遷于淫哇之鄭故在宗廟之中君臣上下同聽之則莫不和親鄉里族黨之中長少同聼之則莫不和順易直子諒之心油然而生悖慢邪僻之患無由而接此民所以不乖也然謂之樂禮非樂之至也故以教民而已若其至則和樂而無形昏嘿而無聲流而不息合同而化思慮且将有不及况可得而教民哉以儀禮辨等則民不越者樂所以統同禮所以辨異同與天地合其和異與天地合其節以禮禮教和所以為同也而患于不能别異故儀以辨之所以為異也其天叙之有典其天秩之有禮民皆居之以為倫用之以為常聖人也者充乎人倫之至而能體常者也因之以立天下之儀推之以辨天下之等儀必有義而倫類在焉等必有節而法度在焉此民所以不越也以俗教安則民不愉者以儀辨等所以為異也異則患不能從衆以俗教安則所以從衆也夫天之所生地之所飬世習之所傳萬數之所聚鄉閭師友之所教道雖皆出于性命之理而不能無異生于陵者安于陵長于水者安于水越人安越楚人安楚凡人之所習而有欲存焉夫是之謂俗先王豈能强之使改咈之使從哉亦各因其所宜而教之使安焉如是則民各從其所願而無苟且倖免之意偷薄之患無自作矣此民所以不偷也以刑教巾則民不虣者民安于俗或所欲者過而不能中或所習者惑而不能一以刑教之所以一民也且先王以中道立教使賢有餘者不敢過愚不肖者不敢不及皆于君取中焉此以徳而教之中也以徳教之而或不從無威以制之則流而入于惡矣先王于是以刑弼教則刑者所以制之而使中也如是則强悍悖戾者皆化而歸于中矣盖不威不懲小懲而大戒者民人之福也法令既設而絶于智慮之所思糾禁既行而懲于形色之所見為下者無或至于滅耳之凶為上者無或至噬腊之吝此民所以不虣也以誓教恤則民不怠者盖刑以威物君子之所不得已小人之所不得免而先王期于無刑者亦必有具矣以誓教恤則勉之使無敢怠以度教節則約之使無敢僭無敢怠則無不及矣無敢僭則無過矣無過不及則所以使中而不至于刑也夫矢之以言而使之憂患焉謂之誓先王命民以戰則欲其相救作民以事則欲其不慢故以誓教恤則憂發乎内而逹乎外矣則民皆勉力以就事又孰敢怠哉以度教節則民知足者衆法所自起而長短制焉謂之度節則度之所制而為限者也以度教節則衣服有制􅄊用有宜貴有常尊賤有等威民皆安分而無覬覦之患所以知足也上曰以儀教等則民不越此曰以度教節則民知足者盖度主于法而儀主于容節主于守而等則有高下之分以儀辨等則行之于上以度教節則施之于下行之于上則下觀而化其所以化者外也施之于下則下守而化其所以化者内也外也故民不越内也故民知足十曰以世事教能則民不失職者世事則世守其事士農工商各世其業之謂也夫良弓之子必學為箕良治之子必學為裘少而習之其心安焉不見異物而遷焉得之于視聽之所親朝夕之所玩樂所積習之便而不可易焉者世事之所能也先王因其能而教之使士與士言義而士得盡心于學農與農言耕而農得盡力于田工與工言􅄊而工得機巧以盡器械商與商言利而商得以負販盡貨賄内不拂其所性外不易其所習因而成之觸類而長之則上之為教也簡而下之從教也輕此民之以不困于務而失職也易曰君子以教思無窮以世事教能則非止其身也其教無窮矣以賢制爵則民慎徳以庸制祿則民興功者教之所以成終始也爵祿者先王所以勵世磨鈍之術爵不茍授叙徳而已祿不妄予論功而已所謂徳懋懋官功懋懋賞是也先王舉善而教不能亦欲其有所懋矣制爵而不以賢則民知爵之為貴而不知慎徳之所以從爵也制祿不以庸則民知祿之為富而不知興功之所以從祿也先王之班爵祿所貴者功徳而已無功徳而爵祿之非所以勵世磨鈍也詩曰既見君子樂且有儀則始之以禮樂之教可知矣繼之曰既見君子錫我百朋則終之以爵祿之制可知矣彼學以聚之問以辨之思以精之而終待乎名譽之所崇則欲民慎徳興功茍非爵祿之勸烏可得乎方舜之時五典之所惇五禮之所庸亦已備矣至于同寅恊恭和𠂻則授之以五服之所章亦無異乎十有二教而終之以爵祿矣以土宜之灋辨十有二土之名物以相民宅而知其利害以阜人民以蕃鳥獸以毓草木以任土事辨十有二壤之物而知其種以教稼穡樹藝種章勇反中央隂陽交而生濕濕生土土者隂陽冲氣之所化也然而十有二土既分東西南北之異方則隂陽之氣不能無有餘不足之偏勝其形有高下肥磽之殊其性有羙惡之别則土之所宜固不齊矣因其所宜而為之度數焉以計其土是所謂土宜之法也十有二土則係乎十二國之分野以應天文十二次言之星紀呉越也元枵齊也娵訾衛也降婁魯也大梁趙也實沈晉也鶉首秦也鶉火周也鶉尾楚也壽星鄭也大火宋也析木燕也十二土各有名物者名所以命具土則邱陵墳衍原隰之屬是也物所以色其土青黎赤埴黒墳之屬是也故曰以土宜之法辨十有二土之名物既知矣則其高下羙惡皆得而周知于是乎度地以制邑量地以居民使各安居而樂于從事則藪牧園圃預有職焉故曰以相民宅而知其利害盖民雖好利而惡害不能趨利而避害上之人既相知其利害則示之以利害使之知所避就焉以阜人民則使人民衆安如山阜之阜物也以蕃鳥獸則使之蕃息若草木之蕃蕪也以毓草木則使草木生毓如母順而毓子之毓也夫物必毓而後蕃蕃而後阜鳥獸謂之蕃草木謂之毓而人民謂之阜則察于人倫明于庻物之意大宰蕃鳥獸在毓草木之後土宜之法以蕃鳥獸然後以毓草木者大宰以生毓飬蕃為序而土宜以人民鳥獸草木為序故也以任土事則城郭溝池道渠之役之屬小司徒以任地事則非特土事而已凡有事于地者皆任焉其所任則廣于此矣辨十有二壤之物者上之和緩者為壤壤之為言成也勝也稼穡樹藝于此地以土為質土以壤為羙禹貢于豫言厥土惟壤于雍言厥土惟黄壤于兖言厥土惟白壤皆言其土之美而可耕作者也十有二土則言土之形十有二壤則言土之性其性其形則具于土宜之法故大司徒既以土宜之法辨十有二土之名物而又以土宜辨十有二壤之物十有二壤之物猶土之物也不言名則壤無異名隨土而已知壤之物然後知其種之所宜而教稼穡樹藝可以教甿矣故曰而知其種以教稼穡樹藝樹植之也藝治之也草人以物地相其宜而為之種然則土壤異物則百榖之種亦各有所宜不可以不辨之也故先辨而知其種然後以教稼穡樹藝遂人以土宜教甿稼穡蓋本于大司徒土宜之法遂人則以具法推而行之以教甿也遂人不言樹藝者蓋遂人以時器勸甿則樹藝可知矣以土均之灋辨五物九等制天下之地征以作民職以令地貢以歛財賦以均齊天下之政封畧之内莫非王土其生出之宜否物産之有無道里之逺近貢賦之多寡非有法以均之則不足以正之此土均之法所由立也以辨五物則山林川澤邱陵墳衍原隰之所宜皆可知矣以辨九等則九州之田賦上中下之不同而羙惡高下皆可知矣然後可以制天下之地征征者貢賦稅歛之總名為其以正行之故謂之征也既制地征則民各宜任其事于是乎以作民職量地之宜以任民之力稱物之産以施民之事此所以作民職也既作民職則民宜各獻其功于是乎以令地貢若農貢九穀圃貢草木之類是也地征則征之大者先令乎其大者于是乎以歛財賦以令地貢則下之所以供上大司徒則令之而已以歛財賦則又上之所以取下也故非特令之而已又歛之歛者取彼所有而聚于此也盖用下供上則謂之貢用上歛下則謂之賦此貢賦之辨也然言地貢則不特土貢而已凡地之所産皆預焉言財賦則不特軍賦而已凡上之所歛皆在焉夫制地征作民職令地貢歛財賦固有政矣然逺近多寡之不均先後緩急之不齊非政之善也于是乎以均齊天下之政而土均之法于是乎備也以土圭之灋測土深正日景以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多隂日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所㑹也隂陽之所和也然則百物阜安乃建王國焉制其畿方千里而封樹之深尺鴆反景或作影璣衡所以經天也土圭所以緯地也兩者皆用土焉土之為物陽精之純致一以通乎天地者莫太乎是矣圭之為物剡其首以象物之生平其下以象物之植承順乎天而以生萬物者土也故以土圭求之土圭之法所以度天之高四方之廣與土之深舉測土深則天與四方從可知矣正日景以求地中者日至之景尺有五寸謂之地中以土圭正日景之長短候其景適與土圭等所以求地中而建王國也夫天之高土之深四方之廣其所以正之者以日景而已于夏日至晝漏午之時立八尺之表其景短而不滿于尺有五寸則知其為日南矣多暑則以其火勝之其景長而過于尺有五寸則知其為日北矣多寒者以其水勝之其日中之景若夕景者知其為日東矣多風者以其木勝之其日中之景若朝景者知其為日西矣多隂者以其金勝之言東多風則知多隂之為雨言西多隂則知多風之為陽亦互見也多陽多暑多隂多寒多風多雨皆非地中未可以建王國也日至之景尺有五寸謂之地中者盖地與星辰東南遊萬五千里日景一寸差千里是萬五千里適當尺有五寸之景也土圭長尺有五寸而日至之景合焉故謂之地中以其地中故天地四時風雨隂陽皆得其正矣夫天不足西北地不足東南有餘不足皆非天地之中惟得天地之中然後天地于是乎合故曰天地之所合也土播于四時所以生長收藏萬物一時之氣不至則偏而為害惟得天地之中然後四時于此而交通故曰四時之所交也風以散之雨以潤之偏于陽則多風偏于隂則多雨惟得天地之中然後隂陽和而風雨以序而至故曰風雨之所㑹也獨隂不生獨陽不成隂陽之和不成則反傷之形惟得天地之中則無愆陽伏隂隂陽于此調而不乖故曰隂陽之所和也合以體言交以序言㑹以時言和以氣言天地合四時交風雨㑹隂陽和如此則無乖戾之氣無疾癘之災有生者遂有形者育則萬物以之而阜安以之建王國適其所矣書曰王來紹上帝自服于土中且曰其作大邑其自時配皇天盖洛邑非特地中亦天之中也王者位乎天地之中以中徳而紹上帝以中道而配皇天紹上帝者王之事也配皇天者皇之事也先王所以建國于天地之中者意亦㣲矣夫先王建國非適為百物阜安而已亦為四方之至者道里均焉而經不言者其然易知故也周禮詳解卷九
