body:
  text: 周禮詳解巻二十五宋王昭禹撰夏官司馬惟王建國辨方正位體國經野設官分職以為民極乃立夏官司馬使帥其屬而掌邦政以佐王平邦國政官之屬大司馬卿一人小司馬中大夫二人軍司馬下大夫四人輿司馬上士八人行司馬中士十有六人旅下士三十有二人府六人史十有六人胥三十有二人徒三百有二十人凡軍制萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍輿音餘行户剛反注同先王制官以探本設司以伺末政非夏官也而謂之夏官者政以禮為本也此之謂探本政官也而謂之司馬者政以馬為末也司至于馬則政官所司皆舉矣此之謂伺末物各當其分之謂平邦政之所施則强不得以侵弱衆不得以暴寡小大髙下莫不各當其分矣此司馬所以帥其属而掌邦政以佐王平邦國也大司馬掌邦政以佐王平邦國而政典亦曰以平邦國者蓋政典之為書以平邦國而王之為政亦以平邦國而已蓋政者正也以政為體以平為用惟平然後能正此王之為政所以期于平邦國也夫馬者甲兵之具而王政之所重也故自夏官之卿一人以至于中士十有六人皆以司馬名官則政官之所司其事悉矣夫政以兵為大兵以馬為急故名官以司馬然其官有尊卑之殊則其所掌不能無輕重之辨故政官之正以卿一人為之其官謂之大司馬言大以别小也政官之貳以中大夫二人為之其官謂之小司馬言軍則以率衆也輿司馬以上士八人為之則卑矣所正者乗載之事而已故名官以輿行司馬以中士十有六人為之則尤卑矣所正者行列之事而已故名官以行凡此皆尊卑之别也自大宰而下其徒皆百二十人而司馬之徒獨三百二十人者以政官之所掌以軍旅為主則其徒不得不多矣夫萬有二千五百家為鄉凢起役徒無過家一人故以萬有二千五百人為軍王六鄉故六軍大國三鄉故三軍次國二鄉故二軍小國一鄉故一軍且天子六鄉六遂此獨言鄉者蓋鄉主教而國以鄉為主故也書曰魯人三郊三遂然則諸侯之國亦有遂矣且先王因農事以寄軍令文教武事皆出乎其中射御寓于禮干戚寓于樂㑹什伍而教道藝無非軍政也因田獵而選車徒無非軍事也居聮其家而為比閭族黨州鄉出則聮其人而為伍兩卒旅師軍故六鄉之官皆折衝禦侮之人六鄉之民皆仗節死難之士左之而文無不宜右之而武無不有方其奉璋峩峩髦士攸宜其不敢惰者皆卿大夫之才及其渒彼涇舟烝徒楫之其能濟之者皆將帥之職此其所以為將為帥為卒長伍長之属皆取于卿大夫士而足矣先王之時所以守則固戰則克徳足以柔中國刑足以威四夷者由此道故也大司馬之職掌建邦國之九灋以佐王平邦國制畿封國以正邦國設儀辨位以等邦國進賢興功以作邦國建牧立監以維邦國制軍詰禁以糾邦國施貢分職以任邦國簡稽鄉民以用邦國均守平則以安邦國比小事大以和邦國謂之邦國之九法則以九法所施以邦國為主而無所施于王畿故也以道制法者王以法立事者臣故掌建邦國之九法者大司馬其職也以佐王平邦國則使强不得以侵弱衆不得以暴寡以九法所以正之等之作之維之糾之任之用之安之和之如此也茍戾乎此然後九法施焉則王之于乎邦國豈遽加之以刑辟之威哉制畿封國以正邦國者以田為界畫幾出入焉者畿也度土而居之有大者亦有小者封也制畿則有侯甸男采衛之别封則有公侯伯子男之異自王畿之外其畿皆不過乎五百里自大國百里而下而小國不過五十里如是則大無并吞之强小無侵凌之患而地之小大正矣設儀辨位以等邦國者著乎容物而有義存焉者儀也人之所立而不可易者位也設儀則其國家宫室車旗衣服或以九以七以五為之節也辨位則公一位侯一位伯一位子男同一位也如是則上不偪下下不僣上而人之上下等矣進賢興功以作邦國者以成徳為行謂之賢興事造業謂之功賢者進之而無所蔽則王制所謂諸侯有功徳于民者加地進律此以賢進之者也有功者興之而無所抑則僖二十八年晉侯有功王命尹氏冊命之此以功興之者也賢者進而無所蔽則人莫不懋于德功者興而無所抑則人莫不懋于功而人材由此作新矣所謂作者與詩所謂遐不作人書所謂作新民之意同也建牧立監以維邦國者則大宰所謂建其牧立其監也九州之牧建之于上而使有所統諸侯之監一國者立之于下而使有所承則萬國由此維而相比所謂維者與詩所謂紼纚維之者同也制軍詰禁以糾邦國者軍以包敵禁使無犯制軍則大國三軍次國二軍小國一軍隨其國之大小而制之也詰禁則或施于國或施于軍或施于刑或施于誓隨事而以言詰之也制軍而有以包敵詰禁而使之無犯則邦國由此糾而不散矣施貢分職以任邦國者利上治己而以職供者貢也有所受而聽乎上者職也貢以物言之施貢則各以其所有職以事言之分職則各以其所能施貢所以任其財也分職所以任其力也此之謂任邦國簡稽鄉民以用邦國者萬二千五百家為鄉大國三鄉次國二鄉小國一鄉所以處民也簡謂選其强弱稽謂攷其多寡簡其强弱稽其多寡然後衆可用故曰以用邦國均守平則以安邦國者諸侯為天子守土則均守者均其地守也匡人達法則匡邦國則平則者平其八則也都鄙非無守也以邦國為主邦國非無則也以都鄙為主地守既均則逺近各適其勻無相侵奪之患矣八則既平則髙下各當其分無或僣忒之愆矣邦國于是安而無危故曰安邦國比小事大以和邦國者比小則使大國比小國也事大則使小國事大國也以大比小則有以致其樂天之仁以小事大則有以致其畏天之智如是則諸侯親四隣睦邦國和而不乖矣故曰以和邦國先制畿封國以正其地之小大然後六者並見新經以九伐之灋正邦國馮弱犯寡則眚之賊賢害民則伐之暴内陵外則壇之野荒民散則削之負固不服則侵之賊殺其親則正之放弑其君則殘之犯令陵政則杜之外内亂鳥獸行則滅之馮皮冰反眚所景反壇音善行下孟反王之于邦國平之以九法然有違乎此然後加之以刑辟之威此九伐之法所以行焉夫政者正也九伐之法所以正邦國之罪惡而使之歸于正也此所以謂正邦國歟馮弱犯寡則眚之者以强陵弱謂之馮弱以衆暴寡謂之犯寡如是則詘其爵命削其土地使其强更弱其衆更寡若人之眚瘦然此所以正其馮弱犯寡之罪也賢宜任之以在位者也賊之則傷于義民宜養之使就利者也害之則傷于仁傷于仁義則萬民之所疾也故㑹萬民授兵焉使致其伐若伐木然此所以正其賊賢害民之罪也内則暴其臣民外則陵其四隣暴其臣民則非君國子民之道也陵其四鄰則非睦乃四隣之道也是又諸侯之所疾也故㑹諸侯為壇焉命以伐此以正其暴内陵外之罪也野荒則以奪農時而地不治民散則屈民力而民不安其為罪也以有其地而不能治故削其地之大而使小焉此所以正其野荒民散之罪也負固則恃其地之險阻不服則逆命以叛乎上其為罪也以有其地而不肯服也故進入而侵其地所以正其負固不服之罪賊殺其親則不仁者也然而恩有隆殺罪有輕重正之以服属之法則罪可知矣放弑其君則不義者也義莫隆于君而賊義謂之殘故殘而殺之以其罪重故也犯令則違上之命也陵政則干上之法也故杜絶而伐之以犯令陵政無朝事之實故也外内亂則滅人道也滅之則既滅其身矣又廢其嗣以其使人失世類乎無人道故也然先王之時其所封建以為諸侯者莫非賢也邦國之君又安有罪惡如九伐之法所正者乎蓋先王制治于未亂保邦于未危思患而豫防之故制為九伐之法使政官之長掌之焉于布政之正月則又縣于象魏而使之見徇以木鐸而使之聞布于邦國而使之守雖至治之世不能無嵬瑣自戾以干先王之伐者非徒不欲而冥必不敢非徒無與而又無助也則九伐之法除惡于冥之中正邪于形聲之外者豈小補哉周之盛時九伐之法雖有存豈嘗試哉設之使知懼而已非聰明睿智神武而不殺者孰能與于此哉正月之吉始和布政于邦國都鄙乃縣政象之法于象魏使萬民觀政象挾日而歛之逺之邦國近之都鄙内而萬民于正月之吉大司馬布政而使之守垂象魏而使之觀上焉者知所稟而犯令陵政者不得作下焉者知所從而設私立方者不得萌下有法守庶人不議則政其有不行乎然政之事民可使由之故縣于象魏所以顯諸仁政之神不可使知之故挾日而歛之所以藏諸用記所謂政如日月之神者豈非以其示人也昭然有象及其運行不息則物烏得知其然哉乃以九畿之籍施邦國之政職方千里曰國畿其外方五百里曰侯畿又其外方五百里曰甸畿又其外方五百里曰男畿又其外方五百里曰采畿又其外方五百里曰衛畿又其外方五百里曰蠻畿又其外方五百里曰夷畿又其外方五百里曰鎮畿又其外方五百里曰蕃畿天地之大而裂為四方四方之逺而裂為九畿其内外有制其逺近有辨其封域雖不同而所以服王之事則一而已故九畿又謂之九服畿言其有界畫服言其服王事也九畿之籍則以其界畫書而載于籍也經界既定然後政官所以推而行之者其職可施于是乎有以服邦國矣九畿之籍以正其封疆為主書之圻父薄違詩之祁父刺宣王皆指司馬而言之也凡言國者皆諸侯之國也所謂施邦國之政職者諸侯之國也所謂千里曰國畿者則王國而已天子之畿千里以天事言之則所以象日月之晷也以人事言之則不千里不足以待諸侯也自國畿之外以封諸侯者皆以五百里為限而命名皆有義焉侯畿者以言扞外而蔽内者也甸畿者以言井牧其地什伍其民也男畿者以言致力而事上也采畿者以言服事以奉王也衛畿者以言奮力而衛内也自侯畿謂之中國所謂疆以周索也蠻以言其慢夷以言其易鎮則如四鎮之鎮以安鎮中國為主也蕃則如藩屏之藩以屏蔽中國為主也自蠻畿至蕃畿謂之四夷所謂疆以戎索也以禹貢攷之方千里曰國畿則禹貢所謂甸服也甸服面五百里則為方千里矣蓋面畿徑言之而方以折計之故也其外方五百里曰甸畿則禹貢所謂侯服也以下蓋皆見新經蓋時異事異故其制名與其多寡之數亦不同矣且禹貢自甸服至荒服凡五千里而已故書曰弼成五服至于五千以周官攷之而五服之外又有蕃畿則周公之時廣斥其地復增五百里蓋周盛時物蕃人庶過于堯舜夏商之世不得不然其制聖人豈好異哉時焉而已凡令賦以地與民制之上地食者參之二其民可用者家三人中地食者半其民可用者二家五人下地食者參之一其民可用者家二人下以職供謂之貢上以政取謂之賦賦以歛財以給軍為主也夫地有上地中地下地之差民有家三人二家五人家二人之别其所歛之財宜有以稱之此賦所以本于以地與民之制也蓋地有肥瘠民有多寡則財賦亦随之而有輕重矣然司徒稽人民而周知其數為任衆也故曰可任者司馬令賦為用衆也故曰可用者知其家之衆寡而後數可稽也故于稽數言其家之人知其食之多少而後賦可令也故于令賦言其地之食中春教振旅司馬以旗致民平列陳如戰之陳辨鼔鐸鐲鐃之用王執路鼔諸侯執賁鼔軍將執晉鼔師帥執提旅帥執鼙卒長執鐃兩司馬執鐸公司馬執鐲以教坐作進退疾徐疏數之節遂以蒐田有司表貉誓民鼔遂圍禁火弊獻禽以祭社中仲同陳並去聲將帥並去聲長上聲數音朔傳曰國雖安忘戰必危孔子曰以不教民戰是謂棄之司馬于四時之田以旗致民平列陳如戰之陳以教坐作進退疾徐疏數之節所以不忘戰而教民也蓋聖人思患而預防之雖無難而有多難之畏于無事而為有事之備已治矣未嘗有其治已安矣未嘗有其安國家閒暇選練訓習不可怠忽也四時教戰而謂之為田者以其養禽獸而取之以為利與田事同故也以其事言之則為圍與疆理同也攻蟄獸掎猛烏則與耘同也度可殺然後取則與獲同也此所以習戰謂之田歟夫攻鬬而冒矢石人情之所不欲也馳騁而逐禽獸人情之所同欲也以其情之所不欲而寓扵所同欲之間此人所以樂為之用而四時教戰所以皆寓扵田歟然春陽用事非兵之時故教振旅所謂入曰振旅是也振如振領之振振而整之也方其出則治之以行陣之事均服同食以一衆心則無暇平整其儀飾及其入焉則明尊卑辨貴賤此所以整之也旗所以属衆而物之衆視而從之故致民必以旗然鄉遂之致民也以司徒之大旗則司馬之致民也以王之太常矣蓋日月為常所以象天道以道佐人主者不以兵强天下則司馬致民以太常者知其教戰固有道也夫用軍之法自五人之伍推而上之至於五師之軍其先後有序其左右有局合其衆以成列陳其列以為陣而田獵之所習無非軍事也故平列陣如戰之陣乎者髙下如一之謂也兵以鼔作以金止而鼓鐸鐲鐃皆所以節行也故於振旅辨之道之大謂之路軍事非王所執也以道御衆而已故王執路鼔事之大謂之賁諸侯以敵王愾為事則事之大諸侯所執故諸侯執賁鼓晉以追為義將以統衆而殺敵其事有進而已故軍將執晉鼔提鼔鄭氏謂鼓之有柄者于馬上提之以令衆也故師帥執提鼙卑者所執旅帥所率者五百人之衆其衆少矣非若師之為大故旅帥執鼙以其卑故也軍法自旅而上然後有旗以其非旗不足以指麾故也自旅而上然後有鼔以其非鼓則不足以令衆也卒長執鐃以止鼔也兩司馬執鐸以通鼓也公司馬執鐲以節鼓也伍長而謂之公司馬者尊而六命之卿卑而一命之士所司皆至于馬則軍事之伺末者無不舉矣謂之公司馬則以别于私人私人亦稱司馬所謂家司馬是也鼓陽也故尊者執之金隂也故卑者執之鐃以止鼓則以陽更用事焉故卒長執之通鼔節鼔則佐陽而已故兩司馬公司馬執之坐作進退疾徐疏數皆有節焉不習則不能不講則不熟故教之使習熟焉遂以蒐田者由天道而公焉則方春物生又非為苗除害之時由人道而私焉則祭祀賓客充君之庖不可廢也故春田謂之蒐由人道而私則不可以無所擇故蒐有擇焉騶虞所謂蒐田以時亦擇其不孕然後取之蓋無事而不田曰不敬田不以禮曰暴殄天物于春而必田以敬而致禮也田必以擇不以禮廢仁也有司表貉貉師祭也甸祝掌四時之田表貉之祝號則有司謂甸祝也折民以言者誓也以誓教恤則民不忘而誓以用于軍旅為主也誓民其可已乎禁謂虞衡守禽之厲禁也鼔而圍之遂蒐田矣火弊者田止謂之弊春田以用火為主故曰火弊春非田之時其取而殺之則不若用車之密密以火之利則不若車故也然用車者亦因其焚萊之時也獻禽大獸公之小禽私之也詩曰獻豜于公亦取其􅁼之大者也以祭社者社土示也春為民祈故祭禮獨先言祭社則先王之祭祀凡以為民而已中夏教茇舎如振旅之陳羣吏撰車徒讀書契辨號名之用帥以門名縣鄙各以其名家以號名鄉以州名野以邑名百官各象其事以辨軍之夜事其他皆如振旅遂以苗田如蒐之灋車弊獻禽以享礿茇蒲末反撰息轉反註讀為算礿餘若反詩曰召伯所茇蓋召伯為草舎聽訟於甘棠之下也教茇舎者教以草舎之法焉夏物長養尤非兵時故教茇舎茇舎者草茇而舎也蓋草雖茇隂不能死兵之草舎當圖安存而避危亡故也易野車為主險野人為主撰車徒者所以具之也述事為書合騐為契讀書契者所以聲之也撰車徒讀書契皆比軍事也比軍事為將茇舎焉號名以待夜事故于茇舎辨號相名之用古者晝戰則目相視故為之旗幟夜戰則聲聞故為之號名草舎欲其名聲相聞足以相别而已辨號名固其宜也帥以門名者若魯有東門襄仲宋有桐門右師是也必以門名者以門所以閤闢扞衛而非常之要在此也師以帥衆而閤闢之變扞衛之功折衝之機實係乎此也縣鄙各以其名者則縣謂縣正鄙謂鄙師各以其縣鄙之官而名之也鄉以州名則若南鄉甀東鄉為人是也野以邑名者野為公邑之大夫以其所治之邑而名之也凡此所號名皆所以待軍之夜事以夜則旗幟不足以相視以名相别而已然帥以門名則將以門名可知也縣鄙各以其名則州黨各以其名可知也鄉以州名則遂以縣名亦可知也野以邑名則郊以邑名亦可知也其他皆如振旅則若致民平列陣與夫以教坐作進退疾徐疏數之節皆然矣遂以苗田則夏苗在田如草而已為苗除禽獸之害故也如蒐之法則其他表貉誓民鼔遂圍禁之類皆與蒐同也車弊者夏田以車為主以物生于春長于夏以車馳逐而取之則其利密于春之用火矣以東山之詩攷之其言曰敦彼獨宿亦在車下則茇舎夜事宜用車矣獻禽以享礿則所謂以禴夏享先王也以飲為主則謂之礿以樂為主則謂之禴夏陽之盛時故或曰礿或曰禴以礿與禴皆陽之盛故也中秋教治兵如振旅之陳辨旗物之用王載大常諸侯載旂軍吏載旗師都載旜鄉遂載物郊野載旐百官載旟各書其事與其號焉其他皆如振旅遂以獮田如蒐田之法羅弊致禽以祀祊書註讀畫獮息淺反祊音方天地嚴凝之氣始于西南秋則陰用事兵之時也故教治兵所謂出曰治兵是也旗物以作戰也故于教治兵辨旗物之用日月為常天道之運也王之涖兵以道而已故王載大常交龍為旂君德之用也諸侯之涖兵以德而已故諸侯載旂軍吏孤卿之為將者也以猛毅致其義故軍吏載旗師都孤卿之位衆者也以衆属軍吏故載旜取其亶以事上而已鄉遂則鄉遂之大夫也以其無所將故載物取特物其所属而已郊野則公邑之吏將其衆者也以完果致其智而已故載旐百官則以其属衛王焉以摯速致其禮而已故載旟師都鄉遂無所將而不謂之孤卿大夫至稱百官焉見新傳遂以獮田者獮爾于狩矣于是土既成物廢不用事金王而殺使反一焉羅弊者鳥罟謂之羅維固隹之所係也火之利不若車車之利不若羅之所取至于隹則其利密矣以物成于秋而所取者衆故也王制曰鳩化為鷹然後設罻羅則秋用羅宜矣夫春用火秋用羅各因其時也致禽以祀祊者祊即詩所謂以社以方也祊兼上下之神故謂之祀春物始生故為民祈而祭社秋物既成故為民報而祀祊其序然也社礿烝言獻禽以下見新經中冬教大閲前期羣吏戒衆庶修戰灋虞人莱所田之野為表百步則一為三表又五十步為一表田之日司馬建旗于後表之中羣吏以旗物鼓鐸鐲鐃各帥其民而致質明弊旗誅後至者乃陳車徒如戰之陳皆坐羣吏聽誓于陳前斬牲以左右徇陳曰不用命者斬之中軍以鼙令鼔鼓人皆三鼓司馬振鐸羣吏作旗車徒皆作鼓行鳴鐲車徒皆行及表乃止三鼓摝鐸羣吏弊旗車徒皆坐又三鼓振鐸作旗車徒皆作鼓進鳴鐲車驟徒趨及表乃止坐作如初乃鼔車馳徒走及表乃止鼓戒三闋車三𤼵徒三刺乃鼓退鳴鐃且郤及表乃止坐作如初遂以狩田以旌為左右和之門羣吏各帥其車徒以叙和出左右陳車徒有司平之旗居卒間以分地前後有屯百步有司巡其前後險野人為主易野車為主既陳乃設驅逆之車有司表貉于陳前中軍以鼙令鼓鼓人皆三鼔羣司馬振鐸車徒皆作遂鼔行徒銜枚而進大獸公之小禽私之𫉬者取左耳及所弊鼓皆駴車徒皆譟徒乃弊致禽饁獸于郊入獻禽以享烝摝音鹿分去聲冬則農事既隙而講事之時也故教大閲大閲者將用而大習之也則車徒皆在所簡而所閲之事衆矣春之振旅夏之茇舎秋之治兵凡鼔鐸鐲鐃號名旗物之用無不習焉故曰教大閲羣吏者鄉師以下也戒衆庶則先事而勅之使無敢怠忽也修戰法則猶鄉師前期出田法于州里修其卒伍之類是也除草謂之莱既戒民矣于是山澤之虞除去所田之野草而為表焉為表者所以識正行列也百步則一為三表又五十步為一表則四表之中積二百五十步矣左右之廣取其足以容六軍之衆虞人為表則以待事焉及田之日司馬建旗于後表之中則以待民之至也羣吏以鼓鐸鐲鐃各帥其民而致則皆致之於司馬焉師欲聽于一故也質明弊旗誅後至者前期既戒衆庶矣又後至焉非不教而誅者也故後至者必誅軍法後期者斬而此言誅則方致民也故誅之而已以下文言不用命者斬則知此言誅未遽以死處之也又陳車徒如戰之陣皆坐田之所習無非戰法也故車徒之所陳皆由戰之陣焉皆坐則將為誓衆使坐而聽也羣吏聽誓于陣前斬牲以左右徇陣曰不用命者斬羣吏謂軍師而下也誓以折衆羣吏以帥衆宜聼而諭之也月令于季冬天子田獵以習五戎司馬搢撲北面誓之以月令言之則誓衆者司徒也以小司徒攷之乃㑹萬民之卒伍而用之以起軍旅以作田役特掌其戒禁而已未嘗掌誓則記月令者誤矣士師職以五戒先後刑罰一曰誓用之軍旅則誓衆者士師也斬牲以左右徇陣曰不用命者斬之大閲之所習使民以其死刑誅不如是之嚴則其民弗為使矣然不先有以告戒之及犯而刑誅之亦罔民也故必斬牲以徇之或左或右則左右巡行之使衆皆知也小子凡師田斬牲以左右徇陳則此斬牲以徇陣小子之事也然先王曷常不戒而視成哉前期戒衆庶然後後至者可誅既陳而誓然後不用命者可斬如此則民皆知避而犯者無有矣中軍以鼙令鼔者旅帥執鼙則鼙卑而有衆執者也莊子曰卑而不可不因者民也中軍所以將衆以鼙令鼓則明衆卑而不可不因也徒故車徒或作或行或坐或趨或馳或走或誡或譟以同欲而行以異欲而止凡以因衆而已鼓人皆三鼓司馬振鐸車馳徒走及表乃止見新經蓋先王因民之情而無所違焉所以同欲而行異欲而止上下輯睦于是乎驟馳趨走以赴敵為事驟馳者車也趨走者徒也驟言聚其足而進馳言決圍而去也徒以人言故曰趨走趨言其走之肅走言其行之速也凡此皆車徒勇于赴敵者矣鼔戒三闋車三𤼵徒三刺則其走敵也有節制焉鼓聲止謂之闋鼔戒者鼓聲以戒攻敵也鼓一闋車一𤼵徒一刺三而止焉以象殺敵而成于三之意也武王誓徒曰不愆于六步七歩乃止齊焉誓軍曰不愆于四伐五伐乃止齊焉此所謂車徒之節也乃鼓退鳴鐃而止之其郤而止從上而已夫能使下無違其上如此則輯睦故也遂以狩田者大𫉬之以人守之為取之大者以冬物成之衆也故冬田謂之狩以旌為左右和之門者天時不如地利地利不如人和名軍門曰和以師克在于和故析羽為旌以道旂之則生故也夫道合則渾而自遂未始有事焉離則散而事由之以生矣事之大莫大乎軍事則以旌為門者所寓之意亦已㣲矣羣吏各帥其車徒以叙和出者羣吏則自師都而下各帥其所属之車徒以叙和同而出者也叙者先後之倫也出以先後之倫則行者有叙而不亂矣然不先正其左右之行列則將叙之有不可得故先分左右以陳其車徒又使有司平之使各當其分然後由左右而出者其行列皆正矣有司則鄉師也以鄉師正掌田法而修其卒伍故平其左右之行列属於鄉師也旗居卒間以分地者則軍法自旅而上然後有旗蓋旅帥所建之旗也四兩為卒五卒為旅此旅帥所建之旗所以居于卒間以分地而調其部曲也前後有屯百歩則車徒異羣相去之數也有司巡其前後者則鄉師又從而巡其行列車也郷師之職所云巡其前後之屯正謂是矣軍有有徒平原易野則以車為主山阜險阻則以人為主以車為主非不用人也以人為主非不用車也各有所主而已先王因田獵而選車徒故詩曰東有甫草駕言行狩此則易野車為主也又曰選徒囂囂搏獸於敖此則險野人為主也既陳乃設驅逆之車者驅謂驅車也驅禽使前趨𫉬也逆謂逆車也逆還之使不出圍也既陳則行列正矣然後可田焉故設驅逆之車者田僕也校人則帥之而已故校人曰田獵則帥驅逆之車則將田矣于是禱焉故有司表貉于陳前即甸祝掌表貉之祝號是也中軍以鼙令鼓鼓人皆三鼓則尊者令鼓以作之也羣司馬振鐸則卑者振鐸以通之也如是則上下同欲可以行矣故車徒皆作遂鼔行銜枚而進則所以止喧嘩也故銜枚氏軍旅田役令銜枚然東山之詩曰勿士行枚者蓋婦人欲其夫有征而無戰故以勿事行陣銜枚為事也大獸公之則所謂獻豜于公也小禽私之則所謂言私其豵也𫉬者取左耳雖以象殺敵而又且有智焉右耳不如左明殺敵取左耳示能致敵强使聽已且不專取左耳則效功者疑于獲一而效二取左耳以效功所以謂之馘也及所弊則田所當止之處也鼓皆駴鄭氏謂疾雷擊鼔車徒皆譟謂人言而譟如鳥之噪也夫田弊以象勝敵而止也然一戰而勝士以之驕卒以之惰則所以召敵也故疾雷擊鼔而駴所以示勝而有戒也故駴之字從戒車徒皆譟所以示宜静而譟也故譟之字従喿在右凡此皆不忘戰之意也徒乃弊冬物成而多可取者衆故以徒為主凡曰田用火用車用羅非不用徒也特所主者有異耳致禽饁獸于郊入獻禽以享烝者聚其所獲之禽而以饁田衆兹故曰致禽饁獸于郊饁者盍而餉也及師大合軍以行禁令以救無辜伐有罪若大師則掌其戒令涖大卜帥執事涖釁主及軍器及致建大常比軍衆誅後至者及戰巡陳眡事而賞罰若師有功則左執律右秉鉞以先愷樂獻于社若師不功則厭而奉主車及師大合軍謂命將或王親征之時禁使勿為令使為之以行禁令則命將與王親征行之使無違也仁者愛人故惡人之害之也義者循理故惡人之亂之也以其愛人循理故以救無辜為先以其惡人之害故以伐有罪為後蓋師以安民為先無辜者衆而有罪者寡故也九伐先憑弱犯寡而後賊殺放弑其君親亦此意也若大師謂出師之時也掌其戒令則戒其怠忽與所使為之令皆司馬所掌掌則知所主也非若大合師但推而行其禁令矣卜以知吉凶大卜卜之大而大司馬涖之也主遷主社主也軍器鼓鐸之属凡師受甲迎主于廟及社主祝奉以從殺牲以血塗主及軍器皆神之以厭妖也及致建大常者鄉師致民以司徒之大旗則司馬致民宜以王之大常矣凡此皆示其致民之命有所受之也然鄉師以司徒熊虎之大旗則示其以猛獸致衆矣司馬以日月之大常示其致衆固有道矣比軍衆則校其數之多寡也誅後至者所以懲其怠忽也及戰巡陳眡事而賞罰則眡其鼔鐲鐸鐃旗物車徒坐作進退之事有功者賞違令者罰也師有功而旋作樂謂之愷樂怒釋而為愷故也左執律律以聽軍聲陽也故左執之右秉鉞鉞以致殺伐隂也故右執之右秉鉞示勝而不忘戰也司馬之事武王之於牧野則左仗黄鉞何也武王之事示其無事于誅故左仗之獻于社隂也若師不功則厭而奉主車厭謂厭其冠也主謂社廟之主冠首服也王師無敗自敗而已厭其冠則以失為在已也先王之師其殺其伐其有功其不功皆以道處之如此而春秋之書救書伐書戰書克書王師敗績則異于是矣王弔勞士庶子則相大役與慮事屬其植受其要以待攷而賞誅勞力報反相息亮反與去聲屬音燭公卿大夫之子謂之士庶子其従軍而敗績王親弔勞之死者則弔之傷者則勞之必使大司馬相之以司馬主兵故也大役謂築作城郭溝池役衆之大者也慮事謂謀慮其事也植謂王属役人之官也左傳宋城華元為植是也要謂功程之計書也大司馬于大役與慮事則欲知其故之可否属其植則欲知其人之多寡受其要則欲知其功之等差以待攷而賞誅則事成而攷之以行賞誅也餘見傳大㑹同則帥士庶子而掌其政令若大射則合諸侯之六耦大祭祀饗食羞牲魚授其祭大喪平士大夫喪祭奉詔馬牲食音嗣諸子之職曰㑹同賓客作羣子從則帥士庶子而掌其政令在司馬也射人之職以射法治射儀王以六耦射三侯則大射合諸侯之六耦在司馬也大祭祀饗食羞牲魚授其祭者牲魚魚牲也魚謂之牲者亦生之而後殺也魚之為物柔巽𨼆伏制得其道然後可制而用民之象也故詩言誰能烹魚魴魚赬尾易曰包无魚貫魚以宫人􅃂皆以魚比民然則能制民而用焉以聚百物使鬼神賓客皆得其養政官之事也授其祭則凡能制民而用焉皆司馬以政授之故也喪祭奉詔馬牲者蓋王有成德然後能張大六師以威制天下故也立政之終曰其克詰爾戎兵以陟禹之迹亦是意小司馬之職掌闕凡小祭祀㑹同饗射師田喪紀掌其事如大司馬之法軍司馬闕輿司馬闕行司馬闕周禮詳解巻二十五
