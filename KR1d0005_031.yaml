body:
  text: 周禮詳解卷三十一宋王昭禹撰鄉士掌國中各掌其鄉之民數而糾戒之聽其獄訟察其辭辨其獄訟異其死刑之罪而要之旬而職聽於朝司冦聽之斷其獄弊其訟於朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中協日刑殺肆之三日若欲免之則王會其期大祭祀大喪紀大軍旅大賔客則各掌其鄉之禁令帥其屬夾道而蹕三公若有邦事則為之前驅而辟其喪亦如之凡國有大事則戮其犯命者遂士掌四郊各掌其遂之民數而糾其戒令聽其獄訟察其辭辨其獄訟異其死刑之罪而要之二旬而職聽於朝司冦聽之斷其獄弊其訟於朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中協日就郊而刑殺各於其遂肆之三日若欲免之則王令三公會其期若邦有大事聚衆庶則各掌其遂之禁令帥其屬而蹕六卿若有邦事則為之前驅而辟其喪亦如之凡郊有大事則戮其犯命者縣士掌野各掌其縣之民數糾其戒令而聽其獄訟察其辭辨其獄訟異其死刑之罪而要之三旬而職聽於朝司冦聽之斷其獄弊其訟於朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中協日刑殺各就其縣肆之三日若欲免之則王命六卿會其期若邦有大役聚衆庶則各掌其縣之禁令若大夫有邦事則為之前驅而辟其喪亦如之凡野有大事則戮其犯命者鄉士掌國中者六鄉之獄在國中也各掌其鄉之民數者通掌國中而分掌其鄉也遂士掌四郊者六遂之地在四郊也各掌其遂之民數者通掌四郊而分掌其遂也縣士掌野者縣之獄在野也各掌其縣之民數者通掌野而分掌其縣也鄉之獄訟不聽於鄉而聽於國遂之獄訟不聽於遂而聽於郊縣之獄訟不聽於縣而聽於野者以其所掌者逺則察之欲其近故也所謂四郊非鄉地所謂野非遂地蓋所謂公邑之在郊野者焉鄉士言糾戒之而遂士縣士言糾其戒令者鄉地近則其治也詳故鄉士不特糾之而已又加以戒焉遂地逺則其治也略故遂士縣士無所戒也違其縣遂之戒令則糾之而已聽其獄訟察其辭者獄訟以辭為主書曰師聽五辭五辭簡孚正於五刑又曰察辭於差非從惟從則察獄訟之辭者惟當致明以盡其情而已辨其獄訟異其死刑之罪而要之者或死或刑其罪之輕重既定又從而為之要書將以職聽於朝故也鄉士以一旬遂士以二旬縣士以三旬以其掌者逺故待之欲其久所以慎用刑也司寇聽之者以司寇正刑明辟也斷其獄弊其訟於朝則王朝所在無所容其私也羣士司刑皆在各麗其法以議獄訟者羣士司刑各有所掌若司刑掌五刑之法司刺掌三刺三赦三宥之法又或掌官法或掌官常故各麗其法也獄訟成謂獄訟之辭成而無虧也士師受中謂受其事實之書也協日刑殺則協善日而刑殺之也肆之三日所以懲衆也若欲免之則上之所欲釋之者也於鄉之獄則王親會之於遂之獄則王令三公會之於縣之獄則王令六卿會之所以聽而議之以逺近為之差也祭祀喪紀軍旅賔客之大者與邦之大事邦之大役掌其禁令而蹕則以獄官掌之欲無敢犯而其所掌則有尊卑故也三公六卿大夫之有邦事則為之前驅而辟者以公卿大夫教治政事之所自出非刑官先而辟焉則有所不行故也國也郊也野也大事焉則戮其犯命者又欲使之無犯故也方士掌都家聽其獄訟之辭辨其死刑之罪而要之三月而上獄訟於國司寇聽其成於朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中書其刑殺之成與其聽獄訟者凡都家之大事聚衆庶則各掌其方之禁令以時修其縣法若嵗終則省之而誅賞焉凡都家之士所上治則主之上時掌反治直吏反掌都家之獄訟而謂之方士者以都家在王畿之四方故也都謂王子弟及公卿之采地家謂大夫之采地都家之獄訟三月而後上於國者則以其所掌又逺其待之又宜久也不言朝而言國者以其自有君從而異之也司寇聽其成於朝則獄訟成而後上於國也既成而後上於國而於羣士司刑麗法以議又言獄訟成者前所謂成都家聽斷之成也後所謂成司寇羣士司刑聽議之成也書其刑殺之成則知其所犯之罪書其聽獄訟者則知其聽獄訟之人人主欲其獄成而孚輸而孚者蓋如此也凡都家之大事聚衆庶則各掌其方之禁令者方士以中士十有六人為之則四人分主一方也以時修其縣法則間田之在都家者縣師掌其地域辨其夫家人民田萊之數及其六畜車輦之稽而其獄訟則方士掌之故以嵗時修縣師之法嵗終則文巡而省之以行誅賞凡都家之士所上治謂都士家士上所治之獄訟則方士主之以上於國也訝士掌四方之獄訟諭罪刑於邦國凡四方之有治於士者造焉四方有亂獄則往而成之邦有賔客則與行人送逆之入於國則為之前驅而辟野亦如之居館則帥其屬而為之蹕誅戮暴客者客出入則道之有治則贊之凡邦之大事聚衆庶則讀其誓禁造七報反道音導以言逆人謂之訝故掌四方獄訟謂之訝士四方之獄訟謂掌四方諸侯之獄訟也諭罪刑於邦國者諭之以罪之輕重刑之大小麗於罪則附於刑欲使之知避而無犯也上言四方下言邦國則以邦國在四方故也士典獄者也有治於士則有獄訟之治也造於訝士則以訝士掌四方之獄訟也亂獄謂君臣宣淫上下相虐之類訝士則往而成之所謂成者使兩議皆成之莫之虧也以其掌四方之獄訟故賔客則與行人送逆之入於國則為之前驅而辟居館則帥其屬而為之蹕以刑官所在則人無敢犯故也誅戮暴客者客者國之所禮而暴之則刑之所取也故誅戮之客出入則道之有治則贊之者道謂誘致之贊謂利導之必使訝士亦欲人無敢犯也凡邦之大事聚衆庶則讀其誓禁者誓禁之所施訝士讀之而已非掌之也必使訝士亦犯誓禁則施刑故也朝士掌建邦外朝之法左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庶在其後長丁丈反掌建邦外朝之治者外朝詢衆庶聽訟獄之朝在庫門之外者也其位有左有右有前有後左右有制不得以相踰前後有度不得以相越所謂法也其法一定而其義在焉位於左九棘孤卿大夫前而羣士後者以孤卿大夫臣道也比諸侯為卑而羣士則公卿大夫之屬官故也位於右九棘公侯伯子男前而羣吏後者以公侯伯子男君道也比諸臣為尊而羣吏則以聽獄弊訟為主故也面三槐三公位焉州長衆庶在其後者三公事道諸侯諸臣所不能加而以答王為義故也鄉官帥民而在其後則民為貴於是見矣棘之為木其華白義行之發也其實赤事功之就也棘在外所以待事也孤卿大夫諸侯之象也故其位以棘槐之為木其華黃中德之暢也其實玄至道之復也文在中含章之義也三公之象也故其位以槐三孤六卿其位凡九諸侯别於邦國其服亦九故左右皆九棘太師太傅太保謂之三公其位止於三故面則三槐槐棘之數各稱其位之多寡而已司士以正朝儀之位辨貴賤之等為職故其序朝位先尊後卑朝士以掌建外朝之法為職故其序朝位先卑後尊先卑後尊則先法之所制者也左嘉石平罷民焉右肺石達窮民焉罷音皮罷民不能自強以禮故怠於為善坐諸嘉石所以強其罷也窮民不能自伸其情故憂結於內主諸肺石所以伸其窮也不能自強以禮則在所平焉故役諸司空必以明刑皆所以平之使各當其分而已不能自伸其情則在所達焉故士聽其辭以告於上皆所以達之使其情得以上聞而已故地道尊右而卑左嘉石必在外朝之左者卑之而示其辱也肺石必在外朝之右者佑之而欲其伸也然左為仁右為義嘉石在左雖所以卑之而示其辱以仁宥之而已故使州里任而舍之肺石在右雖所以佑之而欲其伸亦以義制之而已故立於右必三日而後達之帥其屬而以鞭呼趨且辟禁慢朝錯立族談者辟皮亦反趨七須反所以革人而使便其事者鞭也以鞭呼趨則呼朝者使趨就位戒之以肅也辟則使人避焉道之以正也禁慢朝則使之欽也禁錯立則使之正也禁族談則使之靜也孔子在朝廷便便言唯謹爾不踰階而揖不歷位而言則朝儀之法固如此也凡得獲貨賄人民六畜者委於朝告於士旬而舉之大者公之小者庶民私之彼失而我有之之謂得伺度而得之之謂獲故易曰得難曰獲左傳所謂得器曰得得人曰獲春秋書西狩獲麟得寶玉大弓凡此皆難易之辨也貨賄人民者六畜皆其所失者也朝者行義之地凡得獲其所失使之委於朝欲其見利而思義也旬而舉之則以求者或逺待之宣緩於司市也蓋市者民之所會稽察者衆貨賄六畜其亡必得故得之舉之民無私焉民無私焉則亦市之為治欲民不以無故得利也大者公之小者庶民私之則朝之為治欲盡利以遺民也市言貨賄六畜而不言人民蓋人民奴虜之亡者市之所會稽察者衆非亡民所赴也凡士之治有期日國中一旬郊二旬野三旬都三月邦國期期內之治聽期外不聽凡有責者有判書以治則聽凡民同貨財者令以國法行之犯令者刑罰之凡屬責者以其地傅而聽其辭治獄之期或一旬或二旬或三旬或三月或期者以逺近為之差也期外不聽者亦所以省獄息訟也蓋民之所急宜以時治茍為不急又在期外亦可以已矣又況獄訟追證聯逮及於平民烏可久哉凡有責者有判書以治則聽者責謂督償之人判書謂人執其一書其所豫之數使責者執之抵冒而訟有判則足以驗其實故為之聽治也凡民同貨財令以國法行之犯令者刑罰之者同貨財謂同財者也以國法行之謂往來出入皆以關市之法豫之也司關曰凡貨不出於關者舉其貨罰其人所謂國法也若二人同財一人犯令則并舉其貨財而刑罰則施於犯令者一人而已凡屬責者以其地傅而聽其辭者屬責謂以己之財屬之於人而使責也地傅謂其人有地著而書之以附事也有地傅則追證焉不誣故相抵冒而訟以其地傅來乃為之聽治也茍屬責而無傅有傅而無地著不知所在不可追證則弗聽也凡盜賊軍鄉邑及家人殺之無罪凡報仇讎者書於士殺之無罪若邦國凶荒札喪寇戎之故則令邦國都家縣鄙慮刑貶凡盜賊軍鄉邑及家人謂盜賊之羣衆聚而成軍以攻圍鄉邑及家也如是者殺越人於貨凡民罔不憝人得殺之無罪則上下同其惡故也凡報仇讐者書於士殺之無罪者仇讐之罪書於上而逋逃焉則其罪不嫌於不明故殺之無罪也凶而至於荒札而至於喪冦而至於戎皆故之大者其所制之刑所用之財宜有異於平日故令邦國都家縣鄙慮刑貶先事而思患謂之慮慮刑則刑之加釋有趨一時之宜者慮以制之慮貶則財之省殺有紓一時之急者慮以節之也慮刑則非特緩刑也慮貶則非特眚禮也凡此皆出於不得已也司民掌登萬民之數自生齒以上皆書於版辨其國中與其都鄙及其郊野異其男女嵗登下其死生及三年大比以萬民之數詔司冦司寇及孟冬祀司民之日獻其數於王王拜受之登於天府內史司會冢宰二之以贊王治司民主民數之官也在天有司民之星在人有司民之官人之所為者凡以奉承天之所為而已然在人者亦庸詎知其非天耶掌登萬民之數則主其難也司民以其數詔司冦司冦獻之於王王登之於天府也自生齒以上者家語謂男八月生齒也女七月生齒也生齒則有食之端故皆書之於版版以木為之而其體平木仁民性含仁而先王成之以仁政故有取於木無高下老幼一皆容保之而使各當其分故有取於平國中謂王國也都鄙謂王子弟公卿大夫之采地也郊野謂鄉遂也自國中至郊野皆辨之而鄉異其男女則貴賤老幼強弱皆可知矣生者登之死者下之則其數之多寡皆可知矣以民數詔司冦司寇刑官之長也司寇獻民數則以民之數有多寡而其刑之繁省可知矣小司寇言登民數則曰內史司會冡宰二之以制國用獻民數於王則曰圖國用而進退之以司寇主刑而民之犯刑為其貧也故以圖制國用為主司民言獻民數則曰內史司會冢宰二之以贊王治則司民主民數之官也生齒之不蕃則以贊王者無以治之也故以治之為主司刑掌五刑之法以麗萬民之罪墨罪五百劓罪五百宮罪五百刖罪五百殺罪五百若司寇斷獄弊訟則以五刑之法詔刑罰而以辨罪之輕重劓魚器反刖音月掌五刑之法以麗萬民之罪者刑之所施以應其罪之輕重也故司刑之所掌皆有法焉五刑之序皆自輕而入重蓋墨不足以懲然後劓劓不足以懲然後宮宮不足以懲然後刖刖不足以懲然後殺墨劓宮刖殺皆棄人之刑也然周官立刑之法皆五百而吕刑墨劓之屬皆千宮之屬則三百大辟則二百者皆所以世輕重也吕刑曰刑罰世輕世重惟齊非齊有倫有要此之謂也以五刑之法詔刑罰所謂惟察惟法其審克之也而以辨罪輕重所謂上下比罪上刑適輕下服下刑適重上服也司刺掌三刺三宥三赦之法以贊司寇聽獄訟一刺曰訊羣臣再刺曰訊羣吏三刺曰訊萬民一宥曰不識再宥曰過失三宥曰遺忘一赦曰幼弱再赦曰老耄三赦曰蠢愚以此三法者求民情斷民中而施上服下服之罪然後刑殺刺七賜反耄亡報反人之犯罪重者有至於殺故有三刺之法其罪有被之以五刑為已重加之鞭撲為已輕則有以寬之故有三宥之法至於情可矜而五刑疑於無罪則從而赦之故有三赦之法此三者皆有法而所謂法者內以求民情外以斷民中而已司刺則以是法贊司冦聽民訟也小司寇所謂以三刺斷庶民獄訟之中以至於聽民之所刺宥以施上服下服之刑是也司寇不言赦言刺宥則赦可知矣舜典之言欽恤五刑則先眚災肆赦而後怙終賊刑先輕而後重所以示上有好生之德也周官司刺則先三刺而後三宥三赦先重而後輕者所以示有司執法之堅也上有好生之仁則知所以恤民焉有司有執法之堅則民莫之敢犯矣仁之至義之盡也三刺先臣吏則以臣吏能循民志而逹之也三宥者一宥曰不識則若仇讐以甲為乙而殺之也再宥曰過失若舉刃斫伐而誤中射人也三宥曰遺忘若間帷薄忘有在焉而以兵矢投之也不識過失遺忘致慎則或可以免焉故宥之而已三赦一赦曰幼弱則幼而又弱也記所謂七年曰悼者是也再赦曰老耄則老而又耄也記所謂八十九十曰耄是已三赦曰憃愚則憃而又愚也孔子所謂古之愚也直是已茍愚而非憃幼而不弱老而不耄則不在所赦矣蓋幼弱老耄愚蠢皆出於生性之自然非人之所能為也故赦之以此三法者求民情斷民中則情盡於內而辭孚於外情重者上服情輕者下服或刑或殺各當其罪而無疑也司約掌邦國及萬民之約劑治神之約為上治民之約次之治地之約次之治功之約次之治器之約次之治摯之約次之凡大約劑書於宗彞小約劑書於丹圖若有訟者則珥而辟藏其不信者服墨刑若大亂則六官辟藏其不信者殺以道相與者相忘於道術之間以信相結者不約於大信之際附離不以膠漆約束不以繩墨約劑將何所施哉惟其遁天倍情而智鄙之相欺以偽見真而信誕之相疑聖人亦無如之何矣於是因時乘理事制曲防必有約焉以結其信必有劑焉以固其約謂之約劑則約有其劑也所以防其偽抑其欺故大而邦國微而萬民凡言有所未孚誠有所未著其約劑皆掌之於司約矣自治神之約以至於治摯之約皆以重輕先後為之序也治神之約則若魯用郊之屬是也治民之約則若分衛以七族之屬是也治地之約則若取於相土之東都以會王搜之屬是也治功之約則若虢叔虢仲勳在王室藏於盟府之屬是也治器之約則若魯得用四代之器之屬是也治摯之約則若公孫黑使疆委禽之屬是也自治神至治摯其事皆有大有小大則書於宗彛盟諸鬼神無疑也小則書於丹圖以書之而其色則丹示其宣布著盡而無隱昧也若有不信而訟者則殺牲以弭其尸而辟藏所以重其事也不信者服墨刑則以約書宜信而不信則為墨而不明故也有訟則辨訟而已大亂則僭忒而變先王之政刑矣殺之宜也必六官辟藏則以盟約六官皆受其二藏之故也司盟掌盟載之法凡邦國有疑會同則掌其盟約之載及其禮儀北面詔明神既盟則二之盟萬民之犯命者詛其不信者亦如之凡民之有約劑者其二在司盟有獄訟者則使之盟詛凡盟詛各以其地域之衆庶共其牲而致焉既盟則為司盟共祈酒脯詛則慮反為於偽反歃血以自明亦以詔明神盟也盟則載其辭於書也故謂之盟載之法孟子所謂束牲載書是也凡邦國有疑會同則掌其盟約之載者蓋疑事疑謀而不能保其必信故有疑斯有盟有盟斯有約司盟則掌其盟約之載辭也及其禮儀者禮其物也儀其容也魯昭公禮無違者女叔齊曰是儀也不可謂禮此禮儀之辨也北面詔明神者盟約之法非特誓之於衆也質諸明神而盟者神之幽彼或違焉則神斯禍之矣謂之明神則宜鄉明者也故北面詔之夫幽則質諸神而盟者神之所為也明則誓諸人而約者人之所為也盟則必約蓋非約則無以固其盟約必有盟蓋非盟則無以示其誠盟諸神約諸人所以結信之道也既盟則二之者蓋其正藏於天府司盟則藏其二也大司寇曰太史內史司會及六官皆受其二而藏之則藏其二者非特司盟而已凡邦國有疑會同掌者其盟約之載貴者之盟也盟萬民之犯命詛其不信亦如之賤者之盟也先王之時貴而諸侯賤而萬民皆有盟詛之法者豈徒為是聽於神之虛拘哉蓋世之治也人以心相與家以誠相示知畏於神而不敢欺也知欽於神而不敢慢也先王因其有畏欽鬼神之心而躬畏以先之而因以覆盟詛為大戮至於成俗則盟邦國之不協焉盟萬民之犯命而詛其不信者有獄訟者使之盟詛弭亂息爭豈小補哉吕刑曰民興胥漸泯泯棼棼罔中於信以覆詛盟以為苖民之罪則盟詛之設帝者之世已然矣而作記者以為盟詛不及三王不亦謬乎然事有本末本之不圖無事於末後世人義不足以勝之欽畏不足以臨之慢人於上誣人於下區區之牲血脯酒不足以勝背誕之衆矣此君子屢盟詩人所以謂之長亂小國爭盟左氏所以知其必亡鄢陵之盟季文子曰德則不競尋盟何為武父之盟君子曰信之不繼盟無益也豈盟之不足恃哉失之本求之末兹其所以滋亂矣然後盟詛必以其地域之衆庶共其牲而致焉者亦以質之於衆庶使其不敢違焉故也既盟則又使為司盟共祈酒脯者蓋司盟又祈明神焉使不言者必凶矣職金掌凡金玉錫石丹青之戒令受其入征者辨其物之媺惡與其數量楬而璽之入其金錫於為兵器之府入其玉石丹青於守藏之府入其要掌受士之金罰貨罰入於司兵旅於上帝則共其金版饗諸侯亦如之凡國有大故而用金石則掌其令楬音竭璽音徙禹貢揚州厥貢惟金三品荆州厥貢惟金三品礪砥砮丹梁州厥貢璆鐵銀鏤砮磬雍州厥貢球琳琅玕而周官之職金掌凡金玉錫石丹青之戒令受其入征者蓋禹貢之言諸侯之所貢者也周官職金則取於有地者之征而已上以政取謂之征下以職供謂之貢以征與貢異故也辨其物之媺惡所以别其物之貴賤也與其數量所以計其物之多寡也楬而璽之者楬以著其數量璽則封之以印也入其金錫於為兵器之府則入於稿人也稿人曰掌受財於職金以齎其工是也入其玉石丹青於守藏之府則入於玉府也玉府曰掌王之金玉玩好是也入其要則入其計書於大府也掌受士之金罰貨罰入於司兵金罰所謂贖刑之罰也貨罰若司關所謂凡貨不出於關者舉其貨是也旅上帝則共其金版者掌次言王大旅上帝則張氊案設皇邸先儒以邸為後版屏風也所謂金版則以金飾之也共金版則亦託宿於義之意也饗諸侯亦如之則承賔如承神也凡國有大故而用金石則凡器械有用金石者職金則掌其所取之令也司厲掌盜賊之任器貨賄辨其物皆有數量賈而楬之入於司兵其奴男子入於罪𨽻女子入於舂稿凡有爵者與七十者與未齓者皆不為奴稿古老反春秋傳曰鬼有所歸乃不為厲盜賊之厲於人猶鬼之厲也故掌盜賊之任器貨賄謂之司厲也兵器所以除盜賊也故其任器貨賄入之司兵焉奴謂從坐者也先王之刑以其惡之大而有殺不足以懲則又有奴其父母妻子非刑之正也書所謂豫則奴戮汝也其奴男子入於罪𨽻則為𨽻民焉女子入於舂稿則以役舂人稿人之事也凡有爵者七十者與未齓者皆不為奴則無從坐之法也有爵者不為奴貴貴也七十者不為奴老老也未齓者不為奴慈幼也毁齒謂之齓家語曰男八月生齒八嵗齓齒女七月生齒七嵗齓齒是也犬人掌犬牲凡祭祀共犬牲用牷物伏瘞亦如之凡幾珥沈辜用駹可也凡相犬牽犬者屬焉掌其政治犬金畜也故犬人屬於秋官各從其類也掌犬牲凡祭祀共犬牲用牷物者牲用之而後殺掌犬牲則所以畜之而生也祭祀則於是共之而已色之純謂謂之牲故毛以告牷所以貴純也伏瘞亦如之者伏軷祭王出則伏犬牲以車轢之而去也瘞謂貍祭爾雅曰祭地曰瘞薶是也凡幾珥沉辜用駹可也者幾珥則士師所謂刉珥則奉犬牲是也沈辜則太宗伯所謂以貍沉祭山林山澤以疈辜祭四方百物是也夫用駹不若用牷之為善故曰可也凡相犬牽犬者屬焉相謂察知其善惡相犬者屬焉則以其屬有賈四人也牽謂用則繫而導之則以其屬有徒十有六人也政以正之令以治之則以犬人非特祭祀之犬而已凡田犬并掌故也司圜掌收教罷民凡害人者弗使冠飾而加眀刑焉任之以事而收教之能改者上罪三年而舍中罪二年而舍下罪一年而舍其不能改而出圜土者殺雖出三年不齒凡圜土之刑人也不虧體其罰人也不虧財大司寇謂之聚教罷民司圜謂之收教罷民放棄職事散而之他則大司寇以聚之為説放而不知自求則司圜以收之為説既至也則聚而教之未至也則收而教之收則詳於聚也要在上詳在下矣弗使冠飾示其不能以禮自飭其躬也加眀刑而恥之任之以事而勞之凡此皆欲其克已以復禮也上罪三年而舍中罪二年而舍下罪一年而舍以其罪之輕重而為逺近之期也其刑人也不虧體則加之以明刑而已異於五刑之刑也其罰人也不傷財則罰之以職事之勞而已異於五刑之出鍰者也此所謂之收教歟掌囚掌守盜賊凡囚者上罪梏拲而桎中罪桎梏下罪梏王之同族拲有爵者桎以待弊罪及刑殺告刑於王奉而適朝士加明梏以適市而刑殺之凡有爵者與王之同族奉而適甸師氏以待刑殺梏古毒反圜而制之謂之囚繫之於獄者也凡囚皆囚而守之獨言盜賊者盜賊必囚而守之故也梏在頸梏之則以告之也桎在足制之使用其至也拲在手共焉制之使致恭也上罪梏拲而桎中罪桎梏而不拲下罪梏而不桎拲亦稱其罪之輕重而已凡罪梏重於桎桎重於拲王之同族拲則拘之以其輕者而已所以親親也有爵者桎則拘之以次重者而已所以貴貴也以待弊罪則拘之至於斷罪而後已及刑殺告刑於王則鄭氏所謂其死罪則曰某之罪在大辟其刑罪則曰某之罪在小辟是也奉而適朝士則為王欲有所赦宥也凡有爵者與王之同族者奉而適甸師氏以待刑殺則刑於隱也亦貴貴親親之辨與掌戮掌斬殺賊諜而搏之凡殺其親者焚之殺王之親者辜之凡殺人者踣諸市肆之三日刑盜於市凡罪之麗於法者亦如之惟王之同族與有爵者殺之於甸師氏凡軍旅田役斬殺刑戮亦如之墨者使守門劓者使守關宮者使守內刖者使守囿髠者使守積搏普博反踣皮北反髠苦門反積子賜反殺而辱之謂之戮殺而辱之豈特惡其害人哉將以懲衆而生之故以下士二人充其職而名官謂之掌戮掌斬殺賊諜而搏之賊害人者諜反間者斬殺皆棄人之刑也或斬以分其體或殺而使之死亦稱其罪而已已得則斬殺之未得則搏之殺其親則賊仁莫甚焉故焚以火而不存其形殺王之親者則賊義莫甚焉故辜以磔之而不全其體孟子曰賊仁謂之賊賊義謂之殘殘則殘其半體未及焚而滅之也凡殺人者踣諸市僵其尸使衆視之而懲也新傳云云惟王之同族者與有爵者殺之於甸師氏既言於掌囚此復言之者掌囚奉其有罪者適甸師氏而待刑殺掌戮則正以殺之為事也大軍旅田役斬殺刑戮各應其罪之輕重亦掌戮司之也墨者使守門劓者使守關宮者使守內刖者使守囿秃者使守積各以其所宜也墨黥其靣劓截其鼻無妨於禁禦也然劓罪重於墨故逺之以關在外故也宫者則絶人道故使守內刖者斷其足則妨於禁禦可使牧禽獸而已故使守囿秃者使守積則王族無宫但髠之而已使守積積在隱故也先王之於刑人其輕者則流之流之則有居其重者則刑之刑之則有使以其有使故掌戮所掌者如此觀之作記者言公家不畜刑人亦誤矣然公家雖可以畜刑人而君子則不可近不可以禁而近之此吳子餘祭見殺於閽而春秋所以譏之與司𨽻掌五𨽻之法辨其物而掌其政令帥其民而搏盜賊役國中之辱事為百官積任器凡囚執人之事邦有祭祀賔客喪紀之事則役其煩辱之事掌帥四翟之𨽻使之皆服其邦之服執其邦之兵守王宫與野舍之厲禁為於偽反𨽻於主而主掌之者𨽻之也𨽻主勞辱之役而司𨽻則為之長故掌五𨽻之法辨其物而掌其政令五𨽻則罪𨽻與四夷之𨽻也掌五𨽻之法則其役使之差等各有度數存焉故也辨其物則衣服兵器之屬也掌其政令者正之則有政使之則有令也帥其民而搏盜賊役國中之辱事民謂五𨽻之民也盜賊之未獲也則司𨽻帥之搏之國中汚辱之事則司𨽻帥而役之以五𨽻之屬各有百二十人則足以供其事非特是也百官任用之器亦其民為積之也凡囚執罪人之事亦使為之也邦有祭祀賔客喪紀亦役之也掌帥四翟之𨽻守王宫與野舍之厲禁蓋古者天子守在四夷治教政刑之既明則四夷之民莫不向風懷德歸往內附則其𨽻內可以使之守王宫外可以使之守野舍之厲禁此司𨽻所以帥之也必皆服其邦之服執其邦之兵則四夷各有利器宜服齊其政不易其宜修其教不易其俗也然師氏言使其屬帥四夷之𨽻各以其兵服守王之門外且蹕朝在野外則守內列則帥其𨽻者師氏之屬也於此又言司𨽻帥之者蓋師氏之屬帥之則司𨽻帥而從之二官通職聯事也罪𨽻掌役百官府與凡有守者掌使令之小事凡封國若家牛助為牽倣其守王宫與其厲禁者如蠻𨽻之事使色吏反盜賊之家以罪而從坐沒入為奴者謂之罪𨽻先王欲民之遷善逺罪故使從坐者給役事焉以此示民則人知罪之不可為也百官與凡守者則罪𨽻掌而為之役也雖充其役然亦掌使令之小事而已若其大者非所掌也凡封國若家牛助為牽倣者封國謂牽建諸侯家謂立大夫以官牛助之運物則罪𨽻在前之在旁倣之也蠻𨽻掌役校人養馬其在王宮者執其國之兵以守王宫在野外則守厲禁征南蠻所獲之民謂之蠻𨽻掌役校人養馬者蓋校人其徒八十人有不足以給其役故蠻𨽻兼役其事也亦各從其便器以為守衛之備故執其國之兵以守王宫在野外則守厲禁閩𨽻掌役畜養鳥而阜蕃教擾之掌子則取𨽻焉蕃扶元反東南曰閩南蠻之别也亦征而獲其民謂之閩𨽻也掌役畜養鳥則役於掌畜也而阜蕃教擾之則與掌畜所謂阜蕃教擾之同事也掌子則取𨽻焉子謂鳥所生者也閩𨽻掌阜蕃庶物則養之而使之取𨽻於已者也因致其義焉而鳥之無知飲啄鼓舞而惟閩𨽻之是從則閩𨽻之𨽻於中國豈異於是哉如是則在國中而守王宫在野外而守厲禁誠心一意竭力衛上亦事之常然也此所以言掌子則取𨽻而不言守王宫與厲禁也以司𨽻言掌帥四翟之𨽻守王宫與野舍之厲禁則閩𨽻之有守固可知矣夷𨽻掌役牧人養牛馬與鳥言其守王宫者與其守厲禁者如蠻𨽻之事征東夷所獲之民謂之夷𨽻掌役牧人養牛馬則牧人其徒六十或不足以給其事故夷𨽻掌役其事也與鳥言者鸚鵡鴝鵒教擾之則固能言矣則鳥之鳴猶人之言也詩曰相彼鳥矣猶求友生以鳥而能鳴以求其友非其言而然乎使夷𨽻與鳥言亦不為怪矣貉𨽻掌役服不氏而養獸而教擾之掌與獸言其守王宫者與其守厲禁者如蠻𨽻之事征東北夷所獲之民謂之貉𨽻掌役服不氏而養獸而教擾之以服不氏掌養猛獸而教擾之故也不言阜蕃者猛獸非所阜蕃故也掌與獸言者猩猩固能言矣則獸之鳴猶人之言也詩曰􅊯􅊯鹿鳴食野之蘋以鹿而能鳴呼其羣以食非其言而然乎左氏傳介葛盧聞牛鳴曰是生三犧皆用之矣則貉𨽻與獸言亦不足怪也先王必使夷貉之𨽻與鳥獸言者以鳥獸之無知尚可與言而不違乎人矧夷貉之民哉彼其聲也雖夲於非禮義之地道之以德化而使之效順中國豈鳥獸之不若乎此亦先王之微意矣周禮詳解卷三十一
