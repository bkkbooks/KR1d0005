body:
  text: 周禮詳解卷十七宋王昭禹撰春官宗伯惟王建國辨方正位體國經野設官分職以為民極乃立春官宗伯使帥其屬而掌邦禮以佐王和邦國春於五常為仁仁所以出禮故春官以為職而本諸仁孔子曰人而不仁如禮何則仁為禮之本禮為仁之末不知其本則不能起用以應物不事其末則不能反本以復道故先王以官探本以司伺末本末相因而未嘗偏發也即其致治之序故則更新終則有始窮則通通則久是其所以為六官之效與故太宰掌建邦之六典分布五官五官致用不同其效同歸於治然則治無乎不為矣此天官所以不言司正月之吉五官皆布其象特禮無所布則禮無所不用矣治非禮不制教非禮不行政非禮不立刑無禮則淫事無禮則亂此禮所以不同謂之司國語曰古者使名姓之後能知四時之生犧牲之物玉帛之類􅉓器之量次主之度屏攝之位壇場之所上下之神祇氏姓之所出而率舊典為之宗蓋先王之制有族則有祀有祀則有宗而宗則典祀者也如國語之所謂是也禮有五經莫重於祭宗伯掌天神人鬼地祇之禮則謂之宗於四時之官為長則謂之伯豈特周禮為然哉舜命伯夷典三禮則曰命汝作秩宗者亦此意也豈特宗伯為然哉凡典禮者皆謂之宗若所謂都宗人家宗人者皆是也夫天地尊親也四時伯仲也天官言冡有尊者之道焉以佐王和邦國者和之道喪於無分天生蒸民有欲而無分則爭爭則乖乖則離離則亂先王為之制禮以定民志所以制其欲以辨上下所以定其分然後為之制禮之大致其敬心發其愛情動其溫容厚貌於往來辭受問勞拜揖之際則其和邦國也不亦至乎然則禮之施於諸侯歡然之恩足以相愛燦然之文足以相接以仁則大足以庇小以智則小足以事大同心以宣王靈一德以尊天子外則以睦四鄰內則以蕃王室非和者之效與蓋禮之本則主於敬禮之用則在於和故也觀夫戰國之際鄰國之好一言之不讐一拜之不中則兩國為之暴骨則先王以禮和邦國者豈非要務哉大宗伯之職掌建邦之天神人鬼地示之禮以佐王建保邦國示音祗天官言冡以别於五卿大宗伯言大以别於小宗伯五卿皆然尊卑有位上下有分內外有體小大有勢天秩之也大宗伯之禮定上下則曰神鬼示以序其位辨內外則曰鬼神示以序其情明尊卑則曰神示鬼以序其等此人秩之也書曰天秩有禮自我五禮有庸哉殆謂是也合五禮而言則曰佐王和邦國别三祀而言則曰佐王建保邦國蓋封國則頒祀此之謂佐王建邦國也祭則受福此之謂佐王保邦國也以吉禮事邦國之鬼神示祭祀也而謂之吉禮者有受福之道故也謂之建邦之天神人鬼地示之禮則禮當自王出故也謂之事邦國之鬼神示其所事非特王國而已然則禋祀至雨師血祭至百物肆享至冬蒸此皆在王國之中而曰非王國何也蓋禮之事鬼神示則非特王之所躬禮者若山林川澤之類有在邦域之內者故言邦國以該之謂邦國之鬼神示莫非王事故也以禋祀祀昊天上帝昊天之有上帝其猶國之有君也五精之君則猶四方之諸侯而已諸侯有君道故皆謂之君五精之君有帝之道故皆謂之帝易曰先王作樂崇德殷薦之上帝以配祖考記曰郊祀后稷以配天宗祀文王於明堂以配上帝然則上帝或通五帝言之司服曰王之吉服祀昊天上帝則服大裘而冕祀五帝亦如之然則昊天上帝者指天帝耳天者帝之體帝者天之用體嫌於不能降用嫌於不能辨故言其降而與物接則以昊言天言其升而與物辨則以上言帝其降而與物接也不見其形不可以形致之則血腥非所主矣其升而與物辨也不見其象不可以氣致之則槱燎非所主矣有無之中帝之妙用存焉以誠意動之以精意接之祭祀之齊則致其誠意心齊則致其精意人之意粗則交於物精則交於神蓋其理也雖然禋祀未離乎禮大司冦禋祀五帝則戒之曰涖誓百官戒於百族蓋其百執事至斯極也若夫不可以言不可以意察致者不期精粗焉此先王以道格於皇天耳非大宗伯之所能佐也蓋以大宰之尊祀大神示猶為不足又况大宗伯乎以實柴祀日月星辰以槱燎祀司中司命飌師雨師槱羊九反燎羊召反飌言風辰者天經也星者天緯也物受之以有性者司中也物聽之而有分者司命也風師物感之以化雨師物資之以長燔燎之致其神為物報耳柴而後實牲實牲而後槱燎三祀之所同而日月星辰則言實柴風師雨師則言槱燎隆殺之義有所寓焉蓋言實柴則牲在其中言槱燎則柴而已以血祭祭社稷五祀五嶽以貍沈祭山林川澤以疈辜祭四方百物貍亡皆反疈孚逼反社者物資之以生稷者物資之以養五祀則門户司出入之神也中霤司居處之神也竈司飲食行司道路人資之以安五嶽地資之以鎮然則言社稷五祀五嶽則大示可知矣天一而大故舉大以見五帝地二而小故舉小以見大示精意近道而逺於物故昊天以禋為主血近生而逺於人情故祭大示以血為主血之為物有象而非虛有形而非實物之幽也故記曰毛血告幽全之物也以形氣事神則血猶禮之至者故曰郊血大享腥三獻爓一獻孰社稷五祀五嶽與大示與於禮之至者為其有道故也記曰家主中霤國主社示本也此社稷五祀五嶽所以同用血祭若夫山林川澤五地之類耳弗得而與焉貍以瘞藏為主沈以函容為主山川之受物也以貍川澤之受物也以沈以貍沈焉亦各象其物宜也疈者肆而磔之辜者制而磔之凡物生則合聚死則分散自然之理也蠟之祭仁之至義之盡也四方異體肆而不全故祭以疈百物異用制而不變故祭以辜則亦各以其物宜也以肆獻祼享先王以饋食享先王以祠春享先王以禴夏享先王以嘗秋享先王以蒸冬享先王肆他厯反天祀用物氣而貴精地祭用物形而貴幽鬼享用人義而貴時故宗廟之享有三年之祫五年之禘所謂間祀也而又有四時之享焉蓋祭不欲數數則煩故有間祀祭不欲疏疏則怠故有時享以肆獻祼享先王五年之禘也以饋食享先王三年之祫也祼酌鬱鬯以求神也肆亞祼之後進所解之牲體也羞其肆而酌獻焉則以祼享先王其祼也猶事生之有饗也羞其熟而饋食焉則以食享先王其食也猶生事之有食也饗以陽為主故禘以夏食以隂為主故祫以冬禘者審諦昭穆而辨之嚴尊卑之等也則尚乎敬故以肆獻祼為主祫者合聚羣祖而食之仁親之屬也則尚乎愛故以饋食為主春物生未有以享也其享也以詞為主故曰祠夏則陽盛矣其享也以樂為主故夏曰禴秋物成可嘗矣其享也薦新以嘗而已故曰嘗冬則物衆其享也蒸衆物焉故冬曰蒸至於蒸則衆物盡矣其備小物也水草之𦵔陸産之醢在焉其備美物也三牲之爼八簋之實在焉其備陽物也昆蟲之異在焉其備隂物也草木之實在焉凡天之所生地之所長苟可薦者莫不咸在此其所以為蒸與夫先王之於親也感雨露之濡則有怵惕之心感霜露之變則有悽愴之心春祠夏禴則怵惕之心形於所感者也秋嘗冬蒸則悽愴之心形於所感者也然春夏皆陽也祠禴皆聲也春享先王則主於祠夏享先王則主於禴何也蓋聲屬乎陽者也詞者聲之有所屬者也至樂則其聲達矣春者陽之有所生也至夏則其生著矣此所以異也秋冬皆隂也嘗蒸皆食也登榖之月天子嘗新先薦寢廟則嘗之得名主於薦新耳然秋以薦新為未足以盡愛之道故至於冬蒸而備物焉然後為愛之至此所以異也故祠之享不若禴之盛嘗之享不若蒸之盛詩之天保言禴祠蒸嘗先禴而後祠先蒸而後嘗亦以享之盛者為先與以凶禮哀邦國之憂以喪禮哀死亡以荒禮哀凶札以弔禮哀禍災以禬禮哀圍敗以恤禮哀冦亂祭祀之禮有得福之道故謂之吉禮凶者吉之反所以待吉禮之變也故吉禮而凶禮次之夫喜怒哀樂好惡欲人之情也先王制禮以行其情凶禮行其所哀之情者也賓禮行其所好之情者也軍禮行其所惡所怒之情者也嘉禮行其所欲之情者也故吉凶福禍自已求之者多矣大概有數存焉宜在所哀死亡凶札禍災哀其不幸圍敗哀其不能冦亂哀其不也德哭亡謂之喪亡斯哭之矣死以氣言也亡以形言或發於聲音衣服或見於賻贈含襚此喪禮哀死亡也記曰反而亡焉失之矣於是為甚始死也哀其死既葬矣哀其亡川亡而草生謂之荒凶札斯荒矣君膳不祭肺馬不食穀馳道不除祭祀不縣大夫不食粱士飲酒不樂以至荒禮有散利之類此荒禮哀凶札也神所示為禍天所毁為災弔以慰之也如宋大水魯莊公使人弔焉曰天作淫雨害於梁盛如何不弔此弔禮哀禍災也圍謂國見圍敗謂師敗績禬則合貨財以補之也如澶淵之會謀歸宋財是也行人曰致禬以補諸侯之災小行人若國師役則令稿禬之此禬禮哀圍敗也兵作於外為冦兵作於內為亂恤以救之也若衛有狄人之難而齊桓公救之此恤禮哀冦亂也喪禮荒禮以彼喪荒哀之也弔禮禬禮恤禮以我弔禬恤哀之也死亡凶札禍災天事也死亡為重凶札次之禍災為輕圍敗冦亂人事也圍敗為重冦亂為輕凶禮之序冦亂則及時事故救之圍敗則在事後故補之以賓禮親邦國春見曰朝夏見曰宗秋見曰覲冬見曰遇時見曰會殷見曰同時聘曰問殷眺曰視夫吉凶為天下同其憂樂然後天下莫不賓服此賓禮所以次於吉禮凶禮也謂之賓禮則有從王之道焉易曰先王以建萬國親諸侯蓋有賓禮以親之也夫賓禮行於邦國則燦然之文歡然之恩足以相愛接邦國其有不親者乎日有六時而寅為一日之朝嵗有四時而春為一嵗之朝嵗之春猶日之朝故春見曰朝夏則萬物相見於是時也有為之宗者有見而宗之者大則為小之所宗寡則為衆之所宗物各以其類然也故夏見曰宗秋則非萬物相見之時於是相見可謂勤矣故秋見曰覲冬則物辨之時莫為之宗則主無意於見焉亦莫之宗則賓無意相見焉其見也若邂逅然故冬見曰遇冬見曰遇則春見之也専矣春見曰朝則秋見之也暮矣朝而見之也専暮而見之也勤人事之周也宗而見之也願遇而見之也悅人情之適也人情之失惟其怠於相見其迹遂疏苟見而非専雖専而非勤雖勤而非其願其心遂疏見之太數相棄於瀆則以人之情喜新而厭其數邂逅相遇而喜生朝暮繼見而愛生有宗之者而敬生此賓禮所以親之也有不順之之國王召諸侯而會以命事有時而然故時見曰會王不巡守之嵗會諸侯而相見之以命政殷國所同故殷見曰同會以命事則聚其謀也同以命政則一其德也時聘施於時見之後以恩問之而已故時聘曰問殷俯施於殷見之後以事有所察治故殷俯曰視行人曰時聘以結諸侯之好殷俯以除邦國之慝問之所以結好也視之所以除慝也朝覲宗遇會同諸侯之賓於王者也時聘殷俯王人之賔於諸侯者也下或賔於上上或賓於下其交有時其接有禮外以和諸侯內以蕃王室賓禮之行也豈小補哉以軍禮同邦國大師之禮用衆也大均之禮恤衆也大田之禮簡衆也大役之禮任衆也大封之禮合衆也先王以賓禮一天下有不帥則軍禮於是乎用矣然則賓禮所以接外治軍禮所以制外亂而軍禮者所以待賓禮之變也此軍禮所以次於賓禮與先王之於天下德以容民仁以畜衆使內外逺近莫不和悅而正南面此以道同之也然德不足以懷則威以制之仁不足以綏則義以治之此以軍禮同之也大國三軍次國二軍小國一軍師役均田同出於一軍之衆斯以軍禮同其事用恤蔄任合行於三等之國斯以軍禮同其政冦亂則相恤以救之斯以軍禮同其心叛逆則相連以伐之斯以軍禮同其德如此則小事大而無敢抗大庇小而無所陵以致和兄弟蕃王室而使天下為一家者軍禮之效與故用衆者用其命恤衆者恤其事簡衆者簡其能任衆者任其力合衆者合其志上下一心三軍同力以之冒矢石而不辭當鋒刃而不懾莫不有我行不來之死志而無與子偕老之還心此所以用其命也因地以令賦因家以起役地有肥磽而賦有輕重家有上下而役有多寡此所以恤其事也坐作進退不講則不知刺伐擒縱不習則不能春以教振旅夏以教茇舍秋以教治兵冬以教大閲此所以簡其能也大役則率其民而至起徒役則無過家一人豐年則公旬用三日中年則公旬用二日無年則公旬用一日此所以任其力也正其畿疆而使地有定域立其社稷而使民有常主也大國三軍次國二軍小國一軍率皆同心而一德此所以合其志也用其命而不知恤其事恤其事而不知簡其能簡其能而不知任其力任其力而不知合其志非所以為軍禮也軍禮以用其命為主以合其志為終始蓋師均田役於大封而後有之任恤簡合各以一事為主及其用衆則衆之志能材力不得而有焉以嘉禮親萬民可欲之謂善充實之謂美美之至則為嘉蓋兄弟之義男女之情朋友之信故舊之愛賔客之好善之實也無以文之則不能充實而至於美充美而至於嘉非特止於為善而已善恐不得而有焉先王為之飲食之禮以文兄弟之義為之婚冠之禮以文男女之情為之賓射之禮以文朋友故舊之愛為之饗蒸之禮以文賓客之敬為之脤膰賀慶之禮以文親疏之恩然後性善之實擴而充之歡然有恩以相愛燦然有文以相接此禮之所以為嘉也蓋亨者嘉之會天之禮也嘉會所以合禮人之禮也先王之為嘉禮豈出於人為之私意哉亦本於天理而已然禮行於上而民效於下民其有不親者乎教之化民深於命殆謂是與以飲食之禮親宗族兄弟以昏冠之禮親成男女以賓射之禮親故舊朋友以饗燕之禮親四方之賓客以脤膰之禮親兄弟之國以賀慶之禮親異姓之國飲食之禮所謂族燕族食之禮也昏冠之禮所謂昏禮冠禮是也賓射之禮所謂行賓燕之禮而與之射也饗燕之禮所謂饗以訓恭儉燕以示慈惠也脤膰之禮脤謂祭祀之肉而盛以蜃器者也膰謂熟肉助祭執事因賜之以膰胙者也定十四年天王使石尚來歸脤以歸諸侯故盛以蜃器使之懷也孟子言孔子不用從而祭膰肉不至不脫冕而行膰蓋與祭祀而受胙也左傳曰祀有執膰戎有受脤此脤膰之别也賀慶之禮謂因其喜而賀慶之慶則以禮為主賀則以利為主也若行人所謂賀慶以贊諸侯之喜是也飲食以施於宗族兄弟為主致其愛故也昏冠之禮以施於男女為主昏以親之冠以成之言昏則姻可知也言冠則笄可知也先昏後冠則親之而後成之也故舊朋友以義相與者也故以賓射為主饗在廟致其敬也燕在寢致其愛也上公三饗三燕侯伯再饗再燕子男一饗一燕聘客一饗一燕則與時賜無數故饗燕之禮以施於四方賔客為主愛而敬之也兄弟之國同姓之諸侯也與之同事先王故親之以膰與之分守下土故親之以脤福祿吾之所以為身者也與之同福祿則親親之至也雖至歸脤以交諸侯之福賀慶以贊諸侯之喜兄弟之國非不與之賀慶也其親之也以脤膰為主異姓之國非不與之同福祿也其親之也以賀慶為主以異姓之國不及同姓之厚非親疏之辨也親宗族兄弟然後親成男女以尊及卑也親故舊朋友然後親四方賔客以近及逺也四方之賓客以禮來接我者也兄弟異姓之國則我以禮往加焉此嘉禮之序也以九儀之命正邦國之位一命受職再命受服三命受位四命受器五命賜則六命賜官七命賜國八命作牧九命作伯莫非命也凡制於上而受於下者皆命也先王之時有定命之數則典命掌之有加命之數則宗伯掌之加命非定命也故謂之九儀之命而已命以德定其數儀以命制其節位以儀辨其分車旗衣服之類此謂五儀職服位器之類此所謂九儀職服位器之類茍無王命以行之則下不得以聼上不得以使是故九儀有命然後職足以涖事服足以稱德位足以臨人器足以行禮則足以治官足以使國足以守牧足以分州伯足以分州然後邦國之位先後之序髙下有等謂之邦國則指諸侯之國言之非王朝諸侯之位也一命受職者公侯伯之士皆一命子男之大夫亦一命固已受職矣子男之士不命則此或加子男之士為之夫所治謂之職未命之士非無職若府掌官器以治藏史掌官書以贊治之類皆其職也然其職非受於王皆其官長所自辟除有所屬而已至一命則所受之職受於上矣再命受服者公侯伯之大夫與子男之卿皆再命固已受服矣以公侯伯之士與子男之大夫皆一命則此或加公侯伯之士子男之大夫為之司服曰士之服自皮辨而下惟王之上士三命亦服皮辨則此所謂受服者再命始受皮辨之服矣三命受位者公侯伯之卿固已受位矣則此或加公侯伯之大夫子男之卿為之夫君一位卿一位大夫一位上士一位中士一位下士一位則一命再命者非無位也至三命然後其位受於王矣四命受器者公之孤固已受器矣公侯伯之卿皆三命則加公侯伯之卿為之禮運曰大夫具官祭器不假聲樂皆具非禮也假之言至也受器則祭器固已至矣則四命者禮樂之器皆得具而用之五命賜則者或加公之孤或加王之大夫出為縣內之諸侯故賜八則以治也六命賜官者或加子男入為王之卿賜之官使得自置其臣治家邑也七命賜國者或加王之卿或加子男為侯伯以卿為侯伯始有其國也以子男而為侯伯則加受其國也故曰賜國八命作牧者或加侯伯而為之九命作伯者或加三公而為之一命之士積加命而至於五則為都鄙之君五命之子男積加命而至於九則為方伯進賢興功以作邦國也士奮其才德以求為君諸侯奮其才德以求為伯九儀之命為之勸耳言受則有義言賜則有禮言作則有道蓋君子有行可之仕有際可之士自四命以下言受則容有辭之者矣於其受之然後王命成焉此有義也自五命以上言賜則崇德報功有受之而已屬長連帥卒正者諸侯之所聽也州長者屬長連帥卒正之所聽也方伯者天子之老州伯之所聽也州伯各以其屬屬於天子之老有道以揆有德以倡者也州伯聽於天子之老而下之於帥正帥正聽於州伯而下之諸侯然則牧伯之仕豈無所作哉以玉作六瑞以等邦國王執鎮圭公執桓圭侯執信圭伯執躬圭子執榖璧男執蒲璧信音身夫六瑞之制其形有圭璧以象天之體用其名有鎮桓信躬穀蒲以别君德之隆殺信躬之名則取諸身而象之也鎮桓榖蒲之名則取諸物而象之也天子一位公一位侯一位伯一位子男同一位五等之爵先王以定天下之名分其嚴而不可犯也然而徒有其位而無其實以為之稱焉與夫有其實而人莫之悉也烏能使人尊而貴之哉蓋天下之人不可欺者以其皆有良知也不可陵者以其皆有良貴也苟以區區之名分以相制服豈人之情哉先王慮夫天下之人不知吾之為此位也并德之小大而隆殺之又慮其在此位者以貴自驕而忘其德焉至貴賤犯分不足相服而又無以服其下焉於是為之六瑞以表著之五位者正其名而等之也六瑞者表其德而等之也夫天地合而後同道君臣合而後同德六瑞者先王所以取合焉上極乎天下蟠乎地崇髙廣大靜以體仁而四方安焉萬物育焉此王之所以為德也故執鎮圭上有所承下無所底周疑強直其立也不孤其用也不殆以歸德於上而無私此公之所以為德也故執桓圭侯之為德以體仁而其為仁也盡人道以君民此尊而不屈者也故執信圭伯之為德亦以體仁而其為仁也盡人道以長民此屈而不信者也故執躬圭子字也字養也語長人之道為未足能飬人而已故執榖璧以榖為信善而能飬人故也男任也任安也語飬人之道為未足能以順安人而已故執蒲璧以蒲柔順而能安人故也然則有君道者皆取象於天有臣道者皆效法於地故六瑞君之所以為贄也其象取謂天而已璧圓以象天之體圭鋭以象天之用為君之道非充實之美莫之能致也親天下之物無以稱德焉惟玉也溫潤而澤縝密而栗剛而不屈亷而不劌可謂充實之美矣故六者皆以玉為之充實之謂美充美而有光輝之謂大無美德無大仁其仁弗大則仁之靜弗至焉仁而至靜弗至焉仁而至靜然後有以安四方其仁弗大則仁之利弗至焉仁之至利然後有以飬肓萬物四方萬物莫不歸往之謂王王之道也鎮圭之制以王制其體則比其德之美以尺有二寸制其數則比其德之大以四鎮之山制其象則其仁至靜足以致其安至利足以致其飬夫山有仁之道也四鎮之山又有大仁之道者也此王執之所以象其德也鎮圭所以象仁之用也仁之用則顯故王執之大圭所以象道之用也道之用則藏故王搢之然鎮圭之用非一或守之以定國或執之以正己或用之以接臣至於朝日祀天起師賙厄無不以之凡以王者之仁無適而非是也玉人曰鎮圭尺有二寸天子守之此據其定國而言也大宗伯以玉作六瑞而曰王執鎮圭此據其正己而言之也小行人成六瑞而曰王用鎮圭此據其接臣而言之也典瑞之職曰王執鎮圭以朝日此據其祀天而言之也又曰鎮圭以徴守以恤凶荒此據其起師賙厄而言之也公執桓圭而射人又謂三公執璧者蓋方其在朝而為三公則近於王而有所屈則致君之體而不致其用故執璧及其在外而為上公則逺於王而有所伸則有為君之位而致其用故執桓圭非不同勢有屈伸也以禽作六摯以等諸臣君道一故六瑞一以玉為之玉者陽物也有君之道焉此玉所以為瑞天子受而復之寶之也臣道二故六摯以衆禽為之禽者制馭於人者也為人臣者無以有已此禽所以為摯天子受而不復之臣之也摯之為言至也所執以自致焉大者玉帛小者禽鳥至於野外軍中婦人童子皆有以自致焉故先王之時卿效其德大夫效其智士效其節庶人工商效其職其才有餘不敢過其分其實不足不敢執其物且夫鴈雉之類物之無知者且能候時而行守介而死不失其節而况人乎以人而是之不若人之大恥也此固人之所自致者也孤執皮帛太師太傅太保謂之三公少師少傅少保謂之三孤公與王坐而論道燮理隂陽則其道大同於物故公之摯則執璧璧之為物其形圓也則公有天之道焉其名辟也則公有君之道焉孤則二公𢎞化寅亮天地而已於道則不足而於物則未能大同於德則不羣而於物則足以相被故其摯執皮帛皮帛者束以帛而表虎豹之皮以為飾也大人虎變其文炳也君子豹變其文蔚也其道足以衣被人而飾之以炳蔚之文章此孤之道所以為不羣歟然而其道足以衣被人而人蒙其衣被則斯親之矣人仰其道則斯尊之矣親之斯愛之文取炳蔚以示其愛也尊之斯畏之皮取虎豹以示其可畏也人知愛而畏之則德之不羣又可見矣非特王之孤為然典命曰公之孤四命以皮帛視小國之君則公之孤其德亦然矣卿執羔大夫執鴈士執雉曲禮曰飾羔鴈者以饋則卿大夫亦能衣被人而有文章也然孤有不孤之德其文則天也故以虎豹之皮飾之以皮者天為之文也卿之養人大夫之率人其文則人也故飾以繢以繢者人為之文也有德然後能衣被人德成然後有文士未成德者也則無以衣被人故執雉而無所飾然雉之性則耿介而其色則文明以其被文以相質也士非無文也非成德之文則文足以相質而已庶人執鶩工商執雞鶩音木府史胥徒庶人之在官者則庶人非特府史而匕凡民在焉或聨於鄉遂相質以生或聨於官府相須以行欲其不散遷故執鶩工者興事造業以利其上者也商者𢡟遷有無以利其人者也欲其趨時而動故執雞鶩與雞皆人所畜則庶人工商亦上所畜故也以玉作六器以禮天地四方物之受命以天而生以地而成五精之君則分位於四方以佐天地之化育者也先王欲報之德故即地上之圖丘報天即澤中之方丘報地兆五帝於四郊報五帝也天地四方未之辨也有物混成無得而禮焉及其既散始有尊卑之位左右之方隂陽之德生成之序未辨之時猶器之合乎玉猶玉之復乎璞方圓之形玄黃之色璧琮之名大小多寡之數未之有也道之散為天地四方猶以玉而分為器所以致其禮也以蒼璧禮天以黃琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以玄璜禮北方皆有牲幣各散其器之色萬物親地而天為之辟故禮天之器其名曰璧以天有辟之道而萬物所由以制者也其形圓則取其為圜之乾其色蒼則象其始事之時萬物祖天而地為之宗故禮地之器其名曰琮以地有宗之道而萬物所由以收者也其形方則取其直方之坤其色黃則象其終功之時有體斯有用青圭象陽之生物其用也有用斯有事赤陽之盛色章陰之成事赤璋以陽之盛色物之以隂之成事名之是象其事也有事斯有形白琥象陰之成是其形也有形斯有色玄璜者以陽之正色物之以陰之盛色名之是象其色也陽生於子而終於已隂生於午而終於亥則南北為陰陽之雜故赤璋玄璜皆雜陰陽焉陽中於卯隂中於酉則東西為陰陽之純故青圭則成象焉白琥則效法焉道之判於域中天地繼道以為體五精之君各繼其用而已是故六器之形各以用繼體以事繼用以色繼形不失其序然而璧琮圭璋白琥其物之也同其名之也異於北方之玉其名之其物之皆以色焉何也以玄色物之則以天職用之時以黃色名之則以地終功之時也北方之幽無得而名焉其得而名者亦見於色而已不以玄名而黃物之者示地有終功之美而歸之天焉然有禮神之王有祀神之玉以蒼璧禮天至玄璜禮北方則所謂玉書書所謂檀璧是也四圭有邸以祀天旅上帝兩圭有邸以祀地旅四望則所謂祀玉若書所謂秉圭是也皆有牲幣各放其器之色立大祀用玉帛牲牷立次祀用牲幣立小祀用牲而帛則人以衣者也牲則人以養者也以其衣食之物而薦之致人事也六器之象神示之德存焉故牲幣之色則各放之而已矣以天産作陰德以中禮防之以地産作陽德以和樂防之天産動物也地産植物也六牲之屬皆味存焉謂之天産以上首而圓五穀之屬皆氣存焉謂之地産以下首而方精之不足者補之以味形之不足者補之以氣先王以氣味作之則晝夜之所存平旦之所息無非精形之養也養精之至隂德生焉養形之至陽德生焉作之者使之生而無息也陰德作已而教之以陰禮則民可以無怨陽德作已而教之以陽禮則民可以無爭蓋民常勤於用精而怠於用形故先王防以禮樂禮主於減樂主於盈禮減而進以進為文此所以道中樂盈而反以反為文此所以道和隂德民之所以淫也以中和防之則民不淫矣陽德民之所怠也以和樂防之則民不怠矣以禮樂合天地之化百物之産以事鬼神以諧萬民以致百物大道散而天地位天地位而百物生天以陽生地以隂成隂陽相摩鼓之以雷霆潤之以風雨動之以四時暖之以日月冬無愆陽夏無伏隂寒署雨暘各適其中則天地之化是謂太和百物資天之陽以有生資地之隂以有成氣變而有形形變而有質莫不負隂抱陽沖氣以為利則百物之産是以天地之中和而已先王之作禮樂一本於中和則其合天地之化百物之産亦以其自然之和也夫樂由陽來禮由隂作禮減而進以進為文樂盈而反以反為文無過不及也一於中而已無有餘不足也一於和而已合生氣之和道五常之行使之陽而不散陰而不密剛氣不怒柔氣不懾四暢交於中而發作於外其至也極乎天蟠乎地上下與天地同和節則禮樂之大和也其施於物也感動其善心移易其邪行無悖逆詐偽之心無淫佚作亂之事天地欣合隂陽相得覆育萬物以至於勾萌逹羽翼奮角觡生蟄蟲昭蘇羽者嫗伏毛者孕育胎生者不殰而卵生者不殈則禮樂之大和也惟禮樂之大和故能合天地之化惟禮樂之大和故能合百物之産所以與之同流而無問者此也記曰樂者天地之和也禮者天地之序也惟其為天地之和序故能合天地之化也又曰和故百物皆化序故羣物皆别惟其能化别羣物故能合百物之産也夫天物之化百物之産所以合而無間者禮樂之和氣也惟其和氣也以通乎幽則鬼神之無形可得而事矣以治乎明則萬民之至愚可得而諧矣以格乎物則百物之有知可得而致矣能合天地之化百物之産者禮樂之道也可以事鬼神諧萬民致百物者禮樂之功也凡祀大神享大鬼祭大示帥執事而卜日宿視滌濯涖玉鬯省牲鑊奉玉齍詔大號治其大禮詔相王之大禮朕志先定人鬼協從然後可以致享帥執事則人謀從也而卜日則鬼謀從也即太宰所謂前期十日帥執事而卜曰遂戒是也七日戒三日宿太宰大宗伯帥執事而卜日然而太宰特尊故及執事然後眂滌濯及納烹然後贊王牲事及祀之日然後贊玉幣爵之事大宗伯正掌天神人鬼地示之禮故宿眂滌濯涖玉齍省牲鑊奉玉齍太宰不奉齍則亦以齍事卑於牲事也涖玉鬯者玉所以禮神鬯所以求神皆宿眂而涖之也奉玉齍於祭之日蓋奉玉與鬯也詔大號則大之之六號是也以牲幣齍奉鬼神示以鬼神示建保邦國而不為名號以尊大其美以辨名其類其盡志也略其盡物也瀆矣治其大禮凡禮事之大者也詔相王之大禮王禮之大者也若王不與祭祀則攝位凡大祭祀王后不與則攝而薦豆籩徹大賓客則攝而載果朝覲會同則為上相大喪亦如之王哭諸侯亦如之王命諸侯則儐國有大故則旅上帝及四望與音預果讀為祼若王不與則攝位大宗伯掌大祭祀則王之不與祭祀使之攝位也宜矣凡大祭祀王后不與則攝而薦豆籩徹者豆籩有薦謂正祭祀時也豆籩有徹謂祭祀方畢也大賓客則攝而載祼亦謂王后不與而攝其事也載祼者謂祼鬯載於圭瓉也朝覲會同則為上相者相王以行禮也王禮相者非一人而大宗伯則為上相也王命諸侯則儐者儐諸侯以見王也旅者合衆人而祭之也國有大故所求者衆矣舉天之上帝地之四望則衆神皆合祭之矣王大封則先告后土乃頒祀於邦國都家鄉邑大封封諸侯也與詩之賚言大封於廟同意社土神也后土配食於社者也大封以分土而封諸侯則先告后土宜矣頒賜謂頒其祀禮也言邦國而及其都家鄉邑者蓋諸侯之卿與其子弟食采亦謂之都如書所謂簡恤爾都是也諸侯之國其制地也有都家有鄉邑而祭祀之禮皆有等降則其頒祀詳言之者以典祀所頒先王尤以為重而不可忽也揚子曰節莫差於僣僣莫僣於祭則先王於此尤致其詳者其所防豈不為至哉周禮詳解卷十七
