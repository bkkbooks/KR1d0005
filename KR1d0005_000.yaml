body:
  text: 周禮詳解禮類一周禮之屬提要臣等謹案周禮詳解四十卷宋王昭禹撰陳振孫書録解題曰昭禹未詳何等人近世為舉子業者多用之其學皆宗王氏新説王與之作周禮訂義類編姓氏世次列于龜山楊氏之後曰字光逺亦不詳其爵里當為徽欽時人今按其書解惟王建國云業格于上下謂之王或而圍之謂之國解匪頒之式云散其所藏曰匪以等級之曰頒故匪從匚從非言其分而非藏也頒從分從頁言自上而頒之下解圃曰園有衆甫謂之圃解鮑魚曰魚之鮮者包以致之解鱐曰魚之乾者肅以致之解司徒云于文反后為司蓋后從一從口從􅛣從口則所以出命司反之則守令而已從一則所以一衆司反之則分衆以治之而已從􅛣則承上世之庇覆以君天下司反之則以君之爵為執事之法而已其附會穿鑿皆遵王氏字説蓋當時三經新義列在學官功令所懸故昭禹因之不改然其發明義旨則有不盡同于王氏之學者如解泉府以國服為之息云各以共所服國事賈物為息若農以粟米工以器械皆以其所有也周之衰不能為民正田制地稅斂無度又從而貸之則凶年飢嵗無以為償矣下無以償上之人又必責之則稱貸之法豈特無補于民哉求以國服為之息恐收還其毋而不得蓋已目睹青苖之弊而隂破其説矣至其闡發經義有足訂注疏之誤者如解載師里布屋粟謂國宅無征民居有征無布以其不毛使之有里布民出耕在田廬入居在里其屋有田以出粟今不耕田則計屋而斂之謂之屋粟不從先儒以里布為二十五家之泉屋粟為三夫之粟又解近郊十一逺郊二十而三甸稍縣都皆無過十二因當時正役後因逺近劇易而制云云皆為先儒所未發故宋人釋周禮者如王與之訂義林之竒講義多引其説固不得以遵用新説而盡廢之也五官皆不載敘官元末朱申作句解蓋從其例究為一失今姑仍舊本録之內附載陸德明釋文而卷首以德明之名冠昭禹前今考昭禹自序末云因釋文而作則釋文或後人所增入又以德明時代在前遂題諸昭禹上歟今仍録其音釋而德明之名則附著于此不復並列簡端焉乾隆四十六年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀周禮詳解原序道判為萬物之成理理之成具不説之大法禮者法之大分道實寓焉聖人循道之序以制禮制而用之則存乎法推而行之則存乎人其人足以任官其官足以行法然後禮之事舉矣故唐虞稽古建官惟百夏商官倍至周增而為三百六十非故好詳也王者之世物繁事衆其制不得不然也孔子曰周監於二代郁郁乎文哉吾從周蓋言盛矣然道之常無下散於常有之域法象而為天地變通而為四時聖人體道之常無以觀其妙體道之常有以觀其微其精至於與天地合其德與四時合其序雖先天而天且弗違尚何事於仰觀俯法然後奉其時哉惟夫出神天之本宗應帝王之興起天地固有大美矣四時固有眀法矣雖聖人烏得而違焉是故因天地之大美逹而為治教因四時之明法達而為禮政刑事然則常無之道為萬物而有天地四時聖人為天下而有治教禮政刑事天地四時道之所任以致其用者也六官聖人任以致其事者也噫六官之建豈聖人之私智哉實天理之所為也由此以觀則禮之事雖顯於形名度數之粗而禮之理實隱於道德性命之微即事而幽者闡即理而顯者微然則禮其神之所為乎夫神無在而無乎不在無為而無乎不為聖人立禮以為體行禮以為翼事為之制曲為之防亦神之無不在無不為之意也彼荀卿徒知禮為道之華而不知為物之致乃曰生於聖人之偽又烏知禮意哉王昭禹光逺序周禮詳解原序周禮互注總括經禮三百記禮器經禮謂周禮也周禮六篇其官有三百六十上文注文武所以綱紀百官君臨天下周公定之致隆平龍鳯之瑞然則周禮起於成帝劉歆成於鄭玄春官疏鄭玄以為括囊大典網羅衆家是以周禮盛行上文同韓子所見蓋周之舊典禮經也左序齊仲孫歸曰不去慶父魯難未已公曰若之何而去之對曰難不已將自斃君其待之公曰魯可取乎對曰不可猶秉周禮周禮所以本也魯不棄周禮未可動也閔元年晉侯使韓宣子來聘且告為政而來見禮也觀書於太史氏見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之德與周之所以王也昭二年或問周官曰立事揚子重黎篇子居家不暫捨周禮門人問子子曰先師以王道極是也如有用我執此以往通也宗周之介也敢忘其禮乎子曰周禮其敵於天命文中子魏相篇周公典禮與天命齊其長久上文注唐太宗問三代損益何者為當魏徴對曰孔子曰周監於二代郁郁乎文哉吾從周周禮周公旦所裁詩書仲尼所述雖綱紀頺缺而節制具焉荀孟陳之於前董伸之於後遺談餘義可舉而行若擇前代憲章發明王道臣請以周典唯所施行上大悅翌日又召徴入上曰朕昨夜讀周禮真聖作也首篇云惟王建國辨方正位體國經野設官分職以為民極誠哉深乎良久謂徵曰朕思之不井田不封建而欲行周公之道不可得也録唐論禮欒事凡禮十三家五百五十五篇前藝文志帝王質文世有損益至周曲為之防事為之制故曰禮經三百威儀三千及周之衰諸侯將踰法度惡其害已皆滅去其籍同上周公所制百官品物備於此矣晉禮志沈峻尤長三禮陸倕徐勉書薦峻曰凡聖賢所講之書必以周官立義則周官一書實為羣經源本南史本傳褚無量建議禮文雖衆莫如周禮周禮者周公致太平之書先聖極折衷之典法天地而行教化辨方位而敘人倫其義可以幽贊神明其文可以經緯邦國備物致用其可忽乎唐本傳周禮儀禮並周公所記所謂禮經三百威儀三千禮經則周禮也威儀則儀禮也三禮正義周禮遭秦滅學藏於山巖屋壁以故不亡漢武有李氏獲之以上河間獻王獨闕冬官一篇求之千金不得乃以考工記補之遂奏入於祕府時儒以為非是不行至劉歆獨識其書為周公致太平之迹始奏立學官後鄭玄為之注同上周禮互注總括
