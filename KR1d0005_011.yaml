body:
  text: 周禮詳解卷十一宋王昭禹撰小司徒之職掌建邦之教法以稽國中及四郊都鄙之夫家九比之數以辨其貴賤老幼廢疾凡征役之施舍與其祭祀飲食喪紀之禁令教之道出於王教之法出於大司徒上以道揆教下以法守教此教之義所以妙而難知教之法所以粗而可陳也小司徒掌建邦之教法則二大司徒而已蓋教之道存乎心術之微得於觀感之際大司徒以其法眀其義由官府以達於鄉遂由鄉遂以達於都鄙由都鄙以達於邦國所以舉而措之推而行之豈一而足哉此小司徒所以又從而二大司徒以建其法也國中則指王城而言之也四郊則近郊逺郊兼不屬六鄉使吏治之之地言之也夫以人言家以居言夫家猶曰室家指男女而言之也九比九職之比也以稽國中及四郊都鄙之夫家則凡男女生齒之數皆可知也以稽九比之數則凡任職之民其多寡之數皆可知也貴則所以治賤者也賤則所以事貴者也老者在所養幼者在所慈廢疾則不可任事在所寬而恤之也征則貴賤稅斂之總名役則足以任民而用其力施惠焉謂之施舍政役焉謂之舍貴賤老幼廢疾與夫征役之施舍其事既不同則不可不若辨也祭祀則若州祭社黨祭禜族祭酺之類也飲則鄉飲酒族食之類是也喪紀則若族相葬之類是也禁則止使勿為也令則令所當為也祭祀飲食喪紀之事既有禁令亦當辨之使民知所當為與不得為者故曰與其祭祀飲食喪紀之禁令辨其貴賤老幼或先貴賤或先老幼者明貴老皆天下之達尊無所先後爵齒更尊故也乃頒比法於六鄉之大夫使各登其鄉之衆寡六畜車輦辨其物以嵗時入其數以施政教行徵令頒比法者頒以校比之度數也鄉大夫以嵗時登其夫家之衆寡其校比則有法矣其比法則自司徒而頒之鄉大夫則受法於小司徒而用之也政以正之教以道之徵以召之令以使之苟不知其民之衆寡貧富有無則政教之所施或有未安徵令之所行或有不熟此所以必先入其數也餘見傳及三年則大比大比則受邦國之比要周而不比君子之道也比而不周小人之道也先王之用民無非比也使不失乎君子之周而已有恩以相愛有文以相接相應者同聲相求者同氣無非忠信之所為也及三年而大比之所以順天道敕民事而已三年而周者天道之所成終始也三年而比者民事之所成終始也人之所為詎知其非天乎王畿之內謂之比數其所稽者詳矣邦國謂之比要其所受者略矣此逺近之辨也乃㑹萬民之卒伍而用之五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍以起軍旅以作田役以比追胥以令貢賦卒子匆反比毗志反先王處民有法用民有術比其家聮其居其入也則積而為比閭族黨州鄉其出也則合而為伍兩卒旅師軍所以因內政而寄軍令也方其平居無事之時則有教養之素而恩義足以相結及其倉卒有事之際則有法令之習而死生足以相託此小司徒所以㑹萬民之卒伍而用之也五家為比使之相保能相保而後用之則足以為伍矣五者天數也伍之者人也軍旅之法自伍而起其來尚矣居則五家為比而比必有長坐則五人而長者必異席因而陳之則左右前後足以相維作而用之則手足耳目足以相及由此出以為伍而相保之志未始或忘也不待徽幟以為識别不待旌旗以為指揮其一人謂之伍長者以節令之而已故大司馬教戰法伍長謂之公司馬執鐲以教坐作進退疾徐疏數之節也五比為閭使之相受能相受而用之則足以為兩矣從之以為經衡之以為緯無非三者也唯以兩為卒而衡從之數皆耦也已約而治之則合乎什伍而不違推而廣之則適乎參兩而不亂此出以為兩而相受之志未始或忘也四閭為族使之相葬能相葬而後用之則足以為卒矣其容體不足以相及則有徽幟以相眀其言語不足以相通則有服飾以相辨此卒所以從衣也五族為黨使之相救能相救而後用之則足以為旅矣其人之相去視之所不見而非名物不可以指揮其地之相逺聽之所不聞而非旌旗不可以名號此旅之所以從偃也五黨為州使之相賙能相賙而後用之則足以為師矣師以用衆而有治焉從􅎧則其衆足以為物主矣從匝則其衆足以為國敵矣師大衆也六軍亦或謂之師則軍亦大衆故也五州為鄉使之相賓能相賓然後用之則足以為軍矣五師為軍則車於是乎足用而其衆足以包敵矣軍以㑹衆而有車焉則無至於殆此軍所以能安也其兵車一乘則三兩之士居之而足矣其兵車四乘則三卒之士居之而足矣積而至於百乘則三師之所合也積而至於五百乘則三軍之所合也又積而至於千乘則六軍聚焉分之以鄉遂㑹之以都鄙統之以方千里之地則萬乘可知矣起而用之以軍旅為大以田役次之以追胥為小乃若貢賦又卒伍之餘事也凡卒伍之法軍旅去之不足以用衆田役去之不足以簡衆追胥去之不足以任衆貢賦去之不足以令衆先王以是五人為伍而下士長之五伍為兩而中士長之四兩為卒而上士長之五卒為旅而下大夫長之五旅為師而中大夫長之五師為軍而卿長之所謂卿大夫士者其智足以君民矣其仁足以子民矣其愷悌足以為民父母矣先王猶以為未也而六鄉之教又以三公統之則公也者佐王而為德者也卿也者佐王之為業者也六鄉之教以公統之則佐王佐民者也六軍之政以卿統之則佐王佐民者也古者於民入有所佑出有所佐居無離心用無離德其所以無敵於天下者如斯而已然制軍之數自五人之伍積至於五師之軍皆以五數言之而獨於卒則以四兩為之者蓋五者天之中數也二四為六一三五為九數至於五則參天兩地之數備矣五人為伍五伍為兩五旅為師五師為軍取諸參天之奇數而從橫皆三四兩為卒取兩地之耦數而從橫皆兩兵無常形以變為主取諸陽數者陽主變為是故也後世管仲相齊作內政寄軍令分民以軌里連鄉聯民以伍戎卒旅而其法之行也卒伍整於里軍旅整於郊晝戰則目相識夜戰則聲相聞居則同樂行則周知髣佛於成周之制猶足强國而霸齊先王用之槩可見矣乃均土地以稽其人民而周知其數上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人凡起徒役毋過家一人以其餘為羡唯田與追胥竭作土地將以授民田萊不等則不可以不均人民將使任事生齒不齊則不可以不稽逺近適於均之謂均考而計之之謂稽土地既均人民既稽則田萊之髙下肥磽生齒之衆寡老幼其數皆得以周知也孟子曰井地不均穀祿不平此均土地之意也司民曰自生齒以上皆書於版異其男女嵗登下其死生此稽人民之意也有以均土地然後得以定上地中地下地之等而以其地授民焉有以稽人民然後得以定七人六人五人之家而以其人任事焉上地之入可食九人而凖以七人授之則民有餘財家雖七人計其男女老幼之相半而通以三人為可任則民有餘力此中地下地之家所以望望於生齒之衆也可任者或家三人或二家五人或家二人而起徒役無過家一人蓋用徒役不必一時皆遍計所役久近取勞佚均而已不於一家起役二人則所以寬民也以其餘為羡則所用者正卒而已然正卒又有可代者之備此民所以有餘力而不困於役也唯田與追胥竭作者獵取禽獸與衆同欲逐伺盜賊與衆同惡所役近且不及故也夫用民如此則皆出於民情之所願非强之使從咈之使勞民之從之也輕矣又安有東國困於役之刺哉彼東人之子勞於職事而不來西人之子粲其衣服而自安陟岵起瞻望之思采緑有怨曠之嘆其君子有自貽伊阻之嗟其小人吐死生契濶之說周官任人之法掃蕩殆盡可勝惜哉凡用衆庶則掌其政教與其戒禁聽其辭訟施其賞罰誅其犯命者凡國之大事致民大故致餘子凡軍旅田役之事謂之徒非軍旅田旅之事謂之衆故大司徒於大喪則曰帥六鄉之衆庶於大軍旅大田役則曰治其徒庶之政令今此用衆庶不謂之徒則其所用若大詢之屬非軍旅田役之事也凡用衆庶必有政以正之教以導之戒以敕其怠忽禁以止之使勿為皆小司徒所掌以治衆庶也衆之所在不能無爭有爭則不能無辭訟辭訟者以辭而訟於公也有辭訟則當聽其情為之辨其是非曲直故曰聽其辭訟有功過則不能無賞罰賞以勸功罰以懲過出於此而加於彼故曰施其賞罰命出於王下宜凛而行之犯命則其罪又非止於罰而已故誅之餘子所謂以其餘為羡者也夫起徒役無過家一人自所用正卒之外皆謂之餘子也大事自我作不可竭作以勞其民故所致無過家一人大故則不庭不虞之變出於所遭民不足以給之故致羡卒乃經土地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都以任地事而令貢賦凡稅斂之事成法一立有成而不可變者經也欲井牧其田野而不先經其土地則法度虧變田野何自而井牧哉孟子曰經界既正分田制祿可坐而定也與此同意井其田野則任以耕事牧其田野則任以畜事九夫為井則九夫之地所飲同井故也孟子曰方里而井井九百畝謂是矣然又有鄉田同井之說則民不特在田同井而飲而在鄉亦同井而飲矣在鄉同井則同飲於入而處之時在田同井則同飲於出而耕之時出入皆有井以同飲則民相聯屬而不散矣四井為邑則民以里居四井同邑故也古者田於野外里於國中是故在田則有廬舍在國則有保城桑中曰要我乎上宫七月曰上入執宫功所謂上宫即保城也夫步百為畝畝三為里則城蓋三畝之地也孟子又言五畝之宅者蓋兼廬舍言之也然謂之里又謂之邑者里以所居言邑以所聚言故里之字從田從土以民出耕則同田入居則同㕓故也邑之字從已從口量地以制之周營以聚其民故也四邑為丘則民以族葬四邑同丘故也土之髙者謂之丘故一成為敦丘再成為陶丘再成鋭上為融丘三成為崑崙丘民之生也以四閭同族而居所以聯其生也及其死也又以四邑同丘而葬所以聮其死也夫生死皆有以聮之則民之相親相睦恩義愈厚而天下安得不為一家乎大司徒有曰族墳墓墓大夫又令國民族葬皆謂此也四丘為甸則甸周方八里田包於洫名之曰甸為是故也九夫為井方一里四井為邑方二里四邑為丘方四里四丘為甸方八里旁加一里則方十里為一成四甸則方二十里未成為都故為縣取名於大夫所治縣也四縣則方四十里未成為國故為都取名於公卿王子弟所治都也孔子曰安見方五六十而非邦也者則四縣之地是都而已非邦也四都旁加十里為同同方百里井田之法偹於一同今此則止於四縣為都而不言同者蓋四都為同亦自此以積之而已土宜之法以任土事今此以任地事蓋事則止於城郭溝池道渠之役而已以任地事則凡有事於地者皆任焉非特土事也三農園圃虞衡之類皆是矣貢則九貢所貢賦則九賦所斂凡稅斂則其所令又非特貢賦所出而已蓋貢賦常征也稅斂財有事而後征非有常也乃分地域而辨其守施其職而平其政辨其守者辨地役之守也平其政者平地職之政也夫地各有所屬則必有役以分之役既有分必有人以守之大司徒辨其邦國都鄙之數制其畿疆而溝封之夫制其疆而封之以為守制其畿而溝之以為限此所以辨邦國都鄙之守也山虞掌山林之政令物為之厲而為之守禁澤虞掌國澤之政令為之厲禁使其地之人守其財物此所以辨山林川澤之守也先王制職以任民若三農園圃虞衡之屬皆因地以有職也三農則使之貢九穀園圃則使之貢草木虞衡則使之貢山澤之物此所以平地職之政也有以辨地役之守則經界正而無侵越之患也有以平地職之政則貢賦足而無輕重之偏凡小祭祀奉牛牲羞其肆小賓客令野修道委積大軍旅帥其衆庶小軍旅巡役治其政令大喪帥邦役治其政教肆託力反鄭司農音四帥音率大司徒於祀五帝享先王奉牛牲羞其肆故小司徒所奉者小祭杞而已大司徒於大賓客令野修道委積故小司徒所掌者小賓客而已大司徒大軍旅治其徒庶之政令小司徒帥之則致於大司徒而已小軍旅巡役者師行則役隨之小司徒巡役不巡師也小軍旅小司徒巡役則大軍旅大司徒巡役可知矣有役事則有政令小司徒治之而已凡建邦國立其社稷正其畿疆之封凡民訟以地比正之地訟以圖正之社土神也稷穀神也邦國以社稷為主以人賴土以生資穀以養故凡建邦國則必正社稷地官之事故小司徒主之大司徒設其社稷之壝則小司徒立社稷凡以佐大司徒也正其畿疆之封者大司徒既制其畿疆小司徒又正之也制以經其始正以成具終也凡民訟是非不可以無證故以地比正之以地之鄰比知其是非故也凡地訟其疆界不可以無質故以土地之圖正之以圖則疆界所至存焉故也以鄰比而正其民訟則不信者莫助不正者莫容而民之是非得矣以土地之圖而正其地訟則先王作事所以謀始固可使民無訟也彼貪僞者事或至於訟則案圖以聽之具曲直辨矣小宰八成有曰聽閭里以版圖殆謂此也與嵗終則考其屬官之治成而誅賞令羣吏正要㑹而致事正嵗則帥其屬而觀教法之象徇於木鐸曰不用法者國有常刑令羣吏憲禁令修法糾職以待邦治治成治士之計也屬官則教官之屬也考其屬官之成計則功罪可得而知矣功則賞之罪則誅之不言詔王則以太宰嵗終廢置尚以詔王則小司徒於誅賞可知小司徒令羣吏正要㑹而大司徒令教官正治正治則非特要㑹也大司徒既令教官致事小司徒又令羣吏致事則所謂羣吏者羣有司而已凡言吏皆指賤者自士以下皆是也不特府史胥徒之屬正嵗帥其屬則於教官之屬也不言教象之法而曰教法之象者觀則以象為主用則以法為主以象為主則曰象之法以法為主則曰法之象或言法象或言象法亦相備而已令羣吏憲禁令羣吏亦指羣有司也禁令將使民避行之宜表揭之使知憲法也修法則使各修其所守之法防虧廢也糾職則使各糾其所治之大防緩散也修法糾職凡以待邦治有以應之而已故曰以待邦治及大比六鄉四郊之吏平教治正政事考夫屋及其衆寡六畜兵器以待政令比毗志反言六鄉而兼四郊則四郊乃六鄉之閒田縣師所治之地也六鄉四郊之吏或掌教或掌治小司徒則平其教治而已其大有政其小有事小司徒則正其政事而已平者使所掌教治各當其分也正者使所掌政事各正於一也考夫者考其受田之夫考屋者考其居里之屋也蓋以考夫則能知其人數之虛實考屋則欲其乘之以及時蓋亟其乘屋用所以致王業則考其屋者亦政之先務也及其衆寡六畜兵器則欲考知其登耗有無故也以待政令者考夫屋則令其及時乘之以正治其怠惰也考其衆寡六畜兵器則以待征役施舍誅賞之政令也鄉師之職各掌其所治鄉之教而聽其治以國比之法以時稽其夫家衆寡辨其老幼貴賤廢疾馬牛之物辨其可任者與其施舍者掌其戒令糾禁聽其獄訟鄉師教官之考也所以教其屬故謂之師鄉師下大夫四人而分掌六鄉則各主其所治鄉而已故曰各掌其所治鄉之教然非特主教凡鄉之有治皆聽之也鄉師謂之國比之法則以别於邦國之比法旅師謂之邦比之法則以别於鄉邑之自比也小司徒所登六畜辨其物而鄉師止辨馬牛之物者以師田役為事則所須馬牛而已辨其可任者與其施舍者或先可任或先施舍明任與施舍無所先後掌其戒令糾禁則鄉師以教為主故以戒令為先而糾禁為後獄訟則當以情斷之故曰聽其獄訟大役則帥民徒而至治其政令既役則受州里之役要以考司空之辟以逆其役事夫役所以任衆力役之大者若城郭溝渠之役是也帥民徒而至治其政令者以帥而至故稱民以治其政令故稱徒州里者州所里也五黨為州民所居曰里而所役之民於此州里也役要遣役數之要書欲知役數之多寡故也以考司空之辟辟謂功作章程司空主役事故以所受之役要而鉤考司空之章程所以治正其役事也故曰以逆其役事凡邦事令作秩叙大祭祀羞牛牲共茅蒩莫非事也凡有所興治皆謂之事言邦事則事出於邦非鄉里之自興治也作秩則制其常賜之多寡作敘則羞其事治之先後作秩敘者鄉吏也鄉師則令之而已必有所養然後可責以功故先秩而後叙與宫伯里宰行其秩敘同意或曰作或曰行者為是而起之謂之作舉而措之謂之行作言其始行言其終鄉師指凡邦事言之故要其始而謂之作其秩敘宫伯指士庶子言之里宰指趨其耕耨言之故要其終而謂之行其秩敘大司徒大祭祀奉牛牲羞其肆鄉師奉牛牲所以贊大司徒也言羞而不言奉則贊其羞不贊其奉也以奉牛牲則其事略不用贊可也共茅蒩則共之以藉祭也甸師共茅而鄉師治之以為蒩茅亦用以縮酒而鄉師以為蒩用於藉祭者蓋縮酒所以達其氣藉酒所以用其形鄉師地官之屬用取其形而已故不言縮酒之事大軍旅㑹同正治其徒役與其輂輦戮其犯命者輂音菊駕馬曰輂挽行曰輦皆所以載任器且與車為營衛大軍旅㑹同固有稍人作其同徒輂輦帥而以至鄉師則正治之而已正則使之止於一治則理之使不能亂矣戮其犯命者誅而戮之謂之戮大軍旅㑹同衆之所集有犯命者宜使衆皆見而有所懲焉故非特誅之而又戮之以令衆小司徒用衆庶遂人起野役言誅而鄉師四時之田與此言戮者用衆庶起野役則非既集於師田㑹同之地無事戮之誅之而已大喪用役則帥其民而至遂治之及葬執纛以與匠師御匶而治役及窆執斧以蒞匠師大喪用役謂若喪時挽六引之等也鄉師則主治其事而已爾雅曰纛翳也蓋羽葆幢用以指麾挽匶之役正其行列故鄉師執纛以為儀而已窆下棺也執斧蒞匠師以防匶之傾虧使戒飭焉匠師主衆匠者執斧所以為威也凡四時之田前期出田法於州里簡其鼓鐸旗物兵器修其卒伍及期以司徒之大旗致衆庶而陳之以旗物辨鄉邑而治其政令刑禁巡其前後之屯而戮其犯命者斷其爭禽之訟鐸待洛反四時之田則春搜夏苗秋獮冬狩是也出田法於州里則每州里先出田法以示民也簡其鼓鐸旗物兵器修其卒伍則為將用之故也鼓鐸所以聲衆旗物所以麾衆兵器所以勝敵簡則閲而選之也五人為伍百人為卒軍旅之法立於伍成於卒修則習而治之也有以簡之則其器械有所完有以修之則其行列有所正四時之田雖以獵取禽獸而實以教戰則簡而修之皆軍法之所寓也及期以司徒之大旗致衆庶而陳之者司徒之大旗則熊虎之旗也司常九旗於旐亦謂之旗言大則以别之不言徒庶而謂之衆庶蓋鄉師主致民而已及大司徒治其政令然後謂之徒庶也以其物辨鄉邑及郊邑各建其物所以辨也田獵衆之所聚必有正焉故有政必有命焉故有令刑以誅其罪禁以止其非政令刑禁皆鄉師之所治也巡其前後之屯者車徒所聚謂之屯車徒異部故前後異屯鄉師巡之亦所以正其部伍使不亂也戮其犯命者非特誅之而又辱之夫田之得禽大獸公之小禽私之各取左耳以效功焉有爭禽之訟則鄉師為之辨其曲直凡四時之徵令有常者以木鐸徇於市朝以嵗時巡國及野而賙萬民之囏厄以王命施惠四時之徵令有常者若四時之田獵春秋之出內火正月命修封疆二月令雷將發聲之類是也市朝者衆所聚之地因衆所聚之地故巡行而令以木鐸使皆聞而知之也告王凡播告之修不匿厥指豈塗民耳目而愚不識者哉難喜為囏乙而不申為厄嵗時有焉宜有以振而恤之也故鄉師巡國及野而賙之以王命施惠者易曰坤為吝嗇又曰屯其膏小貞吉大貞凶則施惠當自王出而下不得擅其私恩也彼宋罕氏之施惠於民也此亂世之私惠也然而傳或豫之者是亦彼善於此之意嵗終則考六鄉之治以詔廢置六鄉之吏自比長而上至於州長之屬無非掌六鄉之治者雖其職有尊卑之殊所涖有衆寡之異其間不能無勤怠功過之辨茍勤怠不分功過不明將何以為勸懲哉故嵗終則有以考而知之勤而有功者則在所置怠而有過者則在所廢廢置各當其實而懲勸得矣然廢置者上之柄非鄉師所得預焉以其言告上而已故曰以詔廢置然考六鄉之治以詔廢置固鄉官之事又置司諌以考鄉里之治以詔廢置者蓋六鄉之治衆矣先王懼鄉師之職考之或有未盡故使司諌巡問而觀察之有以知其吏之教治之實此所以亦委以考其治而詔廢置也然鄉師言嵗終而司諫不言則司諌所以考而詔之者不必嵗終也司諌於常時既有以考其治而詔上廢置鄉師於嵗終又復考而詔上則吏之情僞又孰能自匿哉正嵗稽其鄉器比共吉凶二服閭共祭器族共喪器黨共射器州共賓器鄉共吉凶禮樂之器禮不徒行以器為之具器不徒立以財為之用財不足器為之闕器不足則禮隨之廢於此有術焉財不患寡器不患乏民無廢事事無廢禮者合衆財以共其器而已且六鄉之器其用衆矣其財非出於一而易共則民得以相資而備禮是以自比至鄉或以其地之逺近與其用之疏數相等或以其人之衆寡與其費之厚薄相均此則共者所以不患其力之不給而為者亦不患其器之不足先王之備鄉器以前民用豈為小補哉然器之積久不能無敝不以嵗時為之考而計之亦或乏用矣以正嵗者時之所首而行禮者自是始焉故正嵗使鄉師又從而稽之則器之或良或窳或備或乏皆得以周知矣比共吉凶二服者祭服弔服也使集一比之財為之而共服也閭共祭器者使集一閭之財為之而共用也喪器者素俎楬豆之屬使集一族之財為之也射器者弓矢侯鵠之屬使集一黨之財為之也賔器者尊俎笙瑟之屬使集一州之財為之也鄉共吉凶禮樂之器者吉器鄭氏解謂若閭共祭器也然吉器非必祭器凡飲食冠昏之屬其器皆是也凶器鄭氏解謂若族共喪器然凶器非必喪器凡干戈戚揚之屬其器皆是也禮樂之器鄭氏解謂若州黨賓射之器然禮樂器非必賓射之器凡有其具於禮樂者皆是也吉凶禮樂之器衆矣故集一鄉之財為之然後可以共也吉凶喪祭賔射禮樂之事人治於是乎在其財常患不足以具服器使集為之有事共焉孰有廢禮者哉然先王之民居則同里射則同器有無足以相資多寡足以相濟以仁相養以義相治道德一而風俗同此其效歟若國大比則考教察辭稽器展事以詔誅賞考教者考其善否與其勤惰蓋六鄉之吏各主教其所屬之民或書其孝弟睦姻有學者或書其德行道藝或考其德行道藝而勸之若此屬無非教矣考其或善或否或勤或怠則勤而善者在所賞怠而否者在所誅矣察辭者察其當否與其實僞蓋民不知道也常出於教之不明教之不明也常起於辭之不正辭苟不正則言僞而辨者有之順非而澤者有之飾智以驚愚訛言以惑衆竒辨怪說紛紛籍籍將至於不可禦矣唯能察其或當或否或實或僞則當而實者在所賞否而僞者在所誅矣稽器者稽其足否與其良窳夫吉凶賔軍田萊域洫之屬凡修物致用者無非器也考其或足或否或良或窳則良而數足者在所賞窳而不足者在所誅矣展事者展其能否與其廢舉夫所作謂之事則凡施於名物者無非事也展其或能或否或廢或舉則能而舉者在所賞否而廢者在所誅矣以詔誅賞則亦以詔上而已以誅賞大柄非鄉師所得與故也鄉師教官之考其上則主於考教察辭其下則主於稽器展事則本在乎上以為教末在乎下以及事鄉之治於此為備矣然辭有待教而後正事有待器而後成故先考教後察辭先稽器後展事鄉大夫之職各掌其鄉之政教禁令鄉大夫每鄉卿一人則六卿分掌六鄉之政教禁令矣其爵乃卿而其職謂之鄉大夫則以智帥人為主也觀其職之所掌者德行在所考道藝在所察可任者在所辨賢能者在所興詎非以智為主哉惟其以智為主則欲其智效一官名官以鄉大夫使之服其名則思有以稱其實矣鄉大夫言各掌其鄉之政教禁令州長言掌其教治政令之法黨正言掌其黨之政令教治族師言掌其族之戒令政事所掌不同者蓋謂之大夫則以其智足以帥人帥人則宜有以政之故鄉大夫所掌以政為先而教次之禁令則輔之者也謂之長則以其仁足以長人長人則宜有以善之故州長所掌以教為先而治次之政令則輔之者也謂之政則人所取正必有政焉故黨正所掌以政為先而令亦輔政者也乃若教治則在正非所先矣謂之師則人所依附必有戒焉故族師所掌以戒為先而令亦輔戒者也乃若政事則在師非所先矣然則鄉官謂之正則其所掌先政謂之師謂之長則其所掌先戒與教視其所掌而先後之意可知矣正月之吉受教法於司徒退而頒之於其鄉吏使各以教其所治以考其德行察其道藝嵗終調制所當改易正月之吉乃始和布教之時也故鄉大夫受教法於司徒而頒之以司徒為教官之長故也退而頒之於其鄉吏使各以教其所治則六鄉之吏又受教法於鄉大夫鄉大夫頒所受司徒之教法使之各教其所治民也然則六鄉之吏所受之教法出於鄉大夫鄉大夫所受之教法出於司徒司徒所受之教法又出於天子上下之相承所由者一道所識者一德風俗烏能而不同哉考其德行者考知其實僞察其道藝者察見其精粗考則按書而考之察則審視之而已則察為詳於考也鄉師言考教察辭辭出於教既考教矣又察其辭則察詳於考可知也蓋德行族師固書之矣欲知其實僞宜考鄉官所書則可知矣道藝欲見其精粗又當審視其事故審之察則非特考之而已然則三年大比而興之曰考其德行道藝於道藝并言考者蓋鄉大夫於每嵗之正月既察其道藝矣及三年大比而興之又欲見其實而已故并德行而考之不必詳察焉以嵗時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之其舍者國中貴者賢者能者服公事者老者疾者皆舍以嵗時入其書族師言以時屬民而校登其族之夫家衆寡鄉大夫登之而不言校者其登也同族師之所校而已蓋族師之職卑而所統者寡故使之校其數然後登上其籍鄉大夫之職尊而所統者衆故登其籍而不校其數小司徒頒此法於六鄉之大夫使各登其鄉之衆寡則使登上其籍於大司徒也辨其可任者辨其力强而可任以事者也國中自七尺以及六十野自六尺以及六十有五皆征之者以其材舍之者以其齒七尺六尺以材言也六十六十有五以齒言也其材七尺六尺征之則以其材之强壯然後可征也其齒六十六十有五以上則以其氣體之衰在所不征也先王寬民財力之意國中晚征而早舍為其近而役多故也野則早征而晚舍以其逺而役少故也其舍者國中貴者賢者能者謂爵祿列於朝廷德業升於國學然後舍征服公事者老疾者皆舍則雖非國中亦舍焉故曰皆舍然則貴者舍之所以貴貴也賢者舍之所以尊賢也能者舍之所以優能也服公事者舍之所以優吏也老者舍之所以老老也疾者舍之所以寬疾也以嵗時入其書則入其書於大司徒欲知其征舍之數也三年則大比考其德行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賓之厥明鄉老及鄉大夫羣吏獻賢能之書於王王再拜受之登於天府內史二之天道之運三年而一成先王於人材其教飬也備其書考也詳積三年之久人材亦足有成矣故因大比而興賢能賢有德行者將承之以在位能有道藝者將庸之以在職興之宜皆得其實焉故又先考其德行道藝考之而得其實則所興者皆真賢實能而在位在職者罔有幸得之人矣且敬敏任恤其事易見其行易知故閭胥書其敬敏任恤者孝悌睦姻有學則其行難見其義難知故族師書其孝悌睦姻有學者謂之德行則非茍孝弟睦姻而已謂之道藝則非茍有學而已故黨正書其德行道藝書之易矣考之難矣故州長考其德行道藝而勸之鄉大夫考其德行道藝而興之也鄉大夫興賢能而必以鄉老帥其事者以尊賢能而興之道之所存也鄉老於司徒之官非屬而無職豈非以事道者尊職事者卑故耶蓋坐而論道者三公之事也作而行之者六卿之事也周官無三公之職以坐而論道異乎作而行之者矣此所以惟鄉大夫興賢能而三公與之矣蓋務引其君以當道者大人所以事君也樂得天下英才而教育之者大人所以治民也雖帝王之盛而立三公不必備謂非大人不足以為之故老子曰容乃公公乃王其作人也有教而無類可謂能容矣其取人也有類而無方可謂能公矣能容能公而民之有士君子之行者鮮不由之矣教其德行道藝則大司徒可也考其德行道藝則鄉大夫可也若以鄉飲酒之禮禮而賓之而獻其賢能之書於王非公其孰能與之必以禮禮賓之所以致敬而尊之也王之於臣苟其道隆德峻者猶且賔之而弗敢臣况乎興賢之初可不致敬而尊之乎又必帥其吏與其衆寡者吏謂鄉官也衆寡謂鄉民也鄉官與民皆在以明興賢能非出於上之私意而本乎下之公願所謂使民興賢能也厥明鄉飲之明日也既興之於鄉遂進之於王獻其書所以進之王必再拜而受其書者尊其所獻也登於天府者寶其所受也內史二之者為詔王制爵祿也先王之於人材於大有則以柔德而有之於大畜則以剛德而畜之以柔德有之非賢能不足以為大有以剛德畜之非爵祿不足以為大畜也退而以鄉射之禮五物詢衆庶一曰和二曰容三曰主皮四曰和容五曰興舞此謂使民興賢出使長之使民興能入使治之先王之於人材之未成則在所教材之既成則在所興三年大比既考其德行道藝而賓興之然猶慮或有未盡取其大矣而或遺其小取其詳矣而或遺其略故獻賢能之書既退而又以五物詢衆庶也所謂鄉射之禮則州長以春秋二時習射於州序今乃以此鄉射之禮詢之也詢之者遍謀之謂也與小司冦致萬民而詢焉同意一曰和者易曰利者義之和謂和於義而不乖二曰容者語曰動容貌思逺暴慢矣行之見於藐而可觀莫非德也德不及仁聖則其為德也和而已莫非行也行不足忠信則其為行也容而已君子以成德為行則內有以充實而不止於和和於德為下是義德而已而不足於道外有以輝光而不止於容容於行為外是貌行而已而不足於德三曰主皮者孔子曰射不主皮蓋射雖以不失正鵠為賢然以觀德行非特取其中侯而已則主皮者射之末也四曰和容五曰興舞者古之射其容欲比於禮其節欲比於樂則和其容儀者不足於禮之節特禮之末而已興舞以比於樂節者不足於樂之和特樂之末而已於德也不責其道德而取其義德於行也不責其德行而取其貌行於藝也不責其本數而取其末度於禮樂也不責其禮樂之本而取其禮樂之末則詢之者亦已恕矣民之行能其有逸哉且所詢如此則有卓然者以告可知也然先王使民賓興者必其賢能今所詢者曰和曰容則可與明德行之末而已曰和容曰興舞則可與明禮樂之末而已曰主皮而中的亦藝之未而已不責其本而取其末何足以為賢能乎蓋先王之取人不求其備而其使人也器之猶芃芃之棫朴而薪槱必用猶泛泛之楊舟而浮沈備載長短小大兼收而並蓄曷嘗責人之全乎易曰包荒用憑河不遐遺殆謂是歟蓋曰和曰容者雖德行之末而茍不失焉亦可謂之賢主皮和容興舞雖道藝之末而茍不失焉亦可謂之能如取其大而廢其小取其詳而廢其略是亦棄人而絶之豈其為恕者乎賢能雖以射而詢之其實因民而已因民以興賢能而上之人無容心於其間故曰使民興賢出使長之使民興能入使治之賢者可使服休故使民出之民上而為之長能者可使服采故使民入之民間而為之治夫舉措皆當於民心斯民所以恱而服矣先明道德以教民因民以興賢能因賢能以治民此好惡所以一而民無不安其治也夫知人則哲堯舜猶難之成周之民可與賓興之大者蓋斯民也三代所以直道而行以誰毁誰譽如有所譽其有所試也其既知之則以鄉飲之禮而賓之其未知之則以鄉射之禮而詢之其待之為己詳其求之為已盡此所以野無遺賢而隰桑之刺不興於雅朝無幸位而伐擅之刺不興於風然則捨成周鄉舉之法而欲盡得人之實者未見其能致也嵗終則令六鄉之吏皆㑹政致事正嵗令羣吏考法於司徒以退各憲之於其所治令六鄉之吏皆㑹政致事則小司徒所謂正要㑹而致事也然小司徒所令者詳故兼正其月要鄉大夫所令者略故但正其嵗㑹而已令羣吏致法者正月之吉鄉大夫受教法於司徒退而頒之於鄉吏使各以教其所治正嵗則又命羣吏考法於司徒以退各憲之於其所治如是則教無異法法無異義所由者一道所循者一德風俗翕然而大同矣國大詢於衆庶則各帥其鄉之衆寡而致於朝國有大故則令民各守其閭以待政令以旌節輔令則達之國大詢謂詢國危詢國遷詢立君也與洪範謀及庶人同意夫先王教法出於一而好惡無異情此所以有詢及於衆庶也若夫教法不一家異尚人殊俗好惡不同而是非不足以取信雖欲詢之適所以自惑也此謀夫孔多所以見刺於詩耳各帥其鄉之衆寡則鄉官咸在焉若州長則所帥衆矣若閭胥則所帥寡矣國有大故令民各守閭以待政令者若大司徒致萬民於王門令無節者不行於天下所謂政令也待政令則聽而待之於大司徒將以防非常之變矣民既以國令行而必輔之以旌節恐奸人乘間投罅以肆其慝也大司徒既令無節者不行於天下而鄉大夫又令之所以叮嚀告戒而其慮患也悉矣此所以措國於不傾之地而天下有磐石之固用此道歟周禮詳解卷十一
