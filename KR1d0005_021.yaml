body:
  text: 周禮詳解卷二十一宋王昭禹撰大胥掌學士之版以待致諸子版音板其體在下作而行之以有相乎上者胥也大胥于國子非教飬之正者掌學事以相乎上而已故謂之胥以對小胥焉故謂于之大掌學士之版以待致諸子者夫公卿大夫士之其父兄有爵列于國也故謂之國子以其衆言之則謂之諸子以其教于學也則謂之學士其實一也版謂其名數之𨽻于版者也學士之版大胥掌之其已至者以此待之其不至者則以此致之由此觀之則先王之時國子之可以入學者無不在所教也詩曰凡周之士不顯亦世則待而致之者與有力也春入學舍采合舞秋頒學合聲舍音釋采音菜春入學舍采則以始入學禮先儒釋采焉禮有釋奠有釋菜殺牲以祭薦饌酌奠者釋奠之禮也蘋蘩芹苑之屬用之以薦誠者釋菜之禮也釋奠所以致其禮之盛釋菜所以昭其誠之至始入學所以昭其盛而已非致其味也故舍采無惡其薄也左傳所謂蘋蘩薀藻之菜可薦鬼神正謂是也合舞則春頌之時故也蓋春于五行為木木主貌舞則發揚蹈厲以動其形容故合舞必以春秋頒學則以春始入學未知其分藝之所宜至秋而後可知也于是分授以所學記曰樂正崇四術立四教順先王詩書禮樂以造士則士之所學各有所冝矣合聲則秋言之時故也蓋秋于五行為金金主言樂之聲以言為本故秋必合聲書曰詩言志歌永言聲依永律和聲本于言可知矣以六樂之會正舞位以序出入舞者比樂官展樂器凡祭祀之用樂者以鼓徴學士序宫中之事會六代之樂而舞焉謂之六樂之會六樂之會其列衆其變繁易亂而難治故必正其舞位使左右有序先後有倫也以序出入舞者則其舞或出入其行綴各有序也樂記曰武始而北出再成而滅商三成而南四成而南國是強五成而分周公左召公右六成復綴則舞之出入有如此者夫六樂之舞有文舞焉有武舞焉征誅揖遜之序盡于此矣其數則有司皆能陳之其義則有孔子三月而不知肉味者非窮神知化孰能究此哉則先王成人終始于此固其宜也此樂官必比敘其所教之人也展樂器謂展視其所用之器也凡祭祀之用樂者以鼓徴學士則召之使興舞也言祭祀之用樂則有不用樂者可知矣序宫中之事謂序王宫之中國子之宿衛而學道藝者春秋之所學各有其序如此大胥之所掌是也宫正言比宫中之衆寡會其什伍而教之道藝則大胥之序宫中之事者如此小胥掌學士之徴令而比之觥其不敬者巡舞列而撻其怠慢者正樂縣之位王宫縣諸侯軒縣卿大夫判縣士特縣辨其聲凡縣鐘磬半為堵全為肆觥古橫反特本亦作犆堵丁古反大胥掌學士之版以待致諸子小胥掌學士之徴令而比之凡以贊大胥而已有事則徴之有為則令之徴則召之使來令則使之有為比者校序其多寡之數使之類聚而羣分觥其不敬者敬以直內致其隱敕焉慢期而不時至者則為不敬矣故觥之觥罰爵也觥之所以使中焉巡舞列而撻其怠慢者怠則不勤慢則不敬故撻之撻所以恥之使達焉肆師誅其慢怠者則祭尚敬故以懲慢為先小胥撻其怠慢者則學尚勤故以懲怠為急祭言誅之政也學言撻之教也宫縣謂四靣之縣以象宫室軒去其一則三靣判又去其一則二靣特縣則一靣而已左傳所謂曲縣即軒縣也蓋軒縣去南面以避王不若宫縣之周圍故又謂之曲縣凡樂皆所以象其功德王之德無不周覆也故樂以宫縣諸侯雖有君道而不全也故軒縣而已軒又以明其已能衛上而固下也卿大夫之德半于君也故判縣士以特立為義故特縣此隆殺之辨也凡縣鐘磬半為堵全為肆者堵如宫墻之一者言合是以為宫也肆如牲體之全陳言全而後可肆也乃若其數則鄭氏所謂鐘磬二八在一虡謂之堵鐘一堵磬一堵謂之肆其數之多寡蓋如此大師掌六律六同以合隂陽之聲陽聲黃鍾大蔟姑洗㽔賔夷則無射隂聲大吕應鍾南吕函鍾小吕夾鍾皆文之以五聲宫商角徵羽皆播之以八音金石土革絲木匏竹古之神瞽考中聲而量之以制紀之以三平之以六而成于十二此律吕所由作也以其述氣則謂之律以其如人之吕則謂之吕以其同于陽則謂之同六律陽聲也六同隂聲也獨陽不生獨隂不成一隂一陽然後為道故隂陽之聲不可以不合易數天數五聲地數五五位相得而各有合然則以律同合隂陽之其亦如五行之相合與自形而下則陽尊而隂卑故言律則先同自形而上則隂先而陽後故言陽則先隂陽聲左旋故自黃鍾順而序之至于無射所以進之也隂聲右轉故自大吕逆而序之至于夾鍾所以退之也律起于黃鍾終于仲吕其長短有度其多寡有數其輕重有權其廣狹有量而萬法之原理會于是幽以逹天地四時之理深有以通神示祖考之情施于教治足以齊風俗用之戰伐足以審勝負而記吉凶律之為用豈不大哉蓋律用十二所以象天位八八為位所以象八風五下六上所以象隂陽之中數上益下損所以象隂陽之消長其上左所以象日月之必東損益必三所以體道之所成其相生所以象父子其相繼所以象兄弟其相合所以象夫婦聖人所以命其名者皆有至意存焉要在考之而已蓋肅肅出乎天赫赫發乎地子之氣方潛于黃鍾而復焉黃言隂色之美鍾言陽氣之聚故命之以黃鍾入乎坎者必出乎震否于否者必大于泰寅之氣方接乎震泰而泰出滯焉故命之以大蔟物至辰則潔齊其潔齊也非實體也且然而已故謂之姑洗陽至午則尚衰其尚衰也隂已為主則賔之而已故謂之㽔賔隂至申而夷物刻制而有成則故謂之夷則隂至戍而盛陽至戍而不厭故謂之無射然陽盡變以造始故每律異名隂體常以效法故止于三鍾吕而已鍾者物所聚也吕者物之正也卯之氣夾于陽中而隂尚聚矣故謂之夾鍾未之氣闕可以吕陽陽謂之應鍾氣至于已則隂將萌矣萌則大而隂小故謂之小吕以其宣陽之中氣以發散萬物而使之相見故又謂之中吕酉之氣所以收斂南方發散之功而成之故謂之南吕丑之氣所以冠六同而首之故謂之大吕六律順而序之以生之序進之也六同逆而序之以成之序退之也以生之序進之則子之氣猶未離乎隂也故謂之黃鍾以成之序退之則丑之功固已大矣故謂之大吕夾鍾亦謂之圜鍾以春主規言之也函鍾亦謂之林鍾以夏物衆多而言之也南吕亦謂之南事則以隂成陽之事而言之也然六律乂謂之六始以其始于隂之隂故也六吕又謂之六同六間蓋吕言其體也間言其位也同言其情也總而言之皆所以述隂陽之氣而已故皆謂之十二律也太玄曰聲生于日律生于辰聲非十二律不能發律非五聲不能節五聲非變不能盡故一律之中莫不具五聲五聲之中有所謂五變五聲之本生于黃鍾黃鍾為宫其宫九寸長則其數八十一三分宫而去一下生徴其數五十四三分徴益一而十上生商其數七十二三分商去一而下生羽其數四八三分羽益一而上生角其數六十四多者濁少者大清者細大不踰宫細不踰羽徴之聲又清于角角之聲又清于商其配則土火木金水也其象則君臣民事物也蓋土位于中央有以宅物故為宫而為君金行于南北之間而有以通物故為商而為臣木林之用有以觸物而制之故為角而為民火性無常召之則至故為徴而為事水之翕張因時而已故為羽而為物有物然後能生民有民然後有事有事然後立君有君然後有臣有臣然後生物物勝事事勝臣臣勝民民勝君此五行相生相勝自然之理也昔管仲論聽音之法而以負豕之駭者喻徴以馬之鳴野者喻羽以羊之離羣者喻商以雉之鳴木者喻角以牛之鳴窖喻宫若夷吾者善能知聲矣然散五聲而出之則各有所宜合五聲而總之則莫不互偹方其各有所宜雖一身之理不能一之故肝聲角心聲徴脾聲宫肺聲商腎聲羽素問所謂五臟相音可以意識者是也方其莫不互備雖一身之中而五聲皆存故黃鍾主宫而或為徴角商羽大蔟主商而或為宫徴羽角古人所謂五聲之變不可勝窮者是也五聲必相雜然後成文故曰文之以五聲宫商角徴羽律同所以考五聲五聲所以成八音故言五聲而次之以八音八音八風之莭也五聲屬乎五行八音屬乎八卦金鐘鎛也屬乎兊兊正秋也石磬也屬乎乾乾為天故也土塤也屬乎坤坤為地故也革鼓鼗也屬乎坎陽生于坎而將革隂故也絲琴瑟也屬乎離蠶與木同氣而資乎大火故也木柷敔也屬乎巽巽為木故也匏笙簧也屬乎艮艮為果蓏故也竹簫管也屬乎震震為蒼筤竹故也金石以動之絲竹以行之草木以節之匏以宣之瓦以贊之八音必宣布然後其聲發器故曰皆播之以八音金石土革絲竹匏木五聲八音雜比而後樂作焉然要其聲音之所自出皆本于十二律而十二律又無非黃鍾之所生也揚子曰黃鍾以生之中正以平之殆謂是也教六詩曰風曰賦曰比曰興曰雅曰頌以六德為之本以六律為之音興虛應反一國之事繫一人之本謂之風言天下之事形四方之風謂之雅美盛德之形容以其成功告于神明謂之頌風出于德性雅出于法度頌出于功業三者詩之體也有述其事而陳之謂之賦以其所類而况之謂之比以其所感發而比之謂之興三者詩之用也或曰六詩或曰六義即其章而言之則曰六詩即其理而言之則曰六義大師教之以樂章故曰六詩六德所謂中和祗庸孝友也中以本道之體其義達而為和其敬逹而為祗能和能祗則庸德成焉庸以本道之用充其愛以為孝充其順以為友者六德之所成終始也君子之學詩豈徒誦其空言哉要之本于德而已蓋先王以是經夫婦成孝敬厚人倫美教化移風俗一本于詩則誦詩三百不明其義雖多亦奚以為蓋六德本于性情所以主于中六律稽諸度數所以正于外以六德為之本故雖變猶止乎禮義以六律為之音則書所謂聲依永律和聲也言以六德為之本則知所謂音者末也言以六律為之音則知所謂本者性情也教六詩雖以六德為之本然非播之于音則聲無所發非和之以律則其音無所正先王教人終始于樂欲其兩得不倚一偏故也大祭祀帥瞽登歌令奏擊拊下管播樂器令奏鼓朄大饗亦如之大射帥瞽而歌射節大師執同律以聽軍聲而詔吉凶大喪帥瞽而廞作匶諡凡國之瞽矇正焉拊音撫朄音胤先王作樂所以象成堂上之樂象神人之治堂下之樂象萬物之治登歌升歌清廟擊拊書曰擊石拊石此堂上之樂也故曰登歌令奏擊拊下管播樂器則笙簫之屬朄小鼓也詩曰應朄縣鼓􅉧鼓之以引樂此堂下之樂也故曰下管播樂器奏鼓朄道以無所因而自然為之故升歌于堂上所以貴之也以有所待而使然為下故管播于堂下所以卑之也夔曰於豫擊石拊石百獸率舞堂上之樂而曰百獸率舞者此言舜功德之敏樂之形容有所不逮也方象神人之治而百獸已率舞矣大饗亦如之所以敬諸侯亦如祭祀之禮也大射則擇士而助祭王以騶虞為節諸侯以貍首為節大夫以采蘋為節士以采蘩為節大師則帥瞽而歌之也大師執同律以聽軍聲而詔吉凶則預使知之有所戒也蓋一體之盈虛通于天地應于物類故聽之以同律而必得其詳焉易曰師出以律否臧凶殆謂是與然則次律而合音商則戰勝軍士強角則軍擾多變失士心宫則軍和士卒同心徴則將急數怒軍士勞羽則兵弱少威明亦各緣五行之類而求之也師曠曰吾驟歌北風又歌南風南風不競多死聲楚必無功古之人所以望敵而知吉凶先事而知勝負者用此術也然王者之師以仁伐不仁以義伐不義以救無辜以誅有罪有所不出出無不勝而猶聽軍聲而詔吉凶者蓋兵凶器戰危事聖人不敢輕也死則陳儀物于庭序以興觀者欽則謂之廞以考列其德行而誄之以言則謂之諡于大喪之廞則帥瞽而作匶諡以瞽掌樂王德成于樂諡則成德之名凡國之瞽矇正焉以瞽矇皆屬于大師故也小師掌教鼓鼗柷敔塤簫管弦歌大祭祀登歌擊拊下管擊應鼓徹歌大饗亦如之大喪與廞凡小祭祀小樂事鼓􅉧掌六樂聲音之節與其和塤虡袁反與音預鼓大鼓也所以作樂鼗小鼓也所以導樂柷以合樂深尺有八寸方二尺有四寸尺有八寸二九之數也二尺四寸三八之數也樂由陽來三勝二九勝八此樂之所以作也故合樂則以敔敔以止樂其背則有二十七鉏鋙三九之數其櫟則長一尺隂十之數也樂以隂止陽三九而隂十勝之此樂之所以止也故止樂則以敔塤燒土為之內虛鋭上火也平底六孔水也隂陽之和聲也簫編竹為之其長尺有四寸二七之數也大者二十四管三八之數也小者十六管二八之數也其形則象鳯翼其聲則象鳯鳴􅐟長二尺有四寸三八木之數也其孔有六水數也管如􅐟而小併而吹之也弦琴瑟也琴瑟皆入乎器而覺乎道琴長三尺六寸有六分以象周天三百六十六度也其廣六寸以象六合其弦有七以象七星也瑟長八尺有一寸九九之數也其廣一尺有八寸二九之數也二十七絃三九之數也雖琴之類而絃多于琴故其字從八以言絲之分也其音不若琴聲之為大故其字從戈以言音之細也歌人聲也言之不足故嗟嘆之嗟嘆之不足故詠歌之此九者小師掌之以教瞽矇也鼗塤管簫堂下之樂也絃歌堂上之樂也柷敔上下各有之以樂不可無作止之節故也書曰戞擊鳴球搏拊琴瑟以詠祖考來格戞擊柷敔也此用之于堂上也又曰下管鼗鼓合止柷敔此用之于堂下也大師言大祭祀帥瞽登歌令奏擊拊則登歌者瞽矇也擊拊者小師也大師則令奏之而已下管擊應鼓應鼓應鼙也大射云應鼙在其東則應鼙為朄鼓之和朄鼓為應鼙之引􅉧必有應應必有朄互相備也大師大喪帥瞽而廞作匶諡小師相之而已徹歌則有司徹而歌雍也大師大祭祀令奏鼓􅉧故小師小祭祀鼓朄掌六樂聲音之節與其和則六樂之作也其先後曲直則有節而小大清濁相應而不相陵則和矣國語曰聲應相保曰和又曰大昭小鳴和之道也又曰細抑大陵非和也則小師掌六樂聲音之和音蓋亦如此瞽矇掌播鼗柷敔塤簫管弦歌諷誦詩世奠繫鼓琴瑟掌九德六詩之歌以役大師奠音定繫户計反先王作樂必用瞽者以其聽之審因其材而任焉雖疾不廢也矇非無目有蒙之者瞽下其目以聽為上矇左其目以聽為右惟一于聽故皆可使作樂焉國語曰瞽矇修聲此也掌播鼗柷敔塤簫管絃歌諷蓋小師教之而瞽矇播之也播者發揚而見于聲音也諷謂諷諌之詞瞽矇既掌歌又掌諷諌也世奠繫當從古書為世帝係誦詩世帝係者瞽矇掌誦詩及世帝係詩六詩也世帝係古書有謂之帝係者國語曰教之世為之昭明德而廢幽昏則世帝蓋古帝王之書名也誦詩則以知民風之厚薄誦世帝係則以知前世之興衰小史奠係世則定其係世而已非誦之也鼓琴瑟者誦詩與世帝係也則鼓琴瑟以合而和之也九德之歌六府三事也六詩之歌賦比興風雅頌也既歌九德六詩之歌書曰九功惟敘九敘惟歌則以九功之德皆可歌大師教六詩六律為之首則瞽矇特歌以人聲非以律也以役大師瞽矇之職取正于大師故也視瞭掌凡樂事播鼗擊頌磬笙磬掌大師之縣凡樂事相瞽大喪廞樂器大旅亦如之賔射皆奏其鐘鼓鼜愷獻亦如之相息亮反鼜音戚視之明謂之瞭瞽矇無所見焉故設三百人以扶工謂之視瞭而因使掌樂故曰掌凡樂事瞽矇掌播鼗而視瞭亦播鼗者鼗以導樂所用者衆故也然二者皆受教于小師故小師曰掌教鼗鼓磬在東方曰笙東生長之方故也磬在西方曰頌西成功之方故也掌大師之縣者為大師縣樂器也凡樂事相瞽者瞽無相倀倀然其何之哉視瞭之設正謂是也大喪廞樂器則陳樂器于庭序也大旅有大故而祭亦陳樂器而不作故亦如之賔射王與諸侯射奏鐘鼓以為之節也鼜及愷獻亦視瞭奏鐘鼓故亦如之典同掌六律六同之和以辨天地四方隂陽之聲以為樂器凡聲髙聲䃂正聲緩下聲肆陂聲散險聲斂達聲贏微聲韽回聲衍侈聲筰弇聲鬱薄聲甄厚聲石凡為樂器以十有二律為之數度以十有二聲為之齊量凡和樂亦如之䃂胡本反陂彼義反韽於瞻反又音暗筰側百反弇音掩甄音震齊才計反六律六同雜比而和之則小大清濁皆得其和矣取其中聲焉以為樂器則天地四方隂陽之聲不可以不辨也天地四方各有隂陽之聲是為十二聲能辨十二聲則雜比而和者皆知其所自焉則凡樂器其度之長短其數之多寡其齊之所制其量之所容者可以由此而揆度之矣凡聲生于形形異則聲異髙則鳬氏所謂鐘小而長也小而長則其形髙其聲上藏衮然如裏則其發也舒故曰髙聲䃂下則鳬氏所謂鐘大而短也大而短則其形下其聲發散疾而短聞故曰下聲肆正則上下直其形不髙不下而適于正則其聲緩而不速故曰正聲緩陂謂鐘形偏侈也則其聲散而不斂故曰陂聲散險謂鐘聲偏弇也則其聲斂而不散故曰險聲斂達謂鐘形微大也則其聲贏而有餘故曰達聲贏微謂鐘形微小也則其聲韽小而不成故曰微聲韽回謂鐘形微圜也則其聲淫衍而無鴻殺故曰回聲衍侈謂鐘形過大也則其聲迫筰而出疾故曰侈聲筰弇謂中央寬而口狹則其聲鬱而不發故曰弇聲鬱薄謂鐘形適薄也則其聲動搖而甄掉故曰薄聲甄厚謂鐘形過厚也則其聲如石而不振故曰厚聲石夫天陽也地隂也東南方陽也西北方隂也然隂陽之中復有隂陽焉故髙聲䃂天之陽也正聲緩天之隂也下聲肆地之隂也陂聲散地之陽也險聲斂東方之隂也達聲贏東方之陽也微聲韽西方之隂也回聲衍西方之陽也侈聲筰南方之陽也弇聲鬱南方之隂也薄聲甄北方之隂也厚聲石北方之陽也凡為樂器皆以此十有二聲為之齊量而取中聲焉故其聲之病者得以審而去之凡播于樂器者無非和聲矣數者一二三四之所起也度者分寸尺丈之所總也餘見新傳數度取之十有二律齊量取之十有二聲此樂器之形聲所以無過不及而皆得其中和焉非特為樂器如此凡和樂器亦以是焉故曰凡和樂亦如之然則大師掌六律六同以合隂陽之聲而已而典同掌六律六同之和以辨天地四方隂陽之聲者蓋樂之妙固藏于無形之夷而視之不可見也寂于無聲之希而聽之不可聞也古之人散夷之朴以為六律六同之器闡希之妙以為六隂六陽之聲其長短則有度其多寡則有數其輕重則有齊其廣狹則有量而樂之原畢會于此典同則掌其聲以作樂而欲其數度齊量之不亂也故詳有及于天地四方之位大師則用其聲以施于樂故合十有二聲欲其髙下清濁之克諧其合之也則兩之以隂陽而已此其言之詳略所以不同與磬師掌教擊磬擊編鐘教縵樂燕樂之鐘磬凡祭祀奏縵樂縵莫半反教擊磬擊編鐘皆教視瞭也言擊磬則凡磬皆擊之言擊編鐘則特縣之鐘而已蓋鐘有編有不編者編鍾與磬同故使磬師教擊之鐘之不編則鐘師所自擊也記曰不學操縵不能安弦然則縵者雜聲之和樂也比朝祭為慢故謂之縵樂祭祀奏縵樂則備樂故也燕樂謂房中之樂關睢鵲巢也以其事本于婦人以風喻君子乃燕間之事故曰燕樂縵樂燕樂皆奏鐘磬為節磬師則教之而已鐘師掌金奏凡樂事以鐘鼓奏九夏王夏肆夏昭夏納夏章夏齊夏族夏祴夏驁夏凡祭祀饗食奏燕樂凡射王奏騶虞諸侯奏貍首卿大夫奏采蘋士奏采蘩掌鼙鼓縵樂齊側皆反祴古哀反驁五羔反鼓人曰以晉鼓鼓金奏則此所謂金奏蓋擊金以為奏樂之節也名官曰鐘師則其樂雖用鼓而以金為主凡樂事以鐘鼓奏九夏鐘師擊鐘而兼言鼓者鐘鼓相為用也夏之為言大也文明也樂歌之大而文明者有九王夏則所謂王出入則奏王夏是也肆夏則尸出入奏肆夏是也昭夏則牲出入奏昭夏是也納夏章夏齊夏族夏于文無所見而杜子春云四方賔來乃奏納夏臣有功奏章夏夫人祭奏齊夏族人侍奏族夏理或然也祴或作陔通用也鄉飲酒鄉射燕射大射賔醉將出皆云奏陔則陔者陔切之使不失禮也曰祴亦有戒意大射禮公入奏驁夏則諸侯射于四郊自外而入所奏也比九夏惟王夏王得奏之自肆夏以下雖諸侯亦得用故燕禮奏肆夏若大夫之奏肆夏則僣禮也故郊特牲云大夫之奏肆夏由趙文子始所以譏之也凡祭祀享食奏燕樂以鐘鼓奏之也大師大射帥瞽而歌射節鐘師又云奏騶虞貍首采蘋采蘩蓋奏者鐘鼓也歌者人聲也或歌或奏則其節成矣主射節者樂師也故鐘師不言節掌鼙鼓縵樂者此官主擊鼙於磬師奏縵樂則鐘師擊鼙以和乏也笙師掌教吹竽笙塤籥簫篪􅐟管舂牘應雅以教祴樂凡祭祀饗射共其鐘笙之樂燕樂亦如之大喪廞其樂器及葬奉而藏之大旅則陳之吹昌垂反竽音于牘大録反掌教吹竽笙塤籥簫篪􅐟管舂牘應雅而獨以笙師名官者蓋東方之樂有始事之意故以名官也竽三十六簧水數也長四尺二寸水火合數也火應而水往為竽笙匏為之包竹總而直象物生也籥三孔主中聲而上下之也篪下有七孔上有一孔曰翹是為不齊矣㫪牘以竹大五六寸長七尺為之其端有兩孔髤畫以兩手築地㫪取聲焉應長六尺五寸其中有皆椎雅狀如漆筒長五尺六寸以羊韋鞔之自竽至管以氣吹之故曰吹㫪牘應雅皆築地以為樂節故曰㫪也小師掌教塤簫管而笙師又教吹塤簫管則小師之教或教以樂節而未必教之吹教吹則事又詳于小師矣竽也笙也塤也籥也篪也笛也管也皆樂之所用而㫪牘應雅三者特用于教誡樂以為行節而已蓋賔醉而出奏祴夏故此三者皆㫪以築地使賔行不失禮也鐘笙之樂鄭氏謂鐘聲相應之笙也鎛師掌金奏之鼓凡祭祀鼓其金奏之樂饗食賔射亦如之軍大獻則鼓其愷樂凡軍之夜三鼜皆鼓之守鼜亦如之大喪廞其樂器奉而藏之鎛小鐘也國語曰細鈞有鐘無鎛昭其大也大鈞有鎛無鐘鳴其細也鎛師掌金奏之鼓謂之鎛師者舉小以見大故也與典律同謂之典同守廟祧謂之守祧同意鼓人云以晉鼓鼓金奏掌金奏之鼓則以鼓晉鼓為事也軍大獻鼓其愷樂則亦以晉鼓鼓之與鼓愷樂掌于鎛師者鎛師掌金奏之鼓其所掌樂以金為主軍以鼓進以金止既勝矣欲戢兵之意所以為夜戒也夜戒之鼓有三故曰三鼜司馬法云昏鼓四通為大鼜夜半三通為晨戒旦明五通為發昫所謂三鼜皆鼓之者此也守鼜則備守鼓也夜亦三鼓之故曰亦如之韎師掌教韎樂祭祀則帥其屬而舞之大饗亦如之韎師旄人鞮鞻氏皆掌夷樂而命名不同者韎言其所服旄言其所執鞻言其所履明堂位曰韎東夷之樂韎赤韋也作其樂舞因使服其服從其宜也帥其屬而舞之則韎師之屬舞者十六人也祭祀饗燕用夷樂焉則中天下而立定四海之民服而役之得其歡心使鼓舞焉以承祭祀其饗燕君子之所樂也旄人掌教舞散樂舞夷樂凡四方之以舞仕者屬焉凡祭祀賓客舞其燕樂記曰比音而樂之及干戚羽旄謂之樂樂師教之舞而有旄舞然則旄乃氂牛之尾舞者所執以舞也四夷之民有執旄以舞者先王因立官以教焉故有旄人之職其官以下士四人為之其舞者則至于衆寡無數矣散樂野人之為樂者旄人則掌教之舞師凡野舞則皆教之則此所謂散樂也夷樂四夷之樂鞮鞻氏掌四夷之樂與其聲歌旄人教夷樂之舞而已籥師掌教國子舞羽吹籥祭祀則鼓羽籥之舞賓客饗食則亦如之大喪廞其樂器奉而藏之籥以竹為之故字從竹籥二孔主鐘聲而上下之律吕于是乎生故從三口律度量衡所出册所書集于此籥所不能述册亦不能記也故從今從册音黃帝命伶倫取竹之竅厚約者斷兩節之間而吹之以為黃鍾之宫制十二筒黃鍾之宫自此而生則籥為律吕之本也量所謂籥不過一籥之實而已故字通用籥籥師主教國子舞羽吹籥故以籥師名官羽舞文舞也詩曰左手執籥右手秉翟翟則羽也籥主聲聲靜而可聞宜濟之以動則無隱伏而發翟主容容動而可見宜濟之以靜則無陵暴而過節左者動作之地故執籥以左右者伏靜之地故秉翟以右然文王世子春夏學干戈秋冬學羽籥者何也蓋武奮疾而動春夏王而主動文優遊而靜秋冬隂而主靜亦各從其類也國子學以從政宜以文為先故籥師教以舞羽吹籥為主祭祀則鼓羽籥之舞者舞者蹈厲有節不可舛其教國子舞羽吹籥又鼓之以為之節焉故也餘見傳籥章掌土鼓豳籥中春晝擊土鼓吹豳詩以逆暑中秋夜迎寒亦如之凡國祈年於田祖吹豳雅擊土鼓以樂田畯國祭蠟則吹豳頌擊土鼓以息老物豳彼貧反中音仲樂音洛教國子吹籥故名官以籥師吹籥以為詩章故名官以籥章所謂吹豳詩吹豳雅吹豳頌是皆吹籥以為詩章也餘見新經夫寒往則暑來暑往則寒來寒暑相推而成嵗乃隂陽之進退時行之消息雖天有所不能違而人事何與焉而先王有逆暑迎寒之禮者蓋隂陽有不由其道則不能無愆伏之變而財成輔相之事實有俟于聖人也蓋聖人先天而天不違後天而奉天時則其所以財成輔相之者固有道矣天之大道在隂陽聖人因隂陽以統天地則在人之事庸詎知其非天耶然陽來而為復其往也為知險則氣至而為主隂出而為姤其藏也為知阻則氣至而為客于暑言逆主之也于寒言迎客之也故逆之字從屰為之主者自外至非其主者內出而逆之也故臣為主逆女謂之逆春秋公自逆女亦謂之逆凡言逆皆尊之也迎之字從卬卬者我也我者主也以我為主自內出而遘之其𫝑順也故迎客謂之迎迎婦謂之迎凡言迎皆卑之也豳詩七月也蓋以其詩所言如授衣鑿氷之屬皆言寒暑以戒事故也祈年者祈豐年也觀詩之噫嘻春夏祈榖于上帝而豐年秋冬之報則豐年雖本于天時而所以順而祈之者亦成乎人事也田祖禮記所謂先嗇田畯禮記所謂司嗇先嗇神農也以其始教天下耕稼故祈之司嗇則以其生有功于田畝本始民事施于有政者故吹豳雅擊土鼓以樂之老物則老子所謂物壯則老也若物于嵗功之成復本反始故吹豳頌擊土鼓以息之夫説乎兊勞乎坎者天勞之也嵗十二月為蠟以息之者人勞之也然則萬物之作息雖本于天時而亦成乎人事矣豳雅豳頌謂之雅頌則非七月之詩也先儒以七月之詩分風雅頌之三體是一詩而三用之矣非也然逆暑迎寒先言擊土鼓而祈年祭蠟則先言吹雅頌者蓋逆暑迎寒者召其氣之和也聲和則氣和故先言擊土鼓以聲為主也祈則以言通其意蠟則美其成功故先言雅頌以詞為主也鞮鞻氏掌四夷之樂與其聲歌祭祀則吹而歌之燕亦如之鞮鞻者四夷樂人所履之履也革而適我所履者為是焉故名官以鞮鞻氏四夷之樂則以其樂舞而言之也聲歌則以其所吹倡歌而言之也祭祀于燕則吹其聲而倡其歌以明得其歡心而鼓舞詠歌向風承化以服吾中國之役也如是則際天所覆莫不承服薄海內外莫不臣妾蠻夷猾夏非所患矣明堂位曰韎東夷之樂也任南蠻之樂也納夷蠻之樂于大廟言廣魯于天下也以一侯國之微尚且納夷蠻之樂以自廣焉又况有天下之大者乎周禮詳解卷二十一
