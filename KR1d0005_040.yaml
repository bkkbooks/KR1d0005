body:
  text: 周禮詳解卷四十宋王昭禹撰弓人為弓取六材必以其時六材既聚巧者和之幹也者以為逺也角也者以為疾也筋也者以為深也膠也者以為和也絲也者以為固也漆也者以為受霜露也聚以主反兵不可去亦不可玩玩兵者謂之好戰好戰者雖治而必亡去兵者謂之忘戰忘戰者雖安而必危故古之制字者於弓則象弛弓之形欲有武而不用之意也從一不得已而用欲一而止之意也故三射之禮有六弓之制六弓之物有六材之用此弓人之職所以設也弓人為弓取六材必以其時與輪人所謂斬三材必以其時同意六材既聚巧者和之與輪人所謂三材既具巧者和之同意然三材指轂輻牙而言皆伐木而為之故言斬六材指幹角筋膠絲漆而言各以類求而有不可斬者故言取三材為寡則具之而已故言具六材為多必取而聚之然後可用焉故言聚乃若非天時則無以備隂陽之和故斬三材取六材皆言必以其時非功巧則無以全萬物之用故具三材聚六材皆言巧者和之弓以幹為質以漆為文角附幹以安膠得漆以完筋則施於角之外絲則用於膠之內弓所以及逺者其力在幹故幹以為逺弓所以疾發者其勢在角故角以為疾角幹資筋以為堅韌以射則中深故筋以為深三者得膠然後相合以為和故膠以為和結而固之在絲故絲以為固飾而堅之在漆故漆以受霜露六材雖取以其時苟其質不美則不足相資以為用故得此六材之全然後可以為良也凡取幹之道七柘為上檍次之檿桑次之橘次之木瓜次之荆次之竹為下凡相幹欲赤黑而陽聲赤黑則鄉心陽聲則逺根凡析幹射逺者用藝射深者用直居幹之道災栗不迆則弓不發檍於力反檿烏簟反相息亮反鄉許亮反逺根之逺去聲射食亦反災側冀反迆羊氏反弓有六材而以幹為質幹以剛實為體以堅韌為用必其材之美者然後可以為良故取幹有道柘之為木其剛實如石故為上竹雖剛而有節故為下檍杻也寡枝葉而多曲俗謂之牛筋則其堅可知矣檿桑山桑也國語曰檿弧箕箙則其材可以為弓也尚矣橘其皮皺而堅實木瓜其材縝栗而徑荆類楚而可以為利凡此皆木之堅剛者然不及柘之為愈故以各序而次之凡相幹者竹木之類其剛實堅韌可以為幹者其材雖有七然其資氣于隂陽不能無偏正之異則不可以不相也赤者陽之正色也黑者隂之正色也凡木內得隂陽之正則外應隂陽之正色赤黑則鄉心者以其外之應乎內故也凡有形者擊之皆有聲聲出于形形有隂陽則聲有清濁木近本而在下則聲濁而屬乎隂木逺本而在上則聲清而屬乎陽陽聲則逺根者以其實逺于本而清故也凡析幹者既相之而得其材之美然後可以析之而為弓之幹故析幹次於相幹之後夫曲直者木之刑審曲面藝者工之能用藝者取其木之曲也用直者取其木之直也用其木之曲則往體多而來體寡故利於射逺若夾庾之類是也用其木之直則往體寡來體多故利于射深若王弧之類是也故曰射逺者用藝射深者用直既有以析幹然後可以居幹析幹所以分其材居幹所以處其材居幹必由其木之理則所謂居幹之道也災如災畬之災謂加功以治之也栗如榛栗之栗謂緊密而不縱也不迆謂無邪行絶理也方其以鋸析幹入而居其材之中加功以治而且致其緊密行不邪理不絶則弓之發傷無自而起矣故曰災栗不迆則弓不發弓人之於幹取之而後相相之而後折析之而後居此為弓之序也凡相角秋閷者厚春閷者薄稚牛之角直而澤老牛之角紾而昔疢疾險中瘠牛之角無澤角欲青白而豐末夫角之本蹙於􅑠而休於氣是故柔柔故欲其藝也白也者藝之徴也夫角之中恆當弓之畏畏也者必橈橈故欲其堅也青也者堅之徴也夫角之末逺於􅑠而不休於氣是故脆脆故欲其柔也豐末也者柔之徴也角長二尺有五寸三色不失理謂之牛戴牛紾徒展仄夫音扶蹙子六反􅑠乃老反休音煦畏烏回反逺去聲脆七嵗反秋萬物揫斂而堅成之時故其角厚春萬物發生而未就之時故其角薄稚牛方少而血氣剛則角之文正直而潤澤老牛已疾而血氣衰則其文粗紾而交雜牛多疾則角裏傷牛瘠瘦則角不滋則相角者必辨而知之也角欲青白而豐末者青白言其色之善豐末言其質之厚白者藝之驗青者堅之驗豐末者柔之驗白西方之隂也慘而不舒則多曲而不直故白所以為藝之驗青東方之陽也直而剛強則多堅而不脆故青所以為堅之驗角之藝有三曰角本曰角中曰角末角之本蹙于􅑠而休于肉之氣故柔柔無力故欲其藝曲角之中常當弓之畏畏曲必橈橈則發傷故欲其堅韌角之末逺于􅑠而不休於肉之氣故脆脆則易折故欲其溫柔角長二尺有五寸三色不失理謂之牛戴牛者二尺五寸之長可謂極矣三色者本白中青末豐也角之材莫善於此得其角則可以直一牛故曰牛戴牛凡相膠欲朱色而昔昔也者深瑕而澤紾而摶亷鹿膠青白馬膠赤白牛膠火赤鼠膠黑魚膠餌犀膠黃凡昵之類不能方摶徒丸反昵女乙反凡相膠以純赤為上又欲其文之交錯故曰朱色而昔深班而澤者言其表裏皆有文而其色潤澤也紾而摶亷言其文之粗紾且圜而亷利也自鹿膠青白已下至于犀膠黃凡六等惟牛膠火赤則所謂朱色也其餘皆非純赤則不及牛膠為善矣膠或用皮或用角或用膘如鹿膠所謂用其角也如魚膠所謂用其膘也如馬牛犀鼠所謂用其皮也凡昵之類不能方者鄭氏以昵為脂膏䐈敗之䐈亦粘也然則凡脂膏䐈敗者雖非可用以粘安能比方六膠之用哉夫膠以水潤以火鎔䐈之類非不能粘特不可以為久也此所以不能方乎六膠矣凡相筋欲小簡而長大結而澤小簡而長大結而澤則其為獸必剽以為弓則豈異於其獸筋欲敝之敝漆欲測絲欲沈得此六材之全然後可以為良剽芳妙反敝婢世反凡相筋以條直滋潤為上簡言條直澤言滋潤筋之小者貴乎條直而長筋之大者貴乎稹密而潤筋既如此則其獸可知度以為獸則其性必剽疾矣以之為弓又豈異於其獸哉筋欲敝者蓋筋生則硬熟則耎以物擊嚼之欲其勞敝而熟然後可用故曰敝之敝漆欲測者取其清也絲欲沈者取其實也幹也角也膠也筋也漆也絲也凡此六材皆弓之用也六材皆全則盡善備矣而無庛以之為弓必調而後可以為良矣故曰得此六材之全然後可以為良凡為弓冬析幹而春液角夏治筋秋合三材寒奠體冰析灂冬析幹則易春液角則合夏治筋則不煩秋合三材則合寒奠體則張不流冰析灂則審環春被弦則一年之事液音亦奠音定灂子召反易以豉反夫材美工巧不得天時則不可以為良故弓有六材而治之各以其時也幹欲堅而貞固故冬析之角欲和而溫柔故春液之弓欲散而解緩故夏治之膠漆絲三者欲其成就而充實故秋合之寒奠體者弓往來之體也必于寒而奠之則弓體用膠至冬堅而牢故也冰析灂者漆之灂也必于冰而析之則漆灂欲其不動故也冬析幹則易者于幹堅之時而析之則其藝和易也春液角則合者于角和之時而液之則其氣浹洽也夏治筋則不煩者於筋散之時而治之則其理不亂也秋合三材則合者于成材之時而合之則其質不相離也寒奠體則張不流者體已完則不復有流移冰析灂則審環者灂已環則不復有鼓動也春被弦則一年之事者被弦于春候一期之久而後可用也弓人之為弓治六材各以其時者如此又加之以材美工巧其為弓也又安有不良者哉析幹必倫析角無邪斫目必荼斫目不荼則及其大修也筋代之受病夫目也者必強強者在內而摩其筋夫筋之所由幨恆由此作故角三液而幹再液厚其帤則木堅薄其帤則需是故厚其液而節其帤約之不皆約疏數必侔荼音舒幨昌廉反帤女居反需人兖反數音朔侔莫侯反析幹必倫欲其順理也析角無邪欲其適正也斫目必荼欲其徐也質幹本乎自然此幹所以欲其順理角長而三色不失理此角所以欲其適正攻堅木者先其易而後其節目此斫目所以欲其徐斫木不徐則及其大修也筋代之受病者修言久也蓋斫目不徐則其功粗而不精筋雖與幹為力反為節目所摩嚙而筋反受其病也目也者必強強者在內而摩其筋夫筋之所由幨常由此作者蓋節目剛強而筋柔筋攻剛強而摩柔弱則以筋有幨絶之患作於此矣斫木者其可遽乎角三液而幹再液者液謂以火治之使其液作而耎角則以火灸而治之欲其和也故三液幹則以火揉而治之欲其堅也故再液厚其帤則木堅薄其帤則需者帤謂弓中禆也弓幹析木為之而必用禆者欲其調適也裨厚則過乎剛故木堅禆薄則過乎柔故木需厚其液而節其帤者液既厚則治之為多也帤既節則厚薄適均也約之不皆約疏數必侔者約謂以絲筋束纏之也其約之多少必期于稀疏之均也斫摯必中膠之必均斫摯不中膠之不均則及其大修也角代之受病夫懷膠於內而摩其角夫角之所由挫恆由此作挫子卧反摯之言致也上下如一謂之中多寡適于勻之謂均斫致其幹欲上下如一故必中此言斫幹之善也施膠欲多寡適于勻故必均此言施膠之善也斫摯不中膠之不均則及其大修也角代之受病者內之不治則病自外發也幹懷膠于內而摩其角久則角挫而受其病然則角之傷于外常作于此矣凡居角長者以次需恆角而短是謂逆橈引之則縱釋之則不校恆角而達辟如終紲非弓之利也恆古鄧反校古卯反辟音譬紲息列反弓隈謂之需弓梢謂之簫角長者居隈則角之短者居梢矣角不可失之長亦不可失之短充其兩旁而不及兩端故曰恆角而短不獨充于兩旁而又過于謂兩端故曰恆角而逹恆競也竟其角而失之短故是逆橈言其力之不足而反橈也竟其角而失之達故譬如終紲言其送矢不疾若見紲于弓䪐也引之則縱釋之則不校者縱言引其弦而力弗逮也校疾也言舍其弦而勢不急也此其所以非弓之利也今夫茭解中有變焉故校於挺臂中有柎焉故剽恆角而達引如終紲非弓之利茭户卯反解戶賣反柎芳輔反引音譬茭謂弓隈與簫相接也解謂接中也二者用力有變異則弓之勢有校疾故曰茭解中有變焉故校挺直也柎側骨也弓之直臂乃弓把也兩把有側骨以為之柎則弓之勢剽疾故曰于挺臂中有柎焉故剽變譬言引字之誤嬌幹欲孰於火而無贏嬌角欲孰於火而無燂引筋欲盡而無傷其力煮膠欲孰而水火相得然則居旱亦不動居濕亦不動苟有賤工必因角幹之濕以為之柔善者在外動者在內雖善於外必動於內雖善亦弗可以為良矣嬌居兆反燂音潛煮章吕反幹以堅為貴治之而贏則過孰而失之勤故嬌幹欲孰于火而無贏角以和為貴治之而燂則炙爛而失之脆故嬌角欲孰于火而無燂所謂角三液而幹再液者凡以此故也筋以緩治之則力無損故引筋欲盡而無傷其力膠以和濟之則氣必相入故煮膠欲孰而水火相得四者之材不失之過剛則陽不能勝故居旱亦不動不失之過柔則隂不能勝故居濕亦不動柔則不孰于火不孰于火則不堅故善者雖在外而內之動也必矣又安可以為良哉凡為弓方其峻而髙其柎長其畏而薄其敝宛之無已應下柎之弓末應將興為柎而發必動於閷弓而羽閷末應將發畏烏回反敝必世反宛於阮反羽音户峻弓簫也柎側骨也當弓之曲謂之隈人所握持謂之敝峻方則不欲其圜推髙則不欲其卑畏長則不欲其短敝薄則不欲其厚有是四美引之不休常應弦而無已則弓之良也下柎之弓末應將興者末謂簫也弓柎苟卑簫應弦則將發動興謂發動也為柎而發必動于閷閷謂接中也柎之與閷相為體用柎既發則閷欲無動不可得也弓而羽閷末應將發者鳥所以飛揚者羽羽有二焉羽閷謂兩接中俱動也兩接中俱應簫應弦則角幹亦隨之而發作矣弓有六材焉維幹強之張如流水維體防之引之中參維角䟫之欲宛而無負弦引之如環釋之無失體如環材美工巧為之時謂之參均角不勝幹幹不勝筋謂之參均量其力有三均均者三謂之九和䟫直庚反勝音升弓有六材而幹以為逺角以為疾獨處于六材之先則幹角無為而六材之急用也其言苟有賤工必因角幹之濕以為之柔獨言角幹亦以此也故曰弓有六材維幹強之張如流水又曰維角䟫之欲宛而無負弦引之如環蓋弓以幹為質以角附幹為安二者之材尤宜慎擇也夫順流而不逆者莫如水周運而無端者莫如環維幹強之則弓之質堅張如流水則弓之體調質堅則無句弊體調則無難易此所以張之則知如水之順流也維體防之引之中參者謂內之于檠中以定其體而防深淺之所止體定張之弦居一尺引之又二尺也維角䟫之䟫讀為牚謂角以附幹而拄之也附幹而拄之凡以助幹而為疾則欲其宛順而無辟戾之患故曰欲宛而無負弦惟其宛而無負弦故引其弓而無難易有似乎環之周運矣非特引而張之如環及其釋而弛之其體又如環則弓無弛張之患此角所以附幹而有疾之效也材美工巧為之時謂之三均者材也工也時也三者平之至角不勝幹幹不勝筋謂之三均者角也幹也筋也三者平之至也量其力有三者若幹勝一石加角而勝二石被筋而勝三石者平之至也三均者三而皆為平之至也此所以謂之九和也九和之弓角與幹權筋三侔膠三鋝絲三邸漆三庾上工以有餘下工以不足侔莫侯反鋝色劣反邸丁禮反庾羊主反弓之和以角幹為主以幹材為附角與幹權言其等也筋三侔言筋與角幹相等也膠三鋝言膠與角幹相鋝也絲三邸則取其有所抵之意漆三庾則取其有所受之意上工巧矣故和以是而有餘下工拙矣故和以是而不足為天子之弓合九而成規為諸侯之弓合七而成規大夫之弓合五而成規士之弓合三而成規合音閣凡為弓其材剛直則往體寡來體多而句之勢為少其材柔弱則往體多來體寡而句之勢為多天子諸侯之弓必合九合七而成規以其材之剛直而其句為少故所合者衆而後其體圜也大夫士之弓必合五合三而成規以其材之柔弱而其句為少故所合者寡而後其體圜也司弓矢掌六弓者也各以其數合之成規而已弓人為弓者也故自天子至士之弓皆言為焉為之而成規其亦審曲面勢之巧歟弓長六尺有六寸謂之上制上士服之弓長六尺有三寸謂之中制中士服之弓長六尺謂之下制下士服之凡為弓必與人相稱人之形貌不同故弓之等制不一其長短則以三寸為差六尺有六寸之弓其長之制為上而上士稱此故使上士服之六尺有三寸之弓其長之制為中而中士稱此故使中士服之六尺之弓其長之制為下而下士稱此故使下士服之凡為弓各因其君之躬志慮血氣豐肉而短寬緩以荼若是者為之危弓危弓為之安矢骨直以立忿藝以奔若是者為之安弓安弓為之危矢其人安其弓安其矢安則莫能以速中且不深其人危其弓危其矢危則莫能以願中中丁仲反射之道其中在巧其至在力巧存乎志慮力出乎血氣射者志慮血氣之所寓焉者也人之躬有長短志慮有緩急血氣有強弱故為弓者必因之也且射者必內志正外體直然後持弓矢審固而可以觀德焉苟不因其志慮則志慮不和于心內志其能正乎苟不因其血氣則血氣有不調于體外體其能直乎為弓者各因君之躬志慮血氣者凡以此也豐肉而短骨因以立所謂躬有長短也寬緩以荼忿藝以奔所謂志慮有緩急血氣有強弱也危言疾也安言舒也為弓者必因其人亦在損其贏以濟不足而已故為之危弓而使豐肉而短寬緩以荼者服之為之安弓而使骨直以立忿藝以奔者服之凡此皆損贏以濟不足者也然危弓為疾矣不輔以安矢則太疾而過故危弓為之安矢安弓為緩矣不輔以危矢則太緩而不及故安弓為之危矢人與弓矢皆安言三者之舒也人與弓矢皆危言三者之疾也三舒則一于緩緩則矢行而不及故莫能以速中三疾則一於急急則矢行而太過故莫能以願中上言速則知下之為遲下言願則知上之為暴往體多來體寡謂之夾臾之屬利射侯與弋往體寡來體多謂之王弓之屬利射革與質往體來體若一謂之唐弓之屬利射深夾古洽反臾音庾體者往來之藝也往多來寡則其體曲此夾庾之弓也所謂合五而成規也往寡來多則其體直此王弧之弓也所謂合九而成規者也往來若一則其體得曲直之中此唐大之弓也所謂合七而成規者也夾弓庾弓以授射犴侯鳥獸者故曰利射侯與弋王弓弧弓以授射甲革椹質者故曰利射革與質唐弓大弓以授學射者勞者故曰利射深司弓矢掌六弓則辨其弓之物故王弧之屬以名言之弓人為弓則辨其弓之質故往來之屬以體言之大和無灂其次筋角皆有灂而深其次有灂而疏其次角無灂合灂若背手文角環灂牛筋蕡灂麋筋斥蠖灂和弓􅌛摩蕡扶文反斥音尺蠖杠縛反大和無灂言九和之弓六材皆善而無漆灂也其次筋角皆有灂而深言在背之筋在隈之角皆有漆灂然深在中央而兩旁無有也其次有灂而疏言兩旁不皆有也其灂特疏而已其次角無灂言隈雖無之而簫與背皆有之也合灂若手背文者言弓之表裏漆灂相合之地若人合手而背上文之相應也角環灂言隈裏之文有如環之圜也牛筋蕡灂言背裏之文有如蕡之實也麋筋斥蠖灂言背裏之文有如斥蠖之屈也和弓􅌛摩者謂調和其弓而拂摩之以待用也大射禮曰小射正授弓大射正以袂順左右隈上再下一其􅌛摩之謂與覆之而角至謂之句弓覆之而幹至謂之侯弓覆之而筋至謂之深弓詳察謂之覆極善謂之至覆之而角至則角獨善而已筋幹有未善也夫角所以為疾幹不善則不能逺筋不善則不能深其質柔弱而不剛直故謂之句弓司弓矢曰句者謂之弊弓是也覆之而幹至則幹又善而筋未善也角與幹善則矢疾而逺可以射侯故謂之侯弓覆之而筋至則非特角與幹善而筋又善也則疾而逺又中深焉故謂之深弓句弓言其體之曲而不若侯弓之能逺侯弓言其材之逺而不若深弓之為善故其序如此弓有六材而獨言角幹筋者蓋六材以角幹筋為主而膠絲漆則為之輔而已然則角幹筋於弓之材為急膠絲漆於弓之材為緩為弓者宜致詳於材之急者而材之緩者斯從之矣古人所以冬析幹春液角夏治筋至於合三材則一於秋者亦以此也周禮詳解卷四十
