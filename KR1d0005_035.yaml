body:
  text: 周禮詳解卷三十五宋王昭禹撰冬官考工記一而不可不易者道匿而不可不為者事道一而能易則雖不主故常而未始外乎事事匿而有為則雖麗乎形數而未始離乎道道未始外事此幽者之所以闡也事未始離乎道此顯者之所以微也莊子曰既已謂之一矣且得無言乎一與言為二二與一為三自此以往巧厯不能計而况其凡乎此自無以適有由道以之事者也又曰事兼於義義兼於德德兼於道此自有以適無由事以入道者也是以聖人體道之常無以應天下之有體道之至虛以應天下之實而未始廢于事也故六官之設始于天官以掌治而治以道為本終于冬官以掌事而事以智為主蓋道出而生智智則貞固足以幹事也冬于方為北于物為罔北宅乎幽罔未有形隂于此乎終陽于此乎始藝藝之物自此而復乎道擾擾之緒自此而之乎事道之與事曷嘗相離哉聖人散道之妙以寓干事即事之粗以達于道故備物致用雖皆法度之陳迹而立象明意莫非性命之真理由此觀之則考工之所記特技巧之事而已哉然其名官謂之司空則以其空土以居民故也書曰司空掌邦土居四民時地利居四民時地利者事職之體用也而記者止謂之考工則事官正以典事為務故也先王名官以司空則以居四民言之也作記者以考工言之則以時地利言之也夫百工之事雖本于聖作智創而非巧述工守則不足以設施而致用此百工所以與於六職之一也然工之事有精相有能否餼廩欲稱事則也工不可以不考也賞誅欲當事則工不可以不考作記者謂之考工凡以質其成效而已然典禮殊缺學者雖不覩聖人之全經而先儒追述之功亦不為無補矣國有六職百工與居一焉或坐而論道或作而行之或審曲面藝以飭五材以辨民器或通四方之珍異以資之或飭力以長地財或治絲麻以成之坐而論道謂之王公作而行之謂之士大夫審曲面藝以飭五材以辨民器謂之百工通四方之珍異以資之謂之商旅飭力以長地財謂之農夫治絲麻以成之謂之婦功與音預藝同勢長丁丈反夫天職氣覆地職形載聖職教化物職所宜則凡麗乎隂陽之域者未嘗無職也有所受而聽之者謂之職天地雖大而受職乎道聖人雖尊而受職乎天臣民則卑而受職乎君一失其職則傷之者至然則自王公以至於士大夫工商農婦之屬又安可以無職乎勞心者治人勞力者治于人王公士大夫勞心以治人者也百工商旅農婦勞力以治于人者也自王公以至農夫謂之六職而百工居其中故曰國有六職而百工與居一焉事道者逸事事者勞無為而尊者逸有為而卑者勞王公尊而事道故坐而論之逸而無為者也士大夫卑而事事故作而行之勞而有為者也故曰坐而論道謂之王公作而行之謂之士大夫夫致治之序本在上末在下王公務本以經治故坐而論道以謀其始士大夫務末以贊治故作而行之以成其終坐則無為而未始有作論則言之而未始有行然則士大夫特推王公所論之道作而行之以見其事業而已夫一人之身而百工之所為備五材者民器資之以有成者也一材不可闕而一器不可廢則以飭五材以辨民器百工之事也又烏可後乎哉然欲辨民器必先飭五材欲飭五材必先乎審曲面藝惟窺理所在然後能審曲惟正體所向然後能面藝五材天之所生必致力以修飭之然後可以為民器則若飭木而為舟車弓廬之屬飭金而為鼎量劍削之屬飭土而為甗甑簋豆之屬飭水火而運用之以成乎衆材之屬飭材以為器而民器各有宜焉不可以不辨其為輪也辨其髙下之地其為弓也辨其安危之人其為庛也辨其地之堅柔其為劍也辨其士之上下故曰審曲面藝以飭五材以辨民器謂之百工物貴為珍物殊為異所貴所異者彼此不通其所有則無以相資以為用商旅所以遷有資無而物賴之以通焉故曰通四方之珍異以資之謂之商旅百榖雖有種而不能自生雖有生而不能自長所以生而長之實賴三農之為故為之耕耨為之播種去其蟊賊薅其荼蓼實頴實栗既堅既好者三農生長之力也故曰飭力以長地財謂之農夫夫人無羽毛以耐寒暑所以禦寒暑者必藉乎衣服先王稽其女功使作二事治絲而成之以為帛治麻而成之以為布卒嵗必有衣楬當暑則袗絺綌凡皆婦功之所成也故曰治絲麻以成之謂之婦功六職之序王公制法以示百工者也士大夫行法以治百工者也商旅通物以資百工者也農夫長財以養百工者也嬪婦化治以成百工者也故王公士大夫之序在百工之上商旅農夫婦功之事在百工之下焉荀卿曰精于道者兼物物精于物者以物物王公士大夫精於道者也工商農夫精於物者也工雖具人器而精於物然而百工之事皆聖人之所作以象寓意以器藏禮則百工信度以承道者也其亦有異于商旅農夫之屬焉記考工者以百工承王公士大夫之後而處商旅農夫之前不為無深意矣粵無鎛燕無函秦無廬胡無弓車粵之無鎛也非無鎛也夫人而能為鎛也燕之無函也非無函也夫人而能為函也秦之無廬也非無廬也夫人而能為廬也胡之無弓車也非無弓車也夫人而能為弓車也粵音越鎛音博燕音胭函而南反廬魯吳反夫音扶傳曰少成若天性習貫如自然粵之無鎛工燕之無函工秦之無廬工胡之無弓車之工皆以其地之人少習而成之故不置是工也蓋有所短而後見所長有所拙而後見所巧粵人之巧皆長於為鎛燕人之巧皆長於為函秦人之巧皆長于為廬胡人之巧皆長于為弓車故雖天下之良工吾知其不容于四國凡以無所用其長而施其巧也是以粵無鏄工非無鎛工也以其人皆能為鏄故也燕無函工也非無函工也以其人皆能為函故也秦無廬工也非無廬工也以其人皆能為廬故也胡無弓車工非無弓車工也以其人皆能為弓車故也古者處工于官府使工與工言器段氏為鎛函人為甲廬人為廬器弓人為弓輿人為車皆以官府處之所謂無者非無是人也官府無是工故也詩曰庤乃錢鎛則鎛者治田之器也先儒謂粵地出金錫鑄冶之業田器尤多孟子曰函人惟恐傷人則函者甲胄之屬也先儒謂燕近强胡習作甲胄廬戈㦸之柲也先儒謂秦多細木善作矜柲弓車射乘以攻戰先儒謂胸奴無屋宅田獵畜牧逐水草而居皆知為弓車則四國之無是工皆以夫人能為之故也知者創物巧者述之守之世謂之工百工之事皆聖人之作也爍金以為刃凝土以為器作車以行陸作舟以行水此皆聖人之所作也知音智創初亮反爍始灼反又作鑠形而上者謂之道形而下者謂之器道本於性命而器之理藏乎其中器成於度數而道之迹顯於其外君子上達則其智足以窮理而能創小人下逹則其巧足以循迹而能述蓋發而制之謂之創非智足以窮性命之理則不能及此故曰智者創物分辨而審其才謂之述非巧足以循度數之迹則不能及此故曰巧者述之大司徒曰以世事教能則民不失職古者四民莫不皆然而百工之于官府也其父兄之教不肅而成其子弟之學不勞而能少而習焉其心安焉不見異物而遷焉故攻木之工不使之攻金攻皮之攻不使之攻玉㮚氏之子常為量鳬氏之子常為鍾桃人之子常為劍函人之子常為甲其所傳者一法而各使之精其事焉故曰守之世謂之工雖然此特循法度之迹而守之也若夫得之于手應之于心則輪扁之斫輪也不能以授之子况可得而世也易曰備物致用立成器以為天下利莫大乎聖人蓋百工之事雖形于度數之粗而天下之至精寓焉非聖人降道以觀象出象以觀器孰能作之哉故斷木為杵掘地為臼臼杵之利則取諸小過弦木為弧剡木為矢弧矢之利則取諸暌或為耒耜以取諸益或為網罟以取諸離為棟宇則取諸大壯為棺椁則取諸大過一方一圓而具天地之象一竒一耦而具隂陽之數或曲或直而有剛柔之理或厚或薄而有盈虛之義形名既定而不可易分守既明而不可亂豈淺淺者之所能及哉傳曰作者之謂聖殆以此也是故爍金凝土作為舟車一切皆本于聖人以金為體者以火為用故于金言爍以土為體者以水為用故於土言凝陸行乘車則千里可致水行乘舟則江河可濟凡此之類皆聖人立法以貽天下後世也然前言智者創物而于此又言皆聖人作者蓋大而化之之謂聖聖者智之體也窮理而有所知謂之智智者聖人之用也孟子曰始條理者智之事亦以其用而言之也終條理者聖之事亦以其體而言之也方其從體以起用則凡創物者必資于智之所知故以智者言之及其攝用以歸體則百工之事無非聖之所化故以聖人言之惟以智言故曰創以創者發而制之即其見于度數者而言之也惟以聖言故曰作以作者為而起之原其生出之自而言之也天有時地有氣材有美工有巧合此四者然後可以為良材美工巧然而不良則不時不得地氣也橘踰淮而北為枳鸜鵒不踰濟貉踰汶則死此地氣然也鄭之刀宋之斤魯之削吳粵之劍遷乎其地而弗能為良地氣然也燕之角荆之幹妢胡之笴吳粵之金錫此材之美者也天有時以生有時以殺草木有時以生有時以死石有時以泐水有時以凝有時以澤此天時也枳吉氏反鸜其俱反鵒音欲濟子禮反貉戶各反汶音問水名削思約反妢扶云反笴古老反注讀為槀泐音勒澤音亦又音釋立天之道曰隂與陽立地之道曰柔與剛隂陽寒暑運之以為時者也故曰天有時剛柔燥濕在地化之以為氣者也故曰地有氣萬物盈于天地之間得時以生得氣以成及其成材則天地之美具焉故曰材有美天地無全功萬物無全用而合和成就實有資于巧者故曰工有巧此四者皆有以相成無以相廢合而用之闕一不可故曰合此四者然後可以為良良甚善也天之合也若不慮而知則謂之良知不學而能則謂之良能皆出於天合之自然而非人為之或使也茍其取材也上不得天之時下不得地之氣雖有得材之美與夫得手應心之巧是成於人為之成使非自然之甚善也其可以為良乎是故斬轂之道必矩其隂陽其斬陽木則必以仲冬其斬隂木則必以仲夏弓人之為弓于冬則析幹於春則液角於夏則治筋于秋則合三材此所以因天時也貢金錫則責之揚貢杶幹則責之荆孤桐則貢于徐漆枲則貢于豫以至于鄭之刀宋之斤魯之削吳粵之劍此所以因地氣也相幹則欲其赤黑而鄉心陽聲而逺根相筋則欲小簡而長大結而澤漆則欲測絲則欲沈以至燕之角荆之幹妢胡之笴吳粵之金錫凡此皆材之美也輪人之為輪則可規可萬可水可縣可量可權輿人之為車則圓者中規方者中矩立者中縣衡者中水直者如生繼者如附三材既具巧者和之以為輪六材既聚巧者和之以為弓凡此皆工之巧也列子曰天職生覆地職形載物職所宜蓋變者天道也而天道之所變者生化者地道也而地道之所化者形然天道逺而尊地道近而親則物性之所宜亦繫諸地而已自橘踰淮而北為枳以至貉踰汶則死此地道之化也自鄭之刀以至遷乎其地而弗能為良此物性之宜也自燕之角以至吳粵之金錫則物之有用者存乎材也自天有時以生以至有時以澤則物之有體繫乎天若五方之土各有所偏五土之物各有所宜結而為山嶽其形不類融而為江河其流不一橘踰淮而北為枳則植者因之而不同也鸜鵒不踰濟貉踰汶則死則動者因之而有異也而非特此也至於工飭之而為器亦然以刀之良則必求之鄭而不可以求之宋以削之良則必求之魯而不可求之吳粵此亦物性之宜資於地氣者然也至于角之美者莫如燕幹之美者莫如荆笴莫美于妢胡金錫莫美于吳粵則人養之為材亦因其地氣之為美也天有時以生有時以殺則隂陽之運所以生殺萬物者也草木有時以生有時以死則感隂陽之運而生死者也石有時以泐或以盛暑而解散也水有時以凝澤或以寒溫而融結也此天時地氣材美之不同而工之巧當審焉故不言工巧也凡攻木之工七攻金之工六攻皮之工五設色之工五刮摩之工五摶埴之工二攻木之工輪輿弓廬匠車梓攻金之工築冶鳬㮚段桃攻皮之工函鮑韗韋裘設色之工畫繢鍾筐㡛刮摩之工玉楖雕矢磬摶埴之工陶旊刮古八反摶音團埴時職反㮚古栗字段鍛同鮑音薄韗音運繢户對反㡛莫黃反楖音櫛旊甫罔反天生五材民並用之水火木金土是也加之以皮玉設色則為八材焉九職所謂百工飭化八材是也以土治水以水治火然後水火為用以火治金以金治木然後金木為器皮玉設色之事則亦不離于五者然後摶者之工備此百工之務也攻木之工木工也攻金之工金工也摶埴之工土工也金木言其體摶埴言其用攻皮之工以函為主設色之工以畫為主刮摩之工以玉為主皮色言其體刮摩言其用若夫水火之材則飭化之以運用此六者而已故于水火不言工輪輿弓廬匠車梓者輪人為輪輿人為車弓人為弓廬人為廬器匠人為宫室之屬車人為耒之屬梓人為筍虡之屬此攻木之工七也築冶鳬㮚段桃者築氏為削冶氏為戈戟鳬氏為鐘㮚氏為量段氏為鎛桃氏為劍此攻皮之工五也畫繢鍾筐㡛者畫繢之事官異而職同鍾氏則染羽㡛氏則練絲而筐氏闕焉此設色之工五也陶人為甗旊人為簋此摶埴之工二也有虞氏上陶夏后氏上匠殷人上梓周人上輿體常而盡變者道也聖人體道之常以處已故先聖後聖同乎一揆彼時此時同乎一心若合符而無異矣盡道之變以趍時故觀㑹通而行典禮揆時物而備制作此四代所以有異上矣是故時方上質不以文滅質時方上文不以質勝文其所以立成器而為天下利者亦審所尚而已虞夏之文不勝其質然夏之質又不若虞之純故有虞氏上陶夏后氏上匠商周之質不勝其文然商之文又不若周之備故商人上梓周人上輿有虞氏以德而帝而純朴未散陶工為器則質之純也故上陶記言泰有虞氏之尊又曰有虞氏之瓦棺則上陶可見矣夏后氏以業而王而營制稍興因上匠而為宫室溝洫以居處灌溉則質之散也語言禹卑宫室而盡力乎溝洫則上匠可見矣商則王者之道自此成矣王者之業自此著矣王盡制而禮樂之器不備則無以為文故所上者有在于梓所以為禮樂之器也至周則經制廣而庶事備茍一器之不完則經制之理未廣一物之不設則庶事之宜未備故所上者在於輿以一器而工聚者於車為多也四代所尚亦各因時而已故一器而工聚焉者車為多車象三才而利轉通上下乘之其載有輿其行有牙其服有輈其指有軹以憑為禮則有軾以道軾而為之先則有軓虛而善心則有轂運而無窮則有輪實輪而凑轂則有輻作止而由之則有軸以至為較為輜為軧為轐蓋之圓以象乎天軫之方以象乎地其事詳其物重其義廣其制煩則工之所聚可謂多矣然自攻金設色之工而下其數或以五或以二而攻木之工獨有七焉則車工之為多可見矣車有六等之數車軫四尺謂之一等戈柲六尺有六寸既建而迆崇於軫四尺謂之二等人長八尺崇於戈四尺謂之三等殳長尋有四尺崇於人四尺謂之四等車㦸常崇於殳四尺謂之五等酋矛常有四尺崇於㦸四尺謂之六等車謂之六等之數柲兵媚切迆以氏反殳立殊反酋在由反易曰立天之道曰隂與陽立地乏道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦車有六等所以法易六爻之數也十分曰寸十寸曰尺八尺曰尋倍尋曰常兵車之輪六尺有六寸軹崇三尺有三寸加軫與轐之七寸為四尺是軫去地四尺矣故曰車軫四尺謂之一等自軫而下其車之等皆以四尺為差戈柲六尺有六寸則以四尺為差戈柲六尺有六寸則以四尺崇於軫故謂之二等人長八尺則以四尺崇於戈故謂之三等殳長尋有四尺則以四尺崇於人故謂之四等車㦸常則以四尺崇於殳故謂之五等酋矛常有四尺則以四尺崇於㦸故謂之六等始言車有六等之數終言車謂之六等之數者蓋道冥於一則非有數也合於同則非有等也道散而為器則其差有等其别有數方其原車之等數所由起則自無而出有也故始則曰車有六等之數及其叙車之等所自陳則等數具而法象著其意可得而言之也故終則曰車謂之六等之數夫謂之為言意所寓也可以言論者物之粗也可以意致者物之精也車之等數以義則為精以事則為粗故可致得以言而謂之也若夫言之所不能論意之所不能者又安得而謂之也然五兵之用逺則弓矢者射之近則矛者句之句之矣然後殳者擊之戈㦸者刺之故司馬法曰弓矢圍殳矛守戈㦸助蓋凡用此者皆長以衛短短以救長今此戈矛殳㦸皆插車騎而獨不言弓矢者則乘車之人佩之也六等之車而五兵皆備豈先王得已而用之哉戈矛殳㦸置之於車傍者備而不用之意也弓矢則佩之在下非所上之意矣凡察車之道必自載於地者始也是故察車自輪始凡察車之道欲其朴屬而微至不朴屬無以為完久也不微至無以為戚速也輪已崇則人不能登也輪已庳則於馬終古登阤也朴普剝反屬章欲反戚將六反乂音促庳音婢阤文爾反載物者莫先于車運車者莫先于輪昔之聖人觀轉篷而為輪輪行可載然後為車則車之作輪實為之先焉故察車之道有二一曰載于地者始二曰欲其朴屬三曰欲其微至車之材衆矣而載于地者輪而已故察車自輪始輪之行以完久為固以戚速為利故不朴屬則無以為完久朴屬言其附著之堅也不微至無以為戚速微至言其踐地之少也夫三年為車無一尺之輪則莫能運轉則車雖善載非輪其能行乎木直中繩揉以為輪則其曲中規則輪雖善運非人其能為乎輪既為之于人茍不察其朴屬而微至則說輹之虞輸載之敗不旋踵而至矣轂以為利轉輻以為直指牙以為固抱輪人為之則斬三材必以其時三材既具巧者和之然後可以盡為輪之善也用車者必加于此蓋得其要矣不然則莊周天道何以獨取輪扁斫輪記考工者何以獨首于輪人與輪已崇則過于六尺六寸而軫過四尺為太髙也人斯病于難登輪已庳則不及于六尺六寸而軫不及四尺為太下也馬斯病于難引故曰輪已崇則人不能登也輪已庳則于馬終古登阤也阤阪也終古猶言常也輪庳則馬髙馬髙則其引輪也常若登阪雖倍用力馬疲而車不進之矣故兵車之輪六尺有六寸田車之輪六尺有三寸乘車之輪六尺有六寸六尺有六寸之輪軹崇三尺有三寸也加軫與轐焉四尺也人長八尺登下以為節乘繩證反軹音只轐音卜又音僕王有五路玉路以祀金路以賔象路以朝革路以即戎木路以田今此言兵車即革路也田車即木路也乘車即玉路與金路象路也禮官明其義故巾車謂之路事官制其器故考工謂之車兵車乘車駕國馬田車駕田馬輪俟馬而後行馬有髙下而輪因之以立制故或言六尺有六寸或言六尺有三寸而數度之所以不同也然輪之心為轂轂之末為軹輿後橫木謂之軫軸上伏兔謂之轐輪崇六尺有六寸軹崇三尺有三寸而加軫與轐之七寸然後合而為四尺人長八尺則軹與軫之尺適于人為半矣凡此記輪之崇而人之長短升降以此為節故曰人長八尺登下以為節矣輪人為輪斬三材必以其時三材既具巧者和之轂也者以為利轉也輻也者以為直指也牙也者以為固抱也輪敝三材不失職謂之完牙音訝敝必世反又伏滅反車雖器之一物然工之聚于此為多輪雖車之一物然車之行必先乎此故察車始自于輪此古者所以獨立輪人之官而記考工者亦以輪人為首歟輪雖一物體具三材轂輻牙是也天有時地有氣材有美工有巧合此四者然後可以為良故古者仲冬斬陽木仲夏斬隂木夫時有冬夏木有隂陽因其時而斬其木必得天地之和氣故曰輪人為輪斬三材必以其時轂輻牙之材生于天而成于人生于天則有莫為之之和成于人則有或使之之和然則和者天也和之者人也故曰三材既具巧者和之非特是也弓人為弓取六材必以其時六材既聚巧者和之則聖人立成器以為天下利者豈茍乎哉老子曰三十輻共一轂當其無有車之用又曰有之以為利無之以為用轂中虛而有容是無有也而車賴之以為用故有取于利轉輻實輪而凑轂非無有也而車賴之以為利故有取于直指若夫牙則周圜轂輻以運行其利用故有取于固抱惟利故能轉惟直故能指惟固故能抱合是三材以為輪輪雖歷久而體敝三材各處其所猶不失職是以謂之完也夫在物宜完者也在身宜完者元也元缺而不周則不可以為完元傷而不全則不可以為完然則三材所以為完者亦以其周而不缺全而無傷故也莊子曰不以物挫志之謂完此志之完完之在人者也輪人曰輪敝三材不失職謂之完此輪之完完之在物者也望而眂其輪欲其慏爾而下迆也進而眂之欲其微至也無所取之取諸圜也望其輻欲其揱爾而纎也進而眂之欲其肉稱也無所取之取諸易直也望其轂欲其眼也進而眂之欲其幬之亷也無所取之取諸急也眂其綆欲其蚤之正也察其菑蚤不齵則輪雖敝不匡慏莫歷反圜于權反揱音蕭稱尺證反眼魚懇反幬音疇綆音餅蚤音爪菑側吏反齵音隅輪侖也一實一虛一有一無運而無窮無作則止所謂侖者如斯而已輻畐也畐言其實也實輪而凑轂致福之道也轂穀也穀言其善也輪為善首則轂為善心此所以為榖也轂輻牙分而言之則謂之三材合而言之則謂之輪言望其輻望其轂而不言望其牙則言望而眂其輪兼于牙矣輪貴于圜故欲其幎邇而迆幎如巾之幂物言均致也迆若决圜而轉化言上下皆正直而不旁倚也微至則車止之時輪至地者少也此輪所以取諸圜也輻貴于易直故欲其揱爾而纎揱言殺削之貌纎言向牙之處尖而不大也肉稱則言其洪殺之等也易則無節目直則無撓曲此輻所以取諸易直也轂貴于急故欲其眼眼言如人之眼也目用作而體止焉蓋離為目巽為多白眼目者眼之用眼者目之體故眼之字左從目言其用之作也右從艮言其體之止也夫轂中虛而容輔以動轉亦何異于眼體止于外目作而視乎內懤之亷則下文所謂懤必負幹也懤則幔轂之革亷則亷隅之見于外惟懤之負幹其革急而不緩然後能至是此轂所以取諸急也眼以其顯于外者言之亷以其𨼆于內者言之望者逺而觀之眂者近而見之也望略而視詳于輪獨加望而眂者察車自輪始故特致其詳焉綆謂輪箄下文所謂六尺有六寸之輪鯁三分寸之二是也菑謂輻入轂中也蚤謂輻入牙中也凡造車輪皆向外箄向外箄則車行不掉故曰眂其綆欲其蚤之正以輪之鑿孔取其正也入牙之蚤與入轂之菑上下兩相當而無齟齬之不齊則輪雖久敝而無方而不轉之患故曰察其菑蚤不齵則輪雖敝不匡匡言方也凡物圜則運而轉方則礙而止故也凡斬轂之道必矩其隂陽陽也者稹理而堅隂也者疏理而柔是故以火養其隂而齊諸其陽則轂雖敝不藃稹之忍反敝婢世反藃好角反又呼報反萬物莫不由是而之焉者道也道無所往而不在故于大必備于小不遺雖稊稗瓦礫之徵無不在焉故察車斬轂皆有道也用是道而察車則謂之察車之道用是道而斬轂則謂之斬轂之道凡木生于山南而向日則謂之陽生于山北而背日則謂之隂陽木則足于陽而寡于隂隂木則足于隂而寡于陽必齊其隂陽然後可用以為轂故必矩其隂陽將火養而齊之也傳曰五寸之矩則足以盡天下之方蓋矩者正立之法也矩其隂陽謂以法正之而已陽木則其體實故稹理而堅隂木則其體虛故疏理而柔稹叢緻也疏不密也堅至剛也柔至弱也稹與密以文言之堅與柔以材言之茍不以火炙其隂而養之使堅與陽齊則以革鞔木其隂柔之處必瘦減而不著木斯有藃暴之患矣故曰以火養其隂而齊諸其陽則轂雖敝不藃藃若藃氣出之貌故暴起謂之藃也轂小而長則柞大而短則摯是故六分其輪崇以其一為之牙圍參分其牙圍而漆其二椁其漆內而中詘之以為之轂長以其長為之圍以其圍之阞捎其藪柞莊百反摯讀為槷詘邱勿反捎音蕭藪素口反轂以有為體以無為用故長短小大兩相稱然後利轉而不窮小而長則柞柞言其不廣也大而短則摯摯言其不堅也不廣則狹故內無所容不堅則脆故力不能固所謂六分其輪崇以其一為之牙圍者兵車乘車輪各六尺有六寸六分之而以其一為牙圍則牙圍尺有一寸矣三分其牙圍而漆其二者就尺有一寸取九寸而三分之各得三寸又以二寸而三分之則各得六分有竒合二分而言之則漆者七寸三分寸之一不漆者三寸三分寸之二不漆謂輪之踐地處者也所謂椁其漆內而中詘之以為之轂長以其長為之圍者椁言度兩漆內之尺寸也牙圍不漆者內外面各一寸則六尺六寸之輪其漆內凡六尺四寸也中詘之則于中詘其半是為三尺有二寸故以三尺有二寸為轂之長以其長為之圍則亦三尺二寸矣以其圍之阞捎其藪謂衆輻所趨之地也阞與王制所謂祭用數之阞同也以繫辭歸竒于阞以象閏者言之則阞為四分之一矣捎取也謂于轂圍取四分之一以為衆輻所趨之地則藪凡八寸矣五分其轂之長去一以為賢去三以為軹容轂必直陳篆必正施膠必厚施筋必數幬必負幹既摩革色青白謂之轂之善去起吕反賢胡眄反軹音只篆直轉反數色角反幬音籌車輻頭大穿而為賢小穿而為軹謂之賢者有取于宜為人臣佑上而利下之意謂之軹者蓋轂有圍以利轉至軹而窮焉有宜只之意轂長三尺有二寸徑一尺三分寸之二五分其徑之長去一以為賢則賢徑八寸十五分寸之八去三以為軹則軹徑四寸十五分寸之四賢之徑倍于軹則大穿為甚大鄭氏疑其誤以去一宜為去二理或然也然則大穿去二則得六寸五分寸之二矣治轂者為之形容則欲其直而不曲陳以夏篆之屬則欲其正而不邪故曰容轂必直陳篆必正施膠欲固則貴厚而不薄施筋欲强則貴數而不疏故曰施膠必厚施筋必數幬以幔轂則欲亷之外見故貴其負幹則其革急而不緩轂革相應而無所不足之患矣若夫以革鞔轂訖將漆之革先以骨丸之乃摩以石其色以青白為上故曰既摩色青白謂之轂之善蓋青陽中之色也白隂中之色也隂陽中則和而無剛柔相勝之弊轂之運轉以和為貴故也參分其轂長二在外一在內以置其輻凡輻量其鑿深以為輻廣輻廣而鑿淺則是以大扤雖有良工莫之能固鑿深而輻小則是固有餘而强不足也故竑其輻廣以為之弱則雖有重任轂不折量音良鑿曹報反深尸鴆反扤五骨反强其良反竑獲耕反三分其轂長二在外一在內以置其輻此言置輻于轂相去逺近也轂長三尺有二寸而輻廣三寸半其餘二尺有八寸而三分之輻外一尺九寸故曰二在外輻內九寸半故曰一在內鑿深者言轂之深足以受輻之入也輻廣者言輻之廣足以應轂之所受也二者相應則其固足以相佐而反是則非輻之善輻廣而鑿淺則是以大扤雖有良工莫之能固大扤言其動搖之甚也鑿深而輻小則是固有餘而强不足固有餘以鑿言也强不足以輻言也善為輪者度其輻廣以為之弱則其力相稱足以任重而致逺竑言度其長短故曰竑其輻廣以為之弱則雖有重任轂不折參分其輻之長而殺其一則雖有深泥亦弗之溓也參分其股圍去一以為骹圍殺色界反溓注讀作黏女亷反骹胡飽反凡為輻欲其豐殺適宜近轂則欲豐而近牙則欲殺且以輻長尺有二寸而三分之則其殺四寸也蓋牙所以行地于近牙而殺之雖以行塗而深泥弗粘也輻近轂曰股近牙曰骹在股則豐若人之髀股在骹則約若人之脛近足之骹以輻三分之長殺一以向牙以股三分之圍去一以為骹則本大末小此所以深泥莫之粘也揉輻必齊平沈必均直以指牙牙得則無槷而固不得則有槷必足見也揉而九反槷魚列反見賢遍反火剛而善變凡物之曲直者資其用以正焉水平而無私凡物之輕重者資其體以定焉揉輻以火而齊其曲直之句倨故曰揉輻必齊者取諸易直故也沈輻以水而均其輕重之淺深故曰平沈必均者欲其肉稱故也然輻資牙以指牙資輻以抱兩者相得則無用于槷而自固故曰直以指牙牙得則無槷而固不得則雖用槷以行而搖動則槷出而見矣故曰不得則雖有槷而行必足見也六尺有六寸之輪綆參分寸之二謂之輪之固綆方頴反參音三前言兵車乘車之輪皆六尺有六寸又曰眂其綆欲其蚤之正則輪箄之制尚矣故鑿牙之時其孔向外侵三分寸之二使輻股外箄蓋輪箄則車行安帖而不掉夫是謂之輪之固凡為輪行澤者欲杼行山者欲侔杼以行澤則是刀以割塗也是故塗不附侔以行山則是摶以行石也是故輪雖敝不甐於鑿杼直吕反侔芒侯反摶徒丸反甐音吝又音鱗本作鄰三分其股圍去一以為骹圍者此輪之常制也至於行山行澤又加損焉以從其宜是以行澤必于骹圍者蒪之故欲杼杼言削薄其踐地者行山必于股骹皆等也故欲侔侔言上下之適等也澤水地也行澤者以薄為和故杼以行澤則是割塗而塗不附山石地也行山者以厚為利侔以行山則是摶以行石而輪雖敝不甐于鑿蓋石雖齧之而其鑿不動也凡揉牙外不亷而內不挫旁不腫謂之用火之善挫作卧反凡揉木者宜審曲面藝順其形性之自然而屈之以火違而逆之則外亷而絶理內損而挫折中旁腫負而起善揉牙者無此三患然後可以成固抱之功是故謂之用火之善傳曰恃自負之木則千嵗無輪荀卿曰木直中繩揉以為輪其曲中規皆成於矯揉之善也是故規之以眂其圜也萬之以眂其匡也縣之以眂其輻之直也水之以眂其平沈之均也量其藪以黍以眂其同也權之以眂其輕重之侔也故可規可萭可水可縣可量可權也謂之國工萭矩同縣懸同規矩以正方圓準繩以正平直權以正輕重量以正多寡凡為器而具此六者莫如輪也圓者中規方者中矩故規之以眂其圓矩之以眂其匡萭于文宜為矩匡言其方也縣之以眂其輻之直欲其應于繩也水之以眂其平沈之均權之以眂其輕重之侔欲其應於權也量其藪以黍以眂其同欲其應於量也可規可矩可水可縣可量可權而輪無不善則國人無以過其巧故曰國工夫士善於一國則謂之國士若工巧於一國則謂之國工宜矣周禮詳解卷三十五
